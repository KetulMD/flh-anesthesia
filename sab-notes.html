<!DOCTYPE html>
<html lang="en">

<meta charset="utf-8">

<title>Spinal (SAB) Note Labels</title>
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#f2f2f7">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;margin:0;color:#1f2937;background:#f3f4f6}.wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px}h1{font-size:20px;margin:0 0 4px}.sub{color:#6b7280;font-size:12px;margin:0 0 16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px}label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}textarea{width:100%;min-height:110px;font-size:14px;line-height:1.4;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;resize:vertical;font-family:inherit}.row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-top:14px}.field{display:flex;flex-direction:column}.field input{width:110px;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px}.btns{display:flex;gap:10px;flex-wrap:wrap}button{cursor:pointer;border:none;border-radius:8px;padding:11px 18px;font-size:14px;font-weight:700}.primary{background:#2563eb;color:#fff}.ghost{background:#eef2ff;color:#2563eb}.meta{font-size:12px;color:#6b7280;margin-top:8px}.meta .pill{display:inline-block;background:#f1f5f9;border-radius:999px;padding:3px 10px;font-size:12px;margin:2px 6px 2px 0}.previewArea{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}.labelPreview{width:504px;height:192px;border:1px dashed #cbd5e1;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:6px;background:#fff;overflow:hidden}.labelText{text-align:center;line-height:1.12;word-break:break-word;white-space:pre-wrap;font-family:Helvetica,Arial,sans-serif}.sheetNote{font-size:12px;color:#6b7280;max-width:300px}</style>
<style>
@view-transition{navigation:auto}
::view-transition-group(root){animation-duration:.3s;animation-timing-function:cubic-bezier(.22,.68,0,1)}
::view-transition-old(root){animation-name:vtOldF}
::view-transition-new(root){animation-name:vtNewF}
:root:active-view-transition-type(back)::view-transition-old(root){animation-name:vtOldB}
:root:active-view-transition-type(back)::view-transition-new(root){animation-name:vtNewB}
@keyframes vtNewF{from{transform:translateX(100%)}}
@keyframes vtOldF{to{transform:translateX(-24%);opacity:.55}}
@keyframes vtNewB{from{transform:translateX(-24%);opacity:.55}}
@keyframes vtOldB{to{transform:translateX(100%)}}
@media (prefers-reduced-motion:reduce){::view-transition-group(root),::view-transition-old(root),::view-transition-new(root){animation:none!important}}
</style>
<script>(function(){function bk(a){try{return a&&a.navigationType==='traverse'&&a.from&&a.entry&&a.entry.index<a.from.index;}catch(e){return false;}}
window.addEventListener('pageswap',function(e){if(e.viewTransition){e.viewTransition.types.add(bk(e.activation)?'back':'forward');}});
window.addEventListener('pagereveal',function(e){if(e.viewTransition){var a=(window.navigation&&navigation.activation);e.viewTransition.types.add(bk(a)?'back':'forward');}});})();</script>
</head>
<body>
<div class="wrap"><h1>Spinal Anesthesia (SAB) Note Labels</h1><p class="sub">Avery 5160 &middot; Letter sheet &middot; 3 &times; 10 = 30 identical labels &middot; 2.625&Prime; &times; 1.0&Prime; each &middot; auto-fit text</p><div class="card"><label for="sab_txt">Label text (editable &mdash; this is the default)</label><textarea id="sab_txt"></textarea><div class="row"><div class="field"><label for="sab_count">Number of labels</label><input id="sab_count" type="number" min="1" max="30" value="30"></div><div class="btns"><button class="ghost" id="sab_update">Update preview</button><button class="primary" id="sab_pdf">Generate PDF (Print / Download)</button></div></div><div class="meta"><span class="pill">Page: Letter</span><span class="pill">Cell: 2.625 &times; 1.0 in</span><span class="pill">Margins: 0.1875 L / 0.5 T</span><span class="pill">Gutter: 0.125 X &middot; 0 Y</span><span class="pill">Helvetica 9pt max</span></div></div><div class="card"><div class="previewArea"><div><label>Single label preview (2&times; actual size)</label><div class="labelPreview"><div class="labelText" id="sab_prev"></div></div><p class="sheetNote" id="sab_fit"></p></div><div><label>Sheet</label><p class="sheetNote" id="sab_sheet"></p></div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
(function(){
  var GEO={labelW:2.625,labelH:1.0,marginLeft:0.1875,marginTop:0.5,gapX:0.125,gapY:0,cols:3,rows:10,padX:0.1,padY:0.06};
  var DEFAULT_TEXT="SPINAL (SAB): Timeout/consent, coags & allergies OK. Sitting, ASA monitors, sterile prep/drape. Lido 1% at L__-L__. 25g pencil-pt, __ attempt(s). Free-flow clear CSF, no blood/paresthesia. Bupiv 0.75% __ mL + Fent __ mcg. Stable, tolerated well.";
  function $(id){return document.getElementById(id);}
  var txt,prev,fitInfo,sheetInfo,countEl;
  function wrap(doc,text,fs,maxWin){doc.setFontSize(fs);var words=text.split(/\s+/),lines=[],cur='';for(var i=0;i<words.length;i++){var w=words[i];var test=cur?cur+' '+w:w;if(doc.getTextWidth(test)<=maxWin||!cur){if(!cur&&doc.getTextWidth(w)>maxWin){var p='';for(var c=0;c<w.length;c++){if(doc.getTextWidth(p+w[c])>maxWin&&p){lines.push(p);p=w[c];}else p+=w[c];}cur=p;}else cur=test;}else{lines.push(cur);cur=w;}}if(cur)lines.push(cur);return lines;}
  function fit(doc,text){var maxWin=GEO.labelW-2*GEO.padX,maxHin=GEO.labelH-2*GEO.padY,best=null;for(var fs=9.0;fs>=3.0;fs-=0.25){var lines=wrap(doc,text,fs,maxWin);var lineHin=(fs/72)*1.12;if(lines.length*lineHin<=maxHin){best={fontSize:fs,lines:lines,lineHin:lineHin};break;}}if(!best){var f=3.0;best={fontSize:f,lines:wrap(doc,text,f,maxWin),lineHin:(f/72)*1.12};}return best;}
  function ready(){return !!(window.jspdf&&window.jspdf.jsPDF);}
  function makeDoc(){var J=window.jspdf.jsPDF;var d=new J({unit:'in',format:'letter',orientation:'portrait'});try{d.viewerPreferences({PrintScaling:'None'});}catch(e){}return d;}
  function render(){if(!ready()){fitInfo.textContent='Loading PDF engine...';return;}var doc=makeDoc();doc.setFont('helvetica','normal');var f=fit(doc,txt.value);var sc=2;prev.style.fontSize=(f.fontSize*(96/72)*sc)+'px';prev.style.lineHeight='1.12';prev.textContent=f.lines.join(String.fromCharCode(10));var n=Math.max(1,Math.min(30,parseInt(countEl.value||'30',10)));fitInfo.textContent='Auto-fit: '+f.fontSize.toFixed(2)+' pt, '+f.lines.length+' line(s) (preview at '+sc+'x actual size)';sheetInfo.textContent=n+' identical labels, filled column by column (col=floor(i/10), row=i%10), Helvetica, centered.';return f;}
  function genPDF(){if(!ready()){alert('PDF engine still loading, please try again in a moment.');return;}var doc=makeDoc();doc.setFont('helvetica','normal');var f=fit(doc,txt.value);var n=Math.max(1,Math.min(30,parseInt(countEl.value||'30',10)));doc.setFontSize(f.fontSize);var lh=f.lineHin;for(var i=0;i<n;i++){var col=Math.floor(i/GEO.rows),row=i%GEO.rows;var x=GEO.marginLeft+col*(GEO.labelW+GEO.gapX);var y=GEO.marginTop+row*(GEO.labelH+GEO.gapY);var cx=x+GEO.labelW/2;var bh=f.lines.length*lh;var sy=y+(GEO.labelH-bh)/2+lh*0.80;for(var L=0;L<f.lines.length;L++){doc.text(f.lines[L],cx,sy+L*lh,{align:'center',baseline:'alphabetic'});}}doc.autoPrint();window.open(doc.output('bloburl'),'_blank');}
  function init(){txt=$('sab_txt');prev=$('sab_prev');fitInfo=$('sab_fit');sheetInfo=$('sab_sheet');countEl=$('sab_count');if(!txt.value)txt.value=DEFAULT_TEXT;$('sab_update').addEventListener('click',render);$('sab_pdf').addEventListener('click',genPDF);txt.addEventListener('input',render);countEl.addEventListener('input',render);waitJsPDF();}
  function waitJsPDF(){if(ready()){render();}else{setTimeout(waitJsPDF,150);}}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
})();
</script>
<script>
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js');
}
</script>
<script src="nav.js" defer></script>
</body>
</html>
