<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FLH Anesthesia schedules — call schedules, OR block schedule, and yearly archives">
<title>FLH Anesthesia — Schedules</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --text:#1f2933; --muted:#6b7280;
    --border:#e6e8ec; --border-hover:#cdd3da; --icon:#64748b;
    --accent:#2f6fed; --accent-bg:#eef4ff; --accent-border:#cfe0fb;
    --red:#c0392b; --radius:12px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); margin:0; padding:24px 18px;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  .wrap{max-width:680px; margin:0 auto}
  header{text-align:center; margin-bottom:22px}
  header h1{font-size:21px; font-weight:700; letter-spacing:.2px; margin:0}
  header .sub{font-size:13px; color:var(--muted); margin:4px 0 0}
  .seclabel{font-size:12px; font-weight:600; letter-spacing:1.1px; text-transform:uppercase; color:var(--muted); margin:26px 2px 12px}
  .seclabel:first-of-type{margin-top:0}
  /* Tiles */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  @media(max-width:520px){ .grid{grid-template-columns:1fr} }
  .tile{
    display:flex; align-items:center; gap:13px; padding:16px 16px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    text-decoration:none; color:var(--text); font-size:15px; font-weight:500; transition:.16s ease;
  }
  .tile:hover{transform:translateY(-1px); border-color:var(--border-hover); box-shadow:0 4px 14px rgba(18,24,33,.07)}
  .tile svg{flex:none; width:28px; height:28px; color:var(--icon)}
  .tile .favimg{flex:none; width:22px; height:22px; border-radius:5px; object-fit:contain}
  .tile .chev{margin-left:auto; color:#c4cbd3; font-size:20px; line-height:1}
  /* Year archive */
  .archive-head{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin:26px 2px 12px}
  .archive-head .seclabel{margin:0}
  .archive-head .hint{font-size:12px; color:var(--muted2,#9aa3af)}
  .years{display:grid; grid-template-columns:repeat(auto-fill,minmax(82px,1fr)); gap:10px}
  .yr{
    display:flex; align-items:center; justify-content:center; padding:13px 8px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    text-decoration:none; color:var(--text); font-size:15px; font-weight:600; transition:.16s ease; position:relative;
  }
  .yr:hover{transform:translateY(-1px); border-color:var(--border-hover); box-shadow:0 4px 12px rgba(18,24,33,.07)}
  .yr small{display:block; font-size:10px; font-weight:600; color:var(--muted); letter-spacing:.3px}
  .yr.current{background:var(--accent-bg); border-color:var(--accent-border); color:var(--accent)}
  .yr.current:after{content:"NOW"; position:absolute; top:-7px; right:-6px; background:var(--accent); color:#fff; font-size:9px; font-weight:700; letter-spacing:.4px; padding:2px 6px; border-radius:999px}
  /* Featured current-year card */
  .feature{display:flex; align-items:center; gap:14px; padding:16px 18px; margin:0 0 16px; background:var(--accent-bg); border:1px solid var(--accent-border); border-radius:14px; text-decoration:none; color:var(--text); transition:.16s ease}
  .feature:hover{transform:translateY(-1px); box-shadow:0 6px 18px rgba(47,111,237,.13)}
  .feature .fic{flex:none; width:40px; height:40px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center}
  .feature .fic svg{width:22px; height:22px; color:#fff}
  .feature .ftitle{font-size:15px; font-weight:600; color:var(--text)}
  .feature .fval{margin-left:auto; font-size:19px; font-weight:800; color:var(--accent); letter-spacing:.2px}
  .feature .fchev{color:var(--accent); opacity:.5; font-size:22px; line-height:1}
  /* Federal holidays table */
  .holwrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border); border-radius:12px; background:var(--surface)}
  .holtab{border-collapse:collapse; width:100%; min-width:430px; font-size:13px}
  .holtab th,.holtab td{padding:9px 10px; text-align:center; border-bottom:1px solid var(--border)}
  .holtab thead th{font-size:12px; font-weight:700; color:var(--muted); background:#fbfcfd}
  .holtab tbody tr:last-child td,.holtab tbody tr:last-child th{border-bottom:0}
  .holtab .rowh{text-align:left; font-weight:600; color:var(--text); white-space:nowrap}
  .holtab .hdate{display:block; font-weight:600; color:var(--text)}
  .holtab .hdow{display:block; font-size:10px; color:var(--muted); margin-top:1px}
  .holtab thead th.curcol{color:var(--accent); background:var(--surface2)}
  .holnote{font-size:11px; color:var(--muted2); margin:8px 2px 0; line-height:1.5}
  .holnote b{color:var(--muted); font-weight:600}
  /* Federal Holidays — collapsed, de-emphasized */
  .holdetails{margin-top:26px; border-top:1px solid var(--border); padding-top:14px}
  .holdetails summary{list-style:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-size:12px; font-weight:600; letter-spacing:1.1px; text-transform:uppercase; color:var(--muted); padding:2px 2px}
  .holdetails summary::-webkit-details-marker{display:none}
  .holdetails summary .chev{font-size:18px; color:var(--muted2); transition:transform .2s}
  .holdetails[open] summary .chev{transform:rotate(90deg)}
  .holdetails .holwrap{margin-top:12px; border-color:var(--border)}
  .holdetails .holtab{font-size:12px}
  .holdetails .holtab th,.holdetails .holtab td{padding:7px 9px}
  footer{text-align:center; font-size:13px; color:var(--muted); margin-top:40px; padding-top:18px; border-top:1px solid var(--border)}
  footer a{color:var(--accent); text-decoration:none}
  @media print{ body{background:#fff} .tile,.yr{break-inside:avoid} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Schedules</h1>
    <p class="sub">Call schedules, OR block schedule &amp; yearly archives</p>
  </header>

  <main role="main">
    <div class="seclabel">Call Schedule</div>
    <div id="currentYear"></div>

    <div class="archive-head">
      <div class="seclabel">All Years</div>
    </div>
    <div class="years" id="yearGrid"></div>

    <div class="seclabel" style="margin-top:28px">Other Schedules</div>
    <div class="grid" id="typeGrid"></div>

    <details class="holdetails">
      <summary><span>Federal Holidays</span><span class="chev">&rsaquo;</span></summary>
      <div class="holwrap" id="holHost"></div>
      <div class="holnote">Showing the <b>observed</b> federal day off — a holiday on Saturday is observed the prior Friday; on Sunday, the following Monday.</div>
    </details>
  </main>

  <footer>
    <p><a href="index.html">&larr; Back to Portal</a></p>
  </footer>
</div>

<script>
  const CURRENT_YEAR = Math.min(new Date().getFullYear(), 2028); // auto-advances through 2028

  // Icons (inline SVG, lucide-style)
  const IC = {
    mdcall:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5.2 5.07A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
    nurse:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5.2 5.07A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
    block:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
    nursesched:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
    staff:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    umbrella:'<path d="M22 12a10.06 10.06 0 0 0-20 0Z"/><path d="M12 12v8a2 2 0 0 0 4 0"/><line x1="12" y1="2" x2="12" y2="3"/>',
    pumpkin:'<ellipse cx="12" cy="13.5" rx="8" ry="6"/><path d="M12 7.5V5c0-1.1.9-1.9 2-1.6"/><path d="M9 8.4c-1 1.6-1 8.6 0 10.2"/><path d="M15 8.4c1 1.6 1 8.6 0 10.2"/>',
    turkey:'<path d="M13.8 13 16.9 5.3"/><path d="M13.8 13 20 6.6"/><path d="M13.8 13 21.6 9.6"/><path d="M13.8 13 21.2 12.9"/><path d="M16.9 5.3Q21.6 6.2 21.2 12.9"/><ellipse cx="10.3" cy="14" rx="4.6" ry="3.7"/><path d="M6.9 12.2Q5.5 10.4 5.9 9.2"/><circle cx="5.9" cy="8" r="1.5"/><path d="M4.5 7.8 3.1 8.3 4.5 8.7"/><path d="M5.1 9q-.5 1.1.3 1.8"/><path d="M8.8 17.6V20"/><path d="M11.8 17.6V20"/><path d="M7.9 20h1.9"/><path d="M10.9 20h1.9"/>',
    weekend:'<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="6.8" y2="6.8"/><line x1="17.2" y1="17.2" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="6.8" y2="17.2"/><line x1="17.2" y1="6.8" x2="19.1" y2="4.9"/>',
    holiday:'<path d="M4 22V4a1 1 0 0 1 1-1h0a1 1 0 0 1 1 1v18"/><path d="M6 4h11l-2 3 2 3H6z"/>'
  };
  function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+p+'</svg>';}

  const TYPES = [
    {t:'FLH OR Staff Schedule', svgc:'<path d="M3.6 11.8q1.3-1.4 2.9-.5l2.7 1.6q.7.4 1.4.4t1.4-.4l2.7-1.6q1.6-.9 2.9.5 .9 1 .2 2.2-2.9 4.4-7.2 4.4t-7.2-4.4q-.7-1.2.2-2.2z" fill="#3c4654"/><path d="M12 6.2c-1.1-2.3-4.7-1.9-4.7 1.1 0 2 2.7 3.8 4.7 5.2 2-1.4 4.7-3.2 4.7-5.2 0-3-3.6-3.4-4.7-1.1z" fill="#d9505c"/>', h:'https://www.flhnursing.com/'},
    {t:'Long Weekend Assignments', ic:'turkey',h:'https://docs.google.com/spreadsheet/pub?key=0ArVz2o-8X8BZdFAyQUpmMnRPdTZobDJoRHNRQ2pUYUE&single=true&gid=1&output=html'}
  ];

  // Yearly archive (newest first). label optional sub-note.
  const YEARS = [
    {y:'2028', h:'https://docs.google.com/spreadsheets/d/1qLD2sopO9feS34-_OyI75wJ1k2dqo_Gayf7IY6UEZW0/edit?usp=sharing'},
    {y:'2027', h:'https://docs.google.com/spreadsheets/d/1FD5p2amEV64xk0gArakbRtRp3RNkRFXqMOHl6HYX1VU/edit?usp=sharing'},
    {y:'2026', h:'https://docs.google.com/spreadsheets/d/1Pnk6R_c7-DR5Xctnhmh8l_D7mLxYJPUzDSahE3LOUpU/edit?usp=sharing'},
    {y:'2025', h:'https://docs.google.com/spreadsheets/d/12inSlt34Aji_N19hPA9H4UNSMTSmM3vJK04qub4TZ_c/edit?usp=sharing'},
    {y:'2024', h:'https://docs.google.com/spreadsheets/d/1M-lpUeXSuEYjNh6OPOOaiSa_phQZkPWgwau8SbEm7ms/edit?usp=sharing'},
    {y:'2023', h:'https://docs.google.com/spreadsheets/d/1CNXaAkUiDT3H2NmK66R5rLtqMRAV21yMDIwMxY0-3oU/edit?usp=sharing'},
    {y:'2022', h:'https://docs.google.com/spreadsheets/d/190l8luoAzUEJl-IhcyLUDLFBnAkizX60aJ8EYayFjOM/edit#gid=360989117'},
    {y:'2021', h:'https://docs.google.com/spreadsheets/d/1S21o-8nhAmRWBj7Qfbvy0SJCDBi9moPCZLaqC8L2n84/edit?usp=sharing'},
    {y:'2020', h:'https://docs.google.com/spreadsheets/d/10O5QfY4kLY2T-DSdfh7TYT4H5-BMtq0b8h7OuIlHhf4/edit#gid=933395102'},
    {y:'2019', sub:'Jul–Dec', h:'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_2LDpfLFi5ob4eBdPfifcHHFg6mVQ1Zrhznu73OUXoa0e807AbTCeY7S9FiUvUoCd1P7smrKISYWo/pubhtml'},
    {y:'2019', sub:'Jan–Jun', h:'https://docs.google.com/spreadsheets/d/175goFSVt4E8uloe53bRlldWc89HKiyd90Xa_A3wck7A/edit?usp=sharing'},
    {y:'2018', h:'https://docs.google.com/spreadsheets/d/116d8xcqqg_LvhRBAqYDnahL20LQWCa0cX9nJZBxPdrw/edit?usp=sharing'},
    {y:'2017', h:'https://docs.google.com/spreadsheets/d/1dEV1107rAA6ut4fnwXSp51gSrzEh2IkUNIcJl81BcQ8/edit?usp=sharing'},
    {y:'2016', h:'https://docs.google.com/spreadsheets/d/1uh9Oh54OVCvCXHJD8IfcI0qtHZkjenqEJJB-rn69lGo/pubhtml'},
    {y:'2015', h:'https://docs.google.com/spreadsheets/d/11BAhBPuxzn_ri0BwNkO1O8nic4UeT78OxVIU7eXauYU/pubhtml'},
    {y:'2014', h:'https://docs.google.com/spreadsheet/pub?key=0ArVz2o-8X8BZdEg2ZHhHTlhFOUxEcTZUTl9Rc2lUVXc&output=html'},
    {y:'2013', h:'https://docs.google.com/spreadsheet/pub?key=0ArVz2o-8X8BZdGRJdnVCWEdTRDlyX1hQeHo1czIwa1E&output=html'},
    {y:'2012', h:'https://spreadsheets.google.com/spreadsheet/pub?hl=en_US&hl=en_US&key=0ArVz2o-8X8BZdFh0NWo5U0txaXhDU04xRVd0NTh2TVE&output=html'},
    {y:'2011', h:'https://docs.google.com/spreadsheets/d/1hE-7f7_cqlQ1h1IGvLxlcpNYKk5ffBu-rSdhmaXpAqc/edit?usp=sharing'},
    {y:'2010', h:'https://docs.google.com/spreadsheets/d/1ptzFaZPvLP9WpBhBBSTIeY8SQXCbCksYs7JpJWa2GuA/edit?usp=sharing'},
    {y:'2009', h:'https://docs.google.com/spreadsheets/d/1kGZGFnQrmT866ot1MIPAO8YQi4OKmscUFXR73Jk93NQ/edit?usp=sharing'}
  ];

  const tg=document.getElementById('typeGrid');
  TYPES.forEach(function(o){
    const a=document.createElement('a');
    a.className='tile'; a.href=o.h; a.target='_blank'; a.rel='noopener noreferrer';
    var icon=o.svgc?'<svg viewBox="0 0 24 24" aria-hidden="true">'+o.svgc+'</svg>':(o.img?'<img class="favimg" src="'+o.img+'" alt="" width="22" height="22" loading="lazy">':svg(IC[o.ic]||''));
    a.innerHTML=icon+'<span>'+o.t+'</span><span class="chev">&rsaquo;</span>';
    tg.appendChild(a);
  });

  const yg=document.getElementById('yearGrid');
  YEARS.forEach(function(o){
    const a=document.createElement('a');
    a.className='yr'+(o.y==String(CURRENT_YEAR)&&!o.sub?' current':'');
    a.href=o.h; a.target='_blank'; a.rel='noopener noreferrer';
    a.innerHTML=o.y+(o.sub?'<small>'+o.sub+'</small>':'');
    yg.appendChild(a);
  });
  // Featured card — auto-selected from the current year (capped at 2028).
  var cy=YEARS.find(function(o){return o.y==String(CURRENT_YEAR)&&!o.sub;});
  if(cy){
    const a=document.createElement('a');
    a.className='feature'; a.href=cy.h; a.target='_blank'; a.rel='noopener noreferrer';
    a.innerHTML='<span class="fic">'+svg(IC.nursesched)+'</span>'+
      '<span class="ftitle">Current Schedule</span>'+
      '<span class="fval">'+cy.y+'</span>'+
      '<span class="fchev">&rsaquo;</span>';
    document.getElementById('currentYear').appendChild(a);
  }

  // Federal holidays — current year + next 4, auto-computed
  function nthWeekday(y,m,wd,n){var d=new Date(y,m,1);var off=(wd-d.getDay()+7)%7;return new Date(y,m,1+off+(n-1)*7);}
  function lastWeekday(y,m,wd){var d=new Date(y,m+1,0);var off=(d.getDay()-wd+7)%7;return new Date(y,m,d.getDate()-off);}
  function holidays(y){return [
    {n:'New Year’s Day', d:new Date(y,0,1)},
    {n:'Memorial Day', d:lastWeekday(y,4,1)},
    {n:'Independence Day', d:new Date(y,6,4)},
    {n:'Labor Day', d:nthWeekday(y,8,1,1)},
    {n:'Thanksgiving', d:nthWeekday(y,10,4,4)},
    {n:'Christmas Day', d:new Date(y,11,25)}
  ];}
  function observed(d){var x=new Date(d.getTime());var g=x.getDay();if(g===6)x.setDate(x.getDate()-1);else if(g===0)x.setDate(x.getDate()+1);return x;}
  (function(){
    var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var yrs=[]; for(var i=0;i<5;i++) yrs.push(CURRENT_YEAR+i);
    var names=holidays(CURRENT_YEAR).map(function(h){return h.n;});
    var html='<table class="holtab"><thead><tr><th class="rowh">Holiday</th>'+
      yrs.map(function(y){return '<th'+(y===CURRENT_YEAR?' class="curcol"':'')+'>'+y+'</th>';}).join('')+'</tr></thead><tbody>';
    names.forEach(function(nm,ri){
      html+='<tr><th class="rowh">'+nm+'</th>';
      yrs.forEach(function(y){
        var d=observed(holidays(y)[ri].d);
        html+='<td'+(y===CURRENT_YEAR?' class="curcol"':'')+'><span class="hdate">'+MON[d.getMonth()]+' '+d.getDate()+'</span><span class="hdow">'+DOW[d.getDay()]+'</span></td>';
      });
      html+='</tr>';
    });
    html+='</tbody></table>';
    document.getElementById('holHost').innerHTML=html;
  })();
</script>
</body>
</html>
