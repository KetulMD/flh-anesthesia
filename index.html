<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FLH Anesthesia Department Portal - Quick access to schedules, resources, and tools">
<title>FLH Anesthesia Portal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2933">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FLH Anesthesia">
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --text:#1f2933; --muted:#6b7280;
    --border:#e6e8ec; --border-hover:#cdd3da; --icon:#64748b;
    --red:#c0392b; --red-bg:#fff5f5; --red-border:#f0c5c5;
    --radius:12px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); margin:0; padding:24px 18px;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  .wrap{max-width:640px; margin:0 auto}
  header{display:none; text-align:center; margin-bottom:22px}
  header h1{font-size:22px; font-weight:700; letter-spacing:.2px; margin:0}
  .sub{font-size:13px; color:var(--muted); margin:4px 0 0}
  .seclabel{
    font-size:12px; font-weight:600; letter-spacing:1.1px; text-transform:uppercase;
    color:var(--muted); margin:28px 2px 12px;
  }
  .seclabel:first-of-type{margin-top:0}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  @media(max-width:520px){ .grid{grid-template-columns:1fr} header{display:block} }
  .tile{
    display:flex; align-items:center; gap:13px;
    padding:16px 16px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); text-decoration:none; color:var(--text);
    font-size:15px; font-weight:500; transition:.16s ease; outline:none;
  }
  .tile:hover{transform:translateY(-1px); border-color:var(--border-hover); box-shadow:0 4px 14px rgba(18,24,33,.07)}
  .tile:focus-visible{outline:2px solid #2f6fed; outline-offset:2px}
  .tile svg{flex:none; width:22px; height:22px; color:var(--icon)}
  .tile .chev{margin-left:auto; color:#c4cbd3; font-size:20px; line-height:1}
  .tile.alert{background:var(--red-bg); border-color:var(--red-border); color:var(--red); font-weight:600}
  .tile.alert svg{color:var(--red)}
  .tile.alert .chev{color:#e0a3a3}
  footer{text-align:center; font-size:13px; color:var(--muted); margin-top:42px; padding-top:18px; border-top:1px solid var(--border)}
  footer p{margin:4px 0}
  @media print{ body{background:#fff} .tile{break-inside:avoid} }
  .tile.green{background:#eef9f1; border-color:#bfe3cc; color:#1e7a44; font-weight:600}
  .tile.green svg{color:#1e7a44}
  .tile.green .chev{color:#9ed3b3}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>FLH Anesthesia</h1>
    <p class="sub">Department Portal &amp; Resources</p>
  </header>
  <main role="main">
    <div class="seclabel">Quick Access</div>
    <div class="grid">
      <a class="tile" href="schedule.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="call-team.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07A19.5 19.5 0 0 1 5.2 5.07A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>On Call Team</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="drug-labels.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>Print Drug Label</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="block-schedule.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Block Schedule</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile alert" href="or-emergencies.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>OR Emergencies</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile green" href="https://ketulmd.github.io/anesthesia-reference/" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Anesthesia Reference</span><span class="chev">&rsaquo;</span>
      </a>
    </div>
    <div class="seclabel">Communication &amp; Learning</div>
    <div class="grid">
      <a class="tile" href="https://myapps.urmc.rochester.edu/Citrix/MyAppsRemoteWeb/" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>URMC Remote Access</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="http://outlook.com/owa/urmc.rochester.edu" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>URMC Outlook Mail</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="https://uidp-prod.its.rochester.edu/idp/profile/SAML2/Unsolicited/SSO?providerId=csod-flh" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>FLH MyPath</span><span class="chev">&rsaquo;</span>
      </a>
      <a class="tile" href="useful-links.html" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        <span>Useful Links</span><span class="chev">&rsaquo;</span>
      </a>
    </div>
  </main>
  <footer>
    <p><strong>FLH Anesthesia Portal</strong></p>
    <p style="font-size:12px; margin-top:8px">Last updated: June 2026</p>
  </footer>
</div>

if ('serviceWorker' in navigator && location.protocol === 'https:') {

</body>
</html>
