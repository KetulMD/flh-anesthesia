<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Anesthesia Reference</title>
<style>
  :root{
    --ink:#12171c; --ink-2:#38434d; --ink-3:#6b7883;
    --paper:#f6f4ef; --card:#fffefb; --line:#e4dfd4; --line-2:#eee9de;
    --accent:#0f6b6b;
    --dis:#0f6b6b; --drug:#8a5a1a; --supp:#4a6b1f; --ref:#5b4b91;
    /* role palette */
    --act:#0e6a6a; --act-bg:#0e6a6a0d; --act-bar:#12938f;
    --alr:#b4560b; --alr-bg:#c26a0f12; --alr-bar:#d8811a;
    --info:#5a6873;
    --hit:#ffe08a; --shadow:0 1px 2px #1217170a, 0 8px 24px -12px #12171718;
    --r:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-text-size-adjust:100%; line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }

  header{
    position:sticky; top:0; z-index:20;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter:saturate(1.4) blur(10px);
    border-bottom:1px solid var(--line);
    padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top));
  }
  .bar{max-width:840px; margin:0 auto}
  .titlerow{display:flex; align-items:baseline; gap:10px; margin-bottom:10px; flex-wrap:wrap}
  .wordmark{font-weight:680; letter-spacing:-.02em; font-size:19px}
  .wordmark b{color:var(--accent)}
  .sub{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); font-weight:600}
  .verify{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--alr); font-weight:700; border:1px solid #d8811a55; background:#d8811a12; padding:3px 8px; border-radius:999px; white-space:nowrap}
  .searchwrap{position:relative; display:flex; align-items:center}
  .searchwrap>svg{position:absolute; left:14px; width:18px; height:18px; stroke:var(--ink-3); pointer-events:none}
  #q{
    width:100%; font-size:16px; color:var(--ink);
    padding:13px 44px 13px 42px; border:1px solid var(--line);
    border-radius:var(--r); background:var(--card); box-shadow:var(--shadow);
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  #q:focus{border-color:var(--accent); box-shadow:0 0 0 3px #0f6b6b14}
  #q::placeholder{color:var(--ink-3)}
  #clear{position:absolute; right:10px; display:none; border:0; background:transparent; color:var(--ink-3); font-size:20px; cursor:pointer; padding:4px 8px; line-height:1}

  .controls{display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap}
  .chips{display:flex; gap:6px}
  .chip{font-size:13px; font-weight:600; color:var(--ink-2); border:1px solid var(--line); background:var(--card); padding:6px 11px; border-radius:999px; cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:6px; transition:.12s}
  .chip .dot{width:7px; height:7px; border-radius:50%}
  .chip[data-cat="Disease"] .dot{background:var(--dis)}
  .chip[data-cat="Drug"] .dot{background:var(--drug)}
  .chip[data-cat="Supplement"] .dot{background:var(--supp)}
  .chip[data-cat="Reference"] .dot{background:var(--ref)}
  .chip.on{color:#fff; border-color:transparent; background:var(--ink)}
  .chip.on .dot{background:#fff}
  .count{margin-left:auto; font-size:12.5px; color:var(--ink-3)}
  .count b{color:var(--ink-2); font-weight:680}

  main{max-width:840px; margin:0 auto; padding:8px 16px 80px}
  .lettergroup{margin-top:18px}
  .lh{position:sticky; top:0; font-size:12px; font-weight:700; letter-spacing:.1em; color:var(--ink-3); padding:6px 2px; margin-bottom:2px}

  .entry{background:var(--card); border:1px solid var(--line-2); border-radius:var(--r); margin:8px 0; overflow:hidden; box-shadow:var(--shadow)}
  .etop{display:flex; align-items:center; gap:12px; width:100%; padding:14px 15px; border:0; background:transparent; cursor:pointer; text-align:left; color:inherit; font:inherit}
  .tag{flex:none; width:4px; align-self:stretch; border-radius:3px; margin:-14px 0; margin-right:2px}
  .entry[data-cat="Disease"] .tag{background:var(--dis)}
  .entry[data-cat="Drug"] .tag{background:var(--drug)}
  .entry[data-cat="Supplement"] .tag{background:var(--supp)}
  .entry[data-cat="Reference"] .tag{background:var(--ref)}
  .etitle{font-size:16px; font-weight:640; letter-spacing:-.01em; flex:1; min-width:0}
  .ecat{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; padding:3px 8px; border-radius:999px; flex:none}
  .entry[data-cat="Disease"] .ecat{color:var(--dis); background:#0f6b6b12}
  .entry[data-cat="Drug"] .ecat{color:var(--drug); background:#8a5a1a12}
  .entry[data-cat="Supplement"] .ecat{color:var(--supp); background:#4a6b1f12}
  .entry[data-cat="Reference"] .ecat{color:var(--ref); background:#5b4b9112}
  .badge-new{font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:800; color:#8a5a1a; background:#d8a11a22; border:1px solid #d8a11a55; padding:3px 7px; border-radius:999px; flex:none}
  .chev{flex:none; width:16px; height:16px; stroke:var(--ink-3); transition:transform .2s}
  .entry.open .chev{transform:rotate(90deg)}

  .body{display:none; padding:4px 15px 16px; border-top:1px solid var(--line-2)}
  .entry.open .body{display:block}

  /* jump bar */
  .jump{display:flex; gap:6px; overflow-x:auto; padding:12px 0 4px; margin:0 -2px 2px; scrollbar-width:none}
  .jump::-webkit-scrollbar{display:none}
  .jpill{flex:none; font-size:11.5px; font-weight:650; letter-spacing:.01em; padding:5px 10px; border-radius:999px; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--ink-2); white-space:nowrap; transition:.12s}
  .jpill:hover{border-color:var(--ink-3)}
  .jpill.j-alert{color:var(--alr); border-color:#d8811a44; background:var(--alr-bg)}
  .jpill.j-action{color:var(--act); border-color:#12938f33; background:var(--act-bg)}

  /* section blocks by role */
  .sec{margin-top:12px; scroll-margin-top:150px}
  .sec--info{padding-left:2px}
  .sec--action{background:var(--act-bg); border-left:3px solid var(--act-bar); border-radius:0 8px 8px 0; padding:10px 12px 11px 13px}
  .sec--alert{background:var(--alr-bg); border-left:3px solid var(--alr-bar); border-radius:0 8px 8px 0; padding:10px 12px 11px 13px}
  .sech{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:750; letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px}
  .sec--info .sech{color:var(--info)}
  .sec--action .sech{color:var(--act)}
  .sec--alert .sech{color:var(--alr)}
  .sech svg{width:13px; height:13px; flex:none}

  .sec p{margin:0 0 4px; font-size:14.5px; color:var(--ink-2)}
  .sec ul{margin:0; padding:0; list-style:none}
  .sec li{position:relative; padding-left:18px; margin:4px 0; font-size:14.5px; color:var(--ink-2)}
  /* info: quiet dot */
  .sec--info li::before{content:""; position:absolute; left:3px; top:9px; width:5px; height:5px; border-radius:50%; background:var(--info); opacity:.45}
  /* action: forward arrow marker */
  .sec--action li::before{content:"\203a"; position:absolute; left:3px; top:-1px; font-size:16px; font-weight:800; color:var(--act-bar)}
  /* alert: warning tick */
  .sec--alert li::before{content:"\25b8"; position:absolute; left:3px; top:1px; font-size:12px; color:var(--alr-bar)}
  .sec--alert li{color:#5f3a12}

  mark{background:var(--hit); color:inherit; border-radius:3px; padding:0 1px}
  .empty{text-align:center; color:var(--ink-3); padding:64px 20px; font-size:15px}
  .empty b{color:var(--ink-2)}
  /* topic modal popup */
  .modal{position:fixed; inset:0; z-index:100; display:none}
  .modal.on{display:block}
  .modal-backdrop{position:absolute; inset:0; background:#121717b3; backdrop-filter:blur(2px)}
  .modal-card{position:relative; z-index:1; display:flex; flex-direction:column;
    max-width:820px; margin:24px auto; max-height:calc(100dvh - 48px);
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:0 24px 70px -24px #12171799; overflow:hidden; animation:mpop .16s ease}
  @keyframes mpop{from{opacity:0; transform:translateY(-8px)}to{opacity:1; transform:none}}
  .modal-head{flex:none; display:flex; align-items:center; gap:12px;
    padding:15px 16px 13px; border-bottom:1px solid var(--line-2); background:var(--card)}
  .modal-title{flex:1; min-width:0; font-size:17px; font-weight:680; letter-spacing:-.01em; line-height:1.3}
  .modal-title .mcat{margin-left:8px; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    font-weight:700; padding:3px 8px; border-radius:999px; white-space:nowrap}
  .mcat-Disease{color:var(--dis); background:#0f6b6b12}
  .mcat-Drug{color:var(--drug); background:#8a5a1a12}
  .mcat-Supplement{color:var(--supp); background:#4a6b1f12}
  .mcat-Reference{color:var(--ref); background:#5b4b9112}
  .modal-close{flex:none; width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
    background:var(--paper); color:var(--ink-2); font-size:23px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.12s}
  .modal-close:hover{background:var(--ink); color:#fff; border-color:transparent}
  .modal-close:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .modal-scroll{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px 16px 20px}
  .modal-scroll .body{display:block; padding:0; border:0}
  .modal-scroll .sec{scroll-margin-top:12px}

  @media (max-width:520px){
    header{padding:8px 12px 8px; padding-top:calc(8px + env(safe-area-inset-top))}
    .titlerow{gap:8px; margin-bottom:8px; align-items:center}
    .wordmark{font-size:16px}
    .sub{display:none}
    .verify{font-size:9px; letter-spacing:.04em; font-weight:600; color:var(--ink-3); border:0; background:transparent; padding:0; margin-left:auto}
    .controls{margin-top:8px}
    .count{width:100%; margin:2px 0 0; order:5}
    main{padding:6px 12px 80px}
    .etop{padding:12px 13px}
    .body{padding:4px 13px 14px}
    .modal-card{margin:0; max-width:none; height:100dvh; max-height:100dvh; border-radius:0; border:0}
    .modal-head{padding:12px 13px}
    .modal-scroll{padding:2px 13px 28px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="titlerow">
      <span class="wordmark">Anesthesia <b>Reference</b></span>
      <span class="sub">Conditions · Drugs · Clinical Tools</span>
      <span class="verify">AI-generated — verify before use</span>
    </div>
    <div class="searchwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Search conditions, drugs, findings…" enterkeyhint="search">
      <button id="clear" aria-label="Clear">×</button>
    </div>
    <div class="controls">
      <div class="chips" id="chips">
        <span class="chip on" data-cat="all">All</span>
        <span class="chip" data-cat="Disease"><i class="dot"></i>Diseases</span>
        <span class="chip" data-cat="Drug"><i class="dot"></i>Drugs</span>
        <span class="chip" data-cat="Supplement"><i class="dot"></i>Supplements</span>
        <span class="chip" data-cat="Reference"><i class="dot"></i>Reference</span>
      </div>
      <div class="count" id="count"></div>
    </div>
  </div>
</header>

<main id="list"></main>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modalTitle">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose" aria-label="Close" data-close>&times;</button>
    </div>
    <div class="modal-scroll" id="modalBody"></div>
  </div>
</div>

<script type="application/json" id="data">[{"id":1,"title":"Anemia, Chronic Disease/Inflammation","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Mild-to-moderate anemia driven by chronic inflammation, in which iron is sequestered rather than truly deficient."},{"h":"Pathophysiology/Background","r":"info","t":"• Inflammation raises hepcidin, trapping iron in macrophages and blunting both erythropoiesis and the erythropoietin response — a normocytic (sometimes microcytic) anemia despite adequate iron stores.\n• Seen with chronic infection, autoimmune disease, malignancy, and chronic kidney disease."},{"h":"Worry About","r":"alert","t":"• Reduced oxygen-carrying reserve; the underlying chronic illness usually dominates perioperative risk more than the anemia itself."},{"h":"Preoperative Preparation","r":"action","t":"• Treat the underlying disease, optimize hemoglobin where feasible, and assess cardiac reserve."},{"h":"Anesthetic Management","r":"action","t":"• Maintain oxygen delivery through adequate cardiac output and saturation; transfuse based on symptoms and comorbidity rather than a fixed number."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Poor tolerance of further blood loss or hypotension."}]},{"id":2,"title":"Abruptio Placentae","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Premature separation of a normally implanted placenta after 20 weeks, producing maternal hemorrhage and fetal compromise. An obstetric emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Bleeding into the decidua basalis; may be revealed (visible vaginal bleeding) or concealed (retroplacental clot with little external loss, so blood loss is underestimated).\n• Risk factors: hypertension/preeclampsia, abdominal trauma, cocaine use, prior abruption, smoking, multiparity, and premature membrane rupture.\n• Severity spans minor marginal separation to complete abruption with fetal death."},{"h":"Worry About","r":"alert","t":"• Rapid, sometimes hidden hemorrhage and hypovolemic shock.\n• Disseminated intravascular coagulation — abruption is a leading obstetric cause.\n• Fetal distress requiring emergent delivery."},{"h":"Preoperative Preparation","r":"action","t":"• Secure large-bore IV access; send type and crossmatch, platelets, and coagulation studies including fibrinogen.\n• Activate the massive-transfusion pathway if unstable; assess the airway (pregnant physiology)."},{"h":"Anesthetic Management","r":"action","t":"• Stable patient with reassuring coagulation: neuraxial anesthesia may be acceptable for cesarean delivery.\n• Active hemorrhage, coagulopathy, or instability: general anesthesia with rapid-sequence induction.\n• Resuscitate with blood products; replace fibrinogen (cryoprecipitate) for DIC; maintain left-uterine displacement until delivery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Continuing hemorrhage, DIC, and postpartum uterine atony.\n• Possible transfusion and hysterectomy; neonatal resuscitation."}]},{"id":3,"title":"Achondroplasia, Dwarfism","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• The most common short-limbed dwarfism (FGFR3 mutation), marked by a large head, midface hypoplasia, and a narrow foramen magnum and spinal canal."},{"h":"Pathophysiology/Background","r":"info","t":"• Defective endochondral ossification.\n• Relevant features: macrocephaly and midface hypoplasia, foramen magnum stenosis (cervicomedullary compression and central apnea risk), thoracolumbar kyphosis, spinal canal stenosis, restrictive lung disease, and obstructive sleep apnea."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation (relatively large tongue, midface hypoplasia, limited neck extension).\n• Cervical cord compression with neck manipulation.\n• Unpredictable neuraxial spread from canal stenosis; restrictive respiratory reserve."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and cervical spine, sleep apnea, and respiratory reserve; review foramen magnum imaging if symptomatic.\n• Plan careful positioning and padding."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (video laryngoscopy, a range of smaller tubes sized by weight rather than age); minimize neck extension.\n• Neuraxial is feasible but with reduced, titrated dosing — a slowly dosed epidural is more controllable than a single-shot spinal given unpredictable spread."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway and ventilation difficulty, potential cord injury, respiratory compromise, and erratic block height."}]},{"id":4,"title":"Acidosis, Lactic/Metabolic","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Low blood pH from acid accumulation or bicarbonate loss. Lactic acidosis usually signals impaired tissue oxygen delivery and is a marker of a sick patient."},{"h":"Pathophysiology/Background","r":"info","t":"• High-anion-gap causes: lactate, ketoacidosis, uremia, and toxins (methanol, ethylene glycol, salicylate).\n• Normal-anion-gap causes: gastrointestinal or renal bicarbonate loss.\n• Lactic acidosis: Type A from hypoperfusion/hypoxia; Type B metabolic (metformin, malignancy, liver failure)."},{"h":"Worry About","r":"alert","t":"• The underlying cause (shock, sepsis, ischemia) is the real danger.\n• Acidosis depresses contractility, blunts the catecholamine response, and promotes arrhythmia and hyperkalemia."},{"h":"Preoperative Preparation","r":"action","t":"• Identify and treat the cause; check arterial blood gas, lactate, electrolytes, and the anion gap.\n• Restore perfusion and volume before elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Restore oxygen delivery — fluids, pressors or inotropes, source control for sepsis.\n• Maintain minute ventilation so respiratory acidosis does not compound the metabolic component.\n• Reserve bicarbonate for specific severe indications rather than routine correction; monitor potassium."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic instability, arrhythmia, blunted pressor response, and potassium shifts."}]},{"id":5,"title":"Acidosis, Renal Tubular","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A normal-anion-gap metabolic acidosis from defective renal handling of acid, with a potassium disturbance that depends on the type."},{"h":"Pathophysiology/Background","r":"info","t":"• Type 1 (distal): impaired hydrogen-ion secretion, hypokalemia, kidney stones/nephrocalcinosis.\n• Type 2 (proximal): impaired bicarbonate reabsorption, hypokalemia, often part of Fanconi syndrome.\n• Type 4: hypoaldosteronism with hyperkalemia."},{"h":"Worry About","r":"alert","t":"• Potassium derangement and resulting arrhythmia (low in types 1 and 2, high in type 4).\n• Chronic acidosis and associated systemic conditions."},{"h":"Preoperative Preparation","r":"action","t":"• Check and correct potassium; assess renal function; continue chronic alkali and potassium therapy."},{"h":"Anesthetic Management","r":"action","t":"• Correct electrolytes before induction.\n• Avoid maneuvers that worsen the specific potassium problem — for example, succinylcholine where type 4 hyperkalemia exists.\n• Maintain ventilation and perfusion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia from potassium shifts, muscle weakness, and delayed recovery."}]},{"id":6,"title":"Acquired Immunodeficiency Syndrome","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Advanced HIV infection with CD4 depletion and vulnerability to opportunistic infection and malignancy; frequently multi-organ. On effective therapy many patients have near-normal reserve."},{"h":"Pathophysiology/Background","r":"info","t":"• Potential involvement: cardiomyopathy, HIV nephropathy, pulmonary disease (Pneumocystis, tuberculosis), peripheral and autonomic neuropathy, encephalopathy, and cytopenias.\n• Antiretroviral therapy carries drug interactions and organ toxicities."},{"h":"Worry About","r":"alert","t":"• End-organ disease (cardiac, pulmonary, renal, neurologic), opportunistic infection, and cytopenias.\n• Antiretroviral interactions — protease inhibitors can alter metabolism of some sedatives and anesthetics.\n• Standard (universal) precautions apply to every patient."},{"h":"Preoperative Preparation","r":"action","t":"• Assess end-organ function, current CD4/viral status, and the full medication list for interactions; continue antiretrovirals perioperatively where feasible."},{"h":"Anesthetic Management","r":"action","t":"• No single mandated technique — tailor to organ involvement with meticulous aseptic practice.\n• Account for drug interactions and for autonomic neuropathy (hemodynamic lability).\n• Neuraxial is acceptable absent coagulopathy or a relevant neurologic contraindication."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Infection risk, drug interactions, organ dysfunction, and autonomic instability."}]},{"id":7,"title":"Acromegaly","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Growth-hormone excess in adults, usually from a pituitary adenoma, causing soft-tissue and bony overgrowth. A classic anticipated-difficult-airway condition."},{"h":"Pathophysiology/Background","r":"info","t":"• Airway: enlarged tongue, lips, and epiglottis; thickened pharyngeal and laryngeal tissue with possible glottic narrowing; prognathism.\n• Systemic: hypertension, cardiomyopathy, glucose intolerance or diabetes, obstructive sleep apnea, and entrapment neuropathies."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation; a narrowed glottis may require a smaller tube.\n• Sleep apnea, cardiomyopathy and hypertension, and hyperglycemia."},{"h":"Preoperative Preparation","r":"action","t":"• Detailed airway assessment (consider nasendoscopy or imaging if glottic involvement is suspected).\n• Evaluate cardiac status, glucose, and sleep apnea."},{"h":"Anesthetic Management","r":"action","t":"• Plan for the difficult airway — awake fiberoptic or video laryngoscopy with a range of tube sizes.\n• Radial arterial line: test collateral flow first, since ulnar circulation may be compromised.\n• Manage blood pressure and glucose."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway difficulty and postoperative obstruction, cardiac events, hyperglycemia, and difficult vascular access."}]},{"id":8,"title":"Acute Intermittent Porphyria","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited defect of heme synthesis (porphobilinogen deaminase) causing acute neurovisceral attacks that certain drugs and stressors can precipitate."},{"h":"Pathophysiology/Background","r":"info","t":"• Attacks: severe abdominal pain, autonomic instability, hyponatremia (from SIADH), peripheral neuropathy, seizures, and psychiatric features.\n• Triggers: fasting, dehydration, infection or stress, and enzyme-inducing drugs — barbiturates are the classic offender."},{"h":"Worry About","r":"alert","t":"• Precipitating an acute attack with an unsafe drug or prolonged fasting.\n• Autonomic instability, hyponatremia, seizures, and — in severe attacks — respiratory muscle weakness.\n• Do not give barbiturates (for example thiopental)."},{"h":"Preoperative Preparation","r":"action","t":"• Avoid prolonged fasting (provide glucose), treat dehydration and infection, and minimize stress.\n• Check every planned drug against a porphyria-safe reference before use."},{"h":"Anesthetic Management","r":"action","t":"• Favor agents generally regarded as safe (propofol, most opioids, nitrous oxide, and the common muscle relaxants); regional anesthesia is acceptable when there is no active neuropathy or instability.\n• Avoid recognized triggers (barbiturates; etomidate is commonly listed as unsafe).\n• Maintain hydration and glucose; treat an acute attack with hemin, carbohydrate, and supportive care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Acute attack with pain, weakness, autonomic swings, and possible respiratory failure; hyponatremia."}]},{"id":9,"title":"Acute Respiratory Distress Syndrome","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute diffuse inflammatory lung injury with bilateral infiltrates, refractory hypoxemia, and reduced compliance not fully explained by cardiac failure."},{"h":"Pathophysiology/Background","r":"info","t":"• Berlin criteria: onset within a week, bilateral opacities, not fully cardiac in origin, and a PaO₂/FiO₂ ratio ≤ 300 on at least 5 cmH₂O PEEP (mild/moderate/severe by ratio).\n• Common causes: sepsis, aspiration, pneumonia, trauma, transfusion-related injury, and pancreatitis."},{"h":"Worry About","r":"alert","t":"• Severe hypoxemia and stiff, low-compliance lungs.\n• Ventilator-induced lung injury, the hemodynamic cost of high PEEP, and right-heart strain."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize the underlying cause; assess oxygenation and hemodynamics; plan uninterrupted ventilator support during transport."},{"h":"Anesthetic Management","r":"action","t":"• Lung-protective ventilation: tidal volume near 6 mL/kg predicted body weight, plateau pressure under 30 cmH₂O, appropriate PEEP, and permissive hypercapnia.\n• Conservative fluid strategy; consider recruitment or prone positioning per the ICU plan; prioritize oxygenation over strict normocapnia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia, barotrauma and pneumothorax, hemodynamic compromise, and difficulty ventilating in transit."}]},{"id":10,"title":"Addison Disease","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Primary adrenocortical failure with deficient cortisol and aldosterone and a real risk of adrenal crisis under the stress of surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Usually autoimmune; also tuberculosis, hemorrhage, or metastatic disease.\n• Features: fatigue, hypotension, hyponatremia, hyperkalemia, hyperpigmentation, and hypoglycemia."},{"h":"Worry About","r":"alert","t":"• Adrenal (Addisonian) crisis — refractory hypotension with hyponatremia, hyperkalemia, and hypoglycemia — triggered by surgical stress without adequate steroid coverage."},{"h":"Preoperative Preparation","r":"action","t":"• Continue maintenance steroids and give stress-dose corticosteroid (for example hydrocortisone) scaled to the size of surgery.\n• Correct volume, sodium, potassium, and glucose."},{"h":"Anesthetic Management","r":"action","t":"• Provide perioperative stress-dose hydrocortisone.\n• Treat hypotension with fluids, pressors, and additional steroid; monitor glucose and electrolytes.\n• Avoid etomidate (further adrenal suppression)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Adrenal crisis, refractory hypotension, and electrolyte and glucose disturbances."}]},{"id":11,"title":"Adrenal Insufficiency, Acute or Secondary","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Insufficient cortisol from adrenal disease (primary) or, more commonly in the perioperative setting, suppression of the HPA axis by chronic exogenous steroids (secondary). Acute deficiency under stress is an emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Secondary insufficiency follows chronic glucocorticoid therapy suppressing ACTH; aldosterone is largely preserved, so hyperkalemia is less prominent than in Addison disease.\n• Suspect suppression after roughly 3 or more weeks of significant steroid dosing within the past year."},{"h":"Worry About","r":"alert","t":"• Perioperative adrenal crisis — hypotension unresponsive to fluids and pressors — in a stressed, steroid-suppressed patient."},{"h":"Preoperative Preparation","r":"action","t":"• Continue usual steroids and add stress-dose coverage matched to surgical severity (minor procedures may need little extra).\n• Correct volume and glucose."},{"h":"Anesthetic Management","r":"action","t":"• Give perioperative hydrocortisone; treat unexplained refractory hypotension with additional steroid plus fluids and pressors.\n• Avoid etomidate."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Crisis and hypotension, hypoglycemia, and delayed recognition because the signs are nonspecific."}]},{"id":12,"title":"Alagille Syndrome","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A multisystem genetic disorder (JAG1/NOTCH2) featuring bile-duct paucity with cholestasis alongside congenital heart disease and other anomalies."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic cholestatic liver disease (pruritus, malabsorption, vitamin-K–dependent coagulopathy).\n• Cardiac lesions — classically peripheral pulmonary stenosis, sometimes tetralogy of Fallot.\n• Vertebral (butterfly) anomalies, renal disease, and vascular anomalies including intracranial vessels."},{"h":"Worry About","r":"alert","t":"• The cardiac lesion and its physiology.\n• Hepatic dysfunction with coagulopathy, bleeding risk, and altered drug handling; possible renal and vascular involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac anatomy (echo and cardiology), liver function and coagulation (correct vitamin K and coagulopathy), and renal function; optimize nutrition."},{"h":"Anesthetic Management","r":"action","t":"• Apply hemodynamic goals appropriate to the cardiac lesion.\n• Favor hepatically-sparing drugs and anticipate prolonged effect; correct coagulopathy before regional techniques or major surgery; manage fluids and glucose carefully."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac decompensation, bleeding, delayed drug clearance, and hemodynamic instability."}]},{"id":13,"title":"Alcohol Abuse","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Chronic alcohol use with multi-organ effects and a real risk of perioperative withdrawal."},{"h":"Pathophysiology/Background","r":"info","t":"• Liver disease (cirrhosis, coagulopathy, portal hypertension), cardiomyopathy and arrhythmia, cytopenias, and nutritional/electrolyte deficits (thiamine, magnesium, folate).\n• Reflux and aspiration risk; altered anesthetic requirement — increased in chronic tolerant users, decreased when acutely intoxicated."},{"h":"Worry About","r":"alert","t":"• Withdrawal — tremor, hypertension, tachycardia, seizures, and delirium tremens, which can be fatal.\n• Cardiomyopathy and arrhythmia, coagulopathy and bleeding, aspiration, and thiamine deficiency (Wernicke encephalopathy)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess liver, cardiac, and coagulation status; correct electrolytes and give thiamine (before glucose).\n• Identify withdrawal risk and treat prophylactically (benzodiazepines)."},{"h":"Anesthetic Management","r":"action","t":"• Chronic users generally need more anesthetic; the acutely intoxicated need less and are aspiration-prone (rapid-sequence induction).\n• Manage withdrawal with benzodiazepines or dexmedetomidine; check coagulation before neuraxial techniques."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Withdrawal and delirium tremens, arrhythmia, bleeding, delayed emergence, and hemodynamic lability."}]},{"id":14,"title":"Amniotic Fluid Embolism","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare, catastrophic obstetric emergency in which amniotic fluid and fetal material entering the maternal circulation trigger cardiovascular collapse, hypoxemia, and DIC."},{"h":"Pathophysiology/Background","r":"info","t":"• Better understood as an anaphylactoid/immune-mediated reaction than as simple embolic obstruction; occurs during labor, delivery, or just afterward.\n• Phase 1: pulmonary hypertension, right-heart failure, and hypoxemia. Phase 2: left-heart failure with DIC and hemorrhage."},{"h":"Worry About","r":"alert","t":"• Sudden hypoxia, hypotension, cardiovascular collapse, seizures, and DIC.\n• High mortality and an often unheralded onset."},{"h":"Preoperative Preparation","r":"action","t":"• A clinical diagnosis of exclusion — suspect it in abrupt peripartum collapse with hypoxia and coagulopathy; prepare for full resuscitation and massive transfusion."},{"h":"Anesthetic Management","r":"action","t":"• Immediate resuscitation: high-quality CPR if arrest occurs, airway and oxygenation, and hemodynamic support (fluids, pressors/inotropes; support the right ventricle and treat pulmonary hypertension).\n• Aggressive product-based treatment of DIC and hemorrhage; deliver the fetus promptly (perimortem cesarean within about 5 minutes of maternal arrest); consider ECMO and a multidisciplinary response."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac arrest, refractory shock, massive hemorrhage with DIC, and neurologic injury."}]},{"id":15,"title":"Amyotrophic Lateral Sclerosis","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Progressive degeneration of upper and lower motor neurons causing weakness, bulbar dysfunction, and eventual respiratory failure."},{"h":"Pathophysiology/Background","r":"info","t":"• Denervation upregulates extrajunctional acetylcholine receptors; bulbar involvement brings aspiration risk and a weak cough, and restrictive respiratory failure develops.\n• Sensation and autonomic function are generally preserved."},{"h":"Worry About","r":"alert","t":"• Exaggerated hyperkalemic response to succinylcholine (denervation) — avoid it.\n• Sensitivity to nondepolarizing relaxants and to respiratory depressants; aspiration risk; poor reserve with a likely need for postoperative ventilation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory function (vital capacity) and bulbar status; discuss ventilation goals and code status; institute aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine; use reduced-dose nondepolarizers with quantitative monitoring (sugammadex is helpful).\n• Regional or neuraxial techniques are possible but document baseline deficits first; minimize long-acting respiratory depressants and plan for possible postoperative ventilation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, aspiration, prolonged weakness, and difficulty weaning."}]},{"id":16,"title":"Anaphylaxis","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute, life-threatening hypersensitivity (IgE-mediated or non-immune anaphylactoid) with cardiovascular collapse, bronchospasm, and airway edema. Common perioperative triggers: neuromuscular blockers, antibiotics, latex, and chlorhexidine."},{"h":"Pathophysiology/Background","r":"info","t":"• Mast-cell and basophil degranulation releases histamine and other mediators, producing vasodilation, capillary leak, bronchoconstriction, and mucosal edema.\n• Under the drapes, unexplained hypotension and high airway pressures may be the first clues."},{"h":"Worry About","r":"alert","t":"• Rapid airway edema, refractory hypotension, bronchospasm, and arrest — and the difficulty of recognizing it when signs are masked by anesthesia."},{"h":"Preoperative Preparation","r":"action","t":"• Document allergies and provide a latex-safe environment when indicated; premedication is not reliably protective."},{"h":"Anesthetic Management","r":"action","t":"• Epinephrine is first-line — titrated IV boluses (roughly 10–100 mcg) or an infusion for collapse, or 0.5 mg IM if no IV; stop the suspected trigger.\n• 100% oxygen and secure the airway; give aggressive IV fluids; antihistamines, steroids, and bronchodilators are secondary. Send a tryptase level; use vasopressin or (if beta-blocked) glucagon for refractory cases."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Biphasic recurrence, prolonged shock, airway compromise, ICU need, and later allergy referral and testing."}]},{"id":17,"title":"Anemia, Aplastic","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Bone-marrow failure producing pancytopenia — anemia, leukopenia, and thrombocytopenia together."},{"h":"Pathophysiology/Background","r":"info","t":"• Immune-mediated, drug- or toxin-induced, viral, or idiopathic marrow aplasia, with reduced oxygen carriage, infection risk, and bleeding."},{"h":"Worry About","r":"alert","t":"• Bleeding from thrombocytopenia, infection from neutropenia, and anemia; transfusion needs and reactions."},{"h":"Preoperative Preparation","r":"action","t":"• Check counts and transfuse red cells and platelets as indicated (leukoreduced and irradiated products, especially in transplant candidates); maintain strict asepsis and stop any causative drug."},{"h":"Anesthetic Management","r":"action","t":"• Meticulous aseptic technique and gentle airway handling to avoid mucosal bleeding.\n• Platelet support before neuraxial techniques or surgery per thresholds; avoid intramuscular injections; maintain oxygen delivery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage, infection and sepsis, and transfusion reactions."}]},{"id":18,"title":"Anemia, Hemolytic","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Anemia from accelerated red-cell destruction — intrinsic defects, immune causes, mechanical damage, or oxidant/drug injury."},{"h":"Pathophysiology/Background","r":"info","t":"• Categories: hereditary (G6PD deficiency, membrane and enzyme defects, hemoglobinopathies), autoimmune (warm or cold antibodies), and mechanical.\n• Hemolysis brings anemia, jaundice, gallstones, and splenomegaly, with the potential for acute crisis when triggered."},{"h":"Worry About","r":"alert","t":"• Precipitating hemolysis (cold in cold-agglutinin disease, oxidant drugs in G6PD, hypoxia/acidosis/dehydration in sickle disease).\n• Difficult cross-matching in autoimmune types and cold-agglutinin activation with hypothermia."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the type and its triggers; secure compatible blood (which may be difficult with autoantibodies); optimize hemoglobin and treat active hemolysis."},{"h":"Anesthetic Management","r":"action","t":"• Keep the patient warm (critical in cold-agglutinin disease — warm fluids and room); maintain oxygenation and perfusion and avoid acidosis and dehydration.\n• Avoid known oxidant drugs in G6PD; continue steroids or immunosuppression in autoimmune forms."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemolytic crisis, difficult transfusion, pigment-related renal injury, and thrombosis."}]},{"id":19,"title":"Angina, Chronic Stable","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Predictable exertional chest pain from fixed coronary disease and a myocardial oxygen supply–demand mismatch, relieved by rest or nitrates."},{"h":"Pathophysiology/Background","r":"info","t":"• Stable atherosclerotic plaque with symptoms reproducible at a given workload; a marker of coronary disease and perioperative cardiac risk."},{"h":"Worry About","r":"alert","t":"• Ischemia when demand rises (tachycardia, hypertension, pain, anemia) or supply falls (hypotension, hypoxemia), and progression to an unstable pattern."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anti-anginal therapy (beta-blockers, nitrates, statins); assess functional capacity and symptom control and risk-stratify."},{"h":"Anesthetic Management","r":"action","t":"• Keep heart rate controlled and low-normal and maintain coronary perfusion pressure (adequate diastolic blood pressure).\n• Avoid tachycardia, hypertension, and hypotension; ensure an adequate hematocrit and good analgesia; treat ischemia promptly."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia, arrhythmia, and demand-related events under surgical stress."}]},{"id":20,"title":"Anhidrosis (Congenital Anhidrotic Ectodermal Dysplasia)","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited ectodermal dysplasia with absent or reduced sweat glands (and sparse hair and teeth) that impairs thermoregulation."},{"h":"Pathophysiology/Background","r":"info","t":"• Hypohidrosis prevents heat dissipation by sweating, creating a hyperthermia risk.\n• Dry airway mucosa and characteristic facial and dental features may affect airway management."},{"h":"Worry About","r":"alert","t":"• Perioperative hyperthermia from impaired heat loss (this is not malignant hyperthermia, but temperature must be actively managed).\n• Dry, friable airway mucosa and possible airway difficulty."},{"h":"Preoperative Preparation","r":"action","t":"• Plan active temperature monitoring and cooling capability; assess the airway."},{"h":"Anesthetic Management","r":"action","t":"• Monitor core temperature closely, keep the ambient temperature moderate, and provide active cooling as needed; humidify inspired gases and avoid unnecessary warming.\n• Handle the airway gently."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hyperthermia, dry secretions and mucus plugging, and airway difficulty."}]},{"id":21,"title":"Ankylosing Spondylitis","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic inflammatory spondyloarthropathy causing progressive spinal fusion, reduced spine and chest-wall mobility, and a rigid, potentially difficult airway and neuraxis."},{"h":"Pathophysiology/Background","r":"info","t":"• Ossification of spinal ligaments produces fixed flexion deformity, limited neck extension and mouth opening, and atlantoaxial involvement; the fused spine is brittle and fracture-prone.\n• Restrictive lung disease from a fixed chest wall; associations include aortic regurgitation, conduction defects, apical fibrosis, and uveitis."},{"h":"Worry About","r":"alert","t":"• Difficult intubation from limited neck movement and mouth opening; difficult or failed neuraxial from ossified ligaments and distorted anatomy.\n• Cervical fracture with manipulation, restrictive respiration, and cardiac involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and cervical mobility, respiratory reserve, and cardiac involvement (ECG and echo); review spine imaging."},{"h":"Anesthetic Management","r":"action","t":"• Awake fiberoptic intubation is often prudent; position the rigid spine with extreme care because of fracture risk.\n• Neuraxial may be technically difficult (paramedian approach or ultrasound guidance; general anesthesia may be preferable); use lung-protective ventilation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway difficulty, cervical injury, failed regional technique, and respiratory compromise."}]},{"id":22,"title":"Anomalous Pulmonary Venous Drainage","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital anomaly in which some (partial) or all (total) pulmonary veins drain into the systemic venous circulation instead of the left atrium, creating a left-to-right shunt."},{"h":"Pathophysiology/Background","r":"info","t":"• Total anomalous drainage needs an atrial communication to survive and can present with neonatal cyanosis and pulmonary congestion — an obstructed form is a surgical emergency.\n• Partial forms behave like an atrial septal defect, with chronic volume overload and pulmonary overcirculation."},{"h":"Worry About","r":"alert","t":"• Pulmonary overcirculation and pulmonary hypertension, right-heart volume overload, and — with obstruction — severe neonatal hypoxia.\n• Paradoxical air embolism."},{"h":"Preoperative Preparation","r":"action","t":"• Define the anatomy (echo and cardiology), assess pulmonary pressures and ventricular function, and de-air all lines."},{"h":"Anesthetic Management","r":"action","t":"• Balance pulmonary and systemic vascular resistance to limit overcirculation; avoid factors that raise pulmonary pressure (hypoxia, hypercarbia, acidosis, cold) when pulmonary hypertension is present.\n• Maintain preload and contractility and de-air lines meticulously."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hypertensive crisis, right-heart failure, arrhythmia, and cyanosis."}]},{"id":23,"title":"Anorexia Nervosa","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• An eating disorder with severe caloric restriction, low body weight, and the multi-system consequences of starvation."},{"h":"Pathophysiology/Background","r":"info","t":"• Cardiac effects (bradycardia, hypotension, arrhythmia, prolonged QT, reduced muscle mass with cardiac atrophy), electrolyte derangements (low potassium, phosphate, magnesium), reduced GFR, delayed gastric emptying, hypothermia, and osteoporosis.\n• Refeeding syndrome is a risk when nutrition is reintroduced."},{"h":"Worry About","r":"alert","t":"• Arrhythmia from QT prolongation and electrolyte shifts, hemodynamic fragility with little reserve, hypoglycemia and hypothermia, aspiration from delayed emptying, and refeeding syndrome."},{"h":"Preoperative Preparation","r":"action","t":"• Correct potassium, magnesium, and phosphate and restore volume; obtain an ECG for QT; assess cardiac and nutritional status and manage glucose cautiously."},{"h":"Anesthetic Management","r":"action","t":"• Expect reduced drug requirements (low lean mass, altered kinetics) and titrate carefully.\n• Warm actively, avoid QT-prolonging drugs, monitor glucose and electrolytes, and take aspiration precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, hypotension, hypothermia, delayed emergence, and refeeding complications."}]},{"id":24,"title":"Anticoagulation, Preoperative","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Managing anticoagulated patients around surgery, balancing thromboembolic risk against surgical and neuraxial bleeding."},{"h":"Pathophysiology/Background","r":"info","t":"• Agent-specific timing: warfarin (stop about 5 days, check INR, bridge only high-thrombotic-risk patients); direct oral anticoagulants (hold roughly 2–3 days depending on drug, renal function, and bleeding risk); heparin or LMWH bridging where indicated.\n• Neuraxial anesthesia carries strict ASRA timing intervals."},{"h":"Worry About","r":"alert","t":"• Bleeding (including spinal or epidural hematoma) if stopped too late, and thromboembolism (stroke, VTE, valve thrombosis) if held too long or bridged inappropriately."},{"h":"Preoperative Preparation","r":"action","t":"• Establish the indication and thrombotic risk; follow agent-specific hold times and ASRA intervals; check renal function (affects DOAC clearance).\n• Reserve bridging for high-risk patients (mechanical valve, recent VTE, high CHA₂DS₂-VASc)."},{"h":"Anesthetic Management","r":"action","t":"• Confirm an adequate interval since the last dose before neuraxial techniques; have reversal available where relevant (4-factor PCC or vitamin K for warfarin, idarucizumab for dabigatran, andexanet or PCC for factor Xa inhibitors).\n• Coordinate the timing of postoperative resumption."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• The bleeding-versus-thrombosis balance, neuraxial hematoma, and timing of resumption."}]},{"id":25,"title":"Antithrombin III Deficiency","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited or acquired deficiency of antithrombin causing a hypercoagulable state with recurrent venous thromboembolism and heparin resistance."},{"h":"Pathophysiology/Background","r":"info","t":"• Antithrombin is the cofactor through which heparin works, so low levels cause both thrombophilia and a blunted heparin effect.\n• Acquired causes include liver disease, nephrotic syndrome, DIC, and heparin therapy itself."},{"h":"Worry About","r":"alert","t":"• Perioperative thrombosis and heparin resistance — inadequate anticoagulation for procedures that require it, such as cardiopulmonary bypass — all balanced against bleeding."},{"h":"Preoperative Preparation","r":"action","t":"• Plan the anticoagulation strategy with hematology, review the thrombotic history, and ensure venous thromboembolism prophylaxis."},{"h":"Anesthetic Management","r":"action","t":"• For heparin-dependent procedures, resistance may require antithrombin concentrate or fresh frozen plasma to restore heparin responsiveness.\n• Maintain thromboprophylaxis, avoid stasis and dehydration, and take care with neuraxial techniques in anticoagulated patients."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Thromboembolism, inadequate anticoagulation despite heparin, and therapy-related bleeding."}]},{"id":26,"title":"Anxiety Disorders","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Common psychiatric conditions with heightened perioperative distress; the anesthetic relevance is chiefly medication interactions and sympathetic responses."},{"h":"Pathophysiology/Background","r":"info","t":"• Patients may take SSRIs or SNRIs, benzodiazepines, buspirone, or beta-blockers; chronic benzodiazepine use brings tolerance and a withdrawal risk."},{"h":"Worry About","r":"alert","t":"• Sympathetic surges (hypertension, tachycardia), benzodiazepine withdrawal, serotonergic interactions (serotonin-syndrome risk when meperidine or tramadol is combined with serotonergic agents), and higher sedative requirements in tolerant patients."},{"h":"Preoperative Preparation","r":"action","t":"• Continue chronic psychiatric medications (avoid abrupt benzodiazepine withdrawal) and provide anxiolytic premedication as appropriate."},{"h":"Anesthetic Management","r":"action","t":"• Provide adequate anxiolysis, choose opioids mindful of serotonergic interactions, expect higher sedative needs in benzodiazepine-tolerant patients, and aim for a smooth emergence."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic lability, withdrawal, drug interactions, and difficult sedation."}]},{"id":27,"title":"Aortic Regurgitation","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• An incompetent aortic valve allowing diastolic backflow into the left ventricle, producing volume overload of a dilated, eccentrically hypertrophied ventricle. The hemodynamic goal is 'fast, full, and forward.'"},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic regurgitation causes LV dilation and eventual dysfunction; acute regurgitation (endocarditis, dissection) is poorly tolerated with sudden pulmonary edema.\n• The regurgitant fraction worsens with bradycardia (longer diastole) and with high afterload."},{"h":"Worry About","r":"alert","t":"• Left-ventricular volume overload and failure, poor tolerance of bradycardia and raised afterload, and rapid decompensation in acute regurgitation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess LV function and severity (echo), optimize heart-failure therapy, and reduce afterload where appropriate."},{"h":"Anesthetic Management","r":"action","t":"• Keep heart rate mildly elevated (about 80–100) to shorten diastole and limit regurgitation; maintain preload.\n• Keep afterload low-normal (avoid marked rises in systemic resistance), support contractility, and avoid bradycardia and hypertension."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure, poor tolerance of myocardial depression, and challenging volume management."}]},{"id":28,"title":"Aortic Stenosis","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Fixed obstruction to left-ventricular outflow. The pressure-overloaded, hypertrophied, stiff LV depends on preload, sinus rhythm, a controlled rate, and coronary perfusion pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Progressive narrowing (calcific, bicuspid, or rheumatic).\n• Severe disease: valve area < 1.0 cm², mean gradient > 40 mmHg, or jet velocity > 4 m/s. The symptom triad — angina, syncope, exertional dyspnea — marks advanced disease and high perioperative risk, and usually warrants valve intervention before elective non-cardiac surgery."},{"h":"Worry About","r":"alert","t":"• Fixed output cannot compensate for vasodilation or a fast rhythm.\n• Hypotension lowers coronary perfusion, driving an ischemia-to-arrest spiral, and chest compressions move little blood across a tight valve."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity and symptoms (echo); consider valve replacement (surgical or transcatheter) first for symptomatic severe disease; optimize rhythm and volume."},{"h":"Anesthetic Management","r":"action","t":"• Keep the rhythm sinus and cardiovert new atrial fibrillation early; avoid tachycardia and marked bradycardia; keep the ventricle well filled.\n• Support systemic vascular resistance (phenylephrine first-line) and correct hypotension early; if regional is chosen, a titrated epidural is gentler than a single-shot spinal."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Poor tolerance of arrhythmia, hypovolemia, and vasodilation, and ischemia or collapse that is hard to reverse once it starts."}]},{"id":29,"title":"Apert Syndrome (Acrocephalosyndactyly Type 1 and 2)","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A craniosynostosis syndrome (FGFR2) with midface hypoplasia, syndactyly, and a challenging airway; children often present for multiple craniofacial procedures."},{"h":"Pathophysiology/Background","r":"info","t":"• Premature cranial-suture fusion risks raised intracranial pressure; midface hypoplasia, choanal stenosis, and a high-arched or cleft palate make mask ventilation and intubation difficult.\n• Possible cervical spine fusion, congenital heart disease, and obstructive sleep apnea."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation, raised intracranial pressure, cervical spine anomalies, and associated cardiac disease and sleep apnea."},{"h":"Preoperative Preparation","r":"action","t":"• Airway assessment with a difficult-airway plan; evaluate intracranial pressure, cervical spine, and cardiac status; review prior anesthetic records."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (video or fiberoptic laryngoscopy, a range of sizes, oral airways) and handle the neck carefully.\n• Manage intracranial pressure, plan for blood loss in craniofacial surgery, and emerge with airway vigilance."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway difficulty, blood loss, raised intracranial pressure, and postoperative airway obstruction."}]},{"id":30,"title":"Apnea of the Newborn","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Breathing pauses (longer than about 15–20 seconds, or shorter with bradycardia or desaturation) in neonates, especially the preterm, from immature respiratory control."},{"h":"Pathophysiology/Background","r":"info","t":"• Central, obstructive, or mixed, and more common with prematurity.\n• General anesthesia increases the risk of postoperative apnea in ex-premature infants."},{"h":"Worry About","r":"alert","t":"• Postoperative apnea and bradycardia after general anesthesia, particularly in ex-premature infants below a corrected-age threshold, with attendant hypoxemia."},{"h":"Preoperative Preparation","r":"action","t":"• Establish gestational and postconceptual age and apnea history; continue caffeine therapy if prescribed; plan postoperative apnea monitoring."},{"h":"Anesthetic Management","r":"action","t":"• Consider spinal anesthesia to reduce apnea risk where feasible and minimize opioids and sedatives; ensure caffeine is given if indicated.\n• Admit for extended apnea monitoring after general anesthesia (commonly advised below roughly 55–60 weeks postconceptual age)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Postoperative apnea and bradycardia, desaturation, and the need for monitored admission."}]},{"id":31,"title":"Arnold-Chiari Malformation (Chiari Malformation Type II)","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A hindbrain malformation with cerebellar and brainstem herniation through the foramen magnum, typically accompanied by myelomeningocele and hydrocephalus."},{"h":"Pathophysiology/Background","r":"info","t":"• Brainstem compression causes lower cranial nerve dysfunction (impaired swallowing and airway reflexes, apnea, stridor); hydrocephalus brings raised intracranial pressure and shunt dependence.\n• Syringomyelia and spinal anomalies may coexist."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure and shunt malfunction, brainstem and cranial-nerve dysfunction with aspiration and central apnea, and positioning that stresses the craniocervical junction."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial pressure and shunt function, bulbar function and aspiration risk, and respiratory status; document the neurologic baseline."},{"h":"Anesthetic Management","r":"action","t":"• Avoid raising intracranial pressure (smooth induction, controlled CO₂, head positioning) and position the neck carefully to avoid brainstem compression.\n• Take aspiration precautions, anticipate postoperative apnea and airway problems, and avoid succinylcholine where significant denervation exists."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Apnea, aspiration, raised intracranial pressure, cranial-nerve dysfunction, and delayed recovery."}]},{"id":32,"title":"Aspiration, Perioperative","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inhalation of gastric contents into the airways, risking chemical pneumonitis, hypoxemia, and pneumonia — a leading anesthetic airway catastrophe."},{"h":"Pathophysiology/Background","r":"info","t":"• Risk rises with a full stomach, delayed gastric emptying (obstruction, gastroparesis, diabetes, opioids, GLP-1 agonists), reflux or hiatal hernia, pregnancy, obesity, emergency surgery, and impaired airway reflexes.\n• Severity tracks the volume and acidity of the aspirate; induction and emergence are the highest-risk moments."},{"h":"Worry About","r":"alert","t":"• Hypoxemia, chemical pneumonitis or ARDS, bronchospasm, and secondary pneumonia."},{"h":"Preoperative Preparation","r":"action","t":"• Identify risk; consider prokinetics, antacids, or H₂ blockers where appropriate; plan rapid-sequence induction with cricoid pressure for high-risk patients; use gastric ultrasound when status is uncertain (for example with GLP-1 agonists)."},{"h":"Anesthetic Management","r":"action","t":"• Rapid-sequence induction with a secured airway for at-risk patients, head-up positioning, and suction ready.\n• If aspiration occurs: head-down and lateral, suction, secure the airway, support oxygenation (PEEP), and give bronchodilators as needed — antibiotics only for established infection, and steroids are not routinely helpful."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia, pneumonitis or ARDS, prolonged ventilation, and pneumonia."}]},{"id":33,"title":"Atherosclerotic Disease","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Systemic arterial atherosclerosis affecting the coronary, cerebral, renal, and peripheral beds — a marker of widespread cardiovascular risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic arterial plaque with a risk of thrombosis and organ ischemia, alongside hypertension, diabetes, dyslipidemia, and smoking.\n• Coronary and carotid involvement drive perioperative cardiac and stroke risk."},{"h":"Worry About","r":"alert","t":"• Perioperative myocardial ischemia and stroke, hemodynamic swings that compromise perfusion of narrowed beds, and renal injury."},{"h":"Preoperative Preparation","r":"action","t":"• Continue statins and appropriate antiplatelet and antihypertensive therapy; assess coronary, carotid, and renal status and risk-stratify."},{"h":"Anesthetic Management","r":"action","t":"• Maintain blood pressure near baseline to preserve perfusion of stenotic beds and avoid tachycardia and pressure extremes.\n• Ensure adequate oxygenation and hematocrit and protect the kidneys (avoid nephrotoxins, maintain perfusion)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia, stroke, renal dysfunction, and hemodynamic instability."}]},{"id":34,"title":"Atrial Fibrillation","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Disorganized atrial activity with an irregularly irregular ventricular response — the most common sustained arrhythmia. Loss of atrial kick and rate control are the central concerns."},{"h":"Pathophysiology/Background","r":"info","t":"• Many causes (hypertension, valve disease, ischemia, thyroid disease, alcohol, sepsis, cardiac surgery).\n• Rapid rates reduce filling and output, and atrial stasis creates thromboembolic (stroke) risk that warrants anticoagulation."},{"h":"Worry About","r":"alert","t":"• Rapid ventricular response with hemodynamic compromise, loss of the atrial contribution in a stiff ventricle, thromboembolism and anticoagulation management, and new perioperative atrial fibrillation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess rate or rhythm control and anticoagulation; check electrolytes and thyroid function; manage the anticoagulant hold or bridge per plan."},{"h":"Anesthetic Management","r":"action","t":"• Control the ventricular rate (beta-blockers, calcium-channel blockers, amiodarone) and correct electrolytes and triggers.\n• For unstable rapid atrial fibrillation, perform synchronized cardioversion; maintain preload and avoid triggers such as light anesthesia and hypoxia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Rate-related instability, thromboembolism, recurrence, and drug effects on conduction."}]},{"id":35,"title":"Atrial Flutter","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Organized atrial reentry (classically around 300 per minute) with variable AV conduction — often 2:1, giving a ventricular rate near 150 — which can compromise hemodynamics."},{"h":"Pathophysiology/Background","r":"info","t":"• A macro-reentrant circuit, usually in the right atrium, with substrates and embolic risk similar to atrial fibrillation; it may convert to and from fibrillation."},{"h":"Worry About","r":"alert","t":"• Sudden 1:1 conduction with very fast rates and collapse, rate-related compromise, thromboembolism, and antiarrhythmic drug effects."},{"h":"Preoperative Preparation","r":"action","t":"• Assess rate control and anticoagulation and check electrolytes; note any ablation history."},{"h":"Anesthetic Management","r":"action","t":"• Control the rate with AV-nodal blockers and treat triggers; use synchronized cardioversion for instability (flutter often converts at low energy).\n• Maintain preload and address anticoagulation as for atrial fibrillation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Rapid conduction and instability, thromboembolism, and recurrence."}]},{"id":36,"title":"Atrial Septal Defect, Ostium Primum","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• A defect low in the atrial septum (a variant within the atrioventricular septal/endocardial-cushion spectrum), often with mitral valve (cleft) involvement and a left-to-right shunt."},{"h":"Pathophysiology/Background","r":"info","t":"• More significant than a simple secundum defect; associated with mitral regurgitation, conduction abnormalities, and, over time, pulmonary hypertension.\n• Common in Down syndrome."},{"h":"Worry About","r":"alert","t":"• Pulmonary overcirculation and pulmonary hypertension, AV-valve regurgitation and heart failure, conduction disturbances and arrhythmia, and paradoxical air embolism."},{"h":"Preoperative Preparation","r":"action","t":"• Define the anatomy and pulmonary pressures (echo), assess valve function and rhythm, plan endocarditis prophylaxis where indicated, and de-air lines."},{"h":"Anesthetic Management","r":"action","t":"• Manage the shunt by balancing systemic and pulmonary resistance and avoid raising pulmonary resistance (hypoxia, hypercarbia, acidosis) when pulmonary hypertension is present.\n• Support ventricular function and de-air all lines meticulously."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hypertension, heart failure, arrhythmia, and paradoxical embolism."}]},{"id":37,"title":"Atrial Septal Defect, Ostium Secundum","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• The most common atrial septal defect, in the mid septum (fossa ovalis), producing a left-to-right shunt that is often well tolerated into adulthood."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic left-to-right shunting causes right-heart volume overload and pulmonary overcirculation; large, long-standing shunts can lead to pulmonary hypertension and, rarely, Eisenmenger reversal.\n• Paradoxical embolism is possible."},{"h":"Worry About","r":"alert","t":"• Paradoxical air or thromboembolism (de-air all lines), right-heart volume overload, atrial arrhythmias, and pulmonary hypertension in large or long-standing defects."},{"h":"Preoperative Preparation","r":"action","t":"• Assess shunt size, pulmonary pressures, and ventricular function (echo) and rhythm; de-air lines."},{"h":"Anesthetic Management","r":"action","t":"• Balance systemic and pulmonary resistance to limit overcirculation and avoid rises in pulmonary resistance when pulmonary hypertension exists.\n• Scrupulously remove air bubbles from IV lines and maintain preload and contractility."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Paradoxical embolism, arrhythmia, right-heart failure, and pulmonary hypertension."}]},{"id":38,"title":"Autoimmune Diseases, Cold","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Antibody-mediated disorders in which cold temperatures trigger red-cell agglutination and hemolysis (cold-agglutinin disease) or vascular symptoms."},{"h":"Pathophysiology/Background","r":"info","t":"• Cold-reacting (usually IgM) antibodies clump red cells and drive complement-mediated hemolysis below a threshold temperature.\n• Cold exposure — cold IV fluids, a cold operating room, or hypothermic bypass — precipitates hemolysis and microvascular occlusion."},{"h":"Worry About","r":"alert","t":"• Hemolysis and agglutination triggered by hypothermia, blood-bank cross-match difficulty, microvascular thrombosis, and special danger during hypothermic cardiopulmonary bypass."},{"h":"Preoperative Preparation","r":"action","t":"• Establish the thermal amplitude with the blood bank, secure compatible warmed blood, plan aggressive warming, and involve hematology (steroids or rituximab in some cases)."},{"h":"Anesthetic Management","r":"action","t":"• Keep the patient warm at all times — warm the room and all IV fluids and blood, and use forced-air warming while monitoring temperature.\n• For cardiac surgery, normothermic techniques or special protocols may be needed; maintain perfusion and oxygenation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemolytic crisis, difficult transfusion, thrombosis, and hemolysis-related renal injury."}]},{"id":39,"title":"Becker Disease","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• An X-linked dystrophinopathy — allelic to Duchenne but milder and later in onset — with progressive skeletal-muscle weakness and cardiomyopathy."},{"h":"Pathophysiology/Background","r":"info","t":"• Partial dystrophin deficiency drives muscle degeneration, dilated cardiomyopathy with conduction disease, and later respiratory-muscle weakness.\n• Anesthesia can provoke rhabdomyolysis and hyperkalemia in dystrophinopathies."},{"h":"Worry About","r":"alert","t":"• Succinylcholine can cause hyperkalemia and rhabdomyolysis — avoid it.\n• Volatile agents may trigger rhabdomyolysis or hyperkalemic arrest, so many use total intravenous anesthesia; cardiomyopathy, arrhythmia, respiratory compromise, and sensitivity to nondepolarizers all apply."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac (echo, ECG) and respiratory function, check a baseline creatine kinase, and plan a trigger-avoiding technique."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine; consider total intravenous anesthesia to avoid volatile-triggered rhabdomyolysis.\n• Titrate nondepolarizers with quantitative monitoring (sugammadex), manage cardiac and respiratory status carefully, watch for hyperkalemia, and monitor respiration postoperatively."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Rhabdomyolysis and hyperkalemic arrest, cardiac events, respiratory failure, and prolonged blockade."}]},{"id":40,"title":"Beckwith-Wiedemann Syndrome","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• An overgrowth syndrome featuring macroglossia, abdominal-wall defects (omphalocele), and neonatal hypoglycemia."},{"h":"Pathophysiology/Background","r":"info","t":"• Macrosomia, macroglossia, and organomegaly; hyperinsulinemic hypoglycemia in the newborn; predisposition to Wilms tumor and hepatoblastoma; possible cardiac anomalies."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation from macroglossia, neonatal hypoglycemia, associated cardiac defects, and postoperative airway obstruction."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway, monitor and treat hypoglycemia (glucose infusion), and evaluate the heart."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (macroglossia — positioning, appropriate sizes, video or fiberoptic tools); maintain glucose with monitoring; extubate carefully given postoperative obstruction risk."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway obstruction, hypoglycemia, and cardiac issues."}]},{"id":41,"title":"Behçet Disease","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• A systemic vasculitis with recurrent oral and genital ulcers, uveitis, and multi-system involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Vasculitis affecting vessels of all sizes: mucocutaneous ulcers, ocular disease, arthritis, GI ulceration, CNS involvement, and vascular disease (aneurysm, thrombosis).\n• Pathergy — exaggerated skin reactivity to needle trauma — is characteristic."},{"h":"Worry About","r":"alert","t":"• Friable, ulcerated airway mucosa that bleeds with instrumentation; vascular involvement (aneurysm, thrombosis, difficult access); pathergy at puncture sites; CNS and cardiac disease; effects of chronic steroids or immunosuppression."},{"h":"Preoperative Preparation","r":"action","t":"• Assess vascular, CNS, cardiac, and pulmonary involvement; provide steroid coverage if on chronic steroids; evaluate airway ulceration."},{"h":"Anesthetic Management","r":"action","t":"• Handle the airway gently (ulcers bleed) and minimize needle trauma without omitting necessary lines.\n• Take care with vascular access given the vasculitis and thrombosis risk; regional is acceptable absent coagulopathy or a neurologic contraindication; give stress-dose steroids as needed."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Mucosal bleeding, thrombosis and vascular events, airway problems, and adrenal suppression."}]},{"id":42,"title":"Bernard-Soulier Syndrome","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare inherited platelet disorder (deficient GPIb-IX-V receptor) causing impaired platelet adhesion, bleeding, large platelets, and thrombocytopenia."},{"h":"Pathophysiology/Background","r":"info","t":"• Platelets cannot bind von Willebrand factor, so adhesion fails; mucocutaneous bleeding and menorrhagia are typical, with a low count of giant platelets."},{"h":"Worry About","r":"alert","t":"• Perioperative bleeding; platelet transfusion may be required, with a risk of alloimmunization; drugs impairing platelet function must be avoided, and neuraxial techniques are contraindicated with active bleeding risk."},{"h":"Preoperative Preparation","r":"action","t":"• Involve hematology, plan platelet support and antifibrinolytics (tranexamic acid), and avoid NSAIDs and antiplatelet agents."},{"h":"Anesthetic Management","r":"action","t":"• Provide hemostatic support (platelets, antifibrinolytics, and recombinant factor VIIa for refractory bleeding); avoid intramuscular injections and traumatic instrumentation; avoid neuraxial techniques; ensure meticulous hemostasis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage and transfusion refractoriness or alloimmunization."}]},{"id":43,"title":"Bipolar Disorder","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mood disorder with manic and depressive episodes; the anesthetic relevance is chiefly medication interactions, especially lithium."},{"h":"Pathophysiology/Background","r":"info","t":"• Treated with lithium, anticonvulsants (valproate, carbamazepine, lamotrigine), and antipsychotics; lithium has a narrow therapeutic window."},{"h":"Worry About","r":"alert","t":"• Lithium toxicity (worsened by dehydration, NSAIDs, thiazides, and ACE inhibitors) and its prolongation of neuromuscular blockade.\n• Anticonvulsant enzyme induction and organ effects, and antipsychotic effects such as QT prolongation and sedation."},{"h":"Preoperative Preparation","r":"action","t":"• Generally continue mood stabilizers; know the lithium level and the patient's hydration and renal status; obtain an ECG for QT."},{"h":"Anesthetic Management","r":"action","t":"• Maintain hydration and sodium balance (lithium handling), monitor neuromuscular blockade (lithium prolongs it), avoid QT-prolonging combinations, and watch for drug interactions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Lithium toxicity, prolonged blockade, arrhythmia, and drug interactions."}]},{"id":44,"title":"Blebs and Bullae","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Air-filled lung spaces at risk of rupture and tension pneumothorax, particularly with positive-pressure ventilation."},{"h":"Pathophysiology/Background","r":"info","t":"• Emphysematous or congenital thin-walled spaces that expand with nitrous oxide and positive pressure, and can rupture to cause pneumothorax or a bronchopleural fistula."},{"h":"Worry About","r":"alert","t":"• Tension pneumothorax with positive-pressure ventilation and nitrous-oxide expansion of air spaces (avoid nitrous oxide); rapid decompensation."},{"h":"Preoperative Preparation","r":"action","t":"• Review imaging and extent, avoid nitrous oxide, and have chest drainage available."},{"h":"Anesthetic Management","r":"action","t":"• Avoid nitrous oxide; use low airway pressures and lung-protective ventilation and avoid high PEEP; consider spontaneous ventilation or strict pressure limits.\n• Keep a chest drain ready and maintain a high index of suspicion for sudden desaturation, hypotension, or rising airway pressures."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pneumothorax or tension physiology, bronchopleural fistula, and hypoxemia."}]},{"id":45,"title":"Bleomycin Sulfate Toxicity","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Pulmonary toxicity from prior bleomycin chemotherapy, producing fibrosis and heightened sensitivity to supplemental oxygen."},{"h":"Pathophysiology/Background","r":"info","t":"• Bleomycin causes dose-related pulmonary fibrosis, and high inspired oxygen may potentiate lung injury (oxygen free radicals) in previously treated patients."},{"h":"Worry About","r":"alert","t":"• Oxygen-potentiated lung injury — use the lowest FiO₂ that maintains an acceptable saturation.\n• Restrictive physiology from fibrosis and worsening of injury by fluid overload."},{"h":"Preoperative Preparation","r":"action","t":"• Establish the history and cumulative bleomycin dose, assess pulmonary function, and plan a conservative oxygen strategy."},{"h":"Anesthetic Management","r":"action","t":"• Titrate FiO₂ to the lowest level that keeps saturation acceptable rather than defaulting to high oxygen; use judicious fluids and lung-protective ventilation and avoid unnecessary hyperoxia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Postoperative respiratory failure or ARDS-like injury and hypoxemia."}]},{"id":46,"title":"Blindness","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Visual impairment relevant for perioperative communication and positioning, and a prompt to consider perioperative visual loss in at-risk surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes vary; the practical concerns are orientation, consent, and guidance, plus awareness that ischemic optic neuropathy can occur in prone spine, cardiac, and prolonged hypotensive cases."},{"h":"Worry About","r":"alert","t":"• Perioperative visual loss in high-risk procedures, and patient orientation, communication, and eye protection."},{"h":"Preoperative Preparation","r":"action","t":"• Document baseline vision, discuss visual-loss risk for high-risk cases, and plan clear communication."},{"h":"Anesthetic Management","r":"action","t":"• Protect the eyes and position the head to avoid direct globe pressure, maintain perfusion pressure and hematocrit, and limit or stage prone time for long spine cases.\n• Communicate verbally and
