, hypoxia, hypertension, and venous congestion), seizures, and possible venous air embolism from positioning."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial-pressure and neurologic status, edema (steroids), and seizures (anticonvulsants), and plan pressure control, hemodynamics, and positioning."},{"h":"Anesthetic Management","r":"action","t":"• Control intracranial pressure (normocarbia to mild hypocarbia as needed, head-up without venous obstruction, mannitol or hypertonic saline, propofol-based technique, limit volatiles and nitrous oxide if pressure is high), maintain cerebral perfusion pressure, and keep induction and emergence smooth (avoid coughing and hypertensive surges) while continuing anticonvulsants and steroids and monitoring for venous air embolism."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure and herniation, cerebral ischemia, seizures, hemodynamic surges, and venous air embolism."}]},{"id":265,"title":"Swallowing Disorders","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Dysphagia from neurologic, structural, or muscular causes; the central anesthetic concern is aspiration risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Impaired swallowing (from stroke, neuromuscular disease, bulbar dysfunction, or structural and esophageal lesions) causes aspiration, malnutrition, and recurrent respiratory infection and often reflects an underlying disease."},{"h":"Worry About","r":"alert","t":"• Aspiration from impaired airway protection (retained contents), the underlying cause, malnutrition, recurrent respiratory disease, and a possible structural difficult airway."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the cause, plan aspiration precautions, assess nutrition and respiratory status, and assess the airway."},{"h":"Anesthetic Management","r":"action","t":"• Take aspiration precautions (rapid-sequence induction, decompression, awake extubation), manage the underlying condition, protect the airway, and optimize nutrition and respiratory status with vigilant recovery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, respiratory complications, and underlying-disease issues."}]},{"id":266,"title":"Syndrome X","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Angina with ischemic-appearing tests but normal coronary arteries, attributed to microvascular dysfunction; the relevance is genuine myocardial ischemia despite normal coronaries."},{"h":"Pathophysiology/Background","r":"info","t":"• Microvascular and endothelial dysfunction cause angina and ischemia with angiographically normal epicardial coronaries, associated with hypertension, diabetes, and female sex, and real ischemia can occur."},{"h":"Worry About","r":"alert","t":"• Myocardial ischemia despite normal coronary anatomy (maintain the supply–demand balance), triggers (tachycardia, hypertension, hypotension, anemia, stress), and associated risk factors."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anti-anginal therapy, optimize risk factors, and assess cardiac status."},{"h":"Anesthetic Management","r":"action","t":"• Maintain the myocardial supply–demand balance (avoid tachycardia and pressure extremes, ensure oxygenation and hematocrit), continue anti-anginal medications, treat ischemia, monitor the ECG, and blunt sympathetic stress responses."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Myocardial ischemia, arrhythmia, and hemodynamic-triggered angina."}]},{"id":267,"title":"Systemic Lupus Erythematosus","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A multisystem autoimmune disease with protean organ involvement; anesthetic considerations span cardiac, pulmonary, renal, hematologic, airway, and thrombotic (antiphospholipid) features, plus steroid use."},{"h":"Pathophysiology/Background","r":"info","t":"• Autoimmune inflammation affects the kidneys (nephritis), heart (pericardial effusion, myocarditis, Libman-Sacks valve disease, accelerated coronary disease, conduction disease), lungs (pleuritis and effusion, interstitial disease, pulmonary hypertension), blood (anemia, thrombocytopenia, leukopenia), and airway (cricoarytenoid arthritis), with antiphospholipid syndrome causing thrombosis despite a prolonged aPTT."},{"h":"Worry About","r":"alert","t":"• Multi-organ involvement — renal (drug dosing), cardiac (effusion or tamponade, ischemia, conduction), pulmonary (interstitial disease, pulmonary hypertension, effusions), and hematologic (cytopenias, bleeding) — antiphospholipid thrombosis (the prolonged aPTT is not a bleeding tendency), airway (cricoarytenoid), steroid dependence, and infection."},{"h":"Preoperative Preparation","r":"action","t":"• Assess organ involvement (renal, cardiac by echo, pulmonary, hematologic), antiphospholipid and thrombotic status, and the airway, give steroid coverage, and assess disease activity."},{"h":"Anesthetic Management","r":"action","t":"• Manage affected systems (protect the kidneys, watch for effusion or tamponade and ischemia, manage interstitial disease and pulmonary hypertension), account for cytopenias, manage antiphospholipid thrombotic risk with VTE prophylaxis, use airway caution (cricoarytenoid), give stress-dose steroids, keep the patient warm, and maintain strict asepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Organ dysfunction (renal, cardiac, pulmonary), thrombosis (antiphospholipid), cytopenias and bleeding, and airway issues."}]},{"id":268,"title":"Takayasu Disease","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A large-vessel vasculitis ('pulseless disease') affecting the aorta and its major branches, causing stenoses, hypertension, and unreliable blood-pressure measurement."},{"h":"Pathophysiology/Background","r":"info","t":"• Inflammatory stenosis and occlusion of major arteries cause hypertension (often renovascular), absent or asymmetric pulses, cerebral and limb ischemia, aortic regurgitation, and coronary and pulmonary-artery involvement."},{"h":"Worry About","r":"alert","t":"• Unreliable and asymmetric blood-pressure readings, maintaining perfusion of critical (especially cerebral) beds through stenoses (avoid hypotension), severe hypertension, aortic regurgitation, and steroid dependence."},{"h":"Preoperative Preparation","r":"action","t":"• Map blood pressure across limbs and plan monitoring (unaffected limb, arterial line), assess cerebral, cardiac, and renal involvement, control blood pressure, and give steroid coverage."},{"h":"Anesthetic Management","r":"action","t":"• Measure pressure where reliable (arterial line, unaffected limb), maintain perfusion of critical territories (avoid hypotension), manage hypertension and aortic regurgitation, give stress-dose steroids, and monitor for ischemia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cerebral or organ ischemia, blood-pressure measurement difficulty, hypertension, and aortic regurgitation."}]},{"id":269,"title":"Tetralogy of Fallot","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cyanotic congenital heart lesion (VSD, overriding aorta, right-ventricular outflow obstruction, right-ventricular hypertrophy) with right-to-left shunting; hypercyanotic 'tet spells' are the key hazard."},{"h":"Pathophysiology/Background","r":"info","t":"• Right-ventricular outflow obstruction drives right-to-left shunting across the VSD and cyanosis; falls in systemic resistance or rises in outflow obstruction worsen the shunt, producing hypercyanotic spells, and repair status varies."},{"h":"Worry About","r":"alert","t":"• Tet spells from falling systemic resistance or rising outflow obstruction (worsening right-to-left shunt and cyanosis), maintaining preload, avoiding rises in pulmonary resistance, and paradoxical embolism (de-air lines)."},{"h":"Preoperative Preparation","r":"action","t":"• Determine anatomy and repair status (echo, cardiology), assess cyanosis and ventricular function, de-air lines, and plan for spell management."},{"h":"Anesthetic Management","r":"action","t":"• Maintain systemic vascular resistance (avoid drops that worsen the shunt) and preload, avoid raising pulmonary resistance, and treat tet spells (100% oxygen, fluids, phenylephrine, knee-chest position, esmolol, morphine); de-air all lines."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypercyanotic spells, worsening right-to-left shunt, arrhythmia, and paradoxical embolism."}]},{"id":270,"title":"Thalassemia","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited hemoglobinopathy causing chronic hemolytic anemia and ineffective erythropoiesis; severe (major) disease brings transfusion dependence with iron overload and facial bone changes."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced globin-chain synthesis causes anemia and ineffective erythropoiesis; transfusion dependence in major disease causes iron overload (cardiomyopathy, endocrine and hepatic dysfunction), and extramedullary hematopoiesis causes maxillofacial overgrowth and splenomegaly."},{"h":"Worry About","r":"alert","t":"• Chronic anemia, iron-overload cardiomyopathy and endocrine and hepatic dysfunction, a difficult airway from maxillofacial bone overgrowth in major disease, and splenomegaly."},{"h":"Preoperative Preparation","r":"action","t":"• Assess anemia and organ involvement (cardiac echo for iron overload, hepatic, endocrine), plan transfusion, and assess the airway in major disease."},{"h":"Anesthetic Management","r":"action","t":"• Manage anemia and transfusion, account for iron-overload cardiomyopathy, prepare for a possible difficult airway (maxillofacial changes), and position carefully with splenomegaly."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anemia, cardiomyopathy, difficult airway, and organ dysfunction from iron overload."}]},{"id":271,"title":"Thrombocytopenia","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A low platelet count increasing bleeding risk; management depends on the count, the cause, and platelet function."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced production, increased destruction, or sequestration lowers platelets and raises bleeding risk, with surgical and neuraxial thresholds guiding management, and the underlying cause matters (some causes are prothrombotic despite low counts)."},{"h":"Worry About","r":"alert","t":"• Surgical and neuraxial bleeding below platelet thresholds, the underlying cause, and platelet function as well as number."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the count, cause, and function, correct with platelet transfusion for significant bleeding or very low counts, and avoid antiplatelet drugs."},{"h":"Anesthetic Management","r":"action","t":"• Transfuse platelets for significant thrombocytopenia or bleeding, avoid neuraxial techniques below accepted thresholds, handle the airway gently, and manage the underlying cause."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, neuraxial hematoma risk, and cause-specific issues."}]},{"id":272,"title":"Thyroid Neoplasms","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• Thyroid tumors whose main anesthetic concern is airway compression or deviation and thyroidectomy complications, with occasional hormone excess."},{"h":"Pathophysiology/Background","r":"info","t":"• A thyroid mass can compress or deviate the trachea, extend retrosternally (mediastinal), involve the recurrent laryngeal nerve (voice, airway), and occasionally secrete hormone; thyroidectomy risks nerve injury, hematoma, and hypocalcemia."},{"h":"Worry About","r":"alert","t":"• Difficult airway from tracheal compression or deviation and retrosternal extension, thyroid status, recurrent-laryngeal-nerve involvement, and post-thyroidectomy hematoma (an airway emergency), nerve palsy, and hypocalcemia."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway with imaging (compression, deviation, retrosternal extent), thyroid status, and vocal-cord function, and plan the airway strategy."},{"h":"Anesthetic Management","r":"action","t":"• Plan the airway carefully (awake fiberoptic if severe compression, reinforced tube), manage thyroid status, and after thyroidectomy watch for expanding hematoma (open immediately if airway-threatening), recurrent-laryngeal-nerve palsy, and hypocalcemia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, airway compression, post-thyroidectomy hematoma, nerve palsy, and hypocalcemia."}]},{"id":273,"title":"Tracheoesophageal Fistula (Congenital)","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A neonatal anomaly (usually with esophageal atresia) connecting the trachea and esophagus, causing aspiration and gastric distension; often part of a wider anomaly pattern."},{"h":"Pathophysiology/Background","r":"info","t":"• The fistula allows secretions to soil the lungs and ventilation gas to distend the stomach; it associates with VACTERL anomalies (notably cardiac), and neonatal physiology applies."},{"h":"Worry About","r":"alert","t":"• Aspiration and soiling of the lungs, gastric distension from positive-pressure ventilation through the fistula (impairing ventilation), associated cardiac anomalies, and neonatal considerations."},{"h":"Preoperative Preparation","r":"action","t":"• Suction the upper pouch, assess for associated anomalies (echo for cardiac), plan tube positioning relative to the fistula, and address neonatal temperature and glucose."},{"h":"Anesthetic Management","r":"action","t":"• Position the tube to minimize gas passing through the fistula and avoid excessive positive pressure until the fistula is controlled (spontaneous ventilation is often favored initially), manage associated cardiac disease, and maintain neonatal homeostasis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, gastric distension impairing ventilation, associated anomalies, and hypoxemia."}]},{"id":274,"title":"Transposition of the Great Arteries","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cyanotic congenital lesion where the aorta arises from the right ventricle and the pulmonary artery from the left, creating parallel circulations that require mixing for survival."},{"h":"Pathophysiology/Background","r":"info","t":"• With the circulations in parallel, survival depends on mixing through a patent ductus, atrial, or ventricular communication; the ductus is often maintained with prostaglandin before the arterial switch repair."},{"h":"Worry About","r":"alert","t":"• Maintaining mixing and ductal patency (prostaglandin), balancing the circulations, cyanosis, and paradoxical embolism (de-air lines), plus the specific repair stage."},{"h":"Preoperative Preparation","r":"action","t":"• Understand the anatomy and repair status (cardiology), maintain prostaglandin if duct-dependent, de-air lines, and plan careful hemodynamic management."},{"h":"Anesthetic Management","r":"action","t":"• Preserve mixing and ductal patency, balance systemic and pulmonary flow, maintain preload and ventricular function, de-air lines meticulously, and use invasive monitoring with pediatric cardiac anesthesia input."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Inadequate mixing and cyanosis, arrhythmia, ventricular dysfunction, and paradoxical embolism."}]},{"id":275,"title":"Transverse Myelitis","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inflammatory spinal-cord lesion causing motor, sensory, and autonomic dysfunction below the level, with considerations similar to spinal-cord injury."},{"h":"Pathophysiology/Background","r":"info","t":"• Cord inflammation causes weakness, sensory loss, and autonomic dysfunction below the lesion, with autonomic dysreflexia (lesions above T6), respiratory compromise (high lesions), bladder and bowel dysfunction, spasticity, and denervation."},{"h":"Worry About","r":"alert","t":"• Autonomic dysreflexia (high lesions — severe hypertension from stimulation below the level), respiratory compromise, succinylcholine hyperkalemia (denervation — avoid after the acute phase), aspiration in high lesions, and spasticity."},{"h":"Preoperative Preparation","r":"action","t":"• Document the level and deficits, assess respiratory and autonomic status, plan dysreflexia prevention, and take aspiration precautions for high lesions."},{"h":"Anesthetic Management","r":"action","t":"• Prevent and treat autonomic dysreflexia (adequate anesthetic depth or neuraxial block below the lesion, treat hypertensive surges), avoid succinylcholine (denervation hyperkalemia), support ventilation for high lesions, position carefully, and manage spasticity."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Autonomic dysreflexia, respiratory failure, hyperkalemia with succinylcholine, and aspiration."}]},{"id":276,"title":"Treacher Collins Syndrome","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mandibulofacial dysostosis with mandibular and midface hypoplasia, micrognathia, and ear anomalies — a classic and often severe difficult-airway condition."},{"h":"Pathophysiology/Background","r":"info","t":"• Craniofacial hypoplasia (micrognathia, malar and mandibular underdevelopment, cleft palate, ear malformations) causes a difficult airway that does not reliably improve with age, along with obstructive sleep apnea and possible cardiac anomalies."},{"h":"Worry About","r":"alert","t":"• A severely difficult airway (difficult mask ventilation and intubation), obstructive sleep apnea, and associated anomalies."},{"h":"Preoperative Preparation","r":"action","t":"• Perform a thorough airway assessment and difficult-airway plan, review prior anesthetic records, assess sleep apnea, and prepare advanced airway equipment and skilled help."},{"h":"Anesthetic Management","r":"action","t":"• Maintain spontaneous ventilation and use advanced airway techniques (awake or asleep fiberoptic, supraglottic rescue, surgical-airway backup), avoid muscle relaxants until the airway is secured, and monitor the airway closely afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult or failed airway, obstructive sleep apnea, and associated anomalies."}]},{"id":277,"title":"Tricuspid Atresia","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cyanotic congenital lesion with an absent tricuspid valve and single-ventricle physiology, requiring an atrial communication and staged palliation (Glenn, Fontan)."},{"h":"Pathophysiology/Background","r":"info","t":"• With no direct right-atrial-to-ventricular flow, blood shunts right-to-left across an atrial defect and reaches the lungs through a VSD or ductus; the left ventricle supports a single-ventricle circulation completed by Glenn and Fontan operations."},{"h":"Worry About","r":"alert","t":"• Single-ventricle physiology, balancing pulmonary and systemic flow, maintaining preload (Fontan physiology is preload-dependent), avoiding rises in pulmonary resistance, and paradoxical embolism (de-air lines)."},{"h":"Preoperative Preparation","r":"action","t":"• Understand the palliation stage and physiology (cardiology), optimize hydration and preload, de-air lines, and plan careful ventilation."},{"h":"Anesthetic Management","r":"action","t":"• Maintain preload and single-ventricle function, avoid raising pulmonary resistance (oxygenation, normocarbia, avoid high mean airway pressures in Fontan physiology), balance the circulations, de-air lines, and use invasive monitoring."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Single-ventricle failure, inadequate pulmonary flow, low output from poor preload, and paradoxical embolism."}]},{"id":278,"title":"Trigeminal Neuralgia (Tic Doloureux)","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A severe paroxysmal facial neuropathic pain in the trigeminal distribution; relevance is medication effects and procedural (microvascular decompression or ablation) considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Brief, severe, trigger-evoked facial pain is treated with carbamazepine (enzyme induction, hyponatremia, marrow suppression) and other agents, and patients may present for microvascular decompression or ablative procedures."},{"h":"Worry About","r":"alert","t":"• Carbamazepine effects (drug interactions from enzyme induction, hyponatremia, cytopenias), triggering pain by facial stimulation, and procedure-specific risks (posterior-fossa surgery, venous air embolism)."},{"h":"Preoperative Preparation","r":"action","t":"• Review medications and their effects (sodium, blood counts, interactions), minimize facial triggers, and plan for the specific procedure."},{"h":"Anesthetic Management","r":"action","t":"• Account for carbamazepine effects (interactions, hyponatremia, cytopenias), avoid unnecessary facial stimulation, and for microvascular decompression manage posterior-fossa considerations including venous air embolism."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Drug interactions and hyponatremia, cytopenias, pain triggering, and procedure-specific complications."}]},{"id":279,"title":"Truncus Arteriosus","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cyanotic congenital lesion with a single arterial trunk overriding a VSD, causing mixing, pulmonary overcirculation, heart failure, and pulmonary hypertension."},{"h":"Pathophysiology/Background","r":"info","t":"• One common trunk gives rise to the systemic, pulmonary, and coronary circulations over a VSD, producing complete mixing, high pulmonary blood flow with heart failure, early pulmonary hypertension, and often truncal-valve regurgitation."},{"h":"Worry About","r":"alert","t":"• Pulmonary overcirculation and heart failure (excessive pulmonary flow steals systemic perfusion), pulmonary hypertension, truncal-valve regurgitation, and paradoxical embolism (de-air lines)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess ventricular function, pulmonary pressures, and truncal-valve function (echo), de-air lines, and plan ventilation to balance flow."},{"h":"Anesthetic Management","r":"action","t":"• Balance pulmonary and systemic flow (avoid high FiO₂ and low pulmonary resistance that over-circulate the lungs), support ventricular function and manage regurgitation, avoid dangerous rises in pulmonary resistance, and de-air lines."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Systemic hypoperfusion from pulmonary overcirculation, heart failure, pulmonary hypertension, and paradoxical embolism."}]},{"id":280,"title":"Tuberculosis","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mycobacterial infection, chiefly pulmonary, whose anesthetic priorities are airborne transmission precautions, respiratory optimization, and drug interactions."},{"h":"Pathophysiology/Background","r":"info","t":"• Pulmonary tuberculosis causes cough, cavitary disease, and respiratory compromise and spreads by airborne droplet nuclei; multidrug therapy includes hepatotoxic and enzyme-inducing agents (rifampin), and extrapulmonary disease occurs."},{"h":"Worry About","r":"alert","t":"• Airborne transmission (protect staff and other patients), respiratory compromise in active disease, drug interactions and hepatotoxicity (rifampin induction), and possible extrapulmonary involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Institute airborne precautions (negative-pressure room, N95 respirators), defer elective surgery in active infectious disease, optimize respiratory status, and note drug interactions."},{"h":"Anesthetic Management","r":"action","t":"• Use airborne isolation with filtered and dedicated equipment (bacterial-viral filters), optimize oxygenation and ventilation, account for rifampin-related interactions and hepatotoxicity, and schedule and recover the patient to minimize exposure to others."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Transmission to staff, respiratory compromise, and drug interactions and hepatotoxicity."}]},{"id":281,"title":"Upper Respiratory Infections","cat":"Disease","L":"U","new":true,"sections":[{"h":"Overview","r":"info","t":"• Common viral infections (especially in children) that increase airway reactivity and perioperative respiratory events; the key decision is whether to proceed or postpone."},{"h":"Pathophysiology/Background","r":"info","t":"• Airway inflammation heightens reactivity, raising the risk of laryngospasm, bronchospasm, desaturation, secretions, and coughing, particularly with recent or current infection and airway instrumentation."},{"h":"Worry About","r":"alert","t":"• Laryngospasm and bronchospasm, desaturation and breath-holding, copious secretions, and higher risk with endotracheal intubation; severe features (fever, purulent secretions, lower-tract signs) argue for postponement."},{"h":"Preoperative Preparation","r":"action","t":"• Risk-stratify (postpone for fever, purulent secretions, or lower-respiratory signs; mild infections often proceed), assess the airway, and plan a technique that minimizes instrumentation."},{"h":"Anesthetic Management","r":"action","t":"• Minimize airway instrumentation (mask or supraglottic airway over a tube when feasible), deepen anesthesia before manipulation, treat reactivity (bronchodilators), consider deep versus awake extubation appropriately, and maintain hydration."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Laryngospasm and bronchospasm, desaturation, and secretions."}]},{"id":282,"title":"Urticaria, Cold","cat":"Disease","L":"U","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cold-induced urticaria in which cold exposure triggers histamine release, ranging from local hives to systemic reactions; the anesthetic priority is avoiding cold exposure."},{"h":"Pathophysiology/Background","r":"info","t":"• Cold triggers mast-cell mediator release causing urticaria and angioedema and, with large cold exposures (cold fluids, a cold operating room, cardioplegia), potentially hypotension and anaphylaxis."},{"h":"Worry About","r":"alert","t":"• Systemic mediator release and anaphylaxis from cold exposure (cold IV fluids, cold environment, hypothermia or cold cardioplegia), and consequent hypotension and bronchospasm."},{"h":"Preoperative Preparation","r":"action","t":"• Plan a warm environment and warmed fluids, consider antihistamine premedication, and have anaphylaxis treatment ready; take special care with planned hypothermia or cardioplegia."},{"h":"Anesthetic Management","r":"action","t":"• Keep the patient warm (warm room, fluids, and blankets, forced-air warming), avoid cold exposure, premedicate with antihistamines, be prepared to treat anaphylaxis, and use particular caution with cold cardioplegia or therapeutic hypothermia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anaphylaxis and mediator release, hypotension, and bronchospasm from cold exposure."}]},{"id":283,"title":"Varicella-Zoster Virus","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• The virus causing chickenpox (primary infection) and shingles (reactivation); anesthetic relevance is transmission, respiratory involvement, and neuraxial caution near lesions."},{"h":"Pathophysiology/Background","r":"info","t":"• Primary varicella is a contagious vesicular illness that can cause pneumonia (notably in adults and the immunocompromised), while reactivation causes dermatomal zoster with neuralgia; it spreads by airborne and contact routes and is dangerous to susceptible, pregnant, or immunocompromised contacts."},{"h":"Worry About","r":"alert","t":"• Transmission to susceptible staff and patients (airborne and contact precautions), varicella pneumonia and respiratory compromise, immunocompromised severity, and neuraxial or regional techniques through zoster-affected skin."},{"h":"Preoperative Preparation","r":"action","t":"• Defer elective surgery in active infection, apply isolation precautions, assess respiratory status, and avoid neuraxial puncture through active lesions."},{"h":"Anesthetic Management","r":"action","t":"• Observe airborne and contact precautions, optimize respiratory status if pneumonia is present, avoid regional techniques through affected skin, and protect vulnerable staff and patients."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Transmission, pneumonia and respiratory compromise, and infection through neuraxial sites."}]},{"id":284,"title":"Ventricular Fibrillation","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• Chaotic, disorganized ventricular activity producing no effective output — cardiac arrest requiring immediate defibrillation and resuscitation."},{"h":"Pathophysiology/Background","r":"info","t":"• Disorganized electrical activity abolishes coordinated contraction and cardiac output; it is precipitated by ischemia, hypoxia, electrolyte disturbance, prolonged QT, and other insults, and is fatal within minutes without treatment."},{"h":"Worry About","r":"alert","t":"• Immediate loss of circulation, the need for prompt defibrillation and CPR, and identifying and treating the underlying cause to prevent recurrence."},{"h":"Preoperative Preparation","r":"action","t":"• Ensure a defibrillator and resuscitation drugs are immediately available, correct reversible factors (electrolytes, ischemia, hypoxia), and address any implanted device."},{"h":"Anesthetic Management","r":"action","t":"• Treat immediately with defibrillation and high-quality CPR per ACLS (epinephrine, amiodarone), correct reversible causes (ischemia, hypoxia, electrolytes, acidosis), and provide post-arrest care in ICU."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac arrest, recurrence, and post-arrest organ injury."}]},{"id":285,"title":"Ventricular Preexcitation Syndrome","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• Early ventricular activation through an accessory pathway, predisposing to tachyarrhythmias; the dangerous scenario is preexcited atrial fibrillation."},{"h":"Pathophysiology/Background","r":"info","t":"• An accessory pathway bypasses the AV node, causing preexcitation and reentrant tachycardias; if atrial fibrillation conducts rapidly down the accessory pathway it can degenerate into ventricular fibrillation, and AV-nodal-blocking drugs can worsen this."},{"h":"Worry About","r":"alert","t":"• Reentrant tachycardia and, critically, rapidly conducted preexcited atrial fibrillation risking ventricular fibrillation; avoid AV-nodal-blocking drugs in preexcited atrial fibrillation, and avoid sympathetic surges that provoke arrhythmia."},{"h":"Preoperative Preparation","r":"action","t":"• Assess arrhythmia history and any ablation, plan to avoid triggers, and have cardioversion and appropriate antiarrhythmics (procainamide) available with cardiology input."},{"h":"Anesthetic Management","r":"action","t":"• Avoid sympathetic stimulation (adequate depth and analgesia), avoid AV-nodal-blocking agents if preexcited atrial fibrillation occurs (use procainamide or cardioversion), and keep a defibrillator ready."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Reentrant tachycardia, preexcited atrial fibrillation degenerating to ventricular fibrillation, and drug-provoked acceleration."}]},{"id":286,"title":"Ventricular Septal Rupture (Defect), Postmyocardial Infarction","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mechanical complication of myocardial infarction in which the septum ruptures, creating an acute left-to-right shunt and cardiogenic shock — a surgical emergency with very high risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Necrotic septal rupture after infarction produces an acute left-to-right shunt, volume overload of both ventricles, pulmonary overcirculation, and cardiogenic shock, superimposed on the underlying infarct."},{"h":"Worry About","r":"alert","t":"• Cardiogenic shock and biventricular failure, the acute shunt, ongoing ischemia and arrhythmia, and extreme hemodynamic fragility for emergent repair."},{"h":"Preoperative Preparation","r":"action","t":"• Stabilize with afterload reduction and mechanical support (intra-aortic balloon pump), inotropes and vasopressors as needed, and invasive monitoring, coordinating urgent surgical repair."},{"h":"Anesthetic Management","r":"action","t":"• Support the failing circulation (careful afterload reduction to limit the shunt, inotropic and mechanical support, invasive monitoring), preserve coronary perfusion, manage arrhythmia, and anticipate profound instability through repair."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiogenic shock, biventricular failure, arrhythmia, and perioperative death."}]},{"id":287,"title":"Ventricular Tachycardia","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• A wide-complex ventricular tachyarrhythmia that may be hemodynamically unstable and can degenerate into ventricular fibrillation."},{"h":"Pathophysiology/Background","r":"info","t":"• Rapid ventricular rhythm impairs filling and output and may collapse or deteriorate to fibrillation; causes include ischemia, cardiomyopathy, electrolyte disturbance, prolonged QT (torsades), and drugs."},{"h":"Worry About","r":"alert","t":"• Hemodynamic collapse and degeneration to ventricular fibrillation, the underlying cause, and perioperative triggers (ischemia, electrolytes, QT-prolonging drugs)."},{"h":"Preoperative Preparation","r":"action","t":"• Identify and treat the cause (ischemia, electrolytes, QT), continue antiarrhythmics or manage an ICD, and have a defibrillator and drugs ready."},{"h":"Anesthetic Management","r":"action","t":"• Cardiovert unstable ventricular tachycardia and treat stable episodes with antiarrhythmics (amiodarone; magnesium for torsades), correct reversible causes, avoid triggers, and keep defibrillation available with continuous monitoring."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic collapse, degeneration to fibrillation, and recurrent arrhythmia."}]},{"id":288,"title":"Vitamin B12/Folate Deficiency","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficiencies causing megaloblastic anemia; B12 deficiency also causes neurologic disease, with an important nitrous-oxide interaction."},{"h":"Pathophysiology/Background","r":"info","t":"• Both deficiencies impair DNA synthesis (megaloblastic anemia); B12 deficiency additionally causes subacute combined degeneration and neuropathy, and nitrous oxide inactivates B12, which can precipitate or worsen neurologic deficits."},{"h":"Worry About","r":"alert","t":"• Anemia, B12-related neurologic deficits (document them), and nitrous oxide worsening B12 deficiency (avoid it in deficiency)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess and treat anemia, document neurologic deficits, replace the deficient vitamin, and plan to avoid nitrous oxide in B12 deficiency."},{"h":"Anesthetic Management","r":"action","t":"• Avoid nitrous oxide in B12 deficiency (it inactivates B12), manage anemia, document baseline neurology, and replace the vitamin."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anemia, worsened neurologic deficits, and nitrous-oxide interaction."}]},{"id":289,"title":"Vitamin D Deficiency","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficiency causing impaired calcium homeostasis, bone disease, and muscle weakness."},{"h":"Pathophysiology/Background","r":"info","t":"• Low vitamin D reduces calcium absorption, causing hypocalcemia, secondary hyperparathyroidism, osteomalacia with bone fragility, and proximal muscle weakness."},{"h":"Worry About","r":"alert","t":"• Hypocalcemia effects, bone fragility (careful positioning), and muscle weakness."},{"h":"Preoperative Preparation","r":"action","t":"• Check and correct calcium, replace vitamin D, and note bone fragility for positioning."},{"h":"Anesthetic Management","r":"action","t":"• Correct calcium if low, position carefully given bone fragility, and account for muscle weakness."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypocalcemia, fractures, and weakness."}]},{"id":290,"title":"Vitamin K Deficiency","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficiency impairing synthesis of clotting factors II, VII, IX, and X, causing coagulopathy and bleeding."},{"h":"Pathophysiology/Background","r":"info","t":"• Vitamin K is needed for the vitamin-K-dependent clotting factors; deficiency (malabsorption, warfarin, liver disease, antibiotics, the newborn) prolongs the PT and INR and causes bleeding."},{"h":"Worry About","r":"alert","t":"• Coagulopathy and surgical or neuraxial bleeding, and the underlying cause."},{"h":"Preoperative Preparation","r":"action","t":"• Check coagulation and correct with vitamin K (or plasma or prothrombin complex concentrate for urgent reversal), and treat the cause."},{"h":"Anesthetic Management","r":"action","t":"• Correct coagulopathy before procedures and neuraxial techniques (vitamin K, and factor replacement if urgent), and manage bleeding."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, neuraxial hematoma risk, and delayed correction."}]},{"id":291,"title":"Waldenström Macroglobulinemia","cat":"Disease","L":"W","new":true,"sections":[{"h":"Overview","r":"info","t":"• A lymphoplasmacytic lymphoma producing IgM paraprotein, whose hallmark is hyperviscosity syndrome, along with anemia and bleeding."},{"h":"Pathophysiology/Background","r":"info","t":"• Excess IgM raises serum viscosity (neurologic, visual, and cardiac symptoms and bleeding), causes anemia, impairs platelet function (bleeding), and may include cold-sensitive cryoglobulins; plasmapheresis treats hyperviscosity."},{"h":"Worry About","r":"alert","t":"• Hyperviscosity (neurologic, visual, cardiac, bleeding), anemia, platelet dysfunction and bleeding, and cold-precipitated cryoglobulins."},{"h":"Preoperative Preparation","r":"action","t":"• Treat significant hyperviscosity with plasmapheresis before surgery, assess anemia and bleeding risk, keep the patient warm if cryoglobulins are present, and assess cardiac status."},{"h":"Anesthetic Management","r":"action","t":"• Ensure hyperviscosity is treated preoperatively, manage anemia and bleeding, maintain normothermia (cryoglobulins), and monitor cardiac and neurologic status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hyperviscosity complications, bleeding, anemia, and cold-related cryoglobulin effects."}]},{"id":292,"title":"Wilms Tumor","cat":"Disease","L":"W","new":true,"sections":[{"h":"Overview","r":"info","t":"• A pediatric renal tumor (nephroblastoma) that can extend into the vena cava and heart and cause hypertension; resection carries significant anesthetic risk."},{"h":"Pathophysiology/Background","r":"info","t":"• A large renal mass may extend into the inferior vena cava or right atrium (impairing venous return, risking tumor embolism), secrete renin (hypertension), and associate with syndromes; treatment includes chemotherapy (doxorubicin cardiotoxicity) and resection."},{"h":"Worry About","r":"alert","t":"• Caval or atrial tumor extension (impaired venous return, embolism), hypertension, major blood loss at resection, chemotherapy cardiotoxicity, and avoiding tumor rupture (handling)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess caval and cardiac extension (imaging, echo), blood pressure, and chemotherapy effects (echo), plan for major blood loss, and note associated syndromes."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for major blood loss (large-bore access, blood, invasive monitoring), plan for possible caval involvement and tumor embolism, control hypertension, account for cardiotoxicity, and maintain neonatal or pediatric homeostasis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Major hemorrhage, tumor embolism from caval extension, hypertension, and cardiotoxicity."}]},{"id":293,"title":"Wolff-Parkinson-White Syndrome","cat":"Disease","L":"W","new":true,"sections":[{"h":"Overview","r":"info","t":"• An accessory-pathway syndrome with preexcitation (delta wave) and a risk of reentrant tachycardia and, dangerously, rapidly conducted atrial fibrillation degenerating to ventricular fibrillation."},{"h":"Pathophysiology/Background","r":"info","t":"• The accessory pathway allows reentrant tachycardia and, if atrial fibrillation conducts rapidly down the pathway, can precipitate ventricular fibrillation; AV-nodal-blocking drugs can worsen preexcited atrial fibrillation, and ablation is curative."},{"h":"Worry About","r":"alert","t":"• Reentrant tachycardia and preexcited atrial fibrillation risking ventricular fibrillation; avoid AV-nodal-blocking agents (adenosine, verapamil, digoxin, beta-blockers) in preexcited atrial fibrillation, and avoid sympathetic surges."},{"h":"Preoperative Preparation","r":"action","t":"• Assess arrhythmia history and any ablation, plan to avoid triggers, and have cardioversion and procainamide available with cardiology input."},{"h":"Anesthetic Management","r":"action","t":"• Blunt sympathetic stimulation (adequate depth and analgesia), avoid AV-nodal-blocking drugs if preexcited atrial fibrillation occurs (use procainamide or synchronized cardioversion), and keep a defibrillator immediately available."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Reentrant tachycardia, preexcited atrial fibrillation degenerating to ventricular fibrillation, and drug-provoked acceleration."}]},{"id":294,"title":"Acetaminophen","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• A central analgesic and antipyretic that is a cornerstone of multimodal analgesia, available orally, rectally, and intravenously."},{"h":"Perioperative Management","r":"action","t":"• Continue as a scheduled component of multimodal analgesia; the IV form is useful when the enteral route is unavailable."},{"h":"Worry About","r":"alert","t":"• Hepatotoxicity in overdose or with hepatic impairment or chronic alcohol use; respect the maximum daily dose (commonly 4 g, less in liver disease)."},{"h":"Anesthesia Pearls","r":"action","t":"• Opioid-sparing when given around the clock; time an IV dose to be complete before emergence for a smoother recovery."}]},{"id":295,"title":"Alpha1 Antagonists","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• Alpha-1 adrenergic blockers used for hypertension and for benign prostatic hyperplasia (tamsulosin and others)."},{"h":"Perioperative Management","r":"action","t":"• Continue for blood-pressure control; be aware that BPH-selective agents are relevant even at normal blood pressures."},{"h":"Worry About","r":"alert","t":"• Orthostatic hypotension and intraoperative vasodilation, and the intraoperative floppy iris syndrome during cataract surgery (inform the ophthalmologist)."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate exaggerated hypotension with induction and treat with fluids and vasopressors; flag alpha-blocker use before eye surgery."}]},{"id":296,"title":"Amphetamines","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• Sympathomimetic stimulants (prescribed for ADHD or narcolepsy, or misused) that release and block reuptake of catecholamines."},{"h":"Perioperative Management","r":"action","t":"• Decide on continuation individually; chronic therapeutic use is often continued, while acute intoxication warrants delay of elective surgery."},{"h":"Worry About","r":"alert","t":"• Acute use causes hypertension, tachyarrhythmia, and hyperthermia; chronic use depletes catecholamines, causing hypotension and blunted pressor responses."},{"h":"Anesthesia Pearls","r":"action","t":"• With acute intoxication expect an exaggerated sympathetic state; with chronic use anticipate refractory hypotension and consider direct-acting vasopressors."}]},{"id":297,"title":"Antianxiety Medications","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• Anxiolytics, chiefly benzodiazepines and related agents, that potentiate GABA and cause sedation."},{"h":"Perioperative Management","r":"action","t":"• Continue chronic therapy to avoid withdrawal; benzodiazepines are also useful premedicants."},{"h":"Worry About","r":"alert","t":"• Additive sedation and respiratory depression with anesthetics, tolerance, and a withdrawal syndrome (including seizures) on abrupt cessation."},{"h":"Anesthesia Pearls","r":"action","t":"• Chronic users may need higher sedative doses; avoid abrupt discontinuation and titrate carefully in the elderly."}]},{"id":298,"title":"Antipsychotics","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• Typical and atypical agents for psychiatric disease that block dopamine (and other) receptors."},{"h":"Perioperative Management","r":"action","t":"• Continue chronic therapy; abrupt withdrawal risks relapse and instability."},{"h":"Worry About","r":"alert","t":"• QT prolongation and arrhythmia, sedation and orthostatic hypotension, anticholinergic effects, extrapyramidal reactions, and neuroleptic malignant syndrome (a malignant-hyperthermia differential)."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid additional QT-prolonging drugs and monitor the ECG; recognize neuroleptic malignant syndrome and distinguish it from malignant hyperthermia."}]},{"id":299,"title":"Aspirin (Acetylsalicylic Acid)","cat":"Drug","L":"A","sections":[{"h":"Background","r":"info","t":"• An irreversible cyclooxygenase inhibitor used as an antiplatelet agent and analgesic."},{"h":"Perioperative Management","r":"action","t":"• Continuation depends on indication and bleeding risk; it is often continued for secondary cardiovascular prevention and coronary stents but may be held for high-bleeding-risk or neuraxial procedures."},{"h":"Worry About","r":"alert","t":"• Platelet inhibition (lasting the platelet lifespan, about 7–10 days) increases bleeding, and stopping it risks thrombosis in stented patients."},{"h":"Anesthesia Pearls","r":"action","t":"• Weigh thrombotic against bleeding risk with the surgical and cardiology teams; follow ASRA guidance for neuraxial timing."}]},{"id":300,"title":"Beta-Adrenergic Receptor Antagonists (Blockers)","cat":"Drug","L":"B","sections":[{"h":"Background","r":"info","t":"• Competitive antagonists at beta-adrenergic receptors that lower heart rate, contractility, and blood pressure.\n• Cardioselective agents: metoprolol, atenolol, esmolol, bisoprolol. Non-selective: propranolol, nadolol. Combined alpha/beta: labetalol, carvedilol."},{"h":"Perioperative Management","r":"action","t":"• Continue chronic beta-blockade throughout the perioperative period; abrupt withdrawal can trigger rebound tachycardia, hypertension, and ischemia.\n• Do not newly initiate high-dose beta-blockade on the day of surgery — trial data link that practice to fewer infarcts but more strokes and deaths."},{"h":"Worry About","r":"alert","t":"• Bradycardia and hypotension, a blunted catecholamine response, and masked signs of hypoglycemia.\n• Refractory anaphylaxis in beta-blocked patients may respond to glucagon when epinephrine is inadequate."},{"h":"Anesthesia Pearls","r":"action","t":"• Esmolol, being ultra-short-acting, is useful for transient control of heart rate and blood pressure and for blunting the laryngoscopy response."}]},{"id":301,"title":"Bleomycin","cat":"Drug","L":"B","sections":[{"h":"Background","r":"info","t":"• A chemotherapeutic agent notable for cumulative pulmonary toxicity (pneumonitis and fibrosis)."},{"h":"Perioperative Management","r":"action","t":"• Document prior exposure; the pulmonary toxicity is dose-related and can be worsened by high inspired oxygen."},{"h":"Worry About","r":"alert","t":"• Pulmonary fibrosis and a heightened susceptibility to oxygen-induced lung injury."},{"h":"Anesthesia Pearls","r":"action","t":"• Use the lowest inspired oxygen that maintains adequate saturation in patients with prior bleomycin, and be cautious with fluids."}]},{"id":302,"title":"Calcium-Channel Blockers","cat":"Drug","L":"C","sections":[{"h":"Background","r":"info","t":"• Agents that block calcium channels to lower blood pressure and heart rate and treat angina and arrhythmias (dihydropyridines, verapamil, diltiazem)."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively for blood-pressure and rate control."},{"h":"Worry About","r":"alert","t":"• Vasodilation and hypotension, bradycardia and AV block (non-dihydropyridines), and potentiation of neuromuscular blockade."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate additive hypotension and negative chronotropy with anesthetics; treat refractory cases with calcium and vasopressors."}]},{"id":303,"title":"Carbamazepine–Oxcarbazepine","cat":"Drug","L":"C","sections":[{"h":"Background","r":"info","t":"• Anticonvulsants and mood stabilizers, with carbamazepine a potent hepatic enzyme inducer."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively; note enzyme induction affecting other drugs."},{"h":"Worry About","r":"alert","t":"• Enzyme induction (resistance to nondepolarizing relaxants and altered drug levels), hyponatremia (SIADH-like), and bone marrow suppression."},{"h":"Anesthesia Pearls","r":"action","t":"• Expect faster metabolism of relaxants and other agents; check sodium and blood counts where relevant."}]},{"id":304,"title":"Chemotherapeutic Agents","cat":"Drug","L":"C","sections":[{"h":"Background","r":"info","t":"• A broad class of cytotoxic drugs whose organ toxicities shape anesthetic risk."},{"h":"Perioperative Management","r":"action","t":"• Review the specific agents and cumulative doses and their organ effects before surgery."},{"h":"Worry About","r":"alert","t":"• Cardiotoxicity (anthracyclines), pulmonary toxicity (bleomycin), myelosuppression (bleeding, infection, anemia), nephrotoxicity, neuropathy, and mucositis."},{"h":"Anesthesia Pearls","r":"action","t":"• Tailor management to the agent — echo for anthracyclines, limited oxygen after bleomycin, and account for cytopenias and organ toxicity."}]},{"id":305,"title":"Cocaine","cat":"Drug","L":"C","sections":[{"h":"Background","r":"info","t":"• A local anesthetic and potent sympathomimetic of abuse that blocks catecholamine reuptake."},{"h":"Perioperative Management","r":"action","t":"• Delay elective surgery in acute intoxication; chronic use has cardiovascular implications."},{"h":"Worry About","r":"alert","t":"• Acute intoxication causes hypertension, tachyarrhythmia, coronary vasospasm and ischemia, and hyperthermia; beta-blockers alone risk unopposed alpha vasoconstriction."},{"h":"Anesthesia Pearls","r":"action","t":"• Treat cocaine-associated ischemia and hypertension with benzodiazepines, nitroglycerin, and alpha-blockade or mixed agents, avoiding pure beta-blockade."}]},{"id":306,"title":"Cromolyn Sodium","cat":"Drug","L":"C","sections":[{"h":"Background","r":"info","t":"• A mast-cell stabilizer used prophylactically in asthma and allergic disease."},{"h":"Perioperative Management","r":"action","t":"• Continue as maintenance therapy; it has no role in acute bronchospasm."},{"h":"Worry About","r":"alert","t":"• It does not treat acute bronchospasm, so it is not a rescue agent."},{"h":"Anesthesia Pearls","r":"action","t":"• Ensure rescue bronchodilators are available since cromolyn is purely preventive."}]},{"id":307,"title":"Digitalis (Digoxin)","cat":"Drug","L":"D","sections":[{"h":"Background","r":"info","t":"• A cardiac glycoside used for rate control and heart failure with a narrow therapeutic index."},{"h":"Perioperative Management","r":"action","t":"• Continue for rate control or heart failure and verify the level and potassium if toxicity is suspected."},{"h":"Worry About","r":"alert","t":"• Toxicity (arrhythmias, GI and visual symptoms) is worsened by hypokalemia, hypomagnesemia, hypercalcemia, and renal impairment."},{"h":"Anesthesia Pearls","r":"action","t":"• Keep potassium and magnesium normal, avoid factors precipitating toxicity, and treat severe toxicity with digoxin-specific antibody."}]},{"id":308,"title":"Epsilon-Aminocaproic Acid (Amicar)","cat":"Drug","L":"E","sections":[{"h":"Background","r":"info","t":"• An antifibrinolytic that inhibits plasminogen activation to reduce bleeding."},{"h":"Perioperative Management","r":"action","t":"• Used to reduce perioperative bleeding in appropriate settings."},{"h":"Worry About","r":"alert","t":"• A prothrombotic tendency and, rarely, issues in the setting of DIC or urinary-tract bleeding (clot retention)."},{"h":"Anesthesia Pearls","r":"action","t":"• Useful for hyperfibrinolysis and blood conservation; weigh thrombotic risk in susceptible patients."}]},{"id":309,"title":"Folic Acid","cat":"Drug","L":"F","sections":[{"h":"Background","r":"info","t":"• A vitamin essential for DNA synthesis, supplemented for deficiency and in pregnancy."},{"h":"Perioperative Management","r":"action","t":"• Continue supplementation; it has no direct anesthetic interaction."},{"h":"Worry About","r":"alert","t":"• Minimal direct anesthetic concern; its relevance is the underlying anemia or deficiency it treats."},{"h":"Anesthesia Pearls","r":"action","t":"• Address the underlying megaloblastic anemia and, in B12 deficiency specifically, remember the nitrous-oxide interaction."}]},{"id":310,"title":"Gold (Auranofin, Aurothioglucose, Aurothiomalate)","cat":"Drug","L":"G","sections":[{"h":"Background","r":"info","t":"• Disease-modifying gold compounds used (now rarely) for rheumatoid arthritis."},{"h":"Perioperative Management","r":"action","t":"• Continue if prescribed and consider the underlying disease and its systemic effects."},{"h":"Worry About","r":"alert","t":"• Nephrotoxicity, myelosuppression, and pulmonary and mucocutaneous reactions, plus the airway and systemic issues of rheumatoid arthritis."},{"h":"Anesthesia Pearls","r":"action","t":"• Assess renal function and blood counts and manage the rheumatoid airway and multi-organ involvement."}]},{"id":311,"title":"Inhaled Bronchodilators","cat":"Drug","L":"I","sections":[{"h":"Background","r":"info","t":"• Inhaled beta-agonists and antimuscarinics for asthma and COPD."},{"h":"Perioperative Management","r":"action","t":"• Continue up to and including the day of surgery and have them available intraoperatively."},{"h":"Worry About","r":"alert","t":"• Beta-agonists can cause tachycardia, tremor, and hypokalemia; undertreated airway disease risks bronchospasm."},{"h":"Anesthesia Pearls","r":"action","t":"• Optimize airway disease preoperatively and treat intraoperative bronchospasm with inhaled or IV beta-agonists and deepening anesthesia."}]},{"id":312,"title":"Insulin","cat":"Drug","L":"I","sections":[{"h":"Background","r":"info","t":"• The principal anabolic hormone lowering blood glucose. Formulations by duration: rapid (lispro, aspart, glulisine), short (regular), intermediate (NPH), and long-acting (glargine, detemir, degludec)."},{"h":"Perioperative Management","r":"action","t":"• Hold prandial short-acting insulin while the patient is fasting.\n• Reduce rather than omit basal insulin (a common approach is a partial dose of long-acting the night before or morning of surgery); never fully omit basal insulin in type 1 diabetes because of ketoacidosis risk.\n• Follow local protocol and check glucose frequently."},{"h":"Worry About","r":"alert","t":"• Perioperative hypoglycemia, whose warning signs are masked under general anesthesia.\n• Hyperglycemia, and diabetic ketoacidosis if a type 1 patient's basal insulin is withheld."},{"h":"Anesthesia Pearls","r":"action","t":"• For insulin-dependent patients, check glucose roughly hourly intraoperatively and aim for a moderate target (about 140–180 mg/dL), treating with a sliding scale or infusion per protocol."}]},{"id":313,"title":"Lithium Carbonate (Lithobid)","cat":"Drug","L":"L","sections":[{"h":"Background","r":"info","t":"• A mood stabilizer for bipolar disorder with a narrow therapeutic index."},{"h":"Perioperative Management","r":"action","t":"• Continuation is individualized; maintain hydration and monitor levels, and be mindful of sodium and fluid balance."},{"h":"Worry About","r":"alert","t":"• Toxicity is precipitated by dehydration, sodium depletion, NSAIDs, and diuretics; it prolongs neuromuscular blockade and causes CNS, cardiac, and renal effects."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid volume and sodium depletion, monitor levels around major surgery, and account for prolonged neuromuscular blockade."}]},{"id":314,"title":"Marijuana","cat":"Drug","L":"M","sections":[{"h":"Background","r":"info","t":"• Cannabis, used recreationally and medically, acting on cannabinoid receptors."},{"h":"Perioperative Management","r":"action","t":"• Assess frequency and recency of use; heavy use has anesthetic implications."},{"h":"Worry About","r":"alert","t":"• Acute use causes tachycardia and airway irritation; chronic heavy use may increase anesthetic and analgesic requirements, and smoking causes airway reactivity."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate possible higher anesthetic and opioid needs in heavy users and airway reactivity in smokers."}]},{"id":315,"title":"Monoamine Oxidase Inhibitors; Reversible Inhibitors of Monoamine Oxidase","cat":"Drug","L":"M","sections":[{"h":"Background","r":"info","t":"• Antidepressants (and antiparkinsonian selegiline) that inhibit monoamine oxidase, raising synaptic catecholamines and serotonin."},{"h":"Perioperative Management","r":"action","t":"• Where feasible, coordinate with psychiatry; many modern practices continue MAOIs with careful drug avoidance rather than stopping them."},{"h":"Worry About","r":"alert","t":"• Hypertensive crisis with indirect sympathomimetics and tyramine, and serotonin syndrome with meperidine and other serotonergic drugs."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid meperidine and indirect sympathomimetics; use direct-acting vasopressors in reduced doses and titrate carefully."}]},{"id":316,"title":"Nicotine Replacement Therapies","cat":"Drug","L":"N","sections":[{"h":"Background","r":"info","t":"• Nicotine patches, gum, and lozenges used for smoking cessation."},{"h":"Perioperative Management","r":"action","t":"• Continue to support cessation; consider the cardiovascular effects of nicotine."},{"h":"Worry About","r":"alert","t":"• Nicotine causes tachycardia and vasoconstriction (increased myocardial oxygen demand), relevant in coronary disease."},{"h":"Anesthesia Pearls","r":"action","t":"• Support cessation while being mindful of nicotine's cardiovascular effects in at-risk patients."}]},{"id":317,"title":"Nonstatin Hypolipidemic Agents","cat":"Drug","L":"N","sections":[{"h":"Background","r":"info","t":"• Non-statin lipid-lowering drugs (ezetimibe, fibrates, bile-acid sequestrants, niacin)."},{"h":"Perioperative Management","r":"action","t":"• Generally continued; fibrates and sequestrants have specific considerations."},{"h":"Worry About","r":"alert","t":"• Fibrates can cause myopathy (especially with statins) and gallstones; sequestrants impair absorption of other drugs."},{"h":"Anesthesia Pearls","r":"action","t":"• Watch for myopathy with fibrate-statin combinations and separate the timing of sequestrants from other oral drugs."}]},{"id":318,"title":"Nonsteroidal Anti-Inflammatory Drugs","cat":"Drug","L":"N","sections":[{"h":"Background","r":"info","t":"• Cyclooxygenase inhibitors providing analgesia and anti-inflammatory effects, widely used in multimodal analgesia."},{"h":"Perioperative Management","r":"action","t":"• Continuation is individualized; they are opioid-sparing but have bleeding, renal, and GI considerations."},{"h":"Worry About","r":"alert","t":"• Reversible platelet inhibition and bleeding, renal impairment (especially with hypovolemia or nephrotoxins), GI ulceration, and cardiovascular risk."},{"h":"Anesthesia Pearls","r":"action","t":"• Effective opioid-sparing agents; avoid in significant renal impairment, hypovolemia, or high bleeding risk, and use cautiously in the elderly."}]},{"id":319,"title":"Oral Hypoglycemic Agents","cat":"Drug","L":"O","sections":[{"h":"Background","r":"info","t":"• Oral diabetes medications (sulfonylureas, metformin, and others) lowering blood glucose by various mechanisms."},{"h":"Perioperative Management","r":"action","t":"• Generally hold on the day of surgery; hold metformin around surgery per local policy (renal function and contrast)."},{"h":"Worry About","r":"alert","t":"• Sulfonylureas cause hypoglycemia; metformin is associated (rarely) with lactic acidosis, especially with renal impairment or contrast."},{"h":"Anesthesia Pearls","r":"action","t":"• Monitor glucose and manage with insulin perioperatively; resume oral agents when eating and renal function allow."}]},{"id":320,"title":"Penicillins","cat":"Drug","L":"P","sections":[{"h":"Background","r":"info","t":"• Beta-lactam antibiotics used therapeutically and for surgical prophylaxis."},{"h":"Perioperative Management","r":"action","t":"• Administer prophylaxis on time; verify allergy history before giving."},{"h":"Worry About","r":"alert","t":"• Allergic reactions ranging from rash to anaphylaxis, and possible cross-reactivity considerations with cephalosporins."},{"h":"Anesthesia Pearls","r":"action","t":"• Confirm the nature of any reported allergy, be prepared to treat anaphylaxis, and select alternatives when true allergy exists."}]},{"id":321,"title":"Phenothiazines","cat":"Drug","L":"P","sections":[{"h":"Background","r":"info","t":"• A class of typical antipsychotics and antiemetics (e.g., prochlorperazine, promethazine)."},{"h":"Perioperative Management","r":"action","t":"• Continue as prescribed and use antiemetic forms judiciously."},{"h":"Worry About","r":"alert","t":"• Sedation, QT prolongation, orthostatic hypotension, anticholinergic effects, extrapyramidal reactions, and lowered seizure threshold."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid additional QT drugs, watch for extrapyramidal effects, and account for additive sedation and hypotension."}]},{"id":322,"title":"Phenytoin","cat":"Drug","L":"P","sections":[{"h":"Background","r":"info","t":"• An anticonvulsant and enzyme inducer with a narrow therapeutic index."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively and consider levels and enzyme induction."},{"h":"Worry About","r":"alert","t":"• Enzyme induction (resistance to nondepolarizing relaxants and altered drug metabolism), and infusion-related hypotension and arrhythmia with rapid IV administration."},{"h":"Anesthesia Pearls","r":"action","t":"• Expect increased relaxant requirements, infuse IV phenytoin slowly with monitoring, and maintain therapeutic levels."}]},{"id":323,"title":"Procainamide (Procan, Procanbid, Pronestyl)","cat":"Drug","L":"P","sections":[{"h":"Background","r":"info","t":"• A class Ia antiarrhythmic used for ventricular and some supraventricular arrhythmias, including preexcited atrial fibrillation."},{"h":"Perioperative Management","r":"action","t":"• Continue or use as indicated for arrhythmia control; a useful agent in Wolff-Parkinson-White with atrial fibrillation."},{"h":"Worry About","r":"alert","t":"• Hypotension with rapid infusion, QT prolongation and proarrhythmia (torsades), and a lupus-like syndrome with chronic use."},{"h":"Anesthesia Pearls","r":"action","t":"• Infuse slowly with blood-pressure and ECG monitoring and watch the QT; it is preferred over AV-nodal blockers in preexcited atrial fibrillation."}]},{"id":324,"title":"Proton Pump Inhibitors","cat":"Drug","L":"P","sections":[{"h":"Background","r":"info","t":"• Gastric acid suppressants used for reflux, ulcers, and aspiration-risk prophylaxis."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively; useful as part of aspiration prophylaxis in at-risk patients."},{"h":"Worry About","r":"alert","t":"• Generally well tolerated; long-term use has minor considerations (electrolytes, infection risk) not usually acute."},{"h":"Anesthesia Pearls","r":"action","t":"• Combine with other aspiration-prophylaxis measures in high-risk patients; a single dose raises gastric pH but does not empty the stomach."}]},{"id":325,"title":"Rifampin","cat":"Drug","L":"R","sections":[{"h":"Background","r":"info","t":"• An antimycobacterial antibiotic and potent hepatic enzyme inducer."},{"h":"Perioperative Management","r":"action","t":"• Continue tuberculosis therapy and account for major enzyme induction."},{"h":"Worry About","r":"alert","t":"• Strong enzyme induction (reducing levels of many drugs), hepatotoxicity, and harmless orange discoloration of secretions."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate faster metabolism of numerous drugs and monitor liver function; observe tuberculosis precautions where active."}]},{"id":326,"title":"Serotonin: Agonists, Antagonists, and Reuptake Inhibitors","cat":"Drug","L":"S","sections":[{"h":"Background","r":"info","t":"• Drugs acting on serotonin, including SSRIs and SNRIs (antidepressants), triptans, and 5-HT3 antagonist antiemetics (ondansetron)."},{"h":"Perioperative Management","r":"action","t":"• Continue antidepressants perioperatively in most cases; use serotonergic combinations cautiously."},{"h":"Worry About","r":"alert","t":"• Serotonin syndrome when serotonergic drugs combine (SSRIs with meperidine, tramadol, methylene blue, or MAOIs), SSRI-related platelet dysfunction and bleeding, and mild QT effects with ondansetron."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid stacking serotonergic agents, recognize serotonin syndrome (autonomic instability, hyperthermia, clonus), and account for SSRI bleeding tendency."}]},{"id":327,"title":"Statins","cat":"Drug","L":"S","sections":[{"h":"Background","r":"info","t":"• HMG-CoA reductase inhibitors lowering cholesterol with pleiotropic cardiovascular-protective effects."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively, including the day of surgery — they reduce perioperative cardiac risk."},{"h":"Worry About","r":"alert","t":"• Myopathy and, rarely, rhabdomyolysis (worse with certain interactions), and transaminase elevation."},{"h":"Anesthesia Pearls","r":"action","t":"• Do not stop statins around surgery; watch for myopathy, especially with interacting drugs."}]},{"id":328,"title":"Tetracyclines","cat":"Drug","L":"T","sections":[{"h":"Background","r":"info","t":"• Broad-spectrum antibiotics used for various infections."},{"h":"Perioperative Management","r":"action","t":"• Continue as prescribed; not typically first-line surgical prophylaxis."},{"h":"Worry About","r":"alert","t":"• GI upset, photosensitivity, and rare hepatotoxicity; not usually an acute anesthetic concern."},{"h":"Anesthesia Pearls","r":"action","t":"• Few direct anesthetic implications; manage as part of the overall medication review."}]},{"id":329,"title":"Thiazolidinediones","cat":"Drug","L":"T","sections":[{"h":"Background","r":"info","t":"• Oral antidiabetic agents (pioglitazone) that improve insulin sensitivity."},{"h":"Perioperative Management","r":"action","t":"• Generally hold on the day of surgery and manage glucose with insulin."},{"h":"Worry About","r":"alert","t":"• Fluid retention and heart failure exacerbation, and edema."},{"h":"Anesthesia Pearls","r":"action","t":"• Be cautious in patients with heart failure and manage perioperative glucose with insulin."}]},{"id":330,"title":"Thyroid Supplements","cat":"Drug","L":"T","sections":[{"h":"Background","r":"info","t":"• Thyroid hormone replacement (levothyroxine) for hypothyroidism."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively; the long half-life means brief interruptions are tolerated."},{"h":"Worry About","r":"alert","t":"• Under-replacement risks hypothyroid effects; over-replacement risks thyrotoxic symptoms and arrhythmia."},{"h":"Anesthesia Pearls","r":"action","t":"• Continue replacement and ensure the patient is euthyroid for elective surgery."}]},{"id":331,"title":"Tranexamic Acid","cat":"Drug","L":"T","sections":[{"h":"Background","r":"info","t":"• An antifibrinolytic that inhibits plasminogen activation, widely used to reduce surgical and traumatic bleeding."},{"h":"Perioperative Management","r":"action","t":"• Use to reduce bleeding in trauma, obstetric hemorrhage, and major or high-blood-loss surgery."},{"h":"Worry About","r":"alert","t":"• A prothrombotic tendency and, at high doses, seizures; caution in patients with a thrombotic history."},{"h":"Anesthesia Pearls","r":"action","t":"• Effective for hyperfibrinolysis and blood conservation; dose appropriately (avoid excessive doses linked to seizures) and weigh thrombotic risk."}]},{"id":332,"title":"Valproate","cat":"Drug","L":"V","sections":[{"h":"Background","r":"info","t":"• An anticonvulsant and mood stabilizer."},{"h":"Perioperative Management","r":"action","t":"• Continue perioperatively and consider its hematologic and hepatic effects."},{"h":"Worry About","r":"alert","t":"• Thrombocytopenia and platelet dysfunction (bleeding), hepatotoxicity, hyperammonemia, and pancreatitis."},{"h":"Anesthesia Pearls","r":"action","t":"• Check platelets and coagulation for major surgery and consider hepatic effects and hyperammonemia in altered mental status."}]},{"id":333,"title":"Warfarin (Coumadin)","cat":"Drug","L":"W","sections":[{"h":"Background","r":"info","t":"• A vitamin-K-antagonist oral anticoagulant with a narrow therapeutic index requiring INR monitoring."},{"h":"Perioperative Management","r":"action","t":"• Hold before most surgery with bridging decided by thrombotic risk, and confirm an acceptable INR before neuraxial techniques."},{"h":"Worry About","r":"alert","t":"• Bleeding and the need for reversal (vitamin K, prothrombin complex concentrate, or plasma for urgent reversal); many drug and dietary interactions."},{"h":"Anesthesia Pearls","r":"action","t":"• Plan interruption and bridging with the teams; reverse urgent bleeding with prothrombin complex concentrate and vitamin K."}]},{"id":334,"title":"β-Sitosterol","cat":"Supplement","L":"Β","sections":[{"h":"Background","r":"info","t":"• A plant sterol taken to lower cholesterol; it has minimal direct anesthetic relevance beyond mild GI effects."},{"h":"Worry About","r":"alert","t":"• Little specific perioperative concern, though it may modestly affect cholesterol-related therapy and cause GI upset."},{"h":"Preoperative Preparation","r":"action","t":"• No specific stoppage is usually required, but follow general advice to disclose and pause herbal supplements before surgery."}]},{"id":335,"title":"Carnitine","cat":"Supplement","L":"C","sections":[{"h":"Background","r":"info","t":"• An amino-acid derivative involved in fatty-acid energy metabolism, taken for various indications and generally well tolerated."},{"h":"Worry About","r":"alert","t":"• Minimal anesthetic concern; rarely GI upset, with no major established perioperative interaction."},{"h":"Preoperative Preparation","r":"action","t":"• No specific stoppage is generally required, but disclose it as part of the medication and supplement review."}]},{"id":336,"title":"Cranberry","cat":"Supplement","L":"C","sections":[{"h":"Background","r":"info","t":"• A popular supplement used for urinary-tract-infection prevention."},{"h":"Worry About","r":"alert","t":"• May potentiate warfarin and raise the INR, so bleeding and anticoagulation control are the main concerns."},{"h":"Preoperative Preparation","r":"action","t":"• Check the INR in warfarin patients and follow general advice to pause supplements before surgery."}]},{"id":337,"title":"Dehydroepiandrosterone","cat":"Supplement","L":"D","sections":[{"h":"Background","r":"info","t":"• A steroid-hormone precursor (DHEA) taken for purported anti-aging and hormonal effects."},{"h":"Worry About","r":"alert","t":"• Hormonal effects with possible blood-pressure and arrhythmic influence and hormonal interactions."},{"h":"Preoperative Preparation","r":"action","t":"• Advise stopping before surgery and disclose it, given hormonal effects and interactions."}]},{"id":338,"title":"Evening Primrose","cat":"Supplement","L":"E","sections":[{"h":"Background","r":"info","t":"• A botanical source of gamma-linolenic acid taken for various inflammatory and hormonal indications."},{"h":"Worry About","r":"alert","t":"• Possible antiplatelet effect (additive bleeding) and a theoretical lowering of the seizure threshold."},{"h":"Preoperative Preparation","r":"action","t":"• Advise stopping roughly a week before surgery, particularly with bleeding risk or neuraxial techniques."}]},{"id":339,"title":"Garlic (Allium sativum)","cat":"Supplement","L":"G","sections":[{"h":"Background","r":"info","t":"• Popular botanical taken for cholesterol and blood-pressure benefits."},{"h":"Worry About","r":"alert","t":"• Inhibits platelet aggregation and can add to the bleeding effect of antiplatelet and anticoagulant drugs."},{"h":"Preoperative Preparation","r":"action","t":"• Often advised to stop roughly 7 days before surgery, particularly before neuraxial techniques or procedures with high bleeding risk."}]},{"id":340,"title":"Ginkgo biloba","cat":"Supplement","L":"G","sections":[{"h":"Background","r":"info","t":"• A widely used botanical taken for memory and circulation."},{"h":"Worry About","r":"alert","t":"• Inhibits platelet-activating factor and increases bleeding risk, adding to antiplatelet and anticoagulant effects."},{"h":"Preoperative Preparation","r":"action","t":"• Advise stopping roughly 7 days before surgery, especially before neuraxial techniques."}]},{"id":341,"title":"Glycine","cat":"Supplement","L":"G","sections":[{"h":"Background","r":"info","t":"• An amino acid taken as a supplement; as an anesthetic consideration it is more notable as a urologic irrigation fluid."},{"h":"Worry About","r":"alert","t":"• Minimal concern as an oral supplement; large systemic absorption (as with irrigation fluids) can cause hyponatremia and visual and CNS effects."},{"h":"Preoperative Preparation","r":"action","t":"• No specific stoppage is generally required for the supplement; disclose it in the review."}]},{"id":342,"title":"Licorice (Glycyrrhiza glabra)","cat":"Supplement","L":"L","sections":[{"h":"Background","r":"info","t":"• A botanical whose active compound has mineralocorticoid-like activity."},{"h":"Worry About","r":"alert","t":"• Can cause pseudohyperaldosteronism — hypertension, hypokalemia, and fluid retention — with arrhythmia risk from low potassium."},{"h":"Preoperative Preparation","r":"action","t":"• Advise stopping before surgery and check blood pressure and potassium."}]},{"id":343,"title":"Red Yeast Rice (Cholestin)","cat":"Supplement","L":"R","sections":[{"h":"Background","r":"info","t":"• A fermented-rice product that naturally contains monacolin K, a compound chemically identical to lovastatin."},{"h":"Worry About","r":"alert","t":"• Carries statin-like risks — myopathy and rhabdomyolysis, hepatotoxicity, and drug interactions."},{"h":"Preoperative Preparation","r":"action","t":"• Treat it like a statin: review liver function and interactions and follow general perioperative supplement guidance."}]},{"id":344,"title":"St. John’s Wort (Hypericum perforatum)","cat":"Supplement","L":"S","sections":[{"h":"Background","r":"info","t":"• A botanical taken for depression that is a potent inducer of drug-metabolizing enzymes."},{"h":"Worry About","r":"alert","t":"• Strongly induces CYP3A4 and other enzymes (reducing levels of many drugs, including cyclosporine and warfarin) and is serotonergic (serotonin-syndrome risk with serotonergic agents)."},{"h":"Preoperative Preparation","r":"action","t":"• Advise stopping about 5 days before surgery given major interactions and enzyme induction."}]},{"id":345,"title":"Valerian (Valeriana officinalis)","cat":"Supplement","L":"V","sections":[{"h":"Background","r":"info","t":"• A botanical sedative acting on GABA systems, taken for sleep and anxiety."},{"h":"Worry About","r":"alert","t":"• Potentiates the sedative effects of anesthetics and other CNS depressants, and abrupt cessation may cause a benzodiazepine-like withdrawal."},{"h":"Preoperative Preparation","r":"action","t":"• Consider tapering rather than stopping abruptly, disclose it, and anticipate additive sedation."}]},{"id":346,"title":"GLP-1 Receptor Agonists","cat":"Drug","L":"G","new":true,"sections":[{"h":"Background","r":"info","t":"• Incretin-based drugs (semaglutide, liraglutide, tirzepatide) for diabetes and weight loss that slow gastric emptying."},{"h":"Perioperative Management","r":"action","t":"• Follow current guidance to hold before surgery (commonly the day for daily forms and about a week for weekly forms) and treat as potential full stomach."},{"h":"Worry About","r":"alert","t":"• Delayed gastric emptying with retained gastric contents and aspiration risk even after standard fasting, plus glucose effects."},{"h":"Anesthesia Pearls","r":"action","t":"• Consider gastric ultrasound and full-stomach precautions (rapid-sequence induction) when residual gastric contents are a concern."}]},{"id":347,"title":"SGLT2 Inhibitors","cat":"Drug","L":"S","new":true,"sections":[{"h":"Background","r":"info","t":"• Antidiabetic agents (empagliflozin, dapagliflozin, canagliflozin) promoting urinary glucose loss, also used in heart failure and kidney disease."},{"h":"Perioperative Management","r":"action","t":"• Hold for several days before surgery (commonly about 3–4 days) to reduce ketoacidosis risk."},{"h":"Worry About","r":"alert","t":"• Euglycemic diabetic ketoacidosis (ketoacidosis with near-normal glucose), volume depletion, and urinary infection."},{"h":"Anesthesia Pearls","r":"action","t":"• Suspect euglycemic ketoacidosis in an acidotic perioperative diabetic even with normal glucose; check ketones and treat."}]},{"id":348,"title":"Direct Oral Anticoagulants (DOACs)","cat":"Drug","L":"D","new":true,"sections":[{"h":"Background","r":"info","t":"• Direct thrombin (dabigatran) and factor Xa (apixaban, rivaroxaban, edoxaban) inhibitors used for atrial fibrillation and VTE."},{"h":"Perioperative Management","r":"action","t":"• Hold before surgery based on the drug, renal function, and bleeding risk, and follow ASRA timing for neuraxial techniques."},{"h":"Worry About","r":"alert","t":"• Bleeding, and reversal that requires specific agents — idarucizumab for dabigatran and andexanet alfa (or prothrombin complex concentrate) for factor Xa inhibitors."},{"h":"Anesthesia Pearls","r":"action","t":"• Time the last dose to surgery using renal function; reverse life-threatening bleeding with the specific agent or prothrombin complex concentrate."}]},{"id":349,"title":"P2Y12 Inhibitors (Antiplatelets)","cat":"Drug","L":"P","new":true,"sections":[{"h":"Background","r":"info","t":"• Platelet ADP-receptor inhibitors (clopidogrel, ticagrelor, prasugrel) used with aspirin after coronary stenting and for vascular disease."},{"h":"Perioperative Management","r":"action","t":"• Continuation versus interruption is a careful balance; stopping too early after stenting risks stent thrombosis, while continuing raises bleeding."},{"h":"Worry About","r":"alert","t
