":"• Bleeding on the one hand and stent thrombosis (potentially fatal) on the other; ticagrelor and prasugrel are more potent with shorter recommended hold times than clopidogrel."},{"h":"Anesthesia Pearls","r":"action","t":"• Coordinate timing with cardiology and surgery, avoid neuraxial techniques on active therapy, and often continue aspirin through surgery."}]},{"id":350,"title":"Immune Checkpoint Inhibitors","cat":"Drug","L":"I","new":true,"sections":[{"h":"Background","r":"info","t":"• Cancer immunotherapies (PD-1, PD-L1, and CTLA-4 inhibitors) that unleash T-cell activity against tumors."},{"h":"Perioperative Management","r":"action","t":"• Continue cancer therapy per oncology and remain alert for immune-related toxicities."},{"h":"Worry About","r":"alert","t":"• Immune-related adverse events affecting any organ — myocarditis, pneumonitis, colitis, hepatitis, and endocrinopathies (hypophysitis, thyroid, adrenal insufficiency)."},{"h":"Anesthesia Pearls","r":"action","t":"• Screen for organ-specific toxicity, consider adrenal insufficiency needing steroid coverage, and manage myocarditis and pneumonitis seriously."}]},{"id":351,"title":"Buprenorphine (Perioperative MOUD)","cat":"Drug","L":"B","new":true,"sections":[{"h":"Background","r":"info","t":"• A high-affinity partial mu-opioid agonist used for opioid use disorder and pain (often as buprenorphine or buprenorphine-naloxone)."},{"h":"Perioperative Management","r":"action","t":"• Current guidance generally favors continuing buprenorphine perioperatively rather than stopping it, with multimodal analgesia added."},{"h":"Worry About","r":"alert","t":"• Its high receptor affinity can blunt the effect of full agonists, complicating acute pain control."},{"h":"Anesthesia Pearls","r":"action","t":"• Continue buprenorphine, maximize non-opioid multimodal analgesia and regional techniques, and titrate additional full agonists to effect for severe pain."}]},{"id":352,"title":"Naltrexone (Perioperative)","cat":"Drug","L":"N","new":true,"sections":[{"h":"Background","r":"info","t":"• A mu-opioid antagonist used for opioid and alcohol use disorder, available orally and as a long-acting injectable."},{"h":"Perioperative Management","r":"action","t":"• Plan discontinuation before elective surgery requiring opioids (oral roughly 72 hours ahead; the injectable acts for about a month)."},{"h":"Worry About","r":"alert","t":"• It blocks opioid analgesia and can cause receptor upregulation with heightened later opioid sensitivity."},{"h":"Anesthesia Pearls","r":"action","t":"• Emphasize non-opioid multimodal and regional analgesia; if opioids are needed while naltrexone is active, expect blockade and titrate carefully in a monitored setting."}]},{"id":353,"title":"Sugammadex","cat":"Drug","L":"S","new":true,"sections":[{"h":"Background","r":"info","t":"• A selective binding agent that reverses aminosteroid neuromuscular blockade (rocuronium and vecuronium) by encapsulation."},{"h":"Perioperative Management","r":"action","t":"• Use for rapid, reliable reversal, including deep block and rescue after can't-intubate situations."},{"h":"Worry About","r":"alert","t":"• Rare anaphylaxis and bradycardia, and reduced efficacy of hormonal contraceptives (advise backup contraception)."},{"h":"Anesthesia Pearls","r":"action","t":"• Effective even for profound block; dose by depth of block, advise contraceptive precautions, and be ready to treat bradycardia or hypersensitivity."}]},{"id":354,"title":"Sacubitril/Valsartan (ARNI)","cat":"Drug","L":"S","new":true,"sections":[{"h":"Background","r":"info","t":"• A combination of a neprilysin inhibitor and an angiotensin-receptor blocker for heart failure with reduced ejection fraction."},{"h":"Perioperative Management","r":"action","t":"• Manage like an ACE inhibitor or ARB perioperatively — often held on the day of surgery to limit hypotension."},{"h":"Worry About","r":"alert","t":"• Hypotension and vasoplegia (refractory to standard vasopressors), and angioedema and renal and potassium effects."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate refractory hypotension that may need vasopressin, and continue heart-failure optimization otherwise."}]},{"id":355,"title":"Cannabis & Cannabinoids","cat":"Drug","L":"C","new":true,"sections":[{"h":"Background","r":"info","t":"• Cannabis products and cannabinoid drugs acting on cannabinoid receptors, used recreationally and medically."},{"h":"Perioperative Management","r":"action","t":"• Assess pattern and recency of use; heavy chronic use has anesthetic implications."},{"h":"Worry About","r":"alert","t":"• Acute use causes tachycardia and airway irritation; chronic heavy use may increase anesthetic and analgesic requirements, with airway reactivity in smokers."},{"h":"Anesthesia Pearls","r":"action","t":"• Anticipate higher anesthetic and opioid needs in heavy users, airway reactivity in smokers, and possible cannabinoid hyperemesis."}]},{"id":356,"title":"PCSK9 Inhibitors","cat":"Drug","L":"P","new":true,"sections":[{"h":"Background","r":"info","t":"• Injectable monoclonal antibodies (and related agents) that markedly lower LDL cholesterol."},{"h":"Perioperative Management","r":"action","t":"• Continue as prescribed; they have minimal direct perioperative interaction."},{"h":"Worry About","r":"alert","t":"• Few acute anesthetic concerns; relevance is the underlying cardiovascular disease they treat."},{"h":"Anesthesia Pearls","r":"action","t":"• No specific perioperative adjustment is usually needed; manage the underlying cardiovascular risk."}]},{"id":357,"title":"Biologic Immunomodulators (TNF-α & DMARDs)","cat":"Drug","L":"B","new":true,"sections":[{"h":"Background","r":"info","t":"• Biologic agents (TNF-alpha inhibitors and other targeted DMARDs) for autoimmune and inflammatory disease."},{"h":"Perioperative Management","r":"action","t":"• Interruption is individualized by drug, dosing cycle, and infection and healing risk, coordinated with the prescribing specialist."},{"h":"Worry About","r":"alert","t":"• Increased infection risk and impaired wound healing, plus the systemic effects of the underlying disease."},{"h":"Anesthesia Pearls","r":"action","t":"• Time holding around the dosing interval for major surgery, watch for infection, and manage the underlying disease (including airway issues in rheumatoid arthritis)."}]},{"id":358,"title":"Methadone (Perioperative)","cat":"Drug","L":"M","new":true,"sections":[{"h":"Background","r":"info","t":"• A long-acting full mu-opioid agonist (and NMDA antagonist) used for opioid use disorder and chronic pain."},{"h":"Perioperative Management","r":"action","t":"• Continue the baseline daily dose perioperatively and add multimodal analgesia for acute pain."},{"h":"Worry About","r":"alert","t":"• QT prolongation, opioid tolerance requiring higher additional doses, and respiratory depression risk with stacking."},{"h":"Anesthesia Pearls","r":"action","t":"• Continue the maintenance dose, monitor the QT, and treat acute pain with multimodal and regional techniques plus titrated additional opioid."}]},{"id":359,"title":"Kratom (Mitragyna speciosa)","cat":"Drug","L":"K","new":true,"sections":[{"h":"Background","r":"info","t":"• An herbal product whose alkaloids have combined opioid-like and stimulant effects, used for pain and self-treatment of withdrawal."},{"h":"Perioperative Management","r":"action","t":"• Assess use and pattern; it is often undisclosed and unregulated with variable potency."},{"h":"Worry About","r":"alert","t":"• Opioid-like effects and withdrawal, stimulant and serotonergic effects (interaction risk), hepatotoxicity, and seizures."},{"h":"Anesthesia Pearls","r":"action","t":"• Ask specifically about kratom, anticipate opioid tolerance and possible withdrawal, and be cautious with serotonergic combinations."}]},{"id":360,"title":"Prothrombin Complex Concentrate (4-Factor PCC)","cat":"Drug","L":"P","new":true,"sections":[{"h":"Background","r":"info","t":"• A concentrate of vitamin-K-dependent clotting factors (II, VII, IX, X) for rapid reversal of anticoagulation and bleeding."},{"h":"Perioperative Management","r":"action","t":"• Use for urgent reversal of warfarin (with vitamin K) and, in some settings, factor Xa inhibitor-associated bleeding."},{"h":"Worry About","r":"alert","t":"• A thrombotic risk after administration, particularly in predisposed patients."},{"h":"Anesthesia Pearls","r":"action","t":"• Provides rapid, low-volume factor replacement; give with vitamin K for warfarin reversal and weigh thrombotic risk."}]},{"id":361,"title":"Methylene Blue","cat":"Drug","L":"M","new":true,"sections":[{"h":"Background","r":"info","t":"• A dye with multiple uses — treating methemoglobinemia, vasoplegic syndrome, and as a surgical marker — that also inhibits monoamine oxidase."},{"h":"Perioperative Management","r":"action","t":"• Use for methemoglobinemia and refractory vasoplegia; screen for serotonergic drugs first."},{"h":"Worry About","r":"alert","t":"• Serotonin syndrome when combined with serotonergic drugs (it is an MAO inhibitor), transient pulse-oximetry interference, and hemolysis in G6PD deficiency."},{"h":"Anesthesia Pearls","r":"action","t":"• Avoid in patients on serotonergic agents where possible and in G6PD deficiency, and expect a transient dip in the measured oxygen saturation."}]},{"id":362,"title":"Angiotensin II (Giapreza)","cat":"Drug","L":"A","new":true,"sections":[{"h":"Background","r":"info","t":"• A vasopressor form of angiotensin II used for refractory vasodilatory (distributive) shock."},{"h":"Perioperative Management","r":"action","t":"• Add to catecholamines and vasopressin for shock unresponsive to standard vasopressors."},{"h":"Worry About","r":"alert","t":"• A thrombotic and thromboembolic risk (venous thromboembolism prophylaxis is recommended)."},{"h":"Anesthesia Pearls","r":"action","t":"• A useful additional vasopressor mechanism in refractory vasoplegia; provide thromboprophylaxis and titrate to pressure."}]},{"id":363,"title":"Remimazolam (Byfavo)","cat":"Drug","L":"R","new":true,"sections":[{"h":"Background","r":"info","t":"• An ultra-short-acting benzodiazepine metabolized by tissue esterases, used for procedural sedation and anesthesia."},{"h":"Perioperative Management","r":"action","t":"• Use for procedural sedation with rapid onset and offset and predictable recovery."},{"h":"Worry About","r":"alert","t":"• Respiratory depression and sedation (additive with opioids), reversible with flumazenil."},{"h":"Anesthesia Pearls","r":"action","t":"• Offers hemodynamic stability and quick recovery; titrate with opioids carefully and reverse with flumazenil if needed."}]},{"id":364,"title":"Suzetrigine (Journavx)","cat":"Drug","L":"S","new":true,"sections":[{"h":"Background","r":"info","t":"• A first-in-class oral non-opioid analgesic that selectively inhibits the NaV1.8 sodium channel, for moderate-to-severe acute pain."},{"h":"Perioperative Management","r":"action","t":"• Use as a non-opioid option in multimodal analgesia for acute pain without opioid effects."},{"h":"Worry About","r":"alert","t":"• No opioid-type respiratory depression or dependence, but drug interactions (metabolized via CYP3A) and standard tolerability considerations."},{"h":"Anesthesia Pearls","r":"action","t":"• A non-opioid, non-addictive analgesic useful for opioid-sparing; review CYP3A interactions and combine with other multimodal agents."}]},{"id":365,"title":"Oliceridine (Olinvyk)","cat":"Drug","L":"O","new":true,"sections":[{"h":"Background","r":"info","t":"• An intravenous biased mu-opioid agonist (favoring G-protein signaling) for moderate-to-severe acute pain."},{"h":"Perioperative Management","r":"action","t":"• Use as an IV opioid option; it remains an opioid despite the biased-agonist design."},{"h":"Worry About","r":"alert","t":"• Respiratory depression and other opioid effects still occur, and QT prolongation at higher cumulative doses."},{"h":"Anesthesia Pearls","r":"action","t":"• Manage as an opioid (monitor respiration), respect dose limits for QT, and combine with multimodal analgesia."}]},{"id":366,"title":"Vasoactive & Inotrope Infusions","cat":"Reference","L":"V","new":true,"sections":[{"h":"Vasopressors","r":"info","t":"• Norepinephrine (~0.01–0.5 mcg/kg/min): first-line vasoconstrictor for distributive shock.\n• Phenylephrine (bolus 50–100 mcg or infusion): pure alpha vasoconstriction, useful with tachycardia.\n• Vasopressin (~0.01–0.04 units/min): catecholamine-sparing adjunct."},{"h":"Inotropes","r":"info","t":"• Epinephrine: inotrope and vasopressor across the dose range.\n• Dobutamine (~2–20 mcg/kg/min): inotrope and vasodilator.\n• Milrinone: inodilator (inotropy plus pulmonary and systemic vasodilation), useful in right-heart failure and pulmonary hypertension."},{"h":"Pushers","r":"action","t":"• Ephedrine (5–10 mg boluses): indirect mixed agent.\n• Phenylephrine boluses for transient hypotension.\n• Epinephrine (10–100 mcg boluses) for severe hypotension or anaphylaxis."},{"h":"Notes","r":"alert","t":"• Give vasoactive infusions through reliable (ideally central) access, titrate to targets with invasive monitoring, and match the agent to the physiology (afterload versus contractility versus rate)."}]},{"id":367,"title":"Reversal Agents & Antidotes","cat":"Reference","L":"R","new":true,"sections":[{"h":"Neuromuscular & Sedation","r":"info","t":"• Sugammadex reverses rocuronium and vecuronium (dose by depth); neostigmine (with glycopyrrolate) reverses shallow block.\n• Naloxone reverses opioids; flumazenil reverses benzodiazepines (both can precipitate withdrawal or re-sedation)."},{"h":"Anticoagulant Reversal","r":"info","t":"• Protamine reverses heparin; idarucizumab reverses dabigatran; andexanet alfa (or prothrombin complex concentrate) reverses factor Xa inhibitors; vitamin K plus prothrombin complex concentrate reverses warfarin."},{"h":"Toxidrome Antidotes","r":"info","t":"• Dantrolene for malignant hyperthermia; lipid emulsion for local anesthetic toxicity; methylene blue for methemoglobinemia (and vasoplegia); calcium for hyperkalemia and calcium-channel-blocker toxicity; digoxin immune fab for digoxin toxicity; hydroxocobalamin for cyanide."},{"h":"Caution","r":"alert","t":"• Match dose to indication and watch for re-emergence of the original drug effect after short-acting antidotes (naloxone, flumazenil)."}]},{"id":368,"title":"MAC Values (Volatile Anesthetics)","cat":"Reference","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Minimum alveolar concentration (MAC) is the end-tidal concentration at which half of patients do not move to a standard surgical stimulus — a measure of anesthetic potency."},{"h":"Approximate MAC (age ~40, 100% O₂)","r":"info","t":"• Sevoflurane ≈ 2.0%\n• Isoflurane ≈ 1.2%\n• Desflurane ≈ 6.0%\n• Nitrous oxide ≈ 104% (used as an adjuvant)\n• Halothane ≈ 0.75%"},{"h":"Useful Multiples","r":"info","t":"• MAC-awake ≈ 0.3–0.5 MAC (return of responsiveness).\n• MAC-BAR ≈ 1.3–1.5 MAC (blunts the adrenergic response to incision)."},{"h":"Modifiers","r":"action","t":"• MAC falls with age (roughly 6% per decade after 40), hypothermia, opioids, benzodiazepines, other sedatives, pregnancy, acute alcohol intoxication, and hyponatremia.\n• MAC rises with hyperthermia, chronic alcohol use, and sympathomimetics."}]},{"id":369,"title":"Local Anesthetics (Max Doses)","cat":"Reference","L":"L","new":true,"sections":[{"h":"Approximate Maximums","r":"info","t":"• Lidocaine: about 4.5 mg/kg plain, up to about 7 mg/kg with epinephrine.\n• Bupivacaine and levobupivacaine: about 2–2.5 mg/kg (with epinephrine up to ~3).\n• Ropivacaine: about 3 mg/kg.\n• Mepivacaine: about 4.5–7 mg/kg."},{"h":"Modifiers","r":"action","t":"• Doses are guidelines, not thresholds — reduce for the frail, hepatic or cardiac disease, pregnancy, and vascular or intercostal sites (rapid absorption); epinephrine slows absorption and prolongs the block."},{"h":"Toxicity","r":"alert","t":"• Exceeding safe doses or inadvertent intravascular injection causes local anesthetic systemic toxicity; aspirate, use incremental dosing, and consider test doses."},{"h":"Note","r":"info","t":"• Calculate total dose across all sites and use lean body weight; bupivacaine is the most cardiotoxic of the common agents."}]},{"id":370,"title":"Preoperative Cardiac Evaluation","cat":"Reference","L":"P","new":true,"sections":[{"h":"Framework","r":"info","t":"• Combine surgery-specific risk, patient risk (as in the Revised Cardiac Risk Index), and functional capacity (metabolic equivalents) to decide on further testing."},{"h":"Functional Capacity","r":"info","t":"• Good capacity (roughly 4 or more metabolic equivalents — climbing stairs, brisk walking) is reassuring; poor or unknown capacity with elevated risk may prompt testing if it will change management."},{"h":"Active Conditions","r":"alert","t":"• Unstable coronary syndromes, decompensated heart failure, significant arrhythmias, and severe valvular disease warrant evaluation and optimization before elective surgery."},{"h":"Medications","r":"action","t":"• Continue beta-blockers and statins, individualize ACE inhibitors and ARBs (often held on the day), and coordinate antiplatelet and stent timing with cardiology."}]},{"id":371,"title":"Fasting / NPO Guidelines","cat":"Reference","L":"F","new":true,"sections":[{"h":"Standard Fasting Intervals","r":"action","t":"• Clear liquids: 2 hours\n• Breast milk: 4 hours\n• Infant formula and a light meal: 6 hours\n• Fatty or fried food and meat: 8 hours"},{"h":"Notes","r":"info","t":"• Some enhanced-recovery pathways permit clear carbohydrate drinks up to 2 hours before surgery.\n• GLP-1 receptor agonists slow gastric emptying and alter these assumptions — see that drug entry for hold guidance."},{"h":"Worry About","r":"alert","t":"• Full-stomach physiology from obstruction, gastroparesis, pregnancy, or symptomatic reflux raises aspiration risk and may warrant a rapid-sequence approach regardless of clock time."}]},{"id":372,"title":"PONV Risk & Prophylaxis","cat":"Reference","L":"P","new":true,"sections":[{"h":"Risk Factors","r":"info","t":"• The main adult predictors are female sex, nonsmoking status, a history of postoperative nausea or motion sickness, and postoperative opioid use; more factors mean higher risk."},{"h":"Prophylaxis","r":"action","t":"• Use multimodal prophylaxis scaled to risk — a 5-HT3 antagonist (ondansetron), dexamethasone, droperidol or haloperidol, and scopolamine, adding aprepitant for high risk."},{"h":"Technique","r":"action","t":"• Reduce baseline risk with propofol-based total intravenous anesthesia, opioid-sparing multimodal analgesia, adequate hydration, and avoidance of nitrous oxide where feasible."},{"h":"Rescue","r":"action","t":"• Treat breakthrough nausea with an agent from a different class than used for prophylaxis."}]},{"id":373,"title":"Surgical Antibiotic Prophylaxis","cat":"Reference","L":"S","new":true,"sections":[{"h":"Timing","r":"action","t":"• Give within 60 minutes before incision (within 120 minutes for vancomycin or a fluoroquinolone) so tissue levels are adequate at incision."},{"h":"Agent & Dose","r":"info","t":"• Cefazolin covers most cases with weight-based dosing; add or substitute agents for MRSA risk or specific procedures, and use alternatives for true beta-lactam allergy."},{"h":"Redosing","r":"action","t":"• Redose intraoperatively for prolonged surgery (about every two drug half-lives) and after major blood loss."},{"h":"Duration","r":"action","t":"• Discontinue prophylaxis within 24 hours in most cases; prolonged postoperative courses do not reduce infection and promote resistance."}]},{"id":374,"title":"Perioperative Anticoagulation & Bridging","cat":"Reference","L":"P","new":true,"sections":[{"h":"Hold Timing","r":"action","t":"• Time the last dose to the drug and bleeding risk — warfarin roughly 5 days, DOACs by agent and renal function, and antiplatelets per indication."},{"h":"Bridging","r":"info","t":"• Reserve heparin or low-molecular-weight heparin bridging for high thrombotic risk (certain mechanical valves, recent VTE or stroke); most atrial fibrillation does not need bridging."},{"h":"Neuraxial","r":"alert","t":"• Follow ASRA timing before and after neuraxial procedures and catheter removal to avoid spinal hematoma."},{"h":"Resumption & Reversal","r":"action","t":"• Resume anticoagulation when hemostasis allows, and reverse urgently when needed (prothrombin complex concentrate and vitamin K for warfarin; specific agents for DOACs)."}]},{"id":375,"title":"Perioperative Glucose Management","cat":"Reference","L":"P","new":true,"sections":[{"h":"Targets","r":"info","t":"• Aim for moderate control (commonly about 140–180 mg/dL), avoiding both hyperglycemia and hypoglycemia."},{"h":"Oral Agents & Non-Insulin","r":"action","t":"• Hold most oral agents on the day of surgery, hold SGLT2 inhibitors several days ahead (euglycemic ketoacidosis risk), and follow guidance for GLP-1 agonists (gastric emptying and aspiration)."},{"h":"Insulin","r":"action","t":"• Reduce rather than omit basal insulin, hold prandial insulin while fasting, and use short-acting insulin or an infusion for control with frequent monitoring."},{"h":"Vigilance","r":"alert","t":"• Hypoglycemia is masked under anesthesia — monitor glucose regularly and treat promptly; consider euglycemic ketoacidosis in acidotic diabetics on SGLT2 inhibitors."}]},{"id":376,"title":"Airway Assessment","cat":"Reference","L":"A","new":true,"sections":[{"h":"Predictors","r":"info","t":"• Mallampati class, thyromental distance, mouth opening, neck extension and mobility, jaw protrusion, and dentition; obesity, sleep apnea, and prior difficult intubation add risk."},{"h":"Focused History","r":"action","t":"• Ask about prior difficult airway or intubation, radiation or surgery, and syndromes; review prior anesthetic records."},{"h":"Mask & SGA Difficulty","r":"info","t":"• Predictors of difficult mask ventilation include a beard, obesity, edentulousness, age, and snoring; anticipate difficult supraglottic placement with limited mouth opening or altered anatomy."},{"h":"Plan","r":"action","t":"• When difficulty is anticipated, prepare an awake or advanced technique, gather equipment and help, and preoxygenate thoroughly."}]},{"id":377,"title":"Clinical Scores (ASA, VTE, Hepatic)","cat":"Reference","L":"C","new":true,"sections":[{"h":"ASA Physical Status","r":"info","t":"• Classes I (healthy) through VI (brain-dead organ donor), with 'E' appended for emergencies; it describes baseline health, not surgical risk directly."},{"h":"VTE Risk","r":"info","t":"• Risk-assessment models (such as Caprini) weigh patient and procedure factors to guide mechanical and pharmacologic prophylaxis."},{"h":"Hepatic Severity","r":"info","t":"• Child-Pugh (bilirubin, albumin, INR, ascites, encephalopathy) and MELD (bilirubin, INR, creatinine, sodium) stratify perioperative risk in liver disease."},{"h":"Use","r":"action","t":"• Combine scores with clinical judgment to plan monitoring, prophylaxis, and the appropriate setting of care."}]},{"id":378,"title":"Peripheral & Fascial Plane Blocks","cat":"Reference","L":"P","new":true,"sections":[{"h":"Upper Limb","r":"info","t":"• Interscalene (shoulder), supraclavicular and infraclavicular (arm and forearm), and axillary (forearm and hand) brachial plexus blocks."},{"h":"Lower Limb","r":"info","t":"• Femoral and adductor-canal (knee — the adductor canal spares quadriceps strength), and sciatic and popliteal-sciatic blocks (leg and foot)."},{"h":"Trunk / Fascial Plane","r":"info","t":"• Transversus abdominis plane, rectus sheath, PECS and serratus, erector spinae plane, and paravertebral blocks for abdominal and thoracic analgesia."},{"h":"Notes","r":"alert","t":"• Blocks reduce opioids within enhanced-recovery pathways; calculate total local anesthetic dose to avoid systemic toxicity and use ultrasound guidance."}]},{"id":379,"title":"Neuraxial Anesthesia & ASRA Timing","cat":"Reference","L":"N","new":true,"sections":[{"h":"Basics","r":"info","t":"• Spinal anesthesia gives a rapid, dense, single-shot block; epidural analgesia is titratable and catheter-based; both cause sympathetic block with hypotension."},{"h":"Contraindications","r":"alert","t":"• Avoid with patient refusal, coagulopathy or therapeutic anticoagulation, infection at the site, severe hypovolemia, and raised intracranial pressure from a mass."},{"h":"ASRA Timing","r":"action","t":"• Follow ASRA intervals around anticoagulants and antiplatelets for placement and catheter removal to minimize spinal hematoma risk."},{"h":"Complications","r":"alert","t":"• Manage hypotension (fluids, vasopressors), high or total spinal (airway and circulatory support), and post-dural-puncture headache (conservative care, then blood patch)."}]},{"id":380,"title":"Pediatric Quick Card","cat":"Reference","L":"P","new":true,"sections":[{"h":"Airway Sizing","r":"info","t":"• Uncuffed tube size ≈ age/4 + 4 (about age/4 + 3.5 for cuffed); insertion depth ≈ tube size × 3 cm at the lip; children desaturate quickly."},{"h":"Fluids","r":"action","t":"• Maintenance by the 4-2-1 rule (4 mL/kg/h for the first 10 kg, 2 for the next 10, 1 thereafter); replace deficits and losses with balanced crystalloid."},{"h":"Emergency Doses","r":"action","t":"• Epinephrine 0.01 mg/kg (arrest), atropine ~0.02 mg/kg, and defibrillation 2 then 4 J/kg."},{"h":"Practical","r":"info","t":"• Confirm fasting, maintain temperature and glucose in neonates, and use weight-based dosing throughout."}]},{"id":381,"title":"Obstetric Anesthesia","cat":"Reference","L":"O","new":true,"sections":[{"h":"Physiology","r":"info","t":"• Pregnancy brings a difficult airway and rapid desaturation, aspiration risk, aortocaval compression, and reduced anesthetic requirements — always use left uterine displacement."},{"h":"Labor & Cesarean","r":"action","t":"• Neuraxial analgesia is standard for labor; spinal or epidural anesthesia is preferred for cesarean, maintaining blood pressure (phenylephrine) and uteroplacental perfusion."},{"h":"General Anesthesia","r":"alert","t":"• When general anesthesia is needed, plan for a difficult airway with a smaller tube, use rapid-sequence induction with aspiration precautions, and preoxygenate well."},{"h":"Hemorrhage","r":"action","t":"• Anticipate postpartum hemorrhage — uterotonics (oxytocin, then second-line agents), tranexamic acid, and massive-transfusion readiness."}]},{"id":382,"title":"Fluids & Electrolytes","cat":"Reference","L":"F","new":true,"sections":[{"h":"Maintenance","r":"info","t":"• Estimate maintenance with the 4-2-1 rule and prefer balanced crystalloids for most resuscitation; large volumes of normal saline cause hyperchloremic acidosis."},{"h":"Replacement","r":"action","t":"• Replace deficits and ongoing losses guided by hemodynamics and, in major cases, dynamic and goal-directed measures rather than fixed formulas."},{"h":"Key Electrolytes","r":"info","t":"• Correct sodium disturbances at safe rates (avoid osmotic demyelination), keep potassium and magnesium normal for rhythm, and monitor ionized calcium in massive transfusion."},{"h":"Caution","r":"alert","t":"• Both under- and over-resuscitation harm; tailor to the patient and procedure rather than defaulting to large fixed volumes."}]},{"id":383,"title":"Anesthesia Formulas & Physiology","cat":"Reference","L":"A","new":true,"sections":[{"h":"Hemodynamics","r":"info","t":"• Mean arterial pressure ≈ diastolic + one-third pulse pressure; cerebral perfusion pressure = mean arterial pressure − intracranial (or central venous) pressure; cardiac output = stroke volume × heart rate."},{"h":"Oxygenation","r":"info","t":"• Oxygen delivery = cardiac output × arterial oxygen content; arterial oxygen content ≈ 1.34 × hemoglobin × saturation + dissolved oxygen; the alveolar gas and A–a gradient describe gas exchange."},{"h":"Acid-Base & Metabolic","r":"info","t":"• Anion gap = sodium − (chloride + bicarbonate); corrected calcium adjusts for albumin; minute ventilation = tidal volume × respiratory rate."},{"h":"Use","r":"action","t":"• These relationships guide targeted management — for example, supporting delivery by addressing output, hemoglobin, and saturation together."}]},{"id":384,"title":"Neuromuscular Blockade & Monitoring","cat":"Reference","L":"N","new":true,"sections":[{"h":"Agents","r":"info","t":"• Depolarizing: succinylcholine (fast onset and offset; avoid in hyperkalemia-prone and denervation states).\n• Nondepolarizing: rocuronium, vecuronium (aminosteroids, reversible with sugammadex), and cisatracurium (organ-independent Hofmann elimination)."},{"h":"Monitoring","r":"action","t":"• Use quantitative train-of-four monitoring; confirm recovery to a train-of-four ratio of at least 0.9 before extubation."},{"h":"Reversal","r":"action","t":"• Sugammadex reverses aminosteroid block rapidly (dose by depth); neostigmine with an antimuscarinic reverses only shallow block and has a ceiling."},{"h":"Caution","r":"alert","t":"• Residual blockade risks airway obstruction and aspiration; avoid succinylcholine where hyperkalemia is a risk (burns, denervation, prolonged immobility)."}]},{"id":385,"title":"Enhanced Recovery (ERAS) & Multimodal Analgesia","cat":"Reference","L":"E","new":true,"sections":[{"h":"Before Surgery","r":"action","t":"• Minimize fasting with clear carbohydrate drinks, avoid routine bowel prep where appropriate, and set expectations."},{"h":"During Surgery","r":"action","t":"• Use opioid-sparing multimodal analgesia and regional techniques, maintain normothermia and euvolemia with goal-directed fluids, and give PONV prophylaxis."},{"h":"After Surgery","r":"action","t":"• Encourage early feeding and mobilization, remove catheters and drains early, and continue scheduled non-opioid analgesia."},{"h":"Multimodal Analgesia","r":"info","t":"• Combine acetaminophen, NSAIDs, regional blocks, and adjuncts (dexamethasone, ketamine, dexmedetomidine, gabapentinoids selectively) to limit opioids."}]},{"id":386,"title":"Adult Congenital Heart Disease","cat":"Disease","L":"A","new":true,"sections":[{"h":"Overview","r":"info","t":"• Adults living with repaired or unrepaired congenital heart lesions, spanning simple defects to complex single-ventricle (Fontan) and cyanotic physiology."},{"h":"Pathophysiology/Background","r":"info","t":"• A broad spectrum: residual shunts, valve lesions, arrhythmias, ventricular dysfunction, pulmonary hypertension, and Eisenmenger physiology.\n• Management is entirely lesion-specific — the anatomy and current physiology must be known before induction."},{"h":"Worry About","r":"alert","t":"• Paradoxical air embolism through shunts (meticulously de-air every IV line).\n• Arrhythmias; the balance of systemic versus pulmonary vascular resistance in shunt lesions; endocarditis prophylaxis for high-risk lesions; and anticoagulation."},{"h":"Preoperative Preparation","r":"action","t":"• Obtain a recent echocardiogram and cardiology input; understand the specific repair and residual physiology.\n• Assess functional status, arrhythmia burden, and pulmonary pressures; plan antibiotic prophylaxis where indicated."},{"h":"Anesthetic Management","r":"action","t":"• Tailor to the lesion: maintain the appropriate resistance balance and preload.\n• Remove all air bubbles from lines because of right-to-left shunt risk; be cautious with vasodilation in shunt-dependent or fixed-output physiology; use invasive monitoring for complex cases."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, heart failure, paradoxical embolism, cyanosis, and pulmonary hypertensive crises."}]},{"id":387,"title":"Bariatric Surgery / Severe Obesity","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Severe obesity (and its surgery) with linked airway, respiratory, cardiovascular, and pharmacologic challenges."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced functional residual capacity with rapid desaturation, obstructive sleep apnea and obesity hypoventilation, and a higher chance of difficult mask and intubation.\n• Hypertension, coronary disease, diabetes, and reflux; altered distribution of lipophilic drugs; positioning, access, and venous-thromboembolism risk."},{"h":"Worry About","r":"alert","t":"• Difficult airway and rapid desaturation; sleep apnea with postoperative opioid-related respiratory depression; aspiration; weight-based dosing errors; VTE and positioning injury."},{"h":"Preoperative Preparation","r":"action","t":"• Screen for sleep apnea, assess airway and cardiopulmonary status, give aspiration prophylaxis, and plan ramped positioning."},{"h":"Anesthetic Management","r":"action","t":"• Ramp the patient and preoxygenate well (head-up, CPAP); prepare for a difficult airway.\n• Dose by the appropriate weight scalar (induction agents often lean or adjusted body weight; succinylcholine and sugammadex by total body weight); favor opioid-sparing multimodal analgesia and regional techniques; give VTE prophylaxis; extubate awake and head-up with CPAP available."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia, airway events, opioid sensitivity, VTE, and wound or positioning complications."}]},{"id":388,"title":"Bone Cement Implantation Syndrome","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Hemodynamic collapse — hypotension, hypoxia, arrhythmia, and possibly arrest — during cementation of orthopedic prostheses, classically in hip arthroplasty."},{"h":"Pathophysiology/Background","r":"info","t":"• Cementation and prosthesis insertion raise intramedullary pressure, embolizing fat, marrow, and cement and triggering pulmonary vasoconstriction, right-heart strain, and mediator release; it clusters around reaming, cementation, and prosthesis insertion."},{"h":"Worry About","r":"alert","t":"• Sudden hypotension, hypoxemia, arrhythmia, and arrest during cementation, with higher risk in the elderly, in cardiopulmonary disease, and with pathologic or metastatic bone."},{"h":"Preoperative Preparation","r":"action","t":"• Identify high-risk patients, communicate with the surgeon, optimize volume, and heighten monitoring and vigilance around cementation."},{"h":"Anesthetic Management","r":"action","t":"• Ensure euvolemia and high FiO₂ before cementation and anticipate and treat hypotension promptly with vasopressors while staying vigilant through reaming, cementation, and insertion.\n• Surgical measures (lavage, venting) reduce risk; support the right heart."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiovascular collapse or arrest, hypoxemia, arrhythmia, and fat embolism."}]},{"id":389,"title":"Cervical Spine Injury","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Traumatic cervical spine injury where airway management and positioning must protect the cord; high injuries add respiratory and autonomic compromise."},{"h":"Pathophysiology/Background","r":"info","t":"• An unstable injury risks cord damage with movement; high lesions impair the diaphragm and cause neurogenic shock (hypotension with bradycardia from sympathetic loss).\n• Succinylcholine risks hyperkalemia after roughly 24–48 hours (denervation), and chronic injury later brings autonomic dysreflexia."},{"h":"Worry About","r":"alert","t":"• Cord injury with neck manipulation, difficult airway management, neurogenic shock, respiratory compromise in high injuries, succinylcholine hyperkalemia beyond the acute phase, a full stomach, and associated injuries."},{"h":"Preoperative Preparation","r":"action","t":"• Assume instability, document neurologic deficits, assess respiratory function by level, plan the airway with in-line stabilization, and treat neurogenic shock."},{"h":"Anesthetic Management","r":"action","t":"• Manage the airway with manual in-line stabilization (video laryngoscopy or awake fiberoptic) and minimal neck movement, use rapid-sequence induction with aspiration precautions, and support hemodynamics for neurogenic shock (fluids, vasopressors, atropine).\n• Avoid succinylcholine beyond about 24–48 hours after injury and maintain spinal-cord perfusion by avoiding hypotension."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Worsening cord injury, neurogenic shock, respiratory failure, hyperkalemia, and aspiration."}]},{"id":390,"title":"Constrictive Pericarditis","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rigid, non-compliant pericardium restricting diastolic filling, causing venous congestion and a low fixed output — physiology akin to restrictive cardiomyopathy and tamponade."},{"h":"Pathophysiology/Background","r":"info","t":"• A thickened or calcified pericardium limits filling, giving elevated and equalized filling pressures, a low fixed stroke volume dependent on heart rate, and venous congestion; definitive treatment is pericardiectomy."},{"h":"Worry About","r":"alert","t":"• A fixed low stroke volume dependent on heart rate and preload, with poor tolerance of bradycardia, myocardial depression, vasodilation, and hypovolemia; pericardiectomy brings abrupt hemodynamic shifts and bleeding."},{"h":"Preoperative Preparation","r":"action","t":"• Assess filling pressures and function, optimize but avoid over-diuresis (the patient is preload-dependent), and plan invasive monitoring for pericardiectomy."},{"h":"Anesthetic Management","r":"action","t":"• Maintain heart rate (avoid bradycardia), preload, contractility, and afterload while avoiding myocardial depressants and vasodilation — keep the patient full and fast.\n• For pericardiectomy, anticipate sudden hemodynamic shifts, bleeding, and arrhythmia with invasive monitoring and blood available."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Low-output hypotension, arrhythmia, surgical bleeding, and hemodynamic instability."}]},{"id":391,"title":"ECMO","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Extracorporeal membrane oxygenation — mechanical support providing gas exchange (venovenous) and/or circulatory support (venoarterial) for severe cardiac or respiratory failure, with complex anesthetic considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Blood is pumped through an oxygenator; venovenous ECMO supports gas exchange in respiratory failure, while venoarterial ECMO supports circulation and gas exchange in cardiac failure.\n• The circuit requires anticoagulation and sequesters lipophilic drugs, and it carries risks of bleeding, thrombosis, hemolysis, and (in peripheral venoarterial ECMO) differential hypoxia."},{"h":"Worry About","r":"alert","t":"• Bleeding and thrombosis (the anticoagulation balance), altered drug dosing from circuit sequestration, differential oxygenation in peripheral venoarterial ECMO, cannula and access issues, and infection."},{"h":"Preoperative Preparation","r":"action","t":"• Understand the configuration (venovenous versus venoarterial), flows, and anticoagulation and the underlying condition, and coordinate with the ECMO and perfusion team."},{"h":"Anesthetic Management","r":"action","t":"• Coordinate closely with perfusion; titrate anesthetics recognizing circuit sequestration (higher or adjusted doses may be needed), manage anticoagulation and bleeding, maintain flows and hemodynamics, watch for differential hypoxia in venoarterial support, and keep meticulous asepsis and line care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, thrombosis, hemodynamic instability, altered drug effect, and differential hypoxia."}]},{"id":392,"title":"Elevated Intracranial Pressure","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Raised pressure within the rigid skull that threatens cerebral perfusion and risks herniation; management centers on lowering intracranial pressure while preserving cerebral perfusion pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• A mass, edema, hydrocephalus, or hemorrhage raises pressure; because cerebral perfusion pressure equals mean arterial pressure minus intracranial pressure, both hypotension and rising pressure reduce perfusion.\n• The Cushing response (hypertension with bradycardia) is a late sign, and herniation is the catastrophe."},{"h":"Worry About","r":"alert","t":"• Herniation and cerebral ischemia, anything that raises intracranial pressure (hypercarbia, hypoxia, coughing or straining, head-down or neck compression), maintenance of perfusion pressure, and the underlying lesion."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial pressure and neurologic status and the cause, optimize, and plan a smooth induction and a pressure-lowering strategy with head-up positioning."},{"h":"Anesthetic Management","r":"action","t":"• Maintain cerebral perfusion pressure (avoid hypotension), keep normoxia and normocapnia (brief hyperventilation only for acute herniation), and avoid pressure spikes (deep smooth induction and laryngoscopy, avoid coughing and straining, head-up with a neutral neck).\n• Use osmotherapy (mannitol or hypertonic saline) and CSF drainage when available, and treat the cause."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Herniation, cerebral ischemia, hemodynamic surges, and delayed emergence."}]},{"id":393,"title":"HELLP Syndrome","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A severe preeclampsia variant with Hemolysis, Elevated Liver enzymes, and Low Platelets — an obstetric emergency with bleeding and organ risk."},{"h":"Pathophysiology/Background","r":"info","t":"• A severe preeclampsia manifestation causing microangiopathic hemolysis, hepatic dysfunction (risk of hepatic hematoma and rupture), and thrombocytopenia; hypertension raises the risk of DIC, abruption, seizures, pulmonary edema, and renal injury."},{"h":"Worry About","r":"alert","t":"• Thrombocytopenia and coagulopathy (bleeding, neuraxial contraindicated below platelet thresholds or if falling), hepatic dysfunction or rupture, severe hypertension, DIC, and pulmonary edema; delivery is definitive treatment."},{"h":"Preoperative Preparation","r":"action","t":"• Trend platelets and coagulation and check liver and renal function, control blood pressure (labetalol, hydralazine, nicardipine), give magnesium for seizure prophylaxis, plan for delivery, and have blood products available."},{"h":"Anesthetic Management","r":"action","t":"• General anesthesia is often needed when thrombocytopenic (neuraxial is risky with low or falling platelets), so blunt the hypertensive response to laryngoscopy; manage severe hypertension and magnesium (which potentiates neuromuscular blockade — reduce and monitor), have blood products ready, and watch for hepatic hematoma, DIC, and pulmonary edema."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage and coagulopathy, hepatic rupture, hypertensive crisis, DIC, and pulmonary edema."}]},{"id":394,"title":"HIT / Heparin-Induced Thrombocytopenia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• An immune-mediated reaction to heparin causing thrombocytopenia and paradoxical thrombosis; it requires stopping all heparin and using alternative anticoagulation."},{"h":"Pathophysiology/Background","r":"info","t":"• Antibodies to heparin-platelet-factor-4 complexes activate platelets, producing thrombocytopenia in a prothrombotic (not bleeding) state with venous and arterial thrombosis, typically 5–10 days after heparin exposure (sooner with prior exposure)."},{"h":"Worry About","r":"alert","t":"• Thrombosis despite a low platelet count, the need to avoid all heparin (including flushes, heparin-bonded catheters, and LMWH), managing alternative anticoagulation (argatroban, bivalirudin), and procedures requiring anticoagulation such as bypass."},{"h":"Preoperative Preparation","r":"action","t":"• Confirm HIT, stop all heparin (including flushes and coated lines), use a non-heparin anticoagulant per hematology, and plan alternatives for any anticoagulation-requiring procedure."},{"h":"Anesthetic Management","r":"action","t":"• Avoid all heparin exposure and use alternative anticoagulants (direct thrombin inhibitors) where anticoagulation is needed — including bivalirudin for bypass — coordinating with hematology and perfusion and monitoring for thrombosis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Thrombosis, complications of alternative anticoagulation, and difficulty with heparin-dependent procedures."}]},{"id":395,"title":"Interstitial Lung Disease","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• Diffuse parenchymal lung disease causing restrictive physiology, impaired gas exchange, and often pulmonary hypertension — a high perioperative pulmonary risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Interstitial fibrosis or inflammation produces stiff, low-volume lungs with impaired diffusion (hypoxemia worsening on exertion) and pulmonary hypertension with right-heart strain; causes include idiopathic pulmonary fibrosis, autoimmune disease, drugs or radiation, and sarcoidosis, and patients may be on steroids."},{"h":"Worry About","r":"alert","t":"• Severe restriction and hypoxemia with little reserve, pulmonary hypertension and right-ventricular strain, barotrauma from high pressures, postoperative respiratory failure, oxygen sensitivity in some (prior bleomycin), and steroid dependence."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function (restrictive pattern, diffusion capacity), oxygenation, and pulmonary pressures and right-ventricular status, give steroid coverage, and consider regional techniques."},{"h":"Anesthetic Management","r":"action","t":"• Use lung-protective ventilation (low tidal volumes, limited pressures for stiff lungs), maintain oxygenation, avoid raising pulmonary vascular resistance and support the right ventricle, keep oxygen conservative after prior bleomycin, and anticipate postoperative respiratory support with stress-dose steroids."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia and respiratory failure, right-ventricular failure and pulmonary hypertension, barotrauma, and difficulty weaning."}]},{"id":396,"title":"Kidney Transplant Recipient","cat":"Disease","L":"K","new":true,"sections":[{"h":"Overview","r":"info","t":"• A patient with a functioning or failing renal allograft on immunosuppression; the key considerations are graft protection, immunosuppression, and comorbid disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Immunosuppression brings infection risk and drug interactions and toxicities (calcineurin inhibitors are nephrotoxic and hypertensive), graft function is variable (residual CKD issues), and diabetes, cardiovascular disease, and hypertension are common; graft perfusion must be protected."},{"h":"Worry About","r":"alert","t":"• Protecting graft function (maintain perfusion and pressure, avoid nephrotoxins and hypovolemia), infection in the immunosuppressed patient, immunosuppressant interactions and stress-dose steroids, residual electrolyte and volume issues, and cardiovascular comorbidity; avoid the graft-side and fistula arm."},{"h":"Preoperative Preparation","r":"action","t":"• Assess graft function (creatinine), electrolytes, and volume, continue immunosuppression with stress-dose steroids, avoid nephrotoxins, and note drug interactions."},{"h":"Anesthetic Management","r":"action","t":"• Maintain renal perfusion (adequate pressure and volume, avoid hypotension and nephrotoxins), keep strict asepsis, continue immunosuppression and stress-dose steroids, favor organ-independent drugs (cisatracurium), manage electrolytes, and avoid the transplant-side and fistula arm."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Graft dysfunction, infection, electrolyte issues, immunosuppressant effects, and cardiovascular events."}]},{"id":397,"title":"LVAD / Mechanical Circulatory Support","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• A durable ventricular assist device providing continuous, usually non-pulsatile flow for advanced heart failure, with unique physiology and anesthetic considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Continuous-flow support makes the circulation largely non-pulsatile (unreliable NIBP and pulse oximetry — use Doppler or an arterial line for mean pressure); flow is preload-sensitive (hypovolemia causes suction events) and afterload-sensitive, right-ventricular function is critical to fill the device, and anticoagulation is required."},{"h":"Worry About","r":"alert","t":"• Blood-pressure measurement in a non-pulsatile circulation, preload dependence (avoid hypovolemia and suction events) and afterload sensitivity, right-ventricular failure (avoid raising pulmonary resistance), anticoagulation (bleeding versus pump thrombosis), infection, and device power and connections."},{"h":"Preoperative Preparation","r":"action","t":"• Coordinate with the VAD and heart-failure team, understand device parameters, anticoagulation, and right-ventricular function, plan mean-pressure monitoring (arterial line, Doppler), and ensure device power and backup."},{"h":"Anesthetic Management","r":"action","t":"• Involve VAD specialists and monitor mean arterial pressure (arterial line; NIBP and pulse oximetry are unreliable), maintain preload and avoid hypovolemia (suction events), control afterload, and support the right ventricle (oxygenation, normocarbia, inotropes as needed).\n• Manage anticoagulation, keep meticulous asepsis, maintain device function, and follow VAD-specific resuscitation protocols."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Suction events and hypotension, right-ventricular failure, bleeding or thrombosis, monitoring difficulties, and infection."}]},{"id":398,"title":"Lambert-Eaton Myasthenic Syndrome","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• An autoimmune disorder of presynaptic calcium channels at the neuromuscular junction causing weakness that improves with repetition; often paraneoplastic (small-cell lung cancer)."},{"h":"Pathophysiology/Background","r":"info","t":"• Antibodies to presynaptic voltage-gated calcium channels reduce acetylcholine release, causing proximal weakness that improves with exertion (unlike myasthenia gravis), autonomic dysfunction, and diminished reflexes, with a strong association with small-cell lung cancer."},{"h":"Worry About","r":"alert","t":"• Marked sensitivity to both depolarizing and nondepolarizing relaxants (profound, prolonged blockade — reduce greatly or avoid), respiratory-muscle weakness, unreliable anticholinesterase reversal (use sugammadex for rocuronium), autonomic dysfunction, and the underlying malignancy."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory and autonomic function, search for an underlying malignancy, optimize, and discuss the likelihood of postoperative ventilation."},{"h":"Anesthetic Management","r":"action","t":"• Use relaxants very cautiously or avoid them (extreme sensitivity — small doses, quantitative monitoring, sugammadex for rocuronium), anticipate prolonged weakness and postoperative ventilation, recognize that anticholinesterase reversal is unreliable, favor regional or short-acting agents, and manage autonomic instability."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged weakness and respiratory failure, unreliable reversal, autonomic instability, and malignancy considerations."}]},{"id":399,"title":"Massive GI Bleed","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Life-threatening gastrointestinal hemorrhage causing hemorrhagic shock and aspiration risk — an emergency requiring resuscitation and airway control."},{"h":"Pathophysiology/Background","r":"info","t":"• Upper (varices, ulcer) or lower GI bleeding causes hypovolemic shock, anemia, and coagulopathy, with aspiration risk from blood and a full stomach; underlying liver disease may add varices and coagulopathy."},{"h":"Worry About","r":"alert","t":"• Hemorrhagic shock and ongoing bleeding, aspiration of blood and gastric contents, coagulopathy (especially with liver disease or massive transfusion), and hemodynamic collapse on induction."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate (large-bore access, blood, activate massive transfusion), type and crossmatch, correct coagulopathy, plan rapid-sequence induction with decompression, and treat the underlying cause (octreotide and antibiotics for varices)."},{"h":"Anesthetic Management","r":"action","t":"• Resuscitate before and during induction (blood products, massive-transfusion protocol), use rapid-sequence induction with aspiration precautions (suction, cricoid), correct coagulopathy (products, tranexamic acid), warm the patient, and watch for transfusion complications (hypocalcemia, hyperkalemia, hypothermic coagulopathy) with a careful reduced-dose induction in the unstable patient."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhagic shock and collapse, aspiration, coagulopathy, and transfusion complications."}]},{"id":400,"title":"Massive Hemoptysis","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Large-volume airway bleeding threatening asphyxiation; the immediate danger is airway flooding rather than exsanguination — protect the airway and isolate the bleeding lung."},{"h":"Pathophysiology/Background","r":"info","t":"• Bleeding into the airways (bronchiectasis, tuberculosis, malignancy, AVM) risks asphyxiation as blood floods both lungs; the goal is to protect gas exchange in the good lung and isolate the bleeding side."},{"h":"Worry About","r":"alert","t":"• Asphyxiation from airway blood (the main killer), difficulty ventilating and oxygenating, a difficult airway (blood obscures the view), and the need for lung isolation and positioning."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the bleeding side (imaging, bronchoscopy), plan lung isolation (double-lumen tube or bronchial blocker) and positioning (bleeding side down), secure large-bore access and blood, and arrange rigid bronchoscopy or interventional radiology for embolization."},{"h":"Anesthetic Management","r":"action","t":"• Secure and protect the airway urgently with lung isolation (double-lumen tube, bronchial blocker, or mainstem intubation of the good lung), position the bleeding side down, suction aggressively, and maintain oxygenation in the healthy lung.\n• Support hemodynamics, involve bronchoscopy or interventional radiology for source control, and correct coagulopathy."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Asphyxiation and hypoxemia, difficult airway, inability to ventilate, and hemodynamic instability."}]},{"id":401,"title":"MitraClip / Transcatheter Edge-to-Edge Repair","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A percutaneous transcatheter repair of mitral regurgitation (an edge-to-edge clip) in high-surgical-risk patients, performed under transesophageal-echo guidance, usually with general anesthesia."},{"h":"Pathophysiology/Background","r":"info","t":"• A transseptal catheter places a clip to reduce mitral regurgitation; patients typically have heart failure, poor LV function, pulmonary hypertension, and multiple comorbidities, and the procedure needs general anesthesia and immobility for echo guidance."},{"h":"Worry About","r":"alert","t":"• Underlying heart failure, poor LV function, and pulmonary hypertension (hemodynamic fragility), procedural complications (transseptal tamponade, bleeding, clip problems, induced mitral stenosis, embolism, arrhythmia), and the need for general anesthesia with echo."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac function, pulmonary pressures, and comorbidities, plan general anesthesia with transesophageal echo and invasive monitoring, set an anticoagulation plan, and coordinate with cardiology and imaging."},{"h":"Anesthetic Management","r":"action","t":"• Provide general anesthesia with echo guidance and immobility and invasive hemodynamic monitoring, manage the failing heart carefully (avoid myocardial depression, support as needed, manage pulmonary hypertension), be ready for complications (tamponade, arrhythmia, acute changes in regurgitation), and manage anticoagulation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure and hemodynamic instability, tamponade and procedural complications, arrhythmia, and pulmonary hypertensive events."}]},{"id":402,"title":"Myasthenia Gravis","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• An autoimmune postsynaptic acetylcholine-receptor disorder causing fatigable weakness; the anesthetic hallmarks are resistance to succinylcholine, sensitivity to nondepolarizers, and respiratory and bulbar risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Antibodies against postsynaptic acetylcholine receptors cause fatigable ocular, bulbar, respiratory, and generalized weakness that improves with rest and anticholinesterases; thymoma (a mediastinal mass) is associated, and both myasthenic and cholinergic crises can occur."},{"h":"Worry About","r":"alert","t":"• Marked sensitivity to nondepolarizing relaxants (tiny doses or avoid; sugammadex helps) and relative resistance to succinylcholine, respiratory and bulbar weakness (aspiration, postoperative ventilation), sensitivity to respiratory depressants, crises, an associated mediastinal mass, and drugs that worsen the disease (aminoglycosides, magnesium)."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize disease control (anticholinesterases, immunotherapy; decide on holding pyridostigmine on the day), assess respiratory and bulbar function (predictors of postoperative ventilation) and for thymoma, and plan for possible postoperative ventilation."},{"h":"Anesthetic Management","r":"action","t":"• Minimize or avoid nondepolarizing relaxants (small titrated doses with quantitative monitoring; sugammadex for rocuronium), expect resistance if using succinylcholine, favor regional and short-acting agents, and avoid drugs that worsen the disease (aminoglycosides, magnesium).\n• Maintain normothermia, anticipate postoperative ventilation, and treat crises appropriately."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure and prolonged weakness, aspiration, myasthenic or cholinergic crisis, and unpredictable relaxant response."}]},{"id":403,"title":"Myxedema Coma","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Severe, decompensated hypothyroidism — a life-threatening emergency with hypothermia, hypoventilation, hypotension, and altered mentation."},{"h":"Pathophysiology/Background","r":"info","t":"• Extreme hypothyroidism (often precipitated by illness, cold, or surgery in an undertreated patient) causes hypothermia, bradycardia, hypotension, hypoventilation with CO₂ retention, hyponatremia, hypoglycemia, and altered consciousness, with possible associated adrenal insufficiency and high mortality."},{"h":"Worry About","r":"alert","t":"• Respiratory failure, profound hemodynamic instability, hypothermia, hyponatremia, hypoglycemia, extreme anesthetic sensitivity, and associated adrenal insufficiency — a true emergency where elective surgery is avoided."},{"h":"Preoperative Preparation","r":"action","t":"• Treat the emergency — IV thyroid hormone, stress-dose steroids (for adrenal insufficiency), warming, ventilatory and hemodynamic support, and correction of sodium and glucose — and proceed only to essential surgery with intensive support."},{"h":"Anesthetic Management","r":"action","t":"• Treat myxedema coma (IV thyroid hormone, steroids, warming, supportive care) around any surgery, use minimal anesthetic doses (extreme sensitivity), support ventilation (anticipate prolonged ventilation), maintain temperature and hemodynamics (pressors may be needed), correct sodium and glucose, and use invasive monitoring with ICU care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, refractory hypotension and bradycardia, hypothermia, delayed emergence, and death."}]},{"id":404,"title":"One-Lung Ventilation","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deliberate ventilation of a single lung (lung isolation) for thoracic surgery; the central challenges are hypoxemia and managing the collapsed and dependent lung physiology."},{"h":"Pathophysiology/Background","r":"info","t":"• Lung isolation (double-lumen tube or bronchial blocker) collapses the operative lung; shunt through the non-ventilated lung causes hypoxemia, and hypoxic pulmonary vasoconstriction and lateral positioning redistribute flow, with a risk of malposition and lung injury."},{"h":"Worry About","r":"alert","t":"• Hypoxemia during one-lung ventilation (shunt), tube or blocker malposition (verify with bronchoscopy), ventilator-induced injury to the dependent lung, hemodynamic effects, and re-expansion issues."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function and predicted postoperative function, plan the isolation method and confirm placement, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Confirm lung isolation by bronchoscopy, use lung-protective settings on the dependent lung, and manage hypoxemia stepwise (increase FiO₂, recruit and add PEEP to the dependent lung, apply CPAP or oxygen to the operative lung, re-inflate intermittently, recheck position, or return to two-lung ventilation), supporting hemodynamics and re-expanding the operative lung gently at the end."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia, tube malposition, lung injury, and hemodynamic effects."}]},{"id":405,"title":"Placenta Accreta Spectrum","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An abnormally adherent or invasive placenta (accreta, increta, percreta) that fails to separate at delivery, causing massive obstetric hemorrhage — one of the highest-risk obstetric scenarios."},{"h":"Pathophysiology/Background","r":"info","t":"• Placental villi invade the myometrium and, in percreta, adjacent organs, so the placenta cannot separate and torrential hemorrhage follows; risk factors include prior cesarean and placenta previa, and cesarean hysterectomy is often required with planned multidisciplinary delivery."},{"h":"Worry About","r":"alert","t":"• Massive, rapid hemorrhage with hemorrhagic shock, coagulopathy and DIC, massive transfusion, ureteral or bladder injury (percreta), the need for cesarean hysterectomy, and aspiration."},{"h":"Preoperative Preparation","r":"action","t":"• Plan multidisciplinary delivery (obstetrics, anesthesia, urology, interventional radiology, blood bank), review imaging for depth, secure large-bore access and arterial and central lines, ready cross-matched blood and massive-transfusion products and cell salvage, and consider ureteral stents or balloon occlusion."},{"h":"Anesthetic Management","r":"action","t":"• Prepare fully for massive hemorrhage (large-bore access, rapid infuser, blood products and cell salvage, warming, invasive monitoring); general anesthesia is common for hysterectomy or major hemorrhage (or start neuraxial with a plan to convert), manage coagulopathy proactively (products, fibrinogen, tranexamic acid), maintain perfusion, and take aspiration precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Massive hemorrhage and shock, coagulopathy and DIC, transfusion complications, cesarean hysterectomy, and organ injury."}]},{"id":406,"title":"Stroke / TIA","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute cerebrovascular ischemia (or its transient form); relevance includes recent-stroke timing for elective surgery, perfusion management, and secondary prevention."},{"h":"Pathophysiology/Background","r":"info","t":"• An ischemic (or hemorrhagic) cerebrovascular event causes neurologic deficit and, when recent, impaired autoregulation and vulnerability with elevated perioperative stroke and mortality risk; patients are on antithrombotics, and risk factors include atrial fibrillation, carotid disease, and hypertension."},{"h":"Worry About","r":"alert","t":"• Recurrent stroke from impaired autoregulation (maintain perfusion, avoid pressure extremes) and the timing of elective surgery after a recent stroke, antithrombotic management (bleeding versus thrombosis), residual deficits, and succinylcholine hyperkalemia in paretic limbs."},{"h":"Preoperative Preparation","r":"action","t":"• Delay elective surgery after a recent stroke to allow autoregulation to recover (commonly some months), assess deficits, cause, and antithrombotics, and control blood pressure and risk factors."},{"h":"Anesthetic Management","r":"action","t":"• Maintain cerebral perfusion (blood pressure near or above baseline, avoid hypotension and hypertensive extremes), avoid succinylcholine in established paresis (denervation hyperkalemia), document deficits, take aspiration precautions if bulbar, manage antithrombotics, and maintain normoglycemia and normocarbia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Recurrent stroke, perfusion-related injury, hyperkalemia with succinylcholine in paresis, and the bleeding-versus-thrombosis balance."}]},{"id":407,"title":"TAVR / Transcatheter Aortic Valve Replacement","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A percutaneous aortic-valve replacement for severe aortic stenosis in high-surgical-risk patients; severe-AS physiology and procedural complications drive management."},{"h":"Pathophysiology/Background","r":"info","t":"• A catheter-delivered valve treats severe aortic stenosis; the fixed obstruction demands maintained preload, systemic resistance, sinus rhythm, and rate, and the procedure involves rapid ventricular pacing and risks of annular rupture, tamponade, vascular injury, stroke, heart block, and coronary occlusion."},{"h":"Worry About","r":"alert","t":"• Severe-AS physiology (hypotension causes a coronary-ischemia death spiral — maintain preload, resistance, and rhythm), procedural complications (tamponade, vascular injury, stroke, heart block, paravalvular leak, coronary occlusion), and the effects of rapid pacing."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the stenosis and ventricular function and comorbidities, plan anesthetic approach (general or increasingly conscious sedation) and invasive monitoring, and prepare for complications and possible surgical conversion."},{"h":"Anesthetic Management","r":"action","t":"• Manage severe-AS hemodynamics (maintain preload, systemic resistance, and sinus rhythm, treat hypotension promptly with vasopressors), support the circulation through rapid-pacing runs, use invasive monitoring, and be ready for tamponade, vascular injury, heart block, and conversion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic collapse from AS physiology, tamponade and vascular complications, heart block, and stroke."}]},{"id":408,"title":"Takotsubo Cardiomyopathy","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A stress-induced, usually reversible left-ventricular dysfunction (apical ballooning) mediated by catecholamines that mimics myocardial infarction and can be triggered perioperatively."},{"h":"Pathophysiology/Background","r":"info","t":"• Intense physical or emotional stress and catecholamine surges cause transient regional left-ventricular dysfunction with heart failure, possible outflow-tract obstruction, and arrhythmia, typically recovering over days to weeks."},{"h":"Worry About","r":"alert","t":"• Acute left-ventricular dysfunction and heart failure, dynamic outflow obstruction, arrhythmia, and worsening from catecholamine surges or exogenous catecholamines."},{"h":"Preoperative Preparation","r":"action","t":"• Assess ventricular function and any outflow obstruction (echo), optimize heart failure, and plan to minimize perioperative stress and catecholamine surges."},{"h":"Anesthetic Management","r":"action","t":"• Blunt stress responses (adequate depth and analgesia), avoid catecholamine surges and cautiously avoid exogenous catecholamines (which can worsen it), manage heart failure supportively, treat any outflow obstruction like hypertrophic obstructive cardiomyopathy (maintain preload and afterload, avoid inotropes), and consider mechanical support if severe."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure, outflow obstruction, arrhythmia, and deterioration with catecholamines."}]},{"id":409,"title":"Thyroid Storm","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• Decompensated, life-threatening hyperthyroidism — a hypermetabolic crisis often precipitated by surgery, stress, or illness in an undertreated patient."},{"h":"Pathophysiology/Background","r":"info","t":"• Extreme thyroid hormone excess causes hyperthermia, tachycardia and arrhythmia (atrial fibrillation), heart failure, agitation or delirium, and GI symptoms, and it can be precipitated perioperatively; it resembles and must be distinguished from malignant hyperthermia."},{"h":"Worry About","r":"alert","t":"• Hyperthermia, tachyarrhythmia and heart failure, agitation and delirium, hemodynamic instability, and the differential with malignant hyperthermia — a true emergency, so avoid elective surgery until controlled."},{"h":"Preoperative Preparation","r":"action","t":"• Treat the storm (beta-blockade with propranolol or esmolol, thionamides, iodine after a thionamide, corticosteroids, cooling, and supportive care), control hyperthyroidism before elective surgery, and identify precipitants."},{"h":"Anesthetic Management","r":"action","t":"• Continue storm treatment around any surgery (beta-blockade, thionamides, steroids, active cooling), avoid triggers and drugs that stimulate the sympathetic system, control heart rate and rhythm, maintain hemodynamics, and support the patient in ICU."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Tachyarrhythmia and heart failure, hyperthermia, hemodynamic collapse, and confusion with malignant hyperthermia."}]},{"id":410,"title":"Tracheal Stenosis","cat":"Disease","L":"T","new":true,"sections":[{"h":"Overview","r":"info","t":"• A narrowing of the trachea (post-intubation or tracheostomy, tumor, external compression, or idiopathic) causing airway obstruction and difficult ventilation."},{"h":"Pathophysiology/Background","r":"info","t":"• The narrowed segment obstructs airflow and complicates ventilation and tube passage; presentation ranges from exertional dyspnea to critical obstruction, and patients may present for dilation or tracheal resection with a shared airway."},{"h":"Worry About","r":"alert","t":"• Critical airway obstruction, difficulty ventilating and passing a tube, complete obstruction after muscle relaxation, and the shared airway during resection."},{"h":"Preoperative Preparation","r":"action","t":"• Characterize the stenosis (imaging, endoscopy), plan the airway with ENT, prepare rigid bronchoscopy, appropriate tube sizes, and jet-ventilation or ECMO backup for severe cases."},{"h":"Anesthetic Management","r":"action","t":"• Maintain spontaneous ventilation until the airway is secured, avoid muscle relaxants until ventilation is assured, place a tube beyond or above the stenosis as appropriate (or use jet ventilation), keep rigid bronchoscopy and surgical-airway or ECMO backup ready, and coordinate the shared airway for resection."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Complete airway obstruction, inability to ventilate, and shared-airway challenges."}]},{"id":411,"title":"Von Willebrand Disease","cat":"Disease","L":"V","new":true,"sections":[{"h":"Overview","r":"info","t":"• The most common inherited bleeding disorder, caused by deficient or defective von Willebrand factor, impairing platelet adhesion and lowering factor VIII."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced or dysfunctional von Willebrand factor impairs platelet adhesion and destabilizes factor VIII, causing mucocutaneous and surgical bleeding; subtypes (1, 2, 3) differ, and treatments include desmopressin (for type 1), von Willebrand/factor VIII concentrates, and antifibrinolytics."},{"h":"Worry About","r":"alert","t":"• Surgical and mucosal bleeding and neuraxial hematoma risk, subtype-specific treatment (desmopressin works for type 1 but not others), and avoiding antiplatelet drugs."},{"h":"Preoperative Preparation","r":"action","t":"• Determine the subtype and severity with hematology, plan treatment (desmopressin trial or factor concentrate, antifibrinolytics), and avoid antiplatelet agents."},{"h":"Anesthetic Management","r":"action","t":"• Ensure adequate hemostatic cover (desmopressin or von Willebrand/factor VIII concentrate, tranexamic acid) before surgery, treat neuraxial as high-risk without correction, handle the airway gently, and avoid antiplatelet drugs."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, neuraxial hematoma, and inadequate subtype-specific cover."}]},{"id":412,"title":"Dexmedetomidine","cat":"Drug","L":"D","sections":[{"h":"Background","r":"info","t":"• A selective alpha-2 adrenergic agonist providing sedation and analgesia with minimal respiratory depression."},{"h":"Perioperative Management","r":"action","t":"• Use as a sedative and analgesic adjunct, for opioid sparing, and to reduce emergence agitation and delirium."},{"h":"Worry About","r":"alert","t":"• Bradycardia and hypotension (and transient hypertension with rapid loading), and prolonged sedation at high doses."},{"h":"Anesthesia Pearls","r":"action","t":"• Valued for preserving respiratory drive; anticipate bradycardia and hypotension, and use as part of multimodal and delirium-sparing strategies."}]},{"id":413,"title":"Etomidate","cat":"Drug","L":"E","sections":[{"h":"Background","r":"info","t":"• An imidazole intravenous induction agent notable for hemodynamic stability."},{"h":"Perioperative Management","r":"action","t":"• Useful for induction in hemodynamically unstable or cardiac patients."},{"h":"Worry About","r":"alert","t":"• Adrenal suppression (transient after even a single dose), myoclonus, pain on injection, and a high rate of postoperative nausea."},{"h":"Anesthesia Pearls","r":"action","t":"• Favored for unstable patients for its cardiovascular stability; be mindful of adrenal suppression in the critically ill and treat myoclonus and nausea."}]},{"id":414,"title":"Ketamine","cat":"Drug","L":"K","sections":[{"h":"Background","r":"info","t":"• An NMDA-receptor antagonist producing dissociative anesthesia and potent analgesia."},{"h":"Perioperative Management","r":"action","t":"• Use for induction in unstable patients, as an analgesic adjunct (including opioid-tolerant and chronic pain), and for bronchospasm."},{"h":"Worry About","r":"alert","t":"• Sympathomimetic effects (usually raising heart rate and blood pressure, but direct myocardial depression can appear in catecholamine-depleted patients), emergence phenomena, hypersalivation, and raised secretions."},{"h":"Anesthesia Pearls","r":"action","t":"• Preserves airway reflexes and respiratory drive and causes bronchodilation; blunt emergence phenomena with a benzodiazepine and use low-dose infusions for opioid-sparing analgesia."}]},{"id":415,"title":"Air Embolism","cat":"Reference","L":"A","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Sudden fall in end-tidal CO₂, hypotension, hypoxemia, arrhythmia, and a mill-wheel murmur, typically when the surgical site is above the heart (sitting cases, central-line procedures)."},{"h":"Immediate Actions","r":"action","t":"• Alert the surgeon to flood or occlude the field, give 100% oxygen and stop nitrous oxide, and aspirate air from a central line if present."},{"h":"Positioning & Support","r":"action","t":"• Place the patient head-down and left lateral (Durant position) to trap air in the right atrium, and support the circulation with fluids and vasopressors."},{"h":"Prevent","r":"action","t":"• Meticulous line de-airing, precordial Doppler or end-tidal monitoring in high-risk positioning, and vigilance for paradoxical embolism with any right-to-left shunt."}]},{"id":416,"title":"Bronchospasm","cat":"Reference","L":"B","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Wheeze, rising airway pressures, a prolonged or sloping capnograph upstroke, and hypoxemia; consider mechanical causes (tube, secretions) and anaphylaxis in the differential."},{"h":"Immediate Actions","r":"action","t":"• Deepen anesthesia, give 100% oxygen, and administer an inhaled beta-agonist (via the circuit); add ipratropium.\n• For severe or refractory bronchospasm, give epinephrine."},{"h":"Adjuncts","r":"action","t":"• Consider IV magnesium, ketamine, and corticosteroids (delayed effect), and adjust ventilation to allow full expiration (avoid breath stacking)."},{"h":"Find the Cause","r":"action","t":"• Exclude tube malposition, secretions, and light anesthesia, and treat anaphylaxis if suspected."}]},{"id":417,"title":"Difficult Airway Algorithm","cat":"Reference","L":"D","new":true,"sections":[{"h":"Plan & Prepare","r":"action","t":"• Assess and anticipate difficulty, optimize position and preoxygenation, call for help and equipment early, and have a stepwise plan with defined limits."},{"h":"If Intubation Fails","r":"action","t":"• Limit attempts (optimize each: position, external laryngeal manipulation, adjuncts, video laryngoscopy), and maintain oxygenation between attempts."},{"h":"Can't Intubate","r":"action","t":"• Insert a supraglottic airway to rescue oxygenation and reassess; if ventilation is adequate, wake the patient or proceed via the supraglottic airway as appropriate."},{"h":"Can't Intubate, Can't Oxygenate","r":"alert","t":"• Declare the emergency and perform front-of-neck access (scalpel-bougie cricothyroidotomy) without delay while continuing oxygenation attempts."}]},{"id":418,"title":"Hyperkalemia Crisis","cat":"Reference","L":"H","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• ECG evolves from peaked T waves to a widened QRS, loss of P waves, and a sine-wave pattern preceding arrest; severity correlates poorly with the exact level, so treat the ECG."},{"h":"Stabilize the Membrane","r":"action","t":"• Give IV calcium (chloride or gluconate) immediately for ECG changes — it protects the myocardium without lowering potassium (repeat as needed)."},{"h":"Shift Potassium Intracellularly","r":"action","t":"• Insulin with glucose, a nebulized beta-agonist (albuterol), and bicarbonate if acidotic move potassium into cells within minutes."},{"h":"Remove Potassium","r":"action","t":"• Use diuretics if the patient makes urine, a potassium binder, and dialysis for refractory or renal-failure cases; stop potassium sources and offending drugs."}]},{"id":419,"title":"Laryngospasm","cat":"Reference","L":"L","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Partial or complete glottic closure with stridor or silent airway, paradoxical effort, and desaturation, often on light anesthesia during airway manipulation or secretions."},{"h":"Immediate Actions","r":"action","t":"• Remove the stimulus, apply a jaw thrust with firm pressure at the laryngospasm notch, and deliver continuous positive pressure with 100% oxygen.\n
