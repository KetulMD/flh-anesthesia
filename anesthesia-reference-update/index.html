t-parathyroidectomy hypocalcemia."},{"h":"Preoperative Preparation","r":"action","t":"• Correct hypercalcemia and hydrate, assess renal function and the ECG, position carefully, and assess for MEN."},{"h":"Anesthetic Management","r":"action","t":"• Manage calcium as in hypercalcemia, position for fragile bones, monitor the ECG and neuromuscular blockade, and after parathyroidectomy watch for hypocalcemia (tetany, laryngospasm)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, fractures, renal issues, and postoperative hypocalcemia."}]},{"id":162,"title":"Hypertension, Uncontrolled With Cardiomyopathy","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Poorly controlled hypertension with hypertensive heart disease (hypertrophy, diastolic and later systolic dysfunction) and exaggerated hemodynamic lability."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic hypertension causes left-ventricular hypertrophy, diastolic dysfunction, eventual systolic failure, and coronary, cerebral, and renal end-organ disease, with exaggerated pressor responses and higher perioperative risk."},{"h":"Worry About","r":"alert","t":"• Exaggerated hemodynamic swings, myocardial ischemia (hypertrophy plus demand), poor tolerance of tachycardia and volume from diastolic dysfunction, and cerebral and renal risk; consider delaying elective surgery for severe uncontrolled disease."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize blood-pressure control, continue most antihypertensives (holding ACE inhibitors or ARBs on the day is common), assess end-organ status, and delay if severely uncontrolled with symptoms."},{"h":"Anesthetic Management","r":"action","t":"• Blunt sympathetic responses (adequate depth, short-acting agents for laryngoscopy), maintain hemodynamics near baseline, avoid tachycardia (diastolic dysfunction), treat lability with titratable agents, and protect coronary perfusion, using invasive monitoring for major cases."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia, hemodynamic lability, heart failure, and cerebral or renal events."}]},{"id":163,"title":"Hypertriglyceridemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated triglycerides, relevant for pancreatitis risk (severe elevation), cardiovascular risk, and propofol considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Severe elevation (above roughly 1000 mg/dL) can cause acute pancreatitis and contributes to cardiovascular risk; propofol is a lipid emulsion, so prolonged high-dose infusions add a triglyceride load."},{"h":"Worry About","r":"alert","t":"• Acute pancreatitis with severe elevation, cardiovascular risk, and propofol's lipid load during prolonged infusions, often alongside metabolic syndrome and diabetes."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the triglyceride level and for pancreatitis, manage cardiovascular risk, and note the propofol consideration for long cases."},{"h":"Anesthetic Management","r":"action","t":"• For prolonged sedation, be mindful of propofol's lipid load (consider alternatives or monitor triglycerides in severe cases), manage any pancreatitis supportively, and stay cardiovascularly vigilant."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pancreatitis, cardiovascular events, and propofol lipid load during prolonged infusion."}]},{"id":164,"title":"Hypomagnesemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Low magnesium causing neuromuscular irritability, arrhythmias, and often coexisting hypokalemia and hypocalcemia."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes include GI and renal losses, alcohol, diuretics, and malnutrition; effects include tremor, tetany, weakness, and seizures, arrhythmias (torsades, QT prolongation), and hypokalemia and hypocalcemia that stay refractory until magnesium is corrected."},{"h":"Worry About","r":"alert","t":"• Arrhythmias (torsades, QT prolongation), coexisting refractory hypokalemia and hypocalcemia, neuromuscular irritability and seizures, and potentiation of digoxin toxicity."},{"h":"Preoperative Preparation","r":"action","t":"• Check and replace magnesium (and associated potassium and calcium), obtain an ECG, and correct before elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Replace magnesium intravenously and correct associated electrolytes, monitor the ECG and QT (treat torsades with magnesium), and watch for arrhythmia and neuromuscular effects."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Torsades and arrhythmia, refractory hypokalemia and hypocalcemia, and weakness or seizures."}]},{"id":165,"title":"Hyponatremia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Low serum sodium with neurologic effects, where the rate of correction is critical to avoid osmotic demyelination."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes vary by volume status (SIADH, heart, liver, or renal failure, diuretics, and irrigation-fluid absorption during TURP or hysteroscopy); acute severe hyponatremia causes cerebral edema and seizures, while chronic hyponatremia risks osmotic demyelination if corrected too quickly."},{"h":"Worry About","r":"alert","t":"• Cerebral edema and seizures in acute severe cases and, crucially, osmotic demyelination from overly rapid correction (correct slowly, especially if chronic); TURP or hysteroscopy syndrome from irrigation absorption."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the cause, chronicity, and volume status, correct at a safe rate, and correct significant hyponatremia before elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Correct sodium carefully (slowly for chronic disease to avoid overcorrection), manage volume by cause, monitor neurologic status, and for TURP or hysteroscopy watch for absorption (mental status, sodium) and treat seizures."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Seizures and cerebral edema, osmotic demyelination from overcorrection, and TURP syndrome."}]},{"id":166,"title":"Hypoparathyroidism","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficient parathyroid hormone causing hypocalcemia, commonly after thyroid or parathyroid surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Low PTH causes hypocalcemia (and hyperphosphatemia) with neuromuscular irritability (tetany, laryngospasm, Chvostek and Trousseau signs), QT prolongation, and seizures; it is often iatrogenic."},{"h":"Worry About","r":"alert","t":"• Hypocalcemia effects — laryngospasm and tetany, QT prolongation and arrhythmia, seizures, and reduced contractility — including acute post-thyroidectomy hypocalcemia."},{"h":"Preoperative Preparation","r":"action","t":"• Check and correct calcium (and magnesium), continue calcium and vitamin D, and obtain an ECG."},{"h":"Anesthetic Management","r":"action","t":"• Correct calcium before surgery and monitor ionized calcium (including after thyroid or parathyroid surgery), avoid hyperventilation (which lowers ionized calcium), treat symptomatic hypocalcemia with IV calcium, and watch the QT and for laryngospasm."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Laryngospasm and tetany, arrhythmia, seizures, and hypotension."}]},{"id":167,"title":"Hypophosphatemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Low phosphate that impairs energy metabolism, causing muscle weakness (including respiratory) and, when severe, cardiac and neurologic effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes include refeeding, DKA treatment, alcohol, malnutrition, hyperparathyroidism, and respiratory alkalosis; severe deficiency causes respiratory-muscle weakness (failure to wean), cardiac dysfunction, hemolysis, altered mentation, and impaired oxygen delivery (low 2,3-DPG)."},{"h":"Worry About","r":"alert","t":"• Respiratory-muscle weakness (difficulty ventilating or weaning), cardiac dysfunction, and impaired oxygen delivery when severe, often in the refeeding context."},{"h":"Preoperative Preparation","r":"action","t":"• Check and replace phosphate (especially before weaning ventilation), assess the cause, and correct severe deficiency before elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Replace phosphate for severe deficiency, especially with respiratory weakness or planned extubation, monitor for weakness and cardiac effects, anticipate difficulty weaning, and correct associated electrolytes."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure or difficulty weaning, cardiac dysfunction, and weakness."}]},{"id":168,"title":"Hypoplastic Left Heart Syndrome","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A severe congenital malformation with an underdeveloped left heart; the systemic circulation is duct-dependent, and survival requires staged single-ventricle palliation (Norwood, Glenn, Fontan)."},{"h":"Pathophysiology/Background","r":"info","t":"• The hypoplastic left ventricle and aorta leave the right ventricle supplying systemic output through a patent ductus and mixing; the balance of systemic and pulmonary blood flow is critical, since over-circulating the lungs steals from systemic perfusion, and physiology depends on the palliation stage."},{"h":"Worry About","r":"alert","t":"• The delicate pulmonary-to-systemic flow balance (avoid excessive pulmonary flow and high FiO₂ that lower pulmonary resistance and steal systemic perfusion), ductal dependence (prostaglandin), single-ventricle physiology, arrhythmia, and paradoxical embolism (de-air lines)."},{"h":"Preoperative Preparation","r":"action","t":"• Understand the stage and current physiology (cardiology), maintain prostaglandin if duct-dependent, de-air lines, and plan careful oxygen and ventilation."},{"h":"Anesthetic Management","r":"action","t":"• Balance pulmonary and systemic flow (avoid hyperoxia and hyperventilation that over-circulate the lungs in shunt-dependent stages; maintain systemic perfusion and resistance), maintain preload and single-ventricle function, de-air lines meticulously, and use invasive monitoring with pediatric cardiac anesthesia input."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Systemic hypoperfusion from pulmonary overcirculation, arrhythmia, single-ventricle failure, and paradoxical embolism."}]},{"id":169,"title":"Hypothyroidism","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Thyroid hormone deficiency slowing metabolism with cardiovascular, respiratory, and CNS depression; severe untreated disease risks myxedema coma."},{"h":"Pathophysiology/Background","r":"info","t":"• Low thyroid hormone causes bradycardia, reduced output, diastolic dysfunction, hypothermia, hypoventilation with a blunted hypoxic and hypercarbic drive, hyponatremia, slowed drug metabolism, and anesthetic sensitivity, with possible associated adrenal insufficiency.\n• Myxedema coma is the severe form (hypothermia, hypoventilation, hypotension, altered mentation)."},{"h":"Worry About","r":"alert","t":"• Exaggerated sensitivity to anesthetics, sedatives, and opioids, bradycardia and hypotension, hypothermia, hypoventilation with delayed emergence, hyponatremia, associated adrenal insufficiency, myxedema coma, and a possible difficult airway from goiter or macroglossia."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity and replace thyroid hormone (euthyroid for elective surgery; emergency surgery in severe disease needs IV thyroid hormone and steroids), consider adrenal coverage, and assess the airway."},{"h":"Anesthetic Management","r":"action","t":"• Reduce anesthetic, sedative, and opioid doses, maintain temperature and hemodynamics, support ventilation (reduced drive), watch for delayed emergence, and correct sodium.\n• Treat myxedema coma with IV thyroid hormone, steroids, warming, and supportive care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged sedation and delayed emergence, bradycardia and hypotension, hypothermia, hypoventilation, and myxedema coma."}]},{"id":170,"title":"IgA Deficiency","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• The most common primary immunodeficiency (selective IgA deficiency); the key anesthetic issue is anaphylaxis risk to blood products, alongside infection."},{"h":"Pathophysiology/Background","r":"info","t":"• Low or absent IgA causes recurrent sinopulmonary and GI infections and autoimmune associations; some patients have anti-IgA antibodies and can react anaphylactically to IgA-containing blood products."},{"h":"Worry About","r":"alert","t":"• Anaphylactic reactions to blood or plasma products containing IgA (washed red cells or IgA-deficient products are needed), infection risk, and autoimmune associations."},{"h":"Preoperative Preparation","r":"action","t":"• Note the diagnosis, plan for washed or IgA-deficient blood products if transfusion is likely, and assess infections and autoimmune disease."},{"h":"Anesthetic Management","r":"action","t":"• Use washed red cells or IgA-deficient products to avoid anaphylaxis, be prepared to treat anaphylaxis, and keep strict asepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anaphylactic transfusion reaction and infection."}]},{"id":171,"title":"Implantable Cardioverter-Defibrillators","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• Devices that detect and treat ventricular arrhythmias; the perioperative concern is electromagnetic interference causing inappropriate shocks or pacing inhibition, plus the underlying cardiac disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Patients have significant cardiomyopathy or arrhythmia risk; monopolar electrocautery can be misread as ventricular tachycardia or fibrillation, triggering an inappropriate shock or inhibiting pacing."},{"h":"Worry About","r":"alert","t":"• Inappropriate shocks or pacing inhibition from interference, the underlying (often poor) cardiac function, pacing dependence, and the need to suspend anti-tachycardia therapy for surgery."},{"h":"Preoperative Preparation","r":"action","t":"• Interrogate the device (type, settings, pacing dependence, battery), plan to suspend tachytherapy for cautery (magnet or reprogramming), assess cardiac status, and have external defibrillation and pacing available."},{"h":"Anesthetic Management","r":"action","t":"• Suspend anti-tachyarrhythmia therapy during electrocautery (a magnet disables shocks but not pacing, or reprogram), use bipolar cautery or short bursts with a distant grounding pad, keep external defibrillation and pacing ready with continuous monitoring, and reactivate and interrogate the device afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Inappropriate shock, pacing inhibition, arrhythmia, and underlying cardiac events."}]},{"id":172,"title":"Infratentorial Tumors","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• Posterior-fossa tumors near the brainstem and cerebellum, with concerns of raised intracranial pressure, brainstem involvement, and posterior-fossa surgery risks."},{"h":"Pathophysiology/Background","r":"info","t":"• A small rigid compartment near the brainstem means tumors cause raised pressure, hydrocephalus, and cranial-nerve or brainstem dysfunction (airway reflexes, cardiovascular and respiratory centers); surgery is often in the sitting or prone position, raising venous-air-embolism risk."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure and hydrocephalus, brainstem manipulation (arrhythmia, hemodynamic and respiratory instability), venous air embolism in the sitting position, and cranial-nerve dysfunction with postoperative airway and aspiration risk."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial pressure, neurologic and bulbar status, and hydrocephalus; plan positioning and venous-air-embolism monitoring (precordial Doppler, consider a central line) and the airway."},{"h":"Anesthetic Management","r":"action","t":"• Control intracranial pressure, monitor for venous air embolism in the sitting position (precordial Doppler, end-tidal CO₂, a central line to aspirate air), anticipate brainstem-manipulation arrhythmia and instability (communicate with the surgeon), protect the airway, and assess neurology on emergence."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure, venous air embolism, brainstem-related arrhythmia and instability, and cranial-nerve dysfunction with aspiration."}]},{"id":173,"title":"Insulinoma","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• An insulin-secreting pancreatic neuroendocrine tumor causing hypoglycemia; the anesthetic challenge is glucose management around resection."},{"h":"Pathophysiology/Background","r":"info","t":"• Autonomous insulin secretion causes fasting hypoglycemia; tumor manipulation can trigger an insulin surge and hypoglycemia, followed by rebound hyperglycemia after resection, and MEN1 association is possible."},{"h":"Worry About","r":"alert","t":"• Hypoglycemia masked under anesthesia (frequent glucose monitoring is essential), swings during tumor manipulation and after resection, and MEN1 features."},{"h":"Preoperative Preparation","r":"action","t":"• Manage preoperative hypoglycemia (glucose, diazoxide, or octreotide), plan frequent glucose monitoring, and assess for MEN1."},{"h":"Anesthetic Management","r":"action","t":"• Monitor glucose very frequently (around every 15–30 minutes near manipulation and resection), treat hypoglycemia with dextrose, expect rebound hyperglycemia after tumor removal (which may confirm complete resection), and manage MEN1 issues."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Intraoperative hypoglycemia, post-resection hyperglycemia, and MEN1 complications."}]},{"id":174,"title":"Intracranial Hypertension","cat":"Disease","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• Idiopathic intracranial hypertension (pseudotumor cerebri) — raised intracranial pressure without a mass lesion, typically in young, often obese women, with headache, papilledema, and risk of visual loss."},{"h":"Pathophysiology/Background","r":"info","t":"• Elevated CSF pressure occurs without a mass or hydrocephalus; management includes weight loss, acetazolamide, CSF diversion (shunt or therapeutic lumbar puncture), and coexisting obesity and sleep apnea are common."},{"h":"Worry About","r":"alert","t":"• Worsening intracranial pressure and visual loss, obesity and sleep apnea with a difficult airway, CSF-shunt considerations, positioning, and acetazolamide effects (metabolic acidosis, electrolyte changes)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial-pressure and visual status, any shunt, obesity and sleep apnea, and the airway, and note acetazolamide effects."},{"h":"Anesthetic Management","r":"action","t":"• Avoid raising intracranial pressure (smooth induction, normocarbia, head-up), manage the obesity and sleep-apnea airway, account for acetazolamide-related acidosis and electrolytes, and preserve CSF-diversion function; neuraxial is possible with attention to CSF dynamics."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Worsening intracranial pressure and visual loss, airway and sleep-apnea issues, and acid–base and electrolyte effects."}]},{"id":175,"title":"Jaundice","cat":"Disease","L":"J","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated bilirubin from pre-hepatic, hepatocellular, or obstructive causes; relevance is underlying liver dysfunction, coagulopathy, and the risk of postoperative renal failure — especially in obstructive jaundice."},{"h":"Pathophysiology/Background","r":"info","t":"• Pre-hepatic (hemolysis), hepatocellular (liver disease), and post-hepatic (biliary obstruction) categories exist; obstructive jaundice brings coagulopathy from vitamin-K malabsorption, cholangitis and sepsis risk, and increased perioperative acute kidney injury."},{"h":"Worry About","r":"alert","t":"• Coagulopathy (vitamin-K–dependent factors, especially obstructive), postoperative renal failure in obstructive jaundice (maintain hydration and urine output), sepsis and cholangitis, and altered drug handling."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the cause, correct coagulopathy (vitamin K, plasma), assess renal function and hydrate to prevent injury, treat cholangitis, and check liver function."},{"h":"Anesthetic Management","r":"action","t":"• Correct coagulopathy before procedures and regional techniques, maintain hydration and urine output to protect the kidneys (avoid nephrotoxins), use hepatically-appropriate drugs, and treat sepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, postoperative renal failure, sepsis, and delayed drug clearance."}]},{"id":176,"title":"Jeune Syndrome (Asphyxiating Thoracic Dystrophy)","cat":"Disease","L":"J","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare skeletal dysplasia with a small, rigid, narrow thorax causing restrictive respiratory failure, alongside renal and other organ involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• A narrow, bell-shaped rigid thorax causes severe restrictive lung disease and respiratory insufficiency (often fatal in infancy), with short limbs and progressive renal and other organ disease."},{"h":"Worry About","r":"alert","t":"• Severe restrictive respiratory disease and respiratory failure (limited reserve, difficult ventilation), renal impairment (drug dosing), and a possible difficult airway."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory function and reserve and renal function, plan ventilation and postoperative respiratory support, and assess the airway."},{"h":"Anesthetic Management","r":"action","t":"• Ventilate the restricted chest carefully (limited pressures, anticipate difficulty), maintain oxygenation, adjust renally-cleared drugs, and anticipate prolonged postoperative ventilation with gentle airway handling."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, difficult ventilation, renal issues, and difficulty weaning."}]},{"id":177,"title":"Juvenile Gaucher Disease (Type III/Subacute Neuronopathic)","cat":"Disease","L":"J","new":true,"sections":[{"h":"Overview","r":"info","t":"• The chronic neuronopathic (type III) form of Gaucher disease combining visceral involvement (hepatosplenomegaly, cytopenias, bone disease) with neurologic and bulbar features."},{"h":"Pathophysiology/Background","r":"info","t":"• Glucocerebroside accumulation causes oculomotor abnormalities, seizures, progressive neurologic decline, and bulbar dysfunction, plus hepatosplenomegaly, thrombocytopenia and anemia, and bone disease, with possible neck and airway involvement; patients may be on enzyme replacement."},{"h":"Worry About","r":"alert","t":"• Difficult airway (neck and bulbar involvement, trismus, laryngospasm), bleeding (thrombocytopenia, coagulation), aspiration, restrictive lung disease and organomegaly, bone fragility, and seizures."},{"h":"Preoperative Preparation","r":"action","t":"• Check counts and coagulation, assess the airway and respiratory status, review seizure medications, plan transfusion, and continue enzyme replacement."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (bulbar involvement and laryngospasm — careful induction), manage cytopenias and coagulopathy, take aspiration precautions, position carefully for bone fragility and splenomegaly, and continue anticonvulsants."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway and laryngospasm, bleeding, aspiration, respiratory compromise, and seizures."}]},{"id":178,"title":"Kawasaki Disease","cat":"Disease","L":"K","new":true,"sections":[{"h":"Overview","r":"info","t":"• An acute childhood vasculitis whose major concern is coronary artery aneurysms and myocardial involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Medium-vessel vasculitis can cause coronary aneurysms, thrombosis, or stenosis (ischemia and infarction risk), myocarditis, arrhythmia, and valve involvement; treatment is IVIG and aspirin, and cardiac sequelae persist."},{"h":"Worry About","r":"alert","t":"• Coronary aneurysms and myocardial ischemia, infarction, or arrhythmia even in children, myocarditis, antithrombotic therapy (bleeding versus thrombosis), and the acute inflammatory state."},{"h":"Preoperative Preparation","r":"action","t":"• Assess coronary and cardiac status (echo, aneurysm history) and antiplatelet or anticoagulation management with cardiology input."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a coronary-disease patient (maintain coronary perfusion, avoid tachycardia and hypotension, ensure oxygenation), manage antithrombotic therapy, be ready for ischemia and arrhythmia, and use invasive monitoring for significant coronary involvement or major surgery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Myocardial ischemia or infarction, arrhythmia, and thrombosis or bleeding."}]},{"id":179,"title":"Landouzy-Dejerine Dystrophy (Facioscapulohumeral Muscular Dystrophy)","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• A slowly progressive muscular dystrophy affecting the face, shoulder girdle, and upper arms; generally milder with a near-normal lifespan, though respiratory and cardiac involvement occur in some."},{"h":"Pathophysiology/Background","r":"info","t":"• Autosomal dominant, with facial and scapulohumeral weakness (winged scapula) progressing to the pelvic girdle; restrictive respiratory involvement and occasional cardiac conduction abnormalities can occur."},{"h":"Worry About","r":"alert","t":"• Variable respiratory-muscle weakness, possible cardiac conduction abnormalities, sensitivity to nondepolarizers, succinylcholine (hyperkalemia and rhabdomyolysis in dystrophies), and facial weakness affecting the mask seal."},{"h":"Preoperative Preparation","r":"action","t":"• Assess baseline respiratory and cardiac (ECG) status and document the weakness."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine (dystrophy risk; consider total intravenous anesthesia over volatiles), titrate nondepolarizers with quantitative monitoring (sugammadex), watch respiratory function, and monitor for conduction abnormalities."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory compromise, prolonged blockade, rhabdomyolysis with succinylcholine, and conduction issues."}]},{"id":180,"title":"Lesch-Nyhan Syndrome","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• An X-linked purine-metabolism disorder (HGPRT deficiency) with hyperuricemia, severe neurologic dysfunction, dystonia, and compulsive self-mutilation."},{"h":"Pathophysiology/Background","r":"info","t":"• Enzyme deficiency causes uric-acid overproduction (gout, renal stones and failure) and neurologic features — dystonia, spasticity, choreoathetosis, developmental delay, self-injurious behavior, and dysphagia with aspiration risk."},{"h":"Worry About","r":"alert","t":"• Renal impairment (uric acid — hydration and drug dosing), aspiration (dysphagia and dystonia), self-injury and behavioral issues, and a difficult airway (dental damage, dystonia, spasticity)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess renal function (continue allopurinol, hydrate), aspiration and dysphagia, the airway, and behavioral needs, and plan sedation."},{"h":"Anesthetic Management","r":"action","t":"• Maintain hydration and protect the kidneys (avoid dehydration and nephrotoxins), take aspiration precautions (rapid-sequence induction), manage the airway gently, protect the patient from self-injury on emergence, and continue allopurinol."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Renal dysfunction, aspiration, self-injury, and difficult airway."}]},{"id":181,"title":"Liddle Syndrome","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare inherited disorder mimicking hyperaldosteronism (constitutively active renal sodium channels) with hypertension, hypokalemia, and metabolic alkalosis — but low aldosterone."},{"h":"Pathophysiology/Background","r":"info","t":"• Overactive epithelial sodium channels retain sodium (hypertension, volume expansion) and waste potassium and hydrogen (hypokalemia, metabolic alkalosis) with suppressed aldosterone and renin; treatment is amiloride or triamterene, not spironolactone."},{"h":"Worry About","r":"alert","t":"• Hypertension, hypokalemia (arrhythmia, weakness, prolonged neuromuscular blockade), and metabolic alkalosis; note that spironolactone is ineffective because the defect is at the channel."},{"h":"Preoperative Preparation","r":"action","t":"• Control blood pressure and correct potassium (amiloride or triamterene, sodium restriction) and assess for end-organ effects of hypertension."},{"h":"Anesthetic Management","r":"action","t":"• Correct potassium before surgery, control blood pressure, monitor for arrhythmia and prolonged neuromuscular blockade, and continue channel-blocking potassium-sparing diuretics rather than spironolactone."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypokalemic arrhythmia and weakness, hypertension, and prolonged blockade."}]},{"id":182,"title":"Long QT Syndrome","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• Congenital or acquired prolongation of the QT interval predisposing to torsades de pointes and sudden death; the anesthetic priority is avoiding QT-prolonging triggers."},{"h":"Pathophysiology/Background","r":"info","t":"• An ion-channel abnormality (congenital) or drug and electrolyte causes (acquired) prolong repolarization and risk torsades or polymorphic VT, syncope, and sudden death; triggers include sympathetic surges (in some types), bradycardia, low potassium, magnesium, or calcium, and QT-prolonging drugs."},{"h":"Worry About","r":"alert","t":"• Torsades and sudden death, QT-prolonging drugs (some antiemetics such as ondansetron and droperidol, certain antibiotics, methadone), electrolyte disturbance, and sympathetic surges and bradycardia; continue beta-blockers where indicated."},{"h":"Preoperative Preparation","r":"action","t":"• Continue beta-blockers, correct electrolytes (potassium, magnesium, calcium), review all drugs for QT effect, note any ICD, and have magnesium and a defibrillator ready."},{"h":"Anesthetic Management","r":"action","t":"• Avoid QT-prolonging drugs (use alternatives to ondansetron/droperidol and QT-prolonging antibiotics), maintain normal electrolytes, blunt sympathetic surges (adequate depth and analgesia, continued beta-blockade), avoid bradycardia and hypotension, and keep magnesium and a defibrillator immediately available (treat torsades with magnesium and defibrillation)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Torsades or polymorphic VT, sudden cardiac death, and drug- or electrolyte-triggered arrhythmia."}]},{"id":183,"title":"Lyme Disease","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• A tick-borne spirochetal infection with dermatologic, cardiac, neurologic, and joint manifestations; anesthetic relevance centers on cardiac (heart block) and neurologic involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Borrelia infection causes an early rash and, when disseminated, carditis (notably AV block and myocarditis), neurologic disease (facial palsy, meningitis, neuropathy), and arthritis; it is usually antibiotic-treatable."},{"h":"Worry About","r":"alert","t":"• Cardiac involvement — high-grade AV block or conduction disease (may need temporary pacing) and myocarditis — plus neurologic deficits and the acute illness."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for carditis (ECG — AV block) and neurologic involvement, continue antibiotics, and involve cardiology with pacing availability for conduction disease."},{"h":"Anesthetic Management","r":"action","t":"• For Lyme carditis, be prepared for high-grade AV block (external or transvenous pacing available, avoid drugs worsening conduction) and monitor rhythm; document neurologic deficits, position carefully for arthritis, and manage myocarditis hemodynamics."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• AV block and bradyarrhythmia, myocarditis, and neurologic deficits."}]},{"id":184,"title":"Lysosomal Storage Disorders","cat":"Disease","L":"L","new":true,"sections":[{"h":"Overview","r":"info","t":"• A group of inherited enzyme deficiencies causing substrate accumulation with multi-organ involvement; many share difficult-airway, cardiac, and respiratory concerns."},{"h":"Pathophysiology/Background","r":"info","t":"• Accumulation of undegraded substrate (as in the mucopolysaccharidoses, Gaucher, Pompe, and Fabry diseases) causes a difficult airway (macroglossia, thickened tissues, limited neck mobility, tracheal narrowing), cardiomyopathy and valve disease, restrictive lung disease and sleep apnea, hepatosplenomegaly, skeletal deformity, and cervical instability; patients are often on enzyme replacement."},{"h":"Worry About","r":"alert","t":"• A frequently very difficult airway (especially the mucopolysaccharidoses, with can't-intubate-can't-oxygenate potential), cardiac disease, restrictive lung disease and sleep apnea, cervical spine instability, and hepatosplenomegaly."},{"h":"Preoperative Preparation","r":"action","t":"• Perform a detailed airway assessment and difficult-airway plan (imaging when indicated), evaluate cardiac (echo) and respiratory status and the cervical spine, continue enzyme replacement, and review prior anesthetic records."},{"h":"Anesthetic Management","r":"action","t":"• Anticipate a difficult — sometimes extremely difficult — airway (experienced help, video or fiberoptic tools, a range of sizes, a surgical-airway backup), manage cardiac and respiratory disease, protect the cervical spine, position carefully, and monitor the airway vigilantly afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult or failed airway, cardiac events, respiratory failure, and cervical injury."}]},{"id":185,"title":"Malignant Hyperthermia and Other Anesthetic-Induced Myodystrophies","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A pharmacogenetic hypermetabolic crisis triggered by volatile anesthetics and succinylcholine in susceptible individuals (usually RYR1 mutations) — a life-threatening anesthetic emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Uncontrolled skeletal-muscle calcium release causes hypermetabolism: rising end-tidal CO₂, tachycardia, rigidity (masseter or generalized), late hyperthermia, acidosis, hyperkalemia, rhabdomyolysis, and arrhythmia.\n• All volatile agents and succinylcholine are triggers, and myopathies such as central core disease are susceptible."},{"h":"Worry About","r":"alert","t":"• A full crisis (rising end-tidal CO₂ is often the earliest sign; hyperthermia is late), hyperkalemia, arrhythmia, DIC, and death, plus masseter spasm after succinylcholine — recognizing it early is critical."},{"h":"Preoperative Preparation","r":"action","t":"• Identify susceptibility (personal or family history, susceptible myopathies), plan a trigger-free anesthetic, ensure dantrolene and an MH cart are available, and prepare a clean machine (flush or change it, use charcoal filters, remove vaporizers)."},{"h":"Anesthetic Management","r":"action","t":"• For the susceptible patient, use a non-triggering technique (total intravenous anesthesia, rocuronium and sugammadex are fine) on a prepared machine with temperature and CO₂ monitoring.\n• For a crisis: stop triggers, hyperventilate with 100% oxygen at high flows, give dantrolene 2.5 mg/kg IV repeated until controlled, cool actively, treat hyperkalemia, acidosis, and arrhythmias, watch for rhabdomyolysis and DIC, and transfer to ICU."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• MH crisis, hyperkalemic arrest, rhabdomyolysis and renal failure, DIC, and later recrudescence."}]},{"id":186,"title":"Malnutrition","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A deficient nutritional state with impaired healing, immunity, muscle and respiratory function, and altered drug handling, all raising perioperative risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Protein-energy malnutrition and micronutrient deficits cause hypoalbuminemia (altered drug binding), poor healing and immunity, muscle wasting with respiratory weakness, electrolyte disturbance, and refeeding-syndrome risk when nutrition is reintroduced."},{"h":"Worry About","r":"alert","t":"• Poor healing and infection, respiratory-muscle weakness, electrolyte disturbance (potassium, magnesium, phosphate) and refeeding syndrome, altered pharmacokinetics (more free drug with low albumin), and hypothermia."},{"h":"Preoperative Preparation","r":"action","t":"• Assess nutritional status, albumin, and electrolytes, correct deficits, consider preoperative nutritional optimization, and anticipate refeeding."},{"h":"Anesthetic Management","r":"action","t":"• Reduce and titrate drug doses (altered binding and sensitivity), correct electrolytes and watch for refeeding syndrome, maintain temperature, support respiration, and keep strict asepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Poor healing and infection, respiratory failure, refeeding syndrome, and prolonged drug effect."}]},{"id":187,"title":"Marfan Syndrome","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A connective-tissue disorder (fibrillin-1) with aortic root dilation and dissection risk, valve disease, tall stature, and skeletal and ocular features."},{"h":"Pathophysiology/Background","r":"info","t":"• The fibrillin defect causes aortic root aneurysm and dissection (a major cause of death), mitral and aortic regurgitation, spontaneous pneumothorax, lens dislocation, joint hypermobility, scoliosis and pectus deformity, and dural ectasia that affects neuraxial techniques."},{"h":"Worry About","r":"alert","t":"• Aortic dissection or rupture (avoid hypertension and pressure surges), valve regurgitation and heart failure, pneumothorax (avoid high airway pressures and nitrous oxide), unpredictable neuraxial from dural ectasia, and a possible difficult airway."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the aortic root (imaging) and valves and respiratory history, control blood pressure, and note dural ectasia for neuraxial planning."},{"h":"Anesthetic Management","r":"action","t":"• Control blood pressure strictly (blunt the laryngoscopy response, treat hypertension) to protect the aorta, manage valve lesions, avoid high airway pressures (pneumothorax), position carefully, and recognize that neuraxial may be unreliable; use invasive monitoring for major or cardiac cases."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aortic dissection or rupture, heart failure, pneumothorax, and unreliable neuraxial."}]},{"id":188,"title":"Mastocytosis","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mast-cell proliferation disorder with a risk of massive mediator release (anaphylaxis-like reactions) triggered by various stimuli."},{"h":"Pathophysiology/Background","r":"info","t":"• Excess mast cells can degranulate and release histamine and other mediators, causing flushing, hypotension, bronchospasm, urticaria, and anaphylactoid reactions; triggers include histamine-releasing drugs, temperature change, mechanical stimulation, and stress."},{"h":"Worry About","r":"alert","t":"• Massive mediator release and anaphylaxis (hypotension, bronchospasm, flushing) triggered by histamine-releasing drugs (some opioids, atracurium), temperature and mechanical stress, and consequent cardiovascular collapse."},{"h":"Preoperative Preparation","r":"action","t":"• Identify triggers, premedicate (H1 and H2 antihistamines, consider steroids and mast-cell stabilizers), avoid known triggers, have epinephrine ready, and minimize stress."},{"h":"Anesthetic Management","r":"action","t":"• Avoid histamine-releasing drugs (prefer fentanyl over morphine and cisatracurium, rocuronium, or vecuronium over atracurium), maintain normothermia and gentle handling, premedicate, and be fully prepared for anaphylaxis; regional is acceptable while avoiding triggers."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anaphylactoid reaction and cardiovascular collapse, bronchospasm, and hypotension."}]},{"id":189,"title":"Mediastinal Masses","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Anterior mediastinal masses can compress the airway, great vessels, and heart, causing life-threatening collapse on induction — a classic anesthetic danger."},{"h":"Pathophysiology/Background","r":"info","t":"• A large anterior mass (lymphoma, thymoma, germ-cell tumor) can compress the trachea and bronchi, the superior vena cava, the pulmonary artery, and the heart; anesthesia and muscle relaxation reduce airway and vascular tone and can cause total airway or cardiovascular collapse, especially supine."},{"h":"Worry About","r":"alert","t":"• Airway and cardiovascular collapse on induction (loss of spontaneous ventilation and the supine position worsen compression, and rescue may be impossible), superior vena cava syndrome, and position-dependent symptoms."},{"h":"Preoperative Preparation","r":"action","t":"• Assess symptoms and position-dependence (supine dyspnea or syncope signals high risk), review imaging (compression level and degree), echo, and flow-volume loops, consider a tissue diagnosis under local, and plan positioning and backup (rigid bronchoscopy, ECMO or bypass standby for severe cases)."},{"h":"Anesthetic Management","r":"action","t":"• Prefer maintaining spontaneous ventilation and awake or local techniques where possible, position to relieve compression (semi-upright, lateral, or prone), and avoid muscle relaxants until the airway is secured and ventilation confirmed.\n• Have rigid bronchoscopy and cardiopulmonary bypass or ECMO available for high-risk cases and be ready to reposition emergently."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway or cardiovascular collapse on induction, inability to ventilate, and superior vena cava syndrome."}]},{"id":190,"title":"Methemoglobinemia","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Oxidized hemoglobin (methemoglobin) that cannot carry oxygen, causing cyanosis and functional hypoxia — commonly drug- or oxidant-induced."},{"h":"Pathophysiology/Background","r":"info","t":"• Oxidizing agents (benzocaine and prilocaine, dapsone, nitrates) convert hemoglobin to methemoglobin, reducing oxygen carriage and left-shifting the curve; cyanosis is unresponsive to oxygen, pulse oximetry is unreliable (reads about 85%), and the blood is chocolate-brown."},{"h":"Worry About","r":"alert","t":"• Functional hypoxia despite a normal PaO₂, misleading pulse oximetry, cyanosis that does not correct with oxygen, causative oxidant drugs, and organ hypoxia at severe levels."},{"h":"Preoperative Preparation","r":"action","t":"• Suspect it with cyanosis and a low, oxygen-unresponsive saturation after oxidant exposure and confirm with co-oximetry."},{"h":"Anesthetic Management","r":"action","t":"• Stop the offending agent, use co-oximetry rather than standard oximetry, and treat significant methemoglobinemia with methylene blue 1–2 mg/kg IV (avoid it in G6PD deficiency — use ascorbic acid or exchange) while maintaining oxygenation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxia and organ injury, misleading monitoring, and a constrained treatment in G6PD deficiency."}]},{"id":191,"title":"Mitochondrial Myopathy","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Disorders of mitochondrial energy production causing myopathy and multi-system dysfunction, sensitive to metabolic stress, fasting, and certain anesthetics."},{"h":"Pathophysiology/Background","r":"info","t":"• Impaired oxidative phosphorylation causes muscle weakness, exercise intolerance, cardiomyopathy and conduction defects, neurologic disease (seizures, stroke-like episodes), diabetes, and lactic acidosis, with vulnerability to fasting, hypoglycemia, and mitochondrial-toxic drugs."},{"h":"Worry About","r":"alert","t":"• Metabolic decompensation and lactic acidosis with fasting or stress, hypoglycemia, cardiomyopathy and conduction disease, respiratory-muscle weakness, anesthetic sensitivity, and propofol-infusion-syndrome risk with prolonged propofol."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac (ECG, echo), respiratory, and glucose status, avoid prolonged fasting (IV dextrose), check lactate, and minimize catabolic stress."},{"h":"Anesthetic Management","r":"action","t":"• Avoid prolonged fasting (glucose-containing fluids with glucose monitoring), avoid or limit prolonged propofol infusions (consider alternatives), maintain temperature, use relaxants cautiously with monitoring, support cardiac and respiratory function, and treat lactic acidosis by supporting perfusion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Lactic acidosis and metabolic crisis, hypoglycemia, cardiac events, respiratory failure, and propofol-related issues."}]},{"id":192,"title":"Mitral Stenosis","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Obstruction to left-atrial emptying (usually rheumatic) giving fixed, limited flow into the left ventricle, dependent on adequate diastolic filling time and preload; the goal is 'full, slow, and tight.'"},{"h":"Pathophysiology/Background","r":"info","t":"• A narrowed mitral valve raises left-atrial pressure with pulmonary congestion and hypertension, frequent atrial fibrillation (loss of atrial kick is poorly tolerated), and a fixed low output; tachycardia shortens diastole and reduces filling."},{"h":"Worry About","r":"alert","t":"• Tachycardia (shortens filling, causing low output and pulmonary edema), rapid atrial fibrillation, hypovolemia and vasodilation, pulmonary hypertension and right-ventricular failure, and factors raising pulmonary vascular resistance."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity, rhythm (rate-control atrial fibrillation), and pulmonary pressures and right-ventricular function, and continue rate control and anticoagulation."},{"h":"Anesthetic Management","r":"action","t":"• Keep the heart rate controlled and low (beta-blockers if needed), maintain preload and rate or sinus-rhythm control (cardiovert unstable atrial fibrillation), maintain afterload, avoid raising pulmonary resistance (oxygenation, normocarbia, avoid acidosis and nitrous oxide), and support the right ventricle; titrate any neuraxial carefully."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary edema from tachycardia, atrial-fibrillation instability, right-ventricular failure, and hypotension."}]},{"id":193,"title":"Mobitz I (Second-Degree Atrioventricular Block)","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Wenckebach AV block — progressive PR prolongation until a dropped beat; usually benign and nodal, but relevant for perioperative bradycardia and drug effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Progressive PR lengthening precedes a non-conducted beat; the block is usually at the AV node (vagal or drug-related) and benign, in contrast to the higher-risk infranodal Mobitz II."},{"h":"Worry About","r":"alert","t":"• Bradycardia and possible progression to higher-grade block (with AV-nodal-blocking drugs, high vagal tone, or ischemia), and distinguishing it from the higher-risk Mobitz II."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for symptoms and an underlying cause (drugs, ischemia, electrolytes) and confirm it is not higher-grade block; asymptomatic Mobitz I usually needs no pacing, but have atropine and pacing available."},{"h":"Anesthetic Management","r":"action","t":"• Usually proceed normally if asymptomatic, avoid excessive vagal stimulation and AV-nodal-blocking drugs where possible, keep atropine and transcutaneous pacing available, monitor the rhythm, and treat symptomatic bradycardia while correcting contributing factors."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bradycardia, uncommon progression to complete block, and drug-induced worsening."}]},{"id":194,"title":"Moyamoya","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Progressive cerebrovascular occlusive disease with fragile collateral vessels and a high risk of perioperative stroke from both hypo- and hyperperfusion."},{"h":"Pathophysiology/Background","r":"info","t":"• Progressive internal-carotid stenosis with fragile collateral vessels creates ischemic and hemorrhagic stroke risk; cerebral perfusion is precarious and sensitive to both blood pressure and CO₂, since hypocapnia causes vasoconstriction and hypercapnia causes steal."},{"h":"Worry About","r":"alert","t":"• Perioperative stroke from hypotension or from abnormal CO₂ (both directions), hemorrhage from fragile vessels, and dehydration."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the baseline neurologic status, optimize hydration, plan tight blood-pressure (near baseline) and CO₂ (normocapnia) control, and continue antiplatelets per plan."},{"h":"Anesthetic Management","r":"action","t":"• Maintain blood pressure near or above baseline (avoid hypotension), keep strict normocapnia (avoid both hyper- and hypocapnia), maintain hydration, normothermia, and hematocrit, and keep induction and emergence smooth to avoid both hypertensive surges and hypotension."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemic or hemorrhagic stroke and perfusion-related injury."}]},{"id":195,"title":"Multiple Endocrine Neoplasia Type 1 and 2","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inherited syndromes of multiple endocrine tumors; the critical anesthetic concern is the specific hormone-secreting tumors, especially pheochromocytoma in MEN2."},{"h":"Pathophysiology/Background","r":"info","t":"• MEN1 features parathyroid hyperplasia (hypercalcemia), pancreatic and GI neuroendocrine tumors (gastrinoma, insulinoma), and pituitary tumors; MEN2 features medullary thyroid carcinoma, pheochromocytoma, and (in 2A) hyperparathyroidism."},{"h":"Worry About","r":"alert","t":"• Pheochromocytoma in MEN2, which must be excluded or treated before other surgery (catecholamine crisis), hypercalcemia from hyperparathyroidism, functional-tumor effects on glucose and GI acid, and airway compression from a thyroid mass."},{"h":"Preoperative Preparation","r":"action","t":"• Screen for and rule out or treat pheochromocytoma before any surgery (alpha-blockade first), correct hypercalcemia, manage functional tumors (glucose, acid suppression), and assess the airway."},{"h":"Anesthetic Management","r":"action","t":"• Ensure pheochromocytoma is excluded or adequately prepared (alpha- then beta-blockade) before non-adrenal surgery, manage hypercalcemia and functional-tumor effects, plan the airway for a thyroid mass, and approach each patient by their tumor profile."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypertensive crisis from unrecognized pheochromocytoma, hypercalcemia effects, glycemic and GI issues, and airway compression."}]},{"id":196,"title":"Multiple Organ Dysfunction Syndrome","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Progressive dysfunction of multiple organ systems, usually from sepsis, trauma, or severe illness — among the sickest patients, with very high perioperative risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Systemic inflammation and hypoperfusion cause dysfunction across the cardiovascular (shock), respiratory (ARDS), renal, hepatic, coagulation (DIC), and central nervous systems, with altered drug handling and extreme instability."},{"h":"Worry About","r":"alert","t":"• Hemodynamic instability and shock, respiratory failure, renal failure, coagulopathy and DIC, altered drug metabolism and sensitivity, and the underlying cause."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize what is possible (perfusion, oxygenation, coagulation, electrolytes), treat the underlying cause with source control, and coordinate with the ICU; often only urgent surgery proceeds."},{"h":"Anesthetic Management","r":"action","t":"• Support each failing system — hemodynamic support (fluids, vasopressors, inotropes), lung-protective ventilation, renal protection, correction of coagulopathy — reduce drug doses, maintain temperature and glucose, use invasive monitoring, and treat the cause with ICU continuity."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Refractory shock, respiratory and renal failure, coagulopathy, and death."}]},{"id":197,"title":"Multisystem Organ Failure, Lung Dysfunction in","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• The pulmonary component of multi-organ failure — acute lung injury or ARDS as one facet of systemic critical illness."},{"h":"Pathophysiology/Background","r":"info","t":"• Systemic inflammation and sepsis produce acute lung injury and ARDS (hypoxemia, low compliance, bilateral infiltrates) alongside other organ failures, usually with mechanical ventilation on lung-protective settings."},{"h":"Worry About","r":"alert","t":"• Severe hypoxemia and poor compliance, ventilator-induced injury, the hemodynamic cost of PEEP, right-heart strain, and the coexisting organ failures."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize the underlying illness, continue lung-protective ventilation, assess oxygenation and hemodynamics, and plan uninterrupted ventilator support."},{"h":"Anesthetic Management","r":"action","t":"• Use lung-protective ventilation (low tidal volume, plateau under 30 cmH₂O, appropriate PEEP, permissive hypercapnia), prioritize oxygenation over normocapnia, keep fluids conservative, support other failing organs, and treat the underlying cause with ICU continuity."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Refractory hypoxemia, barotrauma, hemodynamic compromise, and difficulty ventilating in transport."}]},{"id":198,"title":"Mycoplasma pneumoniae Infection","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• An atypical bacterial respiratory infection ('walking pneumonia') with pulmonary and occasional extrapulmonary (hemolytic, neurologic, cardiac) features."},{"h":"Pathophysiology/Background","r":"info","t":"• Atypical pneumonia with cough and often milder respiratory illness; extrapulmonary effects include cold-agglutinin hemolytic anemia, neurologic disease, myocarditis, and severe skin reactions, and airway reactivity can occur."},{"h":"Worry About","r":"alert","t":"• Respiratory compromise and reactive airway, cold-agglutinin hemolysis (keep the patient warm), rare myocarditis or neurologic involvement, and the acute infection; defer elective surgery when active."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory status, plan warming if cold agglutinins are present, note extrapulmonary involvement, treat the infection, and defer elective surgery if acute."},{"h":"Anesthetic Management","r":"action","t":"• Optimize respiratory status (bronchodilators if reactive), keep the patient warm if cold agglutinins are present (warm fluids and room), manage any myocarditis, and defer elective surgery until recovered."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory compromise, cold-agglutinin hemolysis, and myocarditis or neurologic effects."}]},{"id":199,"title":"Myelomeningocele","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital neural-tube defect with an exposed spinal cord and meninges needing early closure, associated with Chiari II, hydrocephalus, and latex allergy."},{"h":"Pathophysiology/Background","r":"info","t":"• The open spinal defect causes neurologic deficits below its level, hydrocephalus (shunt), Arnold-Chiari II (brainstem and airway involvement), a high rate of latex allergy, and orthopedic issues; neonatal closure poses positioning challenges."},{"h":"Worry About","r":"alert","t":"• Latex allergy (a latex-free environment is essential — anaphylaxis risk), raised intracranial pressure and Chiari II (airway and brainstem), positioning to protect the defect, neurologic deficits, and neonatal temperature and fluid loss from the exposed lesion."},{"h":"Preoperative Preparation","r":"action","t":"• Institute latex-free precautions, assess intracranial pressure and shunt, Chiari II and airway, and the neurologic baseline, and plan positioning that protects the sac."},{"h":"Anesthetic Management","r":"action","t":"• Maintain a strict latex-free environment, protect the defect during induction and positioning (often induce lateral or with the lesion padded), manage intracranial pressure and Chiari, maintain temperature and fluids, document deficits, and watch for postoperative apnea."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Latex anaphylaxis, raised intracranial pressure and Chiari airway issues, hypothermia, and positioning injury."}]},{"id":200,"title":"Myocardial Ischemia","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• Insufficient myocardial oxygen supply relative to demand, risking infarction; the perioperative goal is to preserve the supply–demand balance."},{"h":"Pathophysiology/Background","r":"info","t":"• A coronary supply–demand mismatch (fixed stenosis, spasm, or increased demand) causes ischemia; perioperative stressors include tachycardia, hypertension, hypotension, anemia, and hypoxemia, and ischemia may be silent in diabetics."},{"h":"Worry About","r":"alert","t":"• Perioperative ischemia or infarction from tachycardia, hypertension, hypotension, anemia, or hypoxemia, silent ischemia, arrhythmia, and stent or antiplatelet issues."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anti-ischemic therapy (beta-blockers, statins), optimize, assess coronary status and risk, and manage antiplatelets and stents."},{"h":"Anesthetic Management","r":"action","t":"• Maintain the supply–demand balance — control heart rate (low-normal), preserve coronary perfusion pressure, avoid tachycardia and pressure extremes, and ensure adequate hematocrit and oxygenation — treating ischemia promptly (nitroglycerin, rate control) with ST monitoring and invasive monitoring for high-risk cases."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia or infarction, arrhythmia, and hemodynamic-triggered events."}]},{"id":201,"title":"Myoclonic Epilepsy With Ragged Red Fibers","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• A mitochondrial disorder (MERRF) with myoclonus, epilepsy, myopathy, and multi-system involvement, sharing the anesthetic concerns of mitochondrial disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Mitochondrial dysfunction causes myoclonic seizures, ataxia, and myopathy (ragged red fibers), with possible cardiomyopathy and conduction defects, lactic acidosis, and sensitivity to metabolic stress and fasting."},{"h":"Worry About","r":"alert","t":"• Seizures, metabolic decompensation and lactic acidosis with fasting or stress, cardiomyopathy and conduction disease, respiratory-muscle weakness, relaxant sensitivity, and propofol-infusion caution."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anticonvulsants, assess cardiac (ECG, echo) and respiratory status, avoid prolonged fasting (dextrose), and check lactate and glucose."},{"h":"Anesthetic Management","r":"action","t":"• As for mitochondrial myopathy — avoid prolonged fasting (glucose with monitoring), limit prolonged propofol infusions, monitor relaxants, continue anticonvulsants, maintain temperature, and support cardiac and respiratory function while anticipating seizures."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Seizures, lactic acidosis and metabolic crisis, cardiac events, and respiratory failure."}]},{"id":202,"title":"Myotonia Dystrophica (Myotonic Dystrophy, Steinert Disease)","cat":"Disease","L":"M","new":true,"sections":[{"h":"Overview","r":"info","t":"• The most common adult muscular dystrophy, combining myotonia (impaired muscle relaxation) with multi-system involvement, and notorious for anesthetic sensitivity and cardiac and respiratory risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Myotonia (sustained contraction worsened by succinylcholine, cold, shivering, potassium, and neostigmine) accompanies muscle weakness, cardiac conduction defects and arrhythmias (a leading cause of death), cardiomyopathy, respiratory-muscle weakness with blunted drive, bulbar dysfunction, insulin resistance, and marked sensitivity to sedatives and anesthetics."},{"h":"Worry About","r":"alert","t":"• Exaggerated sensitivity to anesthetics, opioids, and sedatives (prolonged apnea), succinylcholine-induced myotonic contracture (avoid — can prevent ventilation or intubation), cardiac conduction disease and arrhythmia (sudden death), respiratory failure and aspiration, and myotonia triggered by cold, shivering, or neostigmine."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac status (ECG for conduction, echo) with pacing available, respiratory function, and aspiration risk; plan reduced anesthetic dosing, avoid triggers, and anticipate postoperative ventilation."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine, use reduced doses of short-acting agents (regional and multimodal where possible, minimizing opioids and sedatives), maintain normothermia (cold and shivering trigger myotonia), and avoid neostigmine (use sugammadex for rocuronium).\n• Treat myotonic contractures with warming and local measures, monitor the heart with pacing ready, take aspiration precautions, and plan postoperative respiratory monitoring."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged apnea and respiratory failure, myotonic contracture affecting the airway, arrhythmia and sudden death, and aspiration."}]},{"id":203,"title":"Narcolepsy","cat":"Disease","L":"N","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic neurologic sleep disorder with excessive daytime sleepiness and cataplexy; relevance is medication interactions and perioperative sedation sensitivity."},{"h":"Pathophysiology/Background","r":"info","t":"• Loss of hypocretin (orexin) neurons causes sleepiness, cataplexy, sleep paralysis, and hallucinations; treatment includes stimulants (modafinil, amphetamines), sodium oxybate, and antidepressants for cataplexy."},{"h":"Worry About","r":"alert","t":"• Exaggerated sedation and prolonged emergence, drug interactions (stimulant hemodynamic effects, sodium-oxybate synergy with CNS depressants, serotonergic antidepressant interactions), cataplexy triggers, and possible coexisting sleep apnea."},{"h":"Preoperative Preparation","r":"action","t":"• Review medications (stimulants, sodium oxybate, antidepressants) and their interactions, assess for sleep apnea, and minimize sedatives."},{"h":"Anesthetic Management","r":"action","t":"• Anticipate prolonged sedation and emergence, be cautious with CNS depressants (synergy with sodium oxybate) and stimulant hemodynamic and serotonergic effects, consider regional or short-acting agents, and monitor recovery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged sedation and delayed emergence, respiratory depression, and drug interactions."}]},{"id":204,"title":"Necrotizing Fasciitis","cat":"Disease","L":"N","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rapidly progressive, life-threatening soft-tissue infection with sepsis — a surgical emergency requiring urgent debridement."},{"h":"Pathophysiology/Background","r":"info","t":"• Aggressive infection spreading along fascial planes causes tissue necrosis, septic shock, and systemic toxicity, requiring emergent and often repeated extensive debridement with large fluid shifts, coagulopathy, and multi-organ dysfunction."},{"h":"Worry About","r":"alert","t":"• Septic shock and hemodynamic instability, large fluid and blood losses during debridement, coagulopathy and DIC, multi-organ dysfunction, and rapid deterioration, with a likely full stomach."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate (fluids, source control, antibiotics), type and crossmatch, correct coagulopathy and electrolytes, and treat sepsis; optimization is limited by urgency."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a septic shock patient (fluids, vasopressors, inotropes, invasive monitoring), resuscitate aggressively for large losses (blood and products), use rapid-sequence induction, ventilate protectively, warm the patient, and correct coagulopathy, expecting return trips for debridement."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Septic shock, hemorrhage and large fluid shifts, coagulopathy and DIC, and multi-organ failure."}]},{"id":205,"title":"Neurofibromatosis","cat":"Disease","L":"N","new":true,"sections":[{"h":"Overview","r":"info","t":"• A genetic disorder (NF1 or NF2) with neurofibromas and multi-system involvement; anesthetic concerns include airway tumors, pheochromocytoma, and neuraxial masses."},{"h":"Pathophysiology/Background","r":"info","t":"• NF1 features café-au-lait spots, neurofibromas (including airway and mediastinal), scoliosis, hypertension, and a pheochromocytoma association; NF2 features schwannomas and meningiomas.\n• Tumors may involve the airway, spinal cord, and nerve roots, and relaxant responses can be variable."},{"h":"Worry About","r":"alert","t":"• Airway and mediastinal neurofibromas (difficult airway, compression), pheochromocytoma (screen if hypertensive), scoliosis (restrictive lung disease), intracranial and spinal tumors (raised intracranial pressure, neuraxial masses), and variable relaxant response."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway for tumors, screen for pheochromocytoma if hypertensive, evaluate spinal and CNS tumors and scoliosis, and check respiratory status with imaging as needed."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a possible difficult airway, exclude or prepare pheochromocytoma before surgery if suspected, use caution with neuraxial (image spinal tumors first), monitor relaxants, and manage scoliosis, respiration, and hypertension."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, pheochromocytoma crisis, neuraxial complications, and respiratory compromise."}]},{"id":206,"title":"Niemann-Pick Disease","cat":"Disease","L":"N","new":true,"sections":[{"h":"Overview","r":"info","t":"• A lysosomal storage disease with hepatosplenomegaly, progressive neurologic decline, and pulmonary involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Sphingomyelin and lipid accumulation causes hepatosplenomegaly, cytopenias, progressive neurodegeneration (bulbar dysfunction, seizures, regression), interstitial lung infiltration, and possible cardiac involvement, with feeding difficulties and aspiration."},{"h":"Worry About","r":"alert","t":"• Bulbar dysfunction and aspiration, a possible difficult airway, restrictive and infiltrative lung disease with respiratory compromise, hepatosplenomegaly, cytopenias and bleeding, and seizures."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory and neurologic and bulbar status, counts and coagulation, and cardiac status, take aspiration precautions, and review seizure medications."},{"h":"Anesthetic Management","r":"action","t":"• Take aspiration precautions, manage the airway carefully, use lung-protective ventilation and anticipate respiratory compromise, manage cytopenias, position carefully for organomegaly, and continue anticonvulsants."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, respiratory failure, difficult airway, bleeding, and seizures."}]},{"id":207,"title":"Obsessive-Compulsive Disorder","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• An anxiety-spectrum psychiatric disorder whose anesthetic relevance is medication interactions and perioperative anxiety."},{"h":"Pathophysiology/Background","r":"info","t":"• Patients are often on SSRIs, SNRIs, or clomipramine, carrying serotonergic and (with clomipramine) anticholinergic and arrhythmia considerations, and perioperative anxiety may be high."},{"h":"Worry About","r":"alert","t":"• Serotonergic interactions (serotonin syndrome with meperidine, tramadol, or methylene blue), SSRI bleeding effects, clomipramine anticholinergic and arrhythmia effects, and perioperative anxiety."},{"h":"Preoperative Preparation","r":"action","t":"• Continue psychiatric medications, note interactions, and address anxiety with anxiolytic premedication."},{"h":"Anesthetic Management","r":"action","t":"• Avoid serotonergic combinations, account for SSRI bleeding and clomipramine effects, provide anxiolysis, and keep the perioperative course smooth."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Serotonin syndrome, bleeding, clomipramine arrhythmia, and anxiety."}]},{"id":208,"title":"Occipital Encephalocele","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital herniation of brain and meninges through an occipital skull defect needing surgical repair, associated with hydrocephalus and other anomalies."},{"h":"Pathophysiology/Background","r":"info","t":"• Neural tissue and meninges herniate through the defect, with a risk of raised intracranial pressure and hydrocephalus, neurologic deficits, and positioning and airway challenges from the mass, plus associated anomalies."},{"h":"Worry About","r":"alert","t":"• Airway management around the occipital mass (positioning for intubation), raised intracranial pressure and hydrocephalus, protecting the sac during positioning, blood and CSF loss, and neonatal temperature."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the lesion and its positioning implications, intracranial pressure and hydrocephalus, and associated anomalies, and plan the airway and neonatal care."},{"h":"Anesthetic Management","r":"action","t":"• Position carefully to protect the encephalocele and enable intubation (often lateral or with the head supported off the mass), manage intracranial pressure, maintain temperature and fluids, and prepare for blood and CSF loss."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway and positioning difficulty, raised intracranial pressure, blood and CSF loss, and hypothermia."}]},{"id":209,"title":"Occlusive Cerebrovascular Disease","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• Atherosclerotic narrowing of cerebral and carotid arteries with stroke risk; the anesthetic priority is maintaining cerebral perfusion and avoiding hemodynamic extremes."},{"h":"Pathophysiology/Background","r":"info","t":"• Carotid or intracranial stenosis reduces cerebral reserve and stroke and TIA risk with impaired autoregulation in stenotic territories, often alongside coronary disease; patients may present for carotid endarterectomy or stenting."},{"h":"Worry About","r":"alert","t":"• Perioperative stroke from hypotension (hypoperfusion of a stenotic territory) or hypertension, coexisting coronary disease, carotid-surgery considerations (blood-pressure control, cerebral monitoring, carotid-sinus effects), and antithrombotic management."},{"h":"Preoperative Preparation","r":"action","t":"• Assess carotid, cerebral, and cardiac status and the neurologic baseline, control blood pressure, continue antiplatelets, and plan monitoring for carotid surgery."},{"h":"Anesthetic Management","r":"action","t":"• Maintain blood pressure near or slightly above baseline to preserve cerebral perfusion, avoid hypertension extremes, ensure oxygenation and hematocrit, and for carotid endarterectomy control blood pressure tightly with cerebral monitoring and attention to carotid-sinus responses."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Stroke, perfusion-related ischemia, cardiac events, and blood-pressure lability."}]},{"id":210,"title":"Opitz-Frias Syndrome (The G Syndrome)","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital disorder with midline defects including hypertelorism, laryngotracheoesophageal clefts, and swallowing dysfunction — a difficult-airway and aspiration condition."},{"h":"Pathophysiology/Background","r":"info","t":"• Midline malformations (hypertelorism, cleft lip and palate, laryngeal and tracheoesophageal clefts) cause swallowing dysfunction with chronic aspiration and recurrent respiratory infection, with hypospadias and possible cardiac and CNS anomalies."},{"h":"Worry About","r":"alert","t":"• Difficult airway (clefts and laryngotracheal anomalies), high aspiration risk (swallowing dysfunction, laryngeal cleft), recurrent respiratory disease, and associated cardiac and CNS anomalies."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway with a difficult-airway plan, take aspiration precautions, assess respiratory and cardiac status, and review prior anesthetics."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (video or fiberoptic tools, a range of sizes), use strict aspiration precautions, manage respiratory disease and any cardiac lesion, and monitor the airway vigilantly afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, aspiration, respiratory compromise, and associated anomalies."}]},{"id":211,"title":"Osteoarthritis","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• Degenerative joint disease; anesthetic relevance is positioning, airway (cervical and TMJ involvement), chronic pain and opioid use, and comorbidities."},{"h":"Pathophysiology/Background","r":"info","t":"• Joint degeneration causes pain, stiffness, and reduced range of motion; cervical spine and TMJ involvement can limit neck extension and mouth opening, patients are often elderly with comorbidities and chronic NSAID or opioid use, and many present for joint replacement."},{"h":"Worry About","r":"alert","t":"• Positioning difficulty and injury (limited mobility, pain), a possible difficult airway (cervical and TMJ limitation), chronic pain and opioid tolerance, NSAID effects, elderly comorbidities, and VTE risk with arthroplasty."},{"h":"Preoperative Preparation","r":"action","t":"• Assess neck and TMJ mobility and the airway, joint limitations for positioning, pain and opioid use, and comorbidities, and plan analgesia and VTE prophylaxis for arthroplasty."},{"h":"Anesthetic Management","r":"action","t":"• Position and pad carefully (confirm comfort while awake if severe), plan the airway for cervical or TMJ limitation, provide multimodal analgesia accounting for opioid tolerance, favor regional techniques for arthroplasty, give VTE prophylaxis, and watch for bone cement implantation syndrome."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Positioning injury, difficult airway, inadequate analgesia from opioid tolerance, and VTE."}]},{"id":212,"title":"Otitis Media","cat":"Disease","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• Middle-ear infection, common in children, relevant for the frequent presentation for myringotomy and the association with concurrent upper respiratory infection."},{"h":"Pathophysiology/Background","r":"info","t":"• Middle-ear inflammation and effusion often accompany or follow an upper respiratory infection; children present for brief myringotomy and tube placement, and nitrous oxide diffuses into the middle ear, changing pressure."},{"h":"Worry About","r":"alert","t":"• Concurrent upper respiratory infection (airway reactivity — laryngospasm, bronchospasm, secretions), brief-procedure airway management, and nitrous-oxide middle-ear pressure effects."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for active upper respiratory infection and airway reactivity (myringotomy often proceeds despite a mild infection) and perform a pediatric assessment."},{"h":"Anesthetic Management","r":"action","t":"• Manage the pediatric airway (often mask or LMA for brief myringotomy), stay alert for laryngospasm and reactivity with an upper respiratory infection, and limit or avoid nitrous oxide for tympanic and middle-ear procedures."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Laryngospasm or bronchospasm from upper respiratory infection, airway events, and nitrous-oxide ear effects."}]},{"id":213,"title":"Pacemakers","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Implanted cardiac pacing devices; the perioperative concern is electromagnetic interference (electrocautery) inhibiting or resetting pacing, plus the underlying rhythm and cardiac disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Pacemakers treat bradyarrhythmias and conduction disease; monopolar cautery can inhibit pacing (dangerous in pacing-dependent patients) or reset the mode, and unlike an ICD they deliver no shock but pacing function is critical."},{"h":"Worry About","r":"alert","t":"• Pacing inhibition from interference in pacing-dependent patients (asystole risk), mode reset, and the underlying bradyarrhythmia; magnet response is usually asynchronous pacing but varies."},{"h":"Preoperative Preparation","r":"action","t":"• Interrogate the device (type, pacing dependence, settings, battery, magnet response), plan for interference (magnet or reprogram to asynchronous if pacing-dependent), and have external pacing and atropine available."},{"h":"Anesthetic Management","r":"action","t":"• For pacing-dependent patients undergoing cautery, convert to asynchronous pacing (magnet or reprogramming), use bipolar cautery or short bursts with a distant grounding pad, keep continuous monitoring and external pacing available, and interrogate and restore the device afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pacing inhibition and asystole, mode reset, and bradyarrhythmia."}]},{"id":214,"title":"Pancreatitis","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Pancreatic inflammation with fluid shifts, systemic inflammation, and potential multi-organ involvement; severe cases are critically ill."},{"h":"Pathophysiology/Background","r":"info","t":"• Acute disease (gallstones, alcohol) can cause massive third-spacing and hypovolemia, systemic inflammation and ARDS, hypocalcemia, hyperglycemia, ileus with aspiration risk, and necrosis and sepsis; chronic disease brings malnutrition, diabetes, and pain."},{"h":"Worry About","r":"alert","t":"• Hypovolemia and large fluid shifts, system
