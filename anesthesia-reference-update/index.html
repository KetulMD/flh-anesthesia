nt","r":"action","t":"• Avoid raising intracranial pressure, confirm shunt function, position carefully, manage associated conditions, and keep induction and emergence smooth."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure, shunt failure, and complications of associated anomalies."}]},{"id":105,"title":"De Morsier Syndrome","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Septo-optic dysplasia — a triad of optic-nerve hypoplasia, midline brain defects (absent septum pellucidum), and pituitary/hypothalamic dysfunction."},{"h":"Pathophysiology/Background","r":"info","t":"• Hypopituitarism (growth hormone, ACTH/cortisol, ADH causing diabetes insipidus, and thyroid deficiencies), visual impairment, seizures, developmental delay, and temperature dysregulation."},{"h":"Worry About","r":"alert","t":"• Endocrine deficiencies — adrenal insufficiency (steroid coverage), diabetes insipidus (fluid and sodium), hypothyroidism, and hypoglycemia — plus temperature instability, seizures, and visual impairment."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pituitary function, provide steroid coverage, manage diabetes insipidus (desmopressin, fluids, sodium), and check glucose and thyroid status."},{"h":"Anesthetic Management","r":"action","t":"• Give stress-dose steroids, manage diabetes insipidus (monitor sodium and urine output, desmopressin), maintain glucose, monitor temperature, and continue anticonvulsants."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Adrenal crisis, diabetes insipidus and sodium derangement, hypoglycemia, and temperature or seizure problems."}]},{"id":106,"title":"Degenerative Disk Disease","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Age-related disk degeneration causing back or neck pain and possible nerve compression, relevant for positioning, regional technique, and chronic pain."},{"h":"Pathophysiology/Background","r":"info","t":"• Disk degeneration and spondylosis, often with chronic pain and opioid tolerance and sometimes spine surgery; cervical involvement affects the airway and neck."},{"h":"Worry About","r":"alert","t":"• Painful or deformed positioning, technically difficult neuraxial access, chronic opioid tolerance (higher requirements, withdrawal), and cervical involvement affecting the airway."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pain and opioid use, neurologic deficits, and cervical involvement, and plan positioning and analgesia."},{"h":"Anesthetic Management","r":"action","t":"• Position and pad carefully; neuraxial is feasible but may be technically difficult; provide multimodal analgesia accounting for opioid tolerance, document deficits, and use cervical airway caution if involved."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Positioning injury, difficult regional technique, and inadequate analgesia from opioid tolerance."}]},{"id":107,"title":"Depression, Unipolar","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• A common mood disorder whose anesthetic relevance is medication interactions and the perioperative psychological state."},{"h":"Pathophysiology/Background","r":"info","t":"• Patients may take SSRIs or SNRIs, tricyclics, MAOIs, bupropion, or mirtazapine, each with distinct interaction profiles."},{"h":"Worry About","r":"alert","t":"• Serotonin syndrome (serotonergic antidepressants plus meperidine, tramadol, or methylene blue), MAOI interactions (avoid meperidine and indirect sympathomimetics — risk of hypertensive or serotonergic crisis), SSRI-related platelet dysfunction and bleeding, and tricyclic anticholinergic and arrhythmic effects."},{"h":"Preoperative Preparation","r":"action","t":"• Review antidepressants and generally continue them (MAOIs require careful planning), and note the relevant interactions."},{"h":"Anesthetic Management","r":"action","t":"• Avoid serotonergic combinations; with MAOIs avoid meperidine and indirect sympathomimetics (use cautious, reduced-dose direct agents like phenylephrine), account for SSRI bleeding effects, monitor for serotonin syndrome, and watch tricyclic arrhythmia and anticholinergic effects."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Serotonin syndrome, hypertensive crisis with MAOIs, bleeding, and arrhythmia."}]},{"id":108,"title":"Dextrocardia","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• The heart positioned in the right chest, either isolated or with situs inversus and possible associated congenital heart disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Mirror-image situs inversus totalis is often benign, whereas isolated dextrocardia carries a higher rate of associated congenital heart disease; Kartagener syndrome adds primary ciliary dyskinesia with bronchiectasis and recurrent infection.\n• Practical effects touch ECG lead placement, line and defibrillator-pad positioning, and imaging interpretation."},{"h":"Worry About","r":"alert","t":"• Associated congenital heart disease and the reversed anatomy affecting monitoring and procedures (ECG leads, central lines, chest tubes, and defibrillation pads all mirrored); respiratory disease if Kartagener syndrome is present."},{"h":"Preoperative Preparation","r":"action","t":"• Define the anatomy and associated heart disease (echo), note the situs, and assess respiratory status if ciliary dyskinesia is present."},{"h":"Anesthetic Management","r":"action","t":"• Reverse ECG lead placement and adapt line and pad positioning to the mirrored anatomy, manage any congenital heart disease, and address secretions and respiration in Kartagener syndrome."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Missed congenital heart disease, procedural errors from reversed anatomy, and respiratory issues."}]},{"id":109,"title":"Diabetes, Type II (Noninsulin Dependent)","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Insulin-resistant diabetes with vascular, renal, cardiac, autonomic, and glycemic considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic hyperglycemia drives macro- and microvascular disease (often silent coronary disease, nephropathy, retinopathy, and neuropathy including autonomic dysfunction with gastroparesis).\n• Patients may take oral agents, GLP-1 agonists, SGLT2 inhibitors, or insulin, and stiff-joint changes can limit neck extension."},{"h":"Worry About","r":"alert","t":"• Perioperative hyper- and hypoglycemia, silent ischemia, autonomic neuropathy (aspiration from gastroparesis, hemodynamic lability), renal impairment, SGLT2-related euglycemic ketoacidosis, GLP-1 aspiration risk, and possible difficult intubation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess glycemic control (HbA1c) and cardiac and renal status; manage medications (hold SGLT2 inhibitors and GLP-1 agonists per protocol, adjust insulin) and set a glucose plan."},{"h":"Anesthetic Management","r":"action","t":"• Monitor glucose frequently with a moderate target (about 140–180 mg/dL), hold SGLT2 inhibitors to avoid euglycemic ketoacidosis, take aspiration precautions with autonomic neuropathy or GLP-1 use, stay vigilant for ischemia, and protect the kidneys."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Glycemic swings, silent ischemia, aspiration, euglycemic ketoacidosis, and renal issues."}]},{"id":110,"title":"Diabetes Insipidus","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficient ADH (central) or renal resistance to it (nephrogenic), causing large-volume dilute urine and a risk of hypernatremia and dehydration."},{"h":"Pathophysiology/Background","r":"info","t":"• Central disease follows pituitary or hypothalamic injury (surgery, trauma, tumor); nephrogenic disease reflects renal resistance.\n• Massive dilute urine output causes hypovolemia and hypernatremia when intake cannot keep up."},{"h":"Worry About","r":"alert","t":"• Hypernatremia and dehydration from high urine output, demanding careful perioperative fluid and electrolyte management, especially central disease after pituitary surgery or brain injury."},{"h":"Preoperative Preparation","r":"action","t":"• Confirm the type, treat central disease with desmopressin, monitor sodium and volume, and establish a baseline urine output."},{"h":"Anesthetic Management","r":"action","t":"• Monitor urine output, serum sodium, and volume closely; treat central disease with desmopressin and replace free water and fluids to match losses while avoiding hypernatremia and hypovolemia; nephrogenic disease needs volume and treatment of the cause."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypernatremia, hypovolemia and hypotension, and electrolyte swings."}]},{"id":111,"title":"Diaphragmatic Hernia (Congenital)","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Herniation of abdominal contents into the chest through a diaphragmatic defect, causing neonatal pulmonary hypoplasia and pulmonary hypertension."},{"h":"Pathophysiology/Background","r":"info","t":"• Abdominal viscera in the thorax cause lung hypoplasia, pulmonary hypertension, right-to-left shunting, and mediastinal shift.\n• It is a physiologic emergency — pulmonary hypertension is stabilized before, not during, surgery."},{"h":"Worry About","r":"alert","t":"• Pulmonary hypoplasia and hypertension with hypoxemia, gastric distension worsening lung compression (avoid bag-mask ventilation, decompress with an NG tube), barotrauma and pneumothorax from high pressures, and persistent fetal circulation."},{"h":"Preoperative Preparation","r":"action","t":"• Place an NG tube for decompression, avoid mask ventilation (intubate gently), and stabilize pulmonary hypertension and oxygenation before surgery."},{"h":"Anesthetic Management","r":"action","t":"• Use gentle low-pressure ventilation to protect the hypoplastic and contralateral lungs, avoid nitrous oxide, minimize factors raising pulmonary vascular resistance (hypoxia, hypercarbia, acidosis, cold), keep the NG tube decompressed, allow permissive hypercapnia, and treat pulmonary hypertension (inhaled nitric oxide)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hypertensive crisis, pneumothorax, hypoxemia, and right-heart failure."}]},{"id":112,"title":"Diarrhea, Acute and Chronic","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Fluid, electrolyte, and acid–base disturbances from diarrhea, relevant for correction and treatment of the underlying cause."},{"h":"Pathophysiology/Background","r":"info","t":"• Loss of water, sodium, potassium, and bicarbonate causes hypovolemia, hypokalemia, and a non-anion-gap metabolic acidosis; chronic causes (inflammatory bowel disease, infection, malabsorption) add nutritional deficits."},{"h":"Worry About","r":"alert","t":"• Hypovolemia and electrolyte disturbance (hypokalemia with arrhythmia and weakness), metabolic acidosis, and the underlying disease, plus aspiration if there is concurrent vomiting or obstruction."},{"h":"Preoperative Preparation","r":"action","t":"• Correct volume, potassium, and acid–base before elective surgery and assess the cause and nutritional status."},{"h":"Anesthetic Management","r":"action","t":"• Restore volume and electrolytes, correct potassium (arrhythmia risk), address acidosis by treating the cause and maintaining perfusion, and titrate hemodynamics carefully in the volume-depleted patient."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypotension, arrhythmia, acidosis, and electrolyte swings."}]},{"id":113,"title":"Dilated Cardiomyopathy","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• A dilated, poorly contractile ventricle with systolic heart failure and risk of arrhythmia and thromboembolism."},{"h":"Pathophysiology/Background","r":"info","t":"• Ventricular dilation with reduced ejection fraction from many causes (ischemic, viral, alcoholic, idiopathic, peripartum), with heart failure, arrhythmias, and mural thrombus; devices (ICD, CRT, LVAD) may be present."},{"h":"Worry About","r":"alert","t":"• Poor systolic reserve and heart failure, sensitivity to myocardial depressants and afterload change, arrhythmia, thromboembolism, and device considerations."},{"h":"Preoperative Preparation","r":"action","t":"• Assess LV function (echo), rhythm, device status, and anticoagulation, and optimize heart failure."},{"h":"Anesthetic Management","r":"action","t":"• Avoid myocardial depression, maintain contractility (inotropes as needed), reduce afterload carefully to support forward flow, use invasive monitoring for major cases, treat arrhythmia, and favor a titrated induction and regional techniques where feasible."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart-failure decompensation, hypotension, arrhythmia, and thromboembolism."}]},{"id":114,"title":"Diphtheria","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• A toxin-mediated bacterial infection producing a pharyngeal pseudomembrane (airway obstruction) and systemic effects on the heart and nerves; now rare with vaccination."},{"h":"Pathophysiology/Background","r":"info","t":"• Corynebacterium diphtheriae toxin produces a gray pharyngeal pseudomembrane, myocarditis (arrhythmia, heart failure), and neuropathy (bulbar and respiratory)."},{"h":"Worry About","r":"alert","t":"• Airway obstruction from the pseudomembrane (manipulation can dislodge or bleed it), myocarditis with arrhythmia and heart failure, and bulbar or respiratory neuropathy; infection control matters."},{"h":"Preoperative Preparation","r":"action","t":"• Give antitoxin and antibiotics and assess the airway, cardiac status (myocarditis), and neurologic status with infection precautions."},{"h":"Anesthetic Management","r":"action","t":"• Manage the airway carefully (obstruction and a friable membrane — avoid dislodging it and be ready for a difficult or surgical airway), monitor for myocarditis and arrhythmia, support respiration if neuropathy is present, and observe isolation precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway obstruction, arrhythmia and heart failure from myocarditis, and respiratory failure."}]},{"id":115,"title":"Disseminated Intravascular Coagulation","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Systemic activation of coagulation that consumes clotting factors and platelets, causing simultaneous thrombosis and bleeding."},{"h":"Pathophysiology/Background","r":"info","t":"• Triggered by sepsis, trauma, obstetric emergencies, malignancy, or transfusion reactions, it produces widespread microthrombi and consumption — low platelets and fibrinogen, prolonged PT and aPTT, high D-dimer — with organ dysfunction."},{"h":"Worry About","r":"alert","t":"• Diffuse bleeding and microvascular thrombosis with organ failure, the underlying trigger, and massive transfusion needs."},{"h":"Preoperative Preparation","r":"action","t":"• Treat the underlying cause (the key step), check platelets, fibrinogen, PT/aPTT, and D-dimer, and activate the massive-transfusion pathway if bleeding."},{"h":"Anesthetic Management","r":"action","t":"• Treat the precipitating cause and support bleeding with product-based resuscitation (platelets, plasma, cryoprecipitate for fibrinogen, red cells); maintain perfusion and correct acidosis, hypothermia, and hypocalcemia, which worsen coagulopathy; avoid neuraxial techniques and monitor labs."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage, thrombosis and organ failure, and transfusion complications."}]},{"id":116,"title":"Do Not Resuscitate Orders","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• An advance directive limiting resuscitation that requires perioperative clarification, because anesthesia routinely uses interventions that overlap with resuscitation."},{"h":"Pathophysiology/Background","r":"info","t":"• Many DNR-listed interventions (intubation, vasopressors, defibrillation) are also routine parts of anesthesia, so automatic suspension of the order is not appropriate — reconsideration is required."},{"h":"Worry About","r":"alert","t":"• Failing to clarify the patient's perioperative wishes, automatically suspending or enforcing the DNR without discussion, and distinguishing routine anesthetic interventions from resuscitation of an arrest."},{"h":"Preoperative Preparation","r":"action","t":"• Hold a goals-of-care discussion and document whether the DNR is suspended, modified (procedure-directed), or maintained for the perioperative period, involving the patient or surrogate and the surgeon."},{"h":"Anesthetic Management","r":"action","t":"• Follow the agreed, documented plan; distinguish planned interventions from resuscitation, honor the reversal-window agreement, respect patient autonomy, and re-address the order postoperatively."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ethical conflict, unclear directives, and communication gaps."}]},{"id":117,"title":"Double Aortic Arch","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• A vascular ring anomaly in which a double aortic arch encircles and compresses the trachea and esophagus."},{"h":"Pathophysiology/Background","r":"info","t":"• The ring compresses the airway (stridor, respiratory distress) and esophagus (dysphagia) and presents in infancy; the compressed trachea may be malacic."},{"h":"Worry About","r":"alert","t":"• Airway compression and tracheomalacia (positional obstruction, difficult ventilation, and a tube that may need to pass beyond the compression), esophageal compression, and residual tracheomalacia after repair."},{"h":"Preoperative Preparation","r":"action","t":"• Review airway and vascular imaging, assess respiratory status, and plan tube positioning relative to the compression."},{"h":"Anesthetic Management","r":"action","t":"• Manage the airway carefully — maintain spontaneous ventilation with severe compression, position the tube beyond the compression when possible, and be ready for positional obstruction; avoid factors worsening malacia and watch for residual tracheomalacia afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway obstruction, difficult ventilation, tracheomalacia, and postoperative respiratory problems."}]},{"id":118,"title":"Drug Abuse, Lysergic Acid Diethylamide","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Hallucinogen (LSD) use, relevant in acute intoxication (psychological and sympathetic effects) and for drug interactions."},{"h":"Pathophysiology/Background","r":"info","t":"• A serotonergic hallucinogen producing sympathomimetic effects (tachycardia, hypertension, mydriasis) and altered perception, with potential for psychological distress and serotonergic interactions."},{"h":"Worry About","r":"alert","t":"• Sympathetic stimulation and hemodynamic lability, exaggerated drug responses, psychological distress and agitation, and serotonergic interactions."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intoxication and psychological state, defer elective surgery if acutely intoxicated, provide a calm environment, and screen for other drugs."},{"h":"Anesthetic Management","r":"action","t":"• Provide a calm environment and adequate anxiolysis and anesthesia, treat hemodynamic swings, use caution with sympathomimetics (exaggerated response) and serotonergic drugs, and manage agitation with benzodiazepines."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic instability, agitation and psychological reactions, and drug interactions."}]},{"id":119,"title":"Duodenal Atresia","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• Congenital duodenal obstruction in the neonate causing vomiting and requiring surgical correction; strongly associated with Down syndrome."},{"h":"Pathophysiology/Background","r":"info","t":"• Duodenal obstruction (the 'double bubble' on imaging) causes bilious vomiting, dehydration, and a hypochloremic alkalosis, and it frequently accompanies trisomy 21 with its cardiac and airway implications."},{"h":"Worry About","r":"alert","t":"• A full stomach and aspiration (rapid-sequence induction, NG decompression), dehydration and electrolyte and acid–base disturbance, associated Down syndrome (congenital heart disease, atlantoaxial instability, airway), and neonatal glucose and temperature control."},{"h":"Preoperative Preparation","r":"action","t":"• Decompress with an NG tube and correct fluids and electrolytes before surgery; assess for Down syndrome and associated anomalies (echo, cervical spine) and check glucose."},{"h":"Anesthetic Management","r":"action","t":"• Use rapid-sequence induction with NG decompression, correct volume and electrolytes first, manage associated cardiac disease and airway (Down syndrome), and maintain glucose and temperature with careful neonatal dosing."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, electrolyte and volume issues, complications of associated anomalies, and neonatal instability."}]},{"id":120,"title":"Ebstein Anomaly","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital malformation with apical displacement of the tricuspid valve, producing an 'atrialized' right ventricle, tricuspid regurgitation, and a small functional right ventricle, often with an atrial-level shunt and arrhythmias."},{"h":"Pathophysiology/Background","r":"info","t":"• Downward-displaced tricuspid leaflets cause regurgitation and reduce the effective right ventricle; an ASD or PFO allows right-to-left shunting and cyanosis.\n• Accessory pathways (Wolff-Parkinson-White) and supraventricular arrhythmias are common; severity spans mild to severe."},{"h":"Worry About","r":"alert","t":"• Arrhythmias (accessory pathways), right-to-left shunt with paradoxical embolism (de-air lines) and cyanosis, right-ventricular dysfunction, and poor tolerance of raised pulmonary vascular resistance."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the anatomy, shunt, right-ventricular function, and arrhythmia history; de-air lines and plan an antiarrhythmic strategy."},{"h":"Anesthetic Management","r":"action","t":"• Avoid raising pulmonary vascular resistance (oxygenation, normocarbia, avoid acidosis and cold), maintain preload and right-ventricular function, and de-air lines meticulously.\n• Be ready to treat arrhythmias — in Wolff-Parkinson-White with atrial fibrillation, cardiovert rather than relying on AV-nodal blockers — and maintain systemic resistance."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, paradoxical embolism, right-ventricular failure, and cyanosis."}]},{"id":121,"title":"Echinococcosis","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Parasitic cystic (hydatid) disease that forms fluid-filled cysts in the liver, lung, and elsewhere; the anesthetic danger is cyst rupture causing anaphylaxis and dissemination."},{"h":"Pathophysiology/Background","r":"info","t":"• Echinococcus cysts contain antigenic fluid; spontaneous or surgical rupture releases it, causing anaphylaxis and seeding of daughter cysts. Patients present for cyst removal, often on antiparasitic therapy."},{"h":"Worry About","r":"alert","t":"• Life-threatening anaphylaxis from cyst rupture or spillage, dissemination, and location-specific effects (lung cysts on respiration; rarely cardiac or CNS involvement)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cyst location and burden, anticipate anaphylaxis (epinephrine ready), continue antiparasitic therapy, and ensure blood availability."},{"h":"Anesthetic Management","r":"action","t":"• Be prepared for intraoperative anaphylaxis if a cyst ruptures (epinephrine, fluids, airway), watch for hemodynamic collapse during cyst manipulation, and manage location-specific issues."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Anaphylaxis, dissemination, hemodynamic collapse, and respiratory compromise from lung cysts."}]},{"id":122,"title":"Ehlers-Danlos Syndrome","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• A group of heritable connective-tissue disorders with joint hypermobility and skin fragility; the vascular type carries a risk of arterial and organ rupture."},{"h":"Pathophysiology/Background","r":"info","t":"• Collagen defects across several types; the vascular type is the dangerous one, with fragile arteries, bowel, and uterus prone to spontaneous rupture and poor healing.\n• Other types feature hypermobility, easy bruising, skin fragility, and sometimes mitral valve prolapse or aortic root dilation."},{"h":"Worry About","r":"alert","t":"• Spontaneous arterial or visceral rupture and fragile vessels (careful lines, avoid arterial puncture where possible), poor hemostasis and healing, cervical and TMJ laxity (atraumatic airway), pneumothorax risk, and cardiac involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Determine the type, assess cardiac and vascular involvement, plan an atraumatic technique, and ensure blood availability in the vascular type."},{"h":"Anesthetic Management","r":"action","t":"• Handle everything gently — careful positioning (dislocation risk), atraumatic airway (fragile, bleeding-prone tissues), cautious vascular access (ultrasound, avoid arterial lines in the vascular type where possible), meticulous hemostasis, and low airway pressures (pneumothorax).\n• Regional is feasible with attention to bleeding and positioning."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Vascular or visceral rupture, bleeding, pneumothorax, joint dislocation, and poor healing."}]},{"id":123,"title":"Emphysema","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• A COPD phenotype with alveolar destruction, air trapping, and reduced elastic recoil, producing airflow obstruction and hyperinflation."},{"h":"Pathophysiology/Background","r":"info","t":"• Loss of alveoli and recoil causes air trapping, dynamic hyperinflation, bullae (pneumothorax risk), and impaired gas exchange; patients are often smokers with cardiovascular disease and possible cor pulmonale."},{"h":"Worry About","r":"alert","t":"• Air trapping and auto-PEEP (hypotension), pneumothorax (bullae, positive pressure, nitrous oxide), bronchospasm, hypoxemia and hypercarbia, postoperative pulmonary complications, and cor pulmonale."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize with bronchodilators, treat infection, encourage smoking cessation and physiotherapy, assess pulmonary function, and consider regional techniques."},{"h":"Anesthetic Management","r":"action","t":"• Ventilate to avoid air trapping (low rate, longer expiratory time, permissive hypercapnia, avoid high PEEP), avoid nitrous oxide (bullae), use bronchodilators, and stay alert for pneumothorax (sudden hypotension or high pressures).\n• Favor regional or multimodal analgesia to limit opioid respiratory depression, with good humidification and pulmonary toilet."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Auto-PEEP hypotension, pneumothorax, bronchospasm, and respiratory failure."}]},{"id":124,"title":"Encephalopathy, Hypertensive","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute cerebral dysfunction from severely elevated blood pressure exceeding cerebral autoregulation, causing edema — a hypertensive emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Blood pressure beyond the autoregulatory limit causes breakthrough hyperperfusion and cerebral edema, with headache, confusion, seizures, and visual changes; it reverses with controlled — not precipitous — pressure reduction."},{"h":"Worry About","r":"alert","t":"• The hypertensive emergency and cerebral edema, the need for gradual pressure reduction (avoiding ischemia from overcorrection), seizures, and end-organ damage."},{"h":"Preoperative Preparation","r":"action","t":"• Reduce blood pressure in a controlled way with titratable agents, assess end-organ involvement, treat seizures, and identify the cause (eclampsia, pheochromocytoma, renal disease)."},{"h":"Anesthetic Management","r":"action","t":"• Use titratable antihypertensives (nicardipine, labetalol, clevidipine) for smooth, gradual control without overcorrection, manage as a cerebral-edema patient, treat seizures, and keep induction and emergence smooth while monitoring end organs."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cerebral ischemia from overcorrection, ongoing edema or seizures, and end-organ damage."}]},{"id":125,"title":"Encephalopathy, Metabolic","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Diffuse brain dysfunction from systemic metabolic derangement (hepatic, uremic, electrolyte, glucose, endocrine, or toxic), relevant for altered consciousness and drug handling."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes include hepatic failure (hyperammonemia), uremia, sodium disturbances, hypoglycemia, hypercapnia, sepsis, endocrine disease, and drugs or toxins; the result is altered mental status, sometimes seizures, and altered drug metabolism and sensitivity."},{"h":"Worry About","r":"alert","t":"• Depressed consciousness with aspiration and airway risk, heightened sensitivity to sedatives and anesthetics, the underlying organ failure and its drug-handling effects, and seizures; correct derangements (especially sodium) carefully."},{"h":"Preoperative Preparation","r":"action","t":"• Identify and treat the cause; assess airway and aspiration risk, electrolytes, glucose, and organ function; and correct derangements cautiously."},{"h":"Anesthetic Management","r":"action","t":"• Reduce anesthetic and sedative doses (increased sensitivity), protect the airway, choose drugs mindful of hepatic and renal impairment, correct metabolic derangements without overshoot, and monitor neurologic status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, prolonged sedation and delayed emergence, seizures, and worsening organ failure."}]},{"id":126,"title":"Endocardial Cushion Defect (Atrioventricular Canal)","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital defect of the atrioventricular septum and valves (complete AV canal) with atrial and ventricular communications and a common or abnormal AV valve, producing a left-to-right shunt; strongly associated with Down syndrome."},{"h":"Pathophysiology/Background","r":"info","t":"• A combined primum ASD, VSD, and AV-valve abnormality creates a large left-to-right shunt with pulmonary overcirculation, early pulmonary hypertension, AV-valve regurgitation, and heart failure."},{"h":"Worry About","r":"alert","t":"• Pulmonary overcirculation and pulmonary hypertension, AV-valve regurgitation and heart failure, conduction disturbances, paradoxical embolism (de-air lines), and Down-syndrome associations (airway, atlantoaxial instability)."},{"h":"Preoperative Preparation","r":"action","t":"• Define the anatomy, shunt, pulmonary pressures, and valve function (echo); assess Down-syndrome features; arrange endocarditis prophylaxis; and de-air lines."},{"h":"Anesthetic Management","r":"action","t":"• Balance systemic and pulmonary resistance to control the shunt and avoid raising pulmonary resistance when pulmonary hypertension is present; support ventricular function, manage AV-valve regurgitation, de-air lines meticulously, and manage Down-related airway and positioning."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hypertensive crisis, heart failure, arrhythmia, and paradoxical embolism."}]},{"id":127,"title":"Epidermolysis Bullosa","cat":"Disease","L":"E","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inherited blistering disorders in which minor friction or shear causes skin and mucosal blisters; the anesthetic priority is avoiding shear trauma to skin and airway."},{"h":"Pathophysiology/Background","r":"info","t":"• Friction and shear (rather than steady pressure) trigger blistering; severe types cause scarring, contractures, oral and esophageal strictures, microstomia, and dental disease, producing a difficult airway, alongside chronic anemia, malnutrition, and infection."},{"h":"Worry About","r":"alert","t":"• Blistering from friction and shear (avoid adhesive tape and dragging), a difficult airway (microstomia, fragile mucosa — laryngoscopy and tape can blister the mouth), positioning injury, and chronic anemia, malnutrition, and infection."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway (microstomia, strictures), skin, and nutrition and anemia; plan an atraumatic technique with generous padding."},{"h":"Anesthetic Management","r":"action","t":"• Avoid friction and shear — no adhesive tape (use non-adherent dressings, lubricate and pad everything, secure lines and tubes atraumatically), perform gentle well-lubricated laryngoscopy with a smaller tube, position on padded surfaces, and pad the blood-pressure cuff.\n• Ketamine or regional techniques are sometimes favored; give steroid coverage if on chronic steroids and treat any blisters that form."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• New blistering, difficult airway, bleeding from blisters, and infection."}]},{"id":128,"title":"Fabry Disease","cat":"Disease","L":"F","new":true,"sections":[{"h":"Overview","r":"info","t":"• An X-linked lysosomal storage disease (alpha-galactosidase A deficiency) causing glycosphingolipid accumulation and multi-organ vascular disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Deposition in vascular endothelium causes renal failure, cardiomyopathy with arrhythmia and conduction disease, cerebrovascular disease, autonomic dysfunction, neuropathic pain (acroparesthesias), and characteristic angiokeratomas; patients are often on enzyme replacement."},{"h":"Worry About","r":"alert","t":"• Cardiac involvement (hypertrophy, arrhythmia, conduction disease), renal failure, cerebrovascular disease, and autonomic dysfunction (hemodynamic lability, impaired thermoregulation)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac (echo, ECG), renal, and cerebrovascular status, continue enzyme replacement, and note autonomic dysfunction."},{"h":"Anesthetic Management","r":"action","t":"• Manage with cardiac awareness (arrhythmia and conduction, avoid myocardial stress), protect the kidneys (avoid nephrotoxins, careful fluids and drug dosing), and manage autonomic instability including temperature and hemodynamics."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia and conduction problems, renal dysfunction, cerebrovascular events, and autonomic instability."}]},{"id":129,"title":"Factor V Leiden Mutation","cat":"Disease","L":"F","new":true,"sections":[{"h":"Overview","r":"info","t":"• A common inherited thrombophilia (activated protein C resistance) that increases venous thromboembolism risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Mutant factor V resists inactivation by activated protein C, creating a hypercoagulable state with increased DVT and PE risk, especially with surgery, immobility, pregnancy, or estrogen use."},{"h":"Worry About","r":"alert","t":"• Perioperative venous thromboembolism, compounded by surgery, immobility, and pregnancy, and the balance of prophylaxis against bleeding."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the thrombotic history, plan VTE prophylaxis, and coordinate any existing anticoagulation (with ASRA timing for neuraxial)."},{"h":"Anesthetic Management","r":"action","t":"• Provide aggressive VTE prophylaxis (mechanical and pharmacologic by risk), avoid stasis and dehydration, and encourage early mobilization; if anticoagulated, follow ASRA timing for neuraxial techniques."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• DVT and PE, and the bleeding-versus-thrombosis balance with prophylaxis."}]},{"id":130,"title":"Familial Periodic Paralysis","cat":"Disease","L":"F","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inherited channelopathies causing episodic muscle weakness or paralysis tied to potassium shifts, in hypokalemic and hyperkalemic forms."},{"h":"Pathophysiology/Background","r":"info","t":"• Hypokalemic paralysis is triggered by carbohydrate and insulin loads, stress, cold, and rest after exercise; hyperkalemic paralysis is triggered by potassium, fasting, cold, and rest after exercise, and some hyperkalemic forms include myotonia."},{"h":"Worry About","r":"alert","t":"• Triggering an attack through potassium shifts (glucose and insulin, potassium-containing fluids, temperature, stress), respiratory-muscle weakness, arrhythmia from potassium derangement, and succinylcholine (potassium release and myotonia)."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the type, optimize and check potassium, avoid known triggers, and plan temperature control."},{"h":"Anesthetic Management","r":"action","t":"• Monitor potassium closely and keep it in the patient's safe range for their type, avoid type-specific triggers, maintain normothermia, avoid succinylcholine, and monitor neuromuscular function and respiration; watch acid–base changes, which shift potassium."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Paralytic attack, respiratory failure, potassium-related arrhythmia, and prolonged weakness."}]},{"id":131,"title":"Fat Embolism","cat":"Disease","L":"F","new":true,"sections":[{"h":"Overview","r":"info","t":"• Fat globules entering the circulation (classically after long-bone or pelvic fractures or orthopedic surgery), causing respiratory failure, neurologic changes, and petechiae."},{"h":"Pathophysiology/Background","r":"info","t":"• Marrow fat entering the venous circulation produces pulmonary (hypoxemia, ARDS-like injury), cerebral (confusion), and dermal (petechial rash) effects, classically 24–72 hours after injury; reaming and cementing are related triggers."},{"h":"Worry About","r":"alert","t":"• Hypoxemia and respiratory failure, neurologic change, right-heart strain, and recognizing the syndrome perioperatively, including during reaming and nailing."},{"h":"Preoperative Preparation","r":"action","t":"• Keep a high index of suspicion after long-bone or pelvic trauma; early fracture stabilization reduces incidence, and care is supportive."},{"h":"Anesthetic Management","r":"action","t":"• Support oxygenation and ventilation (lung-protective, PEEP), support the right ventricle and perfusion, and anticipate deterioration during reaming or nailing; there is no specific antidote — supportive ICU care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure and ARDS, hypoxemia, neurologic change, and right-heart strain."}]},{"id":132,"title":"Friedreich Ataxia","cat":"Disease","L":"F","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited progressive neurodegenerative disease with ataxia, cardiomyopathy, diabetes, and scoliosis."},{"h":"Pathophysiology/Background","r":"info","t":"• Spinocerebellar degeneration causes ataxia, dysarthria, weakness, and sensory loss; hypertrophic cardiomyopathy (a leading cause of death) with arrhythmia, diabetes, and kyphoscoliosis with restrictive lung disease are common, with later bulbar dysfunction."},{"h":"Worry About","r":"alert","t":"• Cardiomyopathy (hypertrophic, arrhythmia, heart failure), restrictive respiratory disease from scoliosis, bulbar and aspiration risk, and diabetes; relaxant and cardiac-depressant sensitivity is possible."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac status (echo, ECG), respiratory function, glucose, and bulbar and aspiration risk, and document the neurologic baseline."},{"h":"Anesthetic Management","r":"action","t":"• Manage with cardiac awareness (cardiomyopathy hemodynamics, avoid myocardial depression and arrhythmia triggers), use lung-protective ventilation for restrictive disease, take aspiration precautions, manage glucose, and monitor neuromuscular blockade while documenting a baseline for regional."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac events from cardiomyopathy or arrhythmia, respiratory failure, aspiration, and prolonged weakness."}]},{"id":133,"title":"Galactosemia","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited inability to metabolize galactose (transferase deficiency) causing toxic accumulation, managed with a galactose-free diet."},{"h":"Pathophysiology/Background","r":"info","t":"• Accumulation of galactose and galactose-1-phosphate causes liver disease, cataracts, renal tubular dysfunction, developmental problems, and neonatal E. coli sepsis risk, with hypoglycemia; treatment avoids galactose and lactose."},{"h":"Worry About","r":"alert","t":"• Hypoglycemia, liver dysfunction (coagulopathy, altered drug handling), galactose- or lactose-containing medications and fluids (some drug fillers), and neonatal sepsis."},{"h":"Preoperative Preparation","r":"action","t":"• Assess liver function and coagulation and glucose, ensure galactose-free medications and fluids, and treat any sepsis."},{"h":"Anesthetic Management","r":"action","t":"• Maintain glucose with monitoring, use galactose- and lactose-free fluids and drugs (check for lactose fillers), account for hepatic dysfunction in drug choice and coagulation, and correct electrolytes."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoglycemia, hepatic dysfunction and coagulopathy, and sepsis."}]},{"id":134,"title":"Gastrinoma","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• A gastrin-secreting neuroendocrine tumor (Zollinger-Ellison syndrome) causing severe acid hypersecretion, peptic ulcers, and diarrhea; it may be part of MEN1."},{"h":"Pathophysiology/Background","r":"info","t":"• Excess gastrin drives massive gastric acid output with peptic ulceration, reflux, and diarrhea causing electrolyte and volume loss; the large acidic gastric volume raises aspiration risk, and MEN1 association adds hyperparathyroidism and pituitary disease."},{"h":"Worry About","r":"alert","t":"• Aspiration of a large acidic gastric volume (full stomach), electrolyte and volume depletion from diarrhea, and MEN1 features such as hypercalcemia."},{"h":"Preoperative Preparation","r":"action","t":"• Continue high-dose acid suppression, correct volume and electrolytes, take aspiration precautions, and assess for MEN1."},{"h":"Anesthetic Management","r":"action","t":"• Use aspiration precautions and rapid-sequence induction (large acidic residual volume), continue acid suppression, correct fluids and electrolytes, and manage MEN1-related issues such as calcium."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, electrolyte and volume disturbance, and MEN1 complications."}]},{"id":135,"title":"Gaucher Disease","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• A lysosomal storage disease (glucocerebrosidase deficiency) with hepatosplenomegaly, cytopenias, bone disease, and, in some types, neurologic involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Glucocerebroside accumulates in macrophages, causing hepatosplenomegaly, thrombocytopenia and anemia, bone involvement (fractures, pain), and possible pulmonary infiltration; neuronopathic types add CNS and bulbar involvement with airway implications, and patients may be on enzyme replacement."},{"h":"Worry About","r":"alert","t":"• Bleeding (thrombocytopenia and coagulation abnormalities), anemia, difficult airway in neuronopathic forms, restrictive lung disease, aspiration and positioning issues from organomegaly, and bone fragility."},{"h":"Preoperative Preparation","r":"action","t":"• Check counts and coagulation, assess the airway (neuronopathic forms) and pulmonary status, plan transfusion, and continue enzyme replacement."},{"h":"Anesthetic Management","r":"action","t":"• Plan for cytopenias and coagulopathy (platelets, products), handle the airway gently (possible difficulty and aspiration risk), position carefully given bone fragility and splenomegaly, and support respiration; regional depends on platelet and coagulation status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, difficult airway in neuronopathic disease, respiratory compromise, and fractures."}]},{"id":136,"title":"Glaucoma, Open-Angle","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic optic neuropathy with raised intraocular pressure; anesthetic relevance is avoiding pressure spikes and the drug interactions of glaucoma medications."},{"h":"Pathophysiology/Background","r":"info","t":"• Impaired aqueous outflow raises intraocular pressure and damages the optic nerve; patients use topical agents (beta-blockers, alpha-agonists, carbonic anhydrase inhibitors, prostaglandins, cholinergics), some with systemic effects."},{"h":"Worry About","r":"alert","t":"• Raising intraocular pressure (coughing, straining, head-down position, succinylcholine, hypercarbia) and systemic effects of topical drugs — timolol causes bradycardia and bronchospasm, and echothiophate prolongs succinylcholine by inhibiting plasma cholinesterase."},{"h":"Preoperative Preparation","r":"action","t":"• Continue glaucoma drops, note systemic effects (echothiophate and timolol in particular), and avoid pressure-raising factors."},{"h":"Anesthetic Management","r":"action","t":"• Continue eye drops and avoid intraocular-pressure spikes (smooth induction and emergence, avoid coughing and straining, maintain normocarbia, consider avoiding succinylcholine); anticipate prolonged succinylcholine with echothiophate and systemic beta-blockade from timolol, and extubate smoothly."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pressure-related optic injury and systemic drug effects (bradycardia, prolonged blockade)."}]},{"id":137,"title":"Glucose-6-Phosphate Dehydrogenase Deficiency","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• An X-linked enzyme deficiency causing oxidative hemolysis when red cells are stressed by oxidant drugs, infection, or fava beans."},{"h":"Pathophysiology/Background","r":"info","t":"• G6PD normally protects red cells from oxidative damage; deficiency leads to acute hemolysis with oxidant exposure, causing anemia, jaundice, hemoglobinuria, and possible renal injury."},{"h":"Worry About","r":"alert","t":"• Acute hemolytic crisis from oxidant drugs, infection as a trigger, anemia and pigment nephropathy, and the treatment dilemma that methylene blue itself can cause hemolysis in G6PD deficiency."},{"h":"Preoperative Preparation","r":"action","t":"• Identify triggers, avoid oxidant drugs, treat infection, and check a baseline hemoglobin."},{"h":"Anesthetic Management","r":"action","t":"• Avoid oxidant and hemolytic drugs (some sulfonamides, nitrofurantoin, certain antimalarials, high-dose prilocaine or benzocaine, rasburicase, methylene blue), maintain hydration and urine output, and treat hemolysis supportively; for methemoglobinemia in G6PD deficiency, avoid methylene blue and use alternatives such as ascorbic acid or exchange."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemolytic crisis, anemia, renal injury, and a constrained methemoglobinemia treatment."}]},{"id":138,"title":"Goldenhar Syndrome","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital craniofacial disorder (oculo-auriculo-vertebral spectrum) with facial asymmetry, mandibular hypoplasia, and ear, eye, and vertebral anomalies — a difficult-airway condition."},{"h":"Pathophysiology/Background","r":"info","t":"• Hemifacial microsomia with unilateral mandibular hypoplasia produces a difficult airway; ear anomalies, epibulbar dermoids, cervical vertebral anomalies (instability or fusion), and congenital heart disease also occur, and the airway can worsen with growth."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation from asymmetric mandibular hypoplasia, cervical spine instability, and congenital heart disease."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway with a difficult-airway plan, obtain cervical spine imaging, evaluate the heart, and review prior anesthetics."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (spontaneous-ventilation or awake techniques, video or fiberoptic tools, a range of sizes; asymmetry may make one side easier), handle the neck carefully, manage the cardiac lesion, and monitor the airway vigilantly afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, cervical injury, cardiac events, and postoperative obstruction."}]},{"id":139,"title":"Goodpasture Syndrome","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• An autoimmune anti-glomerular-basement-membrane disease causing pulmonary hemorrhage and rapidly progressive glomerulonephritis."},{"h":"Pathophysiology/Background","r":"info","t":"• Anti-GBM antibodies attack lung and kidney, producing alveolar hemorrhage (hemoptysis, hypoxemia, anemia) and renal failure; treatment includes immunosuppression and plasmapheresis."},{"h":"Worry About","r":"alert","t":"• Pulmonary hemorrhage with hypoxemia, renal failure (fluids, electrolytes, drug handling, hyperkalemia), anemia, immunosuppression, and — after plasmapheresis — lowered plasma cholinesterase and clotting factors."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary and renal status, continue immunosuppression with steroid coverage, correct anemia, and note recent plasmapheresis."},{"h":"Anesthetic Management","r":"action","t":"• Ventilate carefully (balance oxygenation, avoid excessive pressures), manage renal failure (avoid nephrotoxins, careful fluids and drugs), give stress-dose steroids, transfuse as needed, and anticipate prolonged succinylcholine after plasmapheresis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hemorrhage and hypoxemia, renal failure, anemia, and prolonged succinylcholine after plasmapheresis."}]},{"id":140,"title":"Gout","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• A crystal arthritis from hyperuricemia; the anesthetic relevance is mostly comorbidities, medications, and renal function."},{"h":"Pathophysiology/Background","r":"info","t":"• Urate crystal deposition causes acute arthritis and associates with obesity, hypertension, chronic kidney disease, cardiovascular disease, and diabetes; medications include NSAIDs, colchicine, and urate-lowering agents, and perioperative dehydration or stress can trigger a flare."},{"h":"Worry About","r":"alert","t":"• Renal impairment (drug dosing, NSAID caution), cardiovascular comorbidity, precipitating a flare, and medication effects (colchicine toxicity, NSAID renal, GI, and bleeding effects)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess renal and cardiovascular status, continue urate-lowering therapy, maintain hydration, and note NSAID and colchicine issues."},{"h":"Anesthetic Management","r":"action","t":"• Maintain hydration to reduce flare risk and protect the kidneys, use NSAIDs cautiously in renal impairment, manage comorbidities, and adjust renally cleared drugs."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Gout flare, renal dysfunction, cardiovascular events, and medication toxicity."}]},{"id":141,"title":"Graves Disease","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• Autoimmune hyperthyroidism; the anesthetic danger is thyroid storm and cardiovascular hyperactivity, with airway issues from goiter."},{"h":"Pathophysiology/Background","r":"info","t":"• TSH-receptor antibodies drive hyperthyroidism (tachycardia, atrial fibrillation, hypertension, hyperthermia, tremor, heat intolerance); goiter can compress the trachea, and ophthalmopathy requires eye protection.\n• An uncontrolled patient is at risk of thyroid storm under stress."},{"h":"Worry About","r":"alert","t":"• Thyroid storm (hyperthermia, tachyarrhythmia, instability, agitation, high mortality) in an uncontrolled patient, airway compression from goiter, atrial fibrillation, and corneal exposure from ophthalmopathy."},{"h":"Preoperative Preparation","r":"action","t":"• Render the patient euthyroid before elective surgery (antithyroid drugs, beta-blockers, iodine), assess the airway and goiter (imaging), heart, and eyes, and delay elective surgery if uncontrolled."},{"h":"Anesthetic Management","r":"action","t":"• Ensure control before elective surgery, avoid sympathetic stimulation (adequate depth, beta-blockade such as esmolol, avoid indirect sympathomimetics and atropine), protect the eyes, and anticipate a difficult airway with goiter.\n• Treat thyroid storm aggressively (beta-blockers, antithyroid drugs, iodine, steroids, cooling, and supportive care)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Thyroid storm, tachyarrhythmia, airway compression, and hemodynamic instability."}]},{"id":142,"title":"Guillain-Barré Syndrome","cat":"Disease","L":"G","new":true,"sections":[{"h":"Overview","r":"info","t":"• An acute immune-mediated demyelinating polyneuropathy causing ascending weakness, respiratory failure, and autonomic instability."},{"h":"Pathophysiology/Background","r":"info","t":"• Often post-infectious demyelination produces ascending flaccid weakness, areflexia, bulbar and respiratory involvement, and prominent autonomic dysfunction (labile blood pressure and heart rate, arrhythmia); denervation upregulates acetylcholine receptors."},{"h":"Worry About","r":"alert","t":"• Respiratory failure (monitor vital capacity, likely postoperative ventilation), autonomic instability with exaggerated responses and arrhythmia, succinylcholine-induced hyperkalemia (avoid it), nondepolarizer sensitivity, and aspiration."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory (vital capacity), bulbar, and autonomic function, anticipate ventilation, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine, use reduced nondepolarizers with monitoring (sugammadex), anticipate exaggerated autonomic responses (short-acting titratable agents, cautious treatment of lability, avoid large boluses), support ventilation and plan for postoperative ventilation, and document deficits if using regional."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, autonomic instability and arrhythmia, hyperkalemia with succinylcholine, prolonged weakness, and aspiration."}]},{"id":143,"title":"Hashimoto Thyroiditis","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Autoimmune thyroiditis, the commonest cause of hypothyroidism, sometimes with goiter and a transient hyperthyroid phase."},{"h":"Pathophysiology/Background","r":"info","t":"• Autoimmune destruction produces hypothyroidism (fatigue, bradycardia, cold intolerance, weight gain) and often a goiter; it associates with other autoimmune conditions, including adrenal insufficiency."},{"h":"Worry About","r":"alert","t":"• Hypothyroid effects (anesthetic sensitivity, bradycardia, hypothermia, delayed emergence, rarely myxedema coma), goiter airway compression, and associated adrenal insufficiency."},{"h":"Preoperative Preparation","r":"action","t":"• Assess thyroid status and aim for euthyroid replacement, continue levothyroxine, evaluate any goiter and airway, and consider associated adrenal insufficiency."},{"h":"Anesthetic Management","r":"action","t":"• Continue thyroid replacement; if hypothyroid, reduce anesthetic doses and watch for bradycardia, hypothermia, and delayed emergence, and plan the airway if a goiter is present."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypothyroid sensitivity, airway compression, and delayed emergence."}]},{"id":144,"title":"Headache, Migraine","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A common primary headache disorder; anesthetic relevance is medications, triggers, and perioperative or postdural-puncture headache considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• A neurovascular headache managed with triptans, ergots, beta-blockers, CGRP antagonists, and prophylactic anticonvulsants or antidepressants; triggers include stress, fasting, and dehydration."},{"h":"Worry About","r":"alert","t":"• Triggering a migraine (fasting, stress, dehydration), drug interactions (triptans or ergots with serotonergic drugs risk serotonin syndrome), and distinguishing postdural-puncture headache from migraine after neuraxial techniques."},{"h":"Preoperative Preparation","r":"action","t":"• Continue prophylaxis, minimize triggers (hydration, avoid prolonged fasting), and note the medications."},{"h":"Anesthetic Management","r":"action","t":"• Maintain hydration and avoid triggers, be cautious combining serotonergic drugs, treat a perioperative migraine, and keep the postdural-puncture-headache differential in mind after neuraxial techniques."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Migraine attack, drug interactions, and diagnostic confusion with postdural-puncture headache."}]},{"id":145,"title":"Heart Disease, Congenital","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A broad category of congenital cardiac lesions whose management is entirely lesion-specific, based on shunt direction, obstruction, and ventricular function."},{"h":"Pathophysiology/Background","r":"info","t":"• The spectrum runs from simple shunts to complex cyanotic and single-ventricle physiology; the key concepts are shunt direction (left-to-right overcirculation versus right-to-left cyanosis), obstruction, pulmonary hypertension, and the systemic–pulmonary resistance balance, with paradoxical embolism a risk in any shunt."},{"h":"Worry About","r":"alert","t":"• Paradoxical air embolism (de-air all lines), maintaining the appropriate resistance balance for the lesion, arrhythmia, heart failure, pulmonary hypertension, endocarditis prophylaxis, and cyanosis."},{"h":"Preoperative Preparation","r":"action","t":"• Know the exact anatomy and current physiology (echo, cardiology), assess function, arrhythmia, and pulmonary pressures, plan prophylaxis, and de-air lines."},{"h":"Anesthetic Management","r":"action","t":"• Tailor entirely to the lesion, maintain the needed resistance balance and preload, de-air lines meticulously, use invasive monitoring for complex cases, and anticipate arrhythmia and failure."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Paradoxical embolism, arrhythmia, heart failure, pulmonary hypertensive crisis, and cyanosis."}]},{"id":146,"title":"Hemochromatosis","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Iron overload (hereditary or transfusional) depositing iron in organs, causing cirrhosis, cardiomyopathy, and diabetes."},{"h":"Pathophysiology/Background","r":"info","t":"• Excess iron deposition causes hepatic cirrhosis (coagulopathy, portal hypertension), dilated or restrictive cardiomyopathy with arrhythmia and conduction disease, diabetes, and endocrine dysfunction."},{"h":"Worry About","r":"alert","t":"• Cardiomyopathy with arrhythmia and conduction disease, hepatic dysfunction (coagulopathy, altered drug handling), and diabetes."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac (echo, ECG) and hepatic function and coagulation and glucose, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Manage with cardiac awareness (cardiomyopathy and arrhythmia, avoid myocardial stress), account for hepatic dysfunction in drug choice and coagulation, and manage glucose."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac events, hepatic and coagulation issues, and glycemic swings."}]},{"id":147,"title":"Hemosiderosis, Pulmonary","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Iron (hemosiderin) deposition in the lungs from recurrent alveolar hemorrhage, causing anemia and progressive restrictive lung disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Recurrent pulmonary hemorrhage leaves iron-laden macrophages and fibrosis with restrictive disease and iron-deficiency anemia; it may be idiopathic or secondary (autoimmune, cardiac)."},{"h":"Worry About","r":"alert","t":"• Restrictive lung disease with impaired gas exchange, the risk of pulmonary hemorrhage, and anemia, plus the underlying cause."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function and anemia, optimize, identify the cause, and continue steroids if prescribed."},{"h":"Anesthetic Management","r":"action","t":"• Use lung-protective ventilation and careful airway management (hemorrhage risk), manage anemia and oxygenation, and treat the underlying cause with steroid coverage where applicable."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure and hypoxemia, pulmonary hemorrhage, and anemia."}]},{"id":148,"title":"Henoch-Schönlein Purpura","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• An IgA small-vessel vasculitis, mostly in children, with palpable purpura, arthritis, abdominal pain, and nephritis."},{"h":"Pathophysiology/Background","r":"info","t":"• IgA immune-complex vasculitis causes a purpuric rash, arthralgia, GI involvement (pain, bleeding, intussusception), and renal disease (nephritis, possible impairment); it is usually self-limited, but renal involvement matters."},{"h":"Worry About","r":"alert","t":"• Renal involvement (hypertension, impairment, drug dosing), GI complications (bleeding, intussusception, aspiration with a surgical abdomen), and steroid use."},{"h":"Preoperative Preparation","r":"action","t":"• Assess renal function and blood pressure and GI status, give steroid coverage if on steroids, and maintain hydration."},{"h":"Anesthetic Management","r":"action","t":"• Manage renal function (avoid nephrotoxins, adjust drugs, control blood pressure), take aspiration precautions with an acute abdomen, and give stress-dose steroids where applicable."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Renal dysfunction and hypertension, GI complications, and aspiration."}]},{"id":149,"title":"Hepatitis, Alcoholic","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute alcohol-induced liver inflammation with hepatic dysfunction, coagulopathy, and high perioperative risk; elective surgery is generally deferred."},{"h":"Pathophysiology/Background","r":"info","t":"• Hepatocyte injury causes jaundice, coagulopathy, hypoalbuminemia, possible encephalopathy, portal hypertension and ascites, and cytopenias, with concurrent withdrawal risk and high surgical mortality in severe disease."},{"h":"Worry About","r":"alert","t":"• Coagulopathy and bleeding, hepatic encephalopathy, altered drug metabolism, hypoglycemia, ascites and aspiration, electrolyte disturbance, and withdrawal."},{"h":"Preoperative Preparation","r":"action","t":"• Defer elective surgery in acute or severe disease, assess coagulation, encephalopathy, electrolytes, and glucose, correct coagulopathy, and manage withdrawal."},{"h":"Anesthetic Management","r":"action","t":"• Use hepatically-sparing drugs at reduced doses, correct coagulopathy before procedures and regional techniques, maintain glucose, take aspiration precautions (ascites), and manage withdrawal and electrolytes."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bleeding, encephalopathy, delayed drug clearance, hypoglycemia, and withdrawal."}]},{"id":150,"title":"Hepatitis, Halothane","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare immune-mediated hepatic injury after halothane (or other halogenated volatile) exposure, ranging from mild transaminitis to fulminant hepatic failure."},{"h":"Pathophysiology/Background","r":"info","t":"• An immune reaction to trifluoroacetylated volatile-anesthetic metabolites causes hepatitis, with higher risk on repeat exposure; halothane is largely obsolete, and cross-reactivity with other fluorinated agents is possible, though modern agents like sevoflurane are lower risk."},{"h":"Worry About","r":"alert","t":"• A history of fulminant hepatic failure and the need to avoid re-exposure to the triggering and cross-reacting volatile anesthetics, plus hepatic dysfunction."},{"h":"Preoperative Preparation","r":"action","t":"• Establish any history of volatile-related hepatitis, plan a volatile-free or lower-risk technique, and assess liver function."},{"h":"Anesthetic Management","r":"action","t":"• Avoid halothane and, in a patient with prior halothane hepatitis, avoid other halogenated volatiles where possible (total intravenous anesthesia or regional), manage any hepatic dysfunction, and document the reaction."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hepatic failure with re-exposure, coagulopathy, and drug-handling issues."}]},{"id":151,"title":"Hepatitis, Viral","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Viral liver infection (types A through E) with acute or chronic hepatic dysfunction; relevance is liver function, transmission precautions, and drug handling."},{"h":"Pathophysiology/Background","r":"info","t":"• Acute or chronic hepatitis produces variable hepatic dysfunction; chronic B and C can cause cirrhosis and hepatocellular carcinoma, B and C are blood-borne, and antivirals carry interactions."},{"h":"Worry About","r":"alert","t":"• Hepatic dysfunction (coagulopathy, altered metabolism), transmission (standard precautions), cirrhosis and portal hypertension in chronic disease, and antiviral interactions; defer elective surgery in acute hepatitis."},{"h":"Preoperative Preparation","r":"action","t":"• Assess liver function and coagulation, defer elective surgery if acute, apply standard precautions, and note antivirals."},{"h":"Anesthetic Management","r":"action","t":"• Use universal precautions, choose hepatically-sparing drugs at adjusted doses, correct coagulopathy, avoid hepatotoxins, and manage cirrhosis-related issues if present."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hepatic dysfunction and coagulopathy, transmission risk, and drug interactions."}]},{"id":152,"title":"Hereditary Hemorrhagic Telangiectasia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• A genetic vascular disorder (Osler-Weber-Rendu) with mucocutaneous telangiectasias and arteriovenous malformations of the lungs, liver, and brain, causing bleeding and shunting."},{"h":"Pathophysiology/Background","r":"info","t":"• Fragile telangiectasias cause epistaxis and GI bleeding with chronic anemia; pulmonary AVMs create a right-to-left shunt (hypoxemia, paradoxical embolism, hemorrhage), cerebral AVMs risk hemorrhage, and hepatic AVMs can cause high-output failure."},{"h":"Worry About","r":"alert","t":"• Bleeding (epistaxis, GI, mucosal — avoid nasal instrumentation and NG tubes), paradoxical air embolism through pulmonary AVMs (meticulous line de-airing), cerebral AVMs, anemia, and high-output failure."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for pulmonary and cerebral AVMs and anemia, de-air lines, avoid nasal tubes, and ensure blood availability."},{"h":"Anesthetic Management","r":"action","t":"• De-air IV lines meticulously (paradoxical embolism through pulmonary AVMs), avoid nasal intubation and NG tubes (epistaxis), handle the airway gently, manage anemia, and watch oxygenation from the pulmonary shunt."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage, paradoxical embolism and stroke, hypoxemia, and anemia."}]},{"id":153,"title":"Herpes, Type I","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Common HSV-1 (orolabial) infection; anesthetic relevance is minor except for active lesions, transmission, and rare complications."},{"h":"Pathophysiology/Background","r":"info","t":"• Recurrent orolabial vesicles are usually benign; concerns include airway lesions, transmission (herpetic whitlow to providers), reactivation, and rare encephalitis, and neuraxial opioids have been associated with labial herpes reactivation."},{"h":"Worry About","r":"alert","t":"• Active oral or airway lesions (bleeding, spread), transmission to staff, reactivation with stress or neuraxial opioids, and rare disseminated disease in the immunocompromised."},{"h":"Preoperative Preparation","r":"action","t":"• Note active lesions and apply standard precautions; minor orolabial disease usually does not delay surgery."},{"h":"Anesthetic Management","r":"action","t":"• Handle the airway gently with oral lesions, wear gloves and take precautions, be aware neuraxial opioids can reactivate labial herpes, and use antivirals if indicated."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Lesion spread and airway issues, transmission, and reactivation."}]},{"id":154,"title":"Hirschsprung Disease","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Congenital absence of colonic ganglion cells causing functional obstruction; neonates and children present with obstruction and a risk of enterocolitis."},{"h":"Pathophysiology/Background","r":"info","t":"• An aganglionic distal colon causes functional obstruction and distension with a risk of enterocolitis, perforation, and sepsis; it presents with failure to pass meconium, distension, and vomiting and associates with Down syndrome."},{"h":"Worry About","r":"alert","t":"• Bowel obstruction and aspiration (full stomach), fluid and electrolyte disturbance, enterocolitis and sepsis, associated Down syndrome, and neonatal physiology."},{"h":"Preoperative Preparation","r":"action","t":"• Decompress with an NG tube, correct fluids and electrolytes, treat sepsis, and assess for Down syndrome and associated anomalies."},{"h":"Anesthetic Management","r":"action","t":"• Use rapid-sequence induction with decompression, correct volume and electrolytes, manage sepsis, maintain temperature and glucose, and manage associated conditions with careful neonatal dosing."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, sepsis and enterocolitis, electrolyte and volume issues, and associated anomalies."}]},{"id":155,"title":"Huntington Disease","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited neurodegenerative disorder with chorea, cognitive decline, and psychiatric symptoms, relevant for aspiration, drug sensitivity, and communication."},{"h":"Pathophysiology/Background","r":"info","t":"• Progressive basal-ganglia degeneration causes chorea, dysphagia and bulbar dysfunction (aspiration), dementia, and psychiatric disease; cachexia and psychiatric medications add complexity, and increased anesthetic sensitivity with reports of abnormal succinylcholine responses have been described."},{"h":"Worry About","r":"alert","t":"• Aspiration from bulbar dysfunction, exaggerated response to anesthetics and sedatives, reported prolonged or abnormal succinylcholine responses, psychiatric drug interactions, poor nutrition, and communication and consent."},{"h":"Preoperative Preparation","r":"action","t":"• Assess bulbar and aspiration risk, nutrition, and psychiatric medications, and plan aspiration precautions and communication."},{"h":"Anesthetic Management","r":"action","t":"• Use aspiration precautions (rapid-sequence induction), titrate anesthetics carefully (possible increased sensitivity), monitor neuromuscular blockade (use succinylcholine cautiously or avoid), manage psychiatric medications, and aim for a smooth emergence."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, prolonged or exaggerated drug effect, and delayed emergence."}]},{"id":156,"title":"Hyperaldosteronism, Primary","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Excess aldosterone (adrenal adenoma or hyperplasia — Conn syndrome) causing hypertension, hypokalemia, and metabolic alkalosis."},{"h":"Pathophysiology/Background","r":"info","t":"• Aldosterone excess retains sodium (hypertension, volume expansion) and loses potassium and hydrogen (hypokalemia, metabolic alkalosis); blood-pressure and potassium control and adrenalectomy planning are the key issues."},{"h":"Worry About","r":"alert","t":"• Hypertension, hypokalemia (arrhythmia, muscle weakness, prolonged neuromuscular blockade), metabolic alkalosis, and volume status, with hemodynamic shifts at adrenalectomy."},{"h":"Preoperative Preparation","r":"action","t":"• Control blood pressure and correct potassium (spironolactone or eplerenone help), assess volume, and plan hemodynamic management for adrenalectomy."},{"h":"Anesthetic Management","r":"action","t":"• Correct potassium before surgery, control blood pressure, monitor for arrhythmia and prolonged neuromuscular blockade, and — for adrenalectomy — anticipate blood-pressure swings and post-removal hypoaldosteronism with hyperkalemia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypokalemic arrhythmia, hypertension, prolonged blockade, and post-adrenalectomy electrolyte shifts."}]},{"id":157,"title":"Hypercalcemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated calcium (commonly from hyperparathyroidism or malignancy) with neuromuscular, cardiac, renal, and CNS effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Common causes are primary hyperparathyroidism and malignancy; effects include weakness, lethargy and confusion, nausea, polyuria and dehydration, a short QT, arrhythmia, renal stones and impairment, and pancreatitis."},{"h":"Worry About","r":"alert","t":"• Dehydration and hypovolemia from polyuria, arrhythmia (short QT), altered consciousness, and renal impairment; severe hypercalcemia is an emergency."},{"h":"Preoperative Preparation","r":"action","t":"• Hydrate and lower calcium (saline, treat the cause, calcitonin or bisphosphonates for severe cases), check renal function and an ECG, and correct before elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Restore volume with saline (which promotes calcium excretion), monitor the ECG and rhythm, use neuromuscular blockers carefully with monitoring, protect the kidneys, and position carefully if malignant bone disease is present."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, hypovolemia, altered mentation, and renal dysfunction."}]},{"id":158,"title":"Hypercholesterolemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated cholesterol — a cardiovascular risk marker whose relevance is comorbid atherosclerosis and statin therapy."},{"h":"Pathophysiology/Background","r":"info","t":"• It contributes to coronary, cerebrovascular, and peripheral atherosclerosis; familial forms cause premature severe disease, and patients are usually on statins."},{"h":"Worry About","r":"alert","t":"• Underlying and often silent cardiovascular disease (coronary, carotid), especially in familial hypercholesterolemia with premature coronary disease."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiovascular risk and disease, continue statins, and optimize modifiable factors."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a cardiovascular-risk patient — maintain hemodynamic stability and coronary perfusion, avoid tachycardia and pressure extremes, and continue statins."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia and cardiovascular events in patients with atherosclerotic disease."}]},{"id":159,"title":"Hyperglycemic Hyperosmolar State","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Severe hyperglycemia with profound dehydration and hyperosmolarity but minimal ketosis, typically in type 2 diabetes — a metabolic emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Marked hyperglycemia drives osmotic diuresis with severe dehydration, hyperosmolarity, and total-body electrolyte depletion (especially potassium); ketosis is minimal, unlike DKA, and infection or illness often precipitates it."},{"h":"Worry About","r":"alert","t":"• Profound hypovolemia and hyperosmolarity, electrolyte deficits (potassium falls with insulin and rehydration), altered consciousness and aspiration, and thromboembolism; defer elective surgery until corrected."},{"h":"Preoperative Preparation","r":"action","t":"• Correct volume, glucose, and electrolytes before surgery, identify and treat the precipitant, and monitor potassium closely."},{"h":"Anesthetic Management","r":"action","t":"• Rehydrate aggressively but carefully, correct glucose gradually with insulin (avoid rapid osmotic shifts and cerebral edema), replace potassium as it falls, watch mentation and aspiration, and give VTE prophylaxis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic instability, potassium swings, altered mentation and aspiration, and thromboembolism."}]},{"id":160,"title":"Hypermagnesemia","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated magnesium (often from obstetric magnesium therapy or renal failure) causing neuromuscular and cardiac depression."},{"h":"Pathophysiology/Background","r":"info","t":"• High magnesium depresses neuromuscular transmission (weakness, reduced reflexes, respiratory depression) and the heart (bradycardia, hypotension, conduction block, arrest at high levels) and potentiates neuromuscular blockers."},{"h":"Worry About","r":"alert","t":"• Muscle weakness and respiratory depression, marked potentiation and prolongation of neuromuscular blockers, and bradycardia, hypotension, and conduction abnormalities, particularly in obstetric patients on magnesium."},{"h":"Preoperative Preparation","r":"action","t":"• Check the magnesium level and renal function, reduce or stop the magnesium infusion if toxic, and treat severe toxicity (IV calcium antagonizes cardiac effects)."},{"h":"Anesthetic Management","r":"action","t":"• Reduce neuromuscular-blocker doses and monitor closely, watch respiration and hemodynamics, and treat severe toxicity with IV calcium and supportive care (dialysis in renal failure)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged weakness and blockade, respiratory depression, and bradycardia and hypotension."}]},{"id":161,"title":"Hyperparathyroidism","cat":"Disease","L":"H","new":true,"sections":[{"h":"Overview","r":"info","t":"• Excess parathyroid hormone causing hypercalcemia with bone, renal, and neuromuscular effects — primary (adenoma) or secondary (chronic kidney disease)."},{"h":"Pathophysiology/Background","r":"info","t":"• PTH excess causes hypercalcemia (primary) or disordered calcium and phosphate (secondary), with bone demineralization and fractures, renal stones and impairment, and possible MEN association."},{"h":"Worry About","r":"alert","t":"• Hypercalcemia effects (dehydration, short-QT arrhythmia, weakness, altered mentation), bone fragility (positioning and fractures), renal impairment, and pos
