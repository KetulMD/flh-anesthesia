clearly with the patient throughout."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Perioperative visual loss in at-risk surgery and disorientation."}]},{"id":47,"title":"Botulism","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• A neuroparalytic illness in which botulinum toxin blocks presynaptic acetylcholine release, producing descending flaccid paralysis and respiratory failure."},{"h":"Pathophysiology/Background","r":"info","t":"• The toxin prevents acetylcholine release at the neuromuscular junction, causing symmetric descending weakness, bulbar involvement, and autonomic dysfunction; respiratory failure is the principal danger."},{"h":"Worry About","r":"alert","t":"• Respiratory failure and aspiration from bulbar palsy, autonomic instability, and profound sensitivity to muscle relaxants (both depolarizing and nondepolarizing) with prolonged ventilation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory and bulbar function, anticipate ventilation, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Expect an exaggerated response to relaxants — greatly reduce doses and monitor closely (sugammadex for rocuronium); avoid succinylcholine (unpredictable, hyperkalemia risk).\n• Support ventilation and autonomic stability and plan for postoperative ventilation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, prolonged weakness, autonomic instability, and aspiration."}]},{"id":48,"title":"Brain Injury, Traumatic","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Acute brain injury where the priority is preventing secondary injury by maintaining cerebral perfusion and oxygenation and controlling intracranial pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Primary injury is compounded by secondary injury from hypoxia, hypotension, raised intracranial pressure, hyperthermia, and glucose derangement.\n• Seizures, autonomic instability, and associated injuries (cervical spine, chest) are common."},{"h":"Worry About","r":"alert","t":"• Secondary injury from hypotension or hypoxia, raised intracranial pressure, an assumed cervical spine injury, a full stomach, coagulopathy, and the Cushing response."},{"h":"Preoperative Preparation","r":"action","t":"• Assess rapidly, assume cervical injury, check coagulation and glucose, and set intracranial-pressure and hemodynamic targets."},{"h":"Anesthetic Management","r":"action","t":"• Maintain cerebral perfusion pressure (avoid hypotension), keep normoxia and normocapnia (brief hyperventilation only for acute herniation), and avoid hyperglycemia and hyperthermia.\n• Rapid-sequence induction with cervical precautions, head-up positioning, osmotherapy (mannitol or hypertonic saline) for raised pressure, and avoidance of maneuvers that spike intracranial pressure."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure or herniation, hypotension, seizures, coagulopathy, and aspiration."}]},{"id":49,"title":"Bronchiolitis Obliterans Syndrome","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Progressive small-airway obstruction and fibrosis — notably as chronic lung-transplant rejection — producing fixed airflow limitation."},{"h":"Pathophysiology/Background","r":"info","t":"• Inflammation and fibrosis obliterate small airways, giving severe obstructive disease and hypoxemia.\n• In transplant patients the lungs are denervated (blunted cough and secretion clearance) and the patient is immunosuppressed."},{"h":"Worry About","r":"alert","t":"• Severe obstruction with air trapping and dynamic hyperinflation, hypoxemia, infection risk, and — in transplant lungs — a blunted cough and hypercarbic response."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function and infection status, continue immunosuppression with stress coverage, and optimize bronchodilators."},{"h":"Anesthetic Management","r":"action","t":"• Ventilate to avoid air trapping (longer expiratory time, lower rate, permissive hypercapnia), use bronchodilators and meticulous asepsis, and manage fluids carefully; favor regional where feasible and avoid high airway pressures."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Air trapping and barotrauma, hypoxemia, infection, and difficult ventilation."}]},{"id":50,"title":"Bronchitis, Chronic","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• A COPD phenotype of chronic productive cough with airflow obstruction, mucus hypersecretion, and infection risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic airway inflammation and hypersecretion with hypoxemia and hypercarbia and possible cor pulmonale; patients are often smokers with cardiovascular disease."},{"h":"Worry About","r":"alert","t":"• Bronchospasm, secretions and mucus plugging, hypoxemia and hypercarbia, postoperative pulmonary complications, and right-heart strain."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize with bronchodilators, treat active infection, encourage smoking cessation and chest physiotherapy, assess pulmonary function, and consider regional techniques."},{"h":"Anesthetic Management","r":"action","t":"• Use bronchodilators, adequate hydration, humidification, and suctioning; avoid histamine-releasing drugs; ventilate to avoid air trapping; and rely on regional or multimodal analgesia to limit opioid respiratory depression."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bronchospasm, secretion retention, respiratory failure, and right-heart strain."}]},{"id":51,"title":"Buerger Disease (Thromboangiitis Obliterans)","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inflammatory, thrombosing vasculitis of small and medium arteries and veins in the extremities, strongly tied to smoking and causing limb ischemia."},{"h":"Pathophysiology/Background","r":"info","t":"• Segmental inflammatory thrombosis leads to digital and limb ischemia, ulcers, and gangrene, typically sparing proximal vessels; smoking cessation is central to management."},{"h":"Worry About","r":"alert","t":"• Worsening limb ischemia — protect perfusion and avoid vasoconstriction and cold; consider the risk of arterial cannulation in affected limbs and careful positioning and padding."},{"h":"Preoperative Preparation","r":"action","t":"• Assess perfusion, reinforce smoking cessation, and avoid vasoconstrictors where possible."},{"h":"Anesthetic Management","r":"action","t":"• Maintain warmth and perfusion, pad and position ischemic limbs carefully, and choose arterial-line sites cautiously; regional or sympathetic block may improve limb flow, and unnecessary vasoconstrictors are best avoided."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Worsening limb ischemia, poor healing, and thrombosis."}]},{"id":52,"title":"Bulimia Nervosa","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• An eating disorder with binge–purge cycles causing electrolyte and volume disturbances and gastrointestinal and dental effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Recurrent vomiting or laxative use produces hypokalemia, metabolic alkalosis (or acidosis with laxatives), dehydration, and hypochloremia.\n• Esophageal and gastric injury, dental erosion, parotid enlargement, and electrolyte-driven cardiac effects (QT prolongation, arrhythmia) may occur."},{"h":"Worry About","r":"alert","t":"• Electrolyte disturbance and arrhythmia (hypokalemia, prolonged QT), dehydration, and aspiration risk from dysmotility or recent purging."},{"h":"Preoperative Preparation","r":"action","t":"• Correct electrolytes and volume, obtain an ECG, assess cardiac status, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Correct potassium and volume before elective surgery, use rapid-sequence induction if aspiration risk is present, avoid QT-prolonging drugs, titrate hemodynamics carefully, and monitor rhythm."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, hypotension, aspiration, and electrolyte swings."}]},{"id":53,"title":"Burn Injury, Chemical","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Tissue injury from chemical agents, with potential systemic toxicity and airway or eye involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Alkalis cause deeper liquefactive injury and acids a coagulative injury; systemic absorption can cause specific toxicities — hydrofluoric acid, for example, produces hypocalcemia, hypomagnesemia, and arrhythmia. Inhalation or ingestion threatens the airway."},{"h":"Worry About","r":"alert","t":"• Ongoing tissue damage until decontaminated, agent-specific systemic toxicity, airway involvement, metabolic derangement, and pain."},{"h":"Preoperative Preparation","r":"action","t":"• Ensure decontamination, identify the agent and its antidote or electrolyte issues, assess the airway and systemic effects, and check calcium and magnesium after hydrofluoric-acid exposure."},{"h":"Anesthetic Management","r":"action","t":"• Confirm decontamination and staff protection, secure the airway early if involved, correct electrolytes (calcium for hydrofluoric acid), resuscitate fluids as needed, treat specific toxicities, and provide multimodal analgesia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway compromise, electrolyte and metabolic disturbance, systemic toxicity, and wound problems."}]},{"id":54,"title":"Burn Injury, Electrical","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Injury from electrical current, often with deep tissue damage out of proportion to skin findings, plus cardiac and neurologic effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Current through tissues causes deep muscle necrosis (rhabdomyolysis, hyperkalemia, myoglobinuric renal failure), arrhythmias or arrest, neurologic injury, and compartment syndrome; associated trauma (falls, fractures, cervical injury) is common."},{"h":"Worry About","r":"alert","t":"• Arrhythmia and cardiac injury, rhabdomyolysis with hyperkalemia and renal failure, hidden deep tissue damage, compartment syndrome, and associated trauma."},{"h":"Preoperative Preparation","r":"action","t":"• Obtain an ECG and cardiac monitoring; assess for rhabdomyolysis (creatine kinase, potassium, myoglobinuria), renal function, and associated injuries."},{"h":"Anesthetic Management","r":"action","t":"• Provide cardiac monitoring and aggressive fluid resuscitation with attention to myoglobinuria (maintain urine output); avoid succinylcholine where rhabdomyolysis or hyperkalemia is a risk and treat hyperkalemia; watch for compartment syndrome and manage associated injuries."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Arrhythmia, hyperkalemia, renal failure, and compartment syndrome."}]},{"id":55,"title":"Burn Injury, Flame","cat":"Disease","L":"B","new":true,"sections":[{"h":"Overview","r":"info","t":"• Thermal burn injury with airway and inhalation risk, massive fluid shifts, hypermetabolism, and drug responses that change over the days after injury."},{"h":"Pathophysiology/Background","r":"info","t":"• Early: airway edema and inhalation injury, carbon-monoxide and cyanide toxicity, and large fluid losses from capillary leak.\n• From roughly 24–48 hours onward: hypermetabolism, upregulated acetylcholine receptors (succinylcholine-induced hyperkalemia risk), resistance to nondepolarizers, altered pharmacokinetics, and infection risk."},{"h":"Worry About","r":"alert","t":"• Airway compromise from edema or inhalation injury (intubate early, before swelling), carbon-monoxide and cyanide poisoning, massive fluid requirements, succinylcholine-induced hyperkalemia after about 24–48 hours (avoid it), nondepolarizer resistance, heat loss, difficult access, and pain."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and inhalation injury early and secure it before edema worsens; check carboxyhemoglobin; begin fluid resuscitation; estimate burn size and depth."},{"h":"Anesthetic Management","r":"action","t":"• Secure the airway early with facial or inhalation injury and give high FiO₂ for carbon monoxide; obtain large-bore access and resuscitate with warmed fluids.\n• Avoid succinylcholine after about 24–48 hours (hyperkalemic arrest) and expect to need higher nondepolarizer doses; warm actively, provide high-dose multimodal analgesia (tolerance develops), and stay vigilant for infection and sepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway loss, hyperkalemic arrest with succinylcholine, hypovolemic shock, hypothermia, infection, and high analgesic requirements."}]},{"id":56,"title":"Calcium Deficiency/Hypocalcemia","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Low ionized calcium impairing neuromuscular and cardiac function."},{"h":"Pathophysiology/Background","r":"info","t":"• Causes: hypoparathyroidism, vitamin D deficiency, renal failure, hypomagnesemia, citrate from massive transfusion, pancreatitis, and alkalosis (which lowers ionized calcium).\n• Effects: neuromuscular irritability (tetany, Chvostek and Trousseau signs), laryngospasm, QT prolongation, hypotension, and reduced contractility."},{"h":"Worry About","r":"alert","t":"• Laryngospasm and tetany, QT prolongation and arrhythmia, and poor contractility with hypotension.\n• Citrate-induced hypocalcemia during massive transfusion, and worsening with hyperventilation-induced alkalosis."},{"h":"Preoperative Preparation","r":"action","t":"• Check ionized calcium and magnesium, correct before elective surgery, and treat the underlying cause."},{"h":"Anesthetic Management","r":"action","t":"• Monitor ionized calcium (especially during massive transfusion, replacing calcium as needed), avoid hyperventilation, correct magnesium, and treat symptomatic hypocalcemia with IV calcium while watching the QT and rhythm."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Tetany and laryngospasm, arrhythmia, and hypotension."}]},{"id":57,"title":"Cancer, Bladder","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Urothelial malignancy; the anesthetic relevance surrounds transurethral resection and radical cystectomy, plus treatment effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Patients are often smokers with cardiopulmonary comorbidity.\n• Transurethral resection risks bladder perforation, the obturator reflex (leg jerk), and irrigation-fluid absorption; radical cystectomy is major surgery with large fluid shifts; chemotherapy (for example cisplatin) adds nephro-, neuro-, and ototoxicity."},{"h":"Worry About","r":"alert","t":"• Obturator reflex and bladder perforation during resection, irrigation-fluid absorption, smoking-related comorbidity, and major blood loss and fluid shifts in cystectomy."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiopulmonary and renal status and chemotherapy history; type and crossmatch for major surgery."},{"h":"Anesthetic Management","r":"action","t":"• For resection, an obturator nerve block or neuromuscular blockade abolishes the obturator reflex; watch for perforation and fluid absorption.\n• For cystectomy, use invasive monitoring, blood availability, active warming, VTE prophylaxis, and careful fluids and analgesia (epidural or multimodal)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Perforation, bleeding, fluid and electrolyte shifts, and cardiopulmonary events."}]},{"id":58,"title":"Cancer, Breast","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A common malignancy; anesthetic relevance lies in surgery, treatment-related toxicity, and opioid-sparing analgesia."},{"h":"Pathophysiology/Background","r":"info","t":"• Prior anthracyclines can cause cardiomyopathy and trastuzumab cardiotoxicity; chest or neck radiation causes fibrosis; prior axillary dissection brings lymphedema of the affected arm."},{"h":"Worry About","r":"alert","t":"• Chemotherapy-related cardiomyopathy, the lymphedema arm (avoid a blood-pressure cuff or IV on that side), radiation effects, and postoperative nausea and pain."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac status after cardiotoxic chemotherapy, identify the affected limb, and plan analgesia."},{"h":"Anesthetic Management","r":"action","t":"• Avoid cannulation and blood-pressure measurement on the lymphedema or dissected side; consider regional techniques (paravertebral or pectoral blocks) for opioid-sparing analgesia and reduced nausea; manage cardiac status and give antiemetic prophylaxis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac events, lymphedema, nausea, and pain."}]},{"id":59,"title":"Cancer, Esophageal","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A malignancy with high aspiration risk and, at resection, major surgical implications."},{"h":"Pathophysiology/Background","r":"info","t":"• Dysphagia, malnutrition, and aspiration risk from obstruction or regurgitation, often in smokers or drinkers with cardiopulmonary disease.\n• Esophagectomy is high-risk, involving one-lung ventilation, fluid shifts, and anastomotic concerns."},{"h":"Worry About","r":"alert","t":"• Aspiration from a full or obstructed stomach (rapid-sequence induction), malnutrition, and the demands of major surgery — one-lung ventilation, fluid balance to protect the anastomosis and lungs, pain, and pulmonary complications."},{"h":"Preoperative Preparation","r":"action","t":"• Take aspiration precautions, assess nutrition and cardiopulmonary status, and plan lung isolation and thoracic epidural analgesia."},{"h":"Anesthetic Management","r":"action","t":"• Rapid-sequence induction for aspiration risk and lung isolation for esophagectomy; use a restrictive fluid strategy to protect the anastomosis and lungs, lung-protective one-lung ventilation, thoracic epidural or multimodal analgesia, careful positioning, and active warming."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, respiratory complications, anastomotic leak, and hemodynamic shifts."}]},{"id":60,"title":"Cancer, Lung Parenchyma","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Primary lung cancer; anesthetic relevance in resection, respiratory reserve, and paraneoplastic syndromes."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced pulmonary reserve (smokers, COPD); resection needs one-lung ventilation.\n• Paraneoplastic syndromes include SIADH, hypercalcemia, ectopic ACTH, and Lambert-Eaton myasthenic syndrome; mediastinal or airway involvement may occur."},{"h":"Worry About","r":"alert","t":"• Limited respiratory reserve and predicted postoperative function, one-lung-ventilation challenges, paraneoplastic effects (Lambert-Eaton confers marked relaxant sensitivity), and airway or mediastinal involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function and predicted postoperative function (split-function testing) and cardiac status; identify paraneoplastic syndromes."},{"h":"Anesthetic Management","r":"action","t":"• Use lung isolation and lung-protective one-lung ventilation; take great care with relaxants in Lambert-Eaton (reduce or avoid, monitor); manage paraneoplastic electrolyte problems; provide thoracic epidural or multimodal analgesia and optimize for pulmonary recovery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia during one-lung ventilation, respiratory failure, and paraneoplastic complications."}]},{"id":61,"title":"Candidiasis","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Fungal infection ranging from mucocutaneous disease to invasive systemic candidiasis in the immunocompromised or critically ill."},{"h":"Pathophysiology/Background","r":"info","t":"• Invasive candidiasis (candidemia) arises with ICU stays, immunosuppression, indwelling lines, and broad-spectrum antibiotics and can cause sepsis, endocarditis, and endophthalmitis.\n• Oral or esophageal disease may affect airway comfort."},{"h":"Worry About","r":"alert","t":"• Sepsis and hemodynamic instability in invasive disease, an immunocompromised host, azole antifungal drug interactions (CYP inhibition prolongs many drugs), and line-related sources."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity and hemodynamics, continue antifungals, note azole interactions, and maintain aseptic technique."},{"h":"Anesthetic Management","r":"action","t":"• Manage invasive disease as sepsis with hemodynamic support, keep strict asepsis, account for azole-mediated drug interactions, and address infected-line source control."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Sepsis, drug interactions, and organ dysfunction."}]},{"id":62,"title":"Carbon Monoxide Poisoning","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Carbon monoxide binds hemoglobin avidly, reducing oxygen delivery and causing tissue hypoxia despite a normal PaO₂ and misleadingly normal pulse oximetry."},{"h":"Pathophysiology/Background","r":"info","t":"• Carboxyhemoglobin lowers oxygen-carrying capacity and shifts the dissociation curve; standard pulse oximetry cannot distinguish it and reads falsely normal.\n• Sources include fire and faulty heaters; in fires, consider concurrent cyanide toxicity."},{"h":"Worry About","r":"alert","t":"• Tissue hypoxia with deceptively normal saturation and PaO₂, neurologic injury, concurrent cyanide toxicity and inhalation injury, and myocardial ischemia."},{"h":"Preoperative Preparation","r":"action","t":"• Measure carboxyhemoglobin by co-oximetry, assess for inhalation injury and cyanide, and obtain an ECG."},{"h":"Anesthetic Management","r":"action","t":"• Give 100% oxygen (which shortens the carboxyhemoglobin half-life) and consider hyperbaric oxygen for severe cases; rely on co-oximetry rather than pulse oximetry, secure the airway if inhalation injury is present, treat suspected cyanide (hydroxocobalamin), and support oxygenation and perfusion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxic organ injury, neurologic sequelae, and cardiac ischemia."}]},{"id":63,"title":"Carcinoid Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Neuroendocrine tumors secreting vasoactive mediators (serotonin, histamine, kinins) that cause flushing, diarrhea, bronchospasm, and hemodynamic instability; carcinoid crisis is the anesthetic danger."},{"h":"Pathophysiology/Background","r":"info","t":"• Mediator release — especially from hepatic metastases or tumor manipulation — produces flushing, bronchospasm, and labile blood pressure.\n• Long-standing disease can cause carcinoid heart disease (right-sided valve fibrosis)."},{"h":"Worry About","r":"alert","t":"• Carcinoid crisis — profound hypotension or hypertension, bronchospasm, and flushing — triggered by tumor manipulation, catecholamines, histamine-releasing drugs, or stress, plus carcinoid heart disease."},{"h":"Preoperative Preparation","r":"action","t":"• Start octreotide before surgery and have it available intraoperatively; assess the heart (echo for right-sided disease); avoid triggers and provide anxiolysis."},{"h":"Anesthetic Management","r":"action","t":"• Octreotide is the key therapy — pretreat and give boluses or an infusion for crisis.\n• Avoid catecholamines and histamine-releasing drugs (treat hypotension with octreotide or vasopressin where possible), keep anesthesia smooth and deep, and monitor invasively for major resection."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Carcinoid crisis, bronchospasm, hemodynamic swings, and right-heart failure."}]},{"id":64,"title":"Cardiac Tamponade","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Pericardial fluid under pressure compressing the heart, impairing filling and causing obstructive shock — a preload- and pressure-dependent emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Rising pericardial pressure limits diastolic filling, reducing stroke volume and driving compensatory tachycardia; the Beck triad (hypotension, muffled heart sounds, distended neck veins) and pulsus paradoxus are classic. The heart is effectively empty and squeezed."},{"h":"Worry About","r":"alert","t":"• Cardiovascular collapse at induction — anesthesia removes compensatory sympathetic tone and positive-pressure ventilation reduces preload, causing precipitous hypotension or arrest."},{"h":"Preoperative Preparation","r":"action","t":"• Confirm with echo; if unstable, drain (pericardiocentesis) before general anesthesia, under local if possible; keep the patient full, fast, and tight (preload, rate, afterload)."},{"h":"Anesthetic Management","r":"action","t":"• Where feasible, drain under local before induction; maintain volume, avoid bradycardia, and preserve contractility and afterload.\n• A ketamine-based induction with maintained spontaneous ventilation is favored; have the surgeon ready to drain and use positive-pressure ventilation cautiously."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic collapse at induction, arrest, and the need for emergent drainage."}]},{"id":65,"title":"Cardiomyopathy, Alcoholic","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Dilated cardiomyopathy from chronic alcohol use, with systolic dysfunction and arrhythmia risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Alcohol toxicity produces a dilated, poorly contractile ventricle, heart failure, and arrhythmias including atrial fibrillation, alongside other alcohol effects (liver disease, electrolyte disturbance, withdrawal)."},{"h":"Worry About","r":"alert","t":"• Poor systolic function and heart failure, arrhythmia, sensitivity to myocardial depressants, and coexisting withdrawal, coagulopathy, and electrolyte issues."},{"h":"Preoperative Preparation","r":"action","t":"• Assess LV function (echo), rhythm, and electrolytes; optimize heart failure and manage withdrawal risk."},{"h":"Anesthetic Management","r":"action","t":"• Manage as dilated cardiomyopathy — maintain contractility, avoid myocardial depression, and manage preload and afterload carefully with invasive monitoring for major cases; correct electrolytes and manage withdrawal."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure, arrhythmia, hemodynamic instability, and withdrawal."}]},{"id":66,"title":"Cardiomyopathy, Hypertrophic","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A hypertrophied, hypercontractile left ventricle with possible dynamic outflow-tract obstruction, which worsens with reduced preload or afterload and with increased contractility."},{"h":"Pathophysiology/Background","r":"info","t":"• Asymmetric septal hypertrophy with dynamic obstruction and systolic anterior motion of the mitral valve, diastolic dysfunction, and arrhythmia and sudden-death risk.\n• Obstruction increases with hypovolemia, vasodilation, tachycardia, and inotropy."},{"h":"Worry About","r":"alert","t":"• Worsening obstruction and hypotension from hypovolemia, vasodilation, tachycardia, or increased contractility; poorly tolerated atrial fibrillation (loss of atrial kick); and sudden death."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the degree of obstruction (echo), rhythm, and any ICD; optimize volume and continue beta-blockers or calcium-channel blockers."},{"h":"Anesthetic Management","r":"action","t":"• Keep the patient full (preload) and slow (avoid tachycardia) and maintain afterload — treat hypotension with volume and a pure alpha agent (phenylephrine), not inotropes or ephedrine, which worsen obstruction.\n• Avoid vasodilation, maintain sinus rhythm (cardiovert atrial fibrillation), and avoid factors that raise contractility."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Dynamic obstruction and hypotension, arrhythmia, sudden death, and poor tolerance of atrial fibrillation."}]},{"id":67,"title":"Cardiomyopathy, Ischemic","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Left-ventricular dysfunction from coronary disease and prior infarction, combining heart failure with ongoing ischemic risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Myocardial scar and hibernation reduce systolic function and cause heart failure and arrhythmia, with continuing coronary supply–demand concerns."},{"h":"Worry About","r":"alert","t":"• Combined heart failure and ischemia, arrhythmia, poor tolerance of tachycardia (worsening both ischemia and filling), and implanted devices."},{"h":"Preoperative Preparation","r":"action","t":"• Assess LV function, ischemic burden, and device status; continue guideline heart-failure and anti-ischemic therapy and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Balance ischemic goals (rate control, coronary perfusion) with failing-heart goals (avoid myocardial depression, careful preload and afterload); use invasive monitoring for major cases and support contractility judiciously."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia, heart-failure decompensation, and arrhythmia."}]},{"id":68,"title":"Cardiomyopathy, Peripartum","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Heart failure with reduced ejection fraction arising late in pregnancy or early postpartum without another identifiable cause."},{"h":"Pathophysiology/Background","r":"info","t":"• A dilated cardiomyopathy in the peripartum window presenting with heart-failure symptoms, with risk of thromboembolism and arrhythmia; it may recover or persist."},{"h":"Worry About","r":"alert","t":"• Heart failure and pulmonary edema, arrhythmia, thromboembolism, and poor tolerance of the fluid shifts of labor and delivery."},{"h":"Preoperative Preparation","r":"action","t":"• Assess LV function (echo) and volume status with multidisciplinary planning (cardiology and obstetrics) and anticoagulation considerations."},{"h":"Anesthetic Management","r":"action","t":"• For delivery, a carefully titrated epidural to control afterload and limit fluid overload is often favored; use invasive monitoring for severe cases, avoid myocardial depressants, manage fluids tightly, and watch for postpartum autotransfusion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure, pulmonary edema, arrhythmia, and thromboembolism."}]},{"id":69,"title":"Cardiomyopathy, Restrictive","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Stiff, non-compliant ventricles with impaired diastolic filling but often preserved systolic function, behaving like constrictive physiology."},{"h":"Pathophysiology/Background","r":"info","t":"• Infiltrative or fibrotic myocardium (for example amyloid) impairs filling, raises filling pressures, and yields a low, fixed stroke volume that is rate- and preload-dependent."},{"h":"Worry About","r":"alert","t":"• A fixed low stroke volume dependent on adequate preload and heart rate, with poor tolerance of tachycardia, arrhythmia (loss of atrial kick), hypovolemia, and vasodilation; conduction disease is common."},{"h":"Preoperative Preparation","r":"action","t":"• Assess filling pressures and function (echo) and rhythm; optimize volume and heed conduction issues."},{"h":"Anesthetic Management","r":"action","t":"• Maintain preload and sinus rhythm, avoid tachycardia and bradycardia, preserve afterload, and avoid myocardial depression; use a gradual anesthetic and invasive monitoring for major surgery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Low-output hypotension, arrhythmia, and poor tolerance of volume shifts."}]},{"id":70,"title":"Carnitine Deficiency","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Deficiency of carnitine impairing fatty-acid metabolism, causing muscle weakness, cardiomyopathy, and metabolic decompensation with fasting."},{"h":"Pathophysiology/Background","r":"info","t":"• Carnitine transports fatty acids into mitochondria; deficiency causes energy failure in muscle and heart, hypoketotic hypoglycemia, and metabolic crises with fasting or stress."},{"h":"Worry About","r":"alert","t":"• Hypoglycemia and metabolic decompensation with prolonged fasting, cardiomyopathy and arrhythmia, and respiratory muscle weakness."},{"h":"Preoperative Preparation","r":"action","t":"• Minimize fasting with IV glucose, assess cardiac and muscle status, and continue carnitine supplementation."},{"h":"Anesthetic Management","r":"action","t":"• Provide glucose-containing fluids with close glucose monitoring and avoid prolonged fasting; be cautious with drugs that burden fatty-acid metabolism (prolonged propofol infusions are theoretically concerning), support cardiac function, and monitor for weakness."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoglycemia, cardiac or metabolic decompensation, and prolonged weakness."}]},{"id":71,"title":"Carotid Sinus Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• An exaggerated baroreceptor reflex in which carotid sinus stimulation causes bradycardia and/or hypotension and syncope."},{"h":"Pathophysiology/Background","r":"info","t":"• A hypersensitive carotid sinus produces vagal bradycardia (cardioinhibitory) and/or a vasodepressor fall in blood pressure with neck pressure or manipulation — relevant during carotid and neck surgery."},{"h":"Worry About","r":"alert","t":"• Profound bradycardia or asystole and hypotension with carotid-sinus stimulation from surgical manipulation or neck positioning, and syncope."},{"h":"Preoperative Preparation","r":"action","t":"• Note the history, have anticholinergics ready, and discuss carotid-sinus local infiltration with the surgeon."},{"h":"Anesthetic Management","r":"action","t":"• Anticipate bradycardia and hypotension during carotid manipulation and treat by stopping the stimulus and giving atropine or glycopyrrolate and vasopressors; the surgeon can infiltrate the carotid sinus with local anesthetic, and pacing should be available for a severe cardioinhibitory pattern."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bradycardia or asystole, hypotension, and syncope."}]},{"id":72,"title":"Central Neurogenic Hyperventilation","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Sustained hyperventilation from central brainstem pathology, producing respiratory alkalosis and signaling serious CNS disease."},{"h":"Pathophysiology/Background","r":"info","t":"• A brainstem lesion (tumor or injury) drives persistent hyperpnea despite alkalosis and a low CO₂, indicating significant intracranial pathology."},{"h":"Worry About","r":"alert","t":"• The underlying CNS lesion and raised intracranial pressure, the effects of respiratory alkalosis (cerebral vasoconstriction, reduced ionized calcium), and the airway and consciousness implications of the disease."},{"h":"Preoperative Preparation","r":"action","t":"• Identify and treat the underlying cause, assess intracranial pressure and neurologic status, and consider airway protection."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a raised-intracranial-pressure and CNS-lesion patient — control ventilation and CO₂ appropriately, protect the airway, avoid worsening intracranial pressure, and treat the underlying condition."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure, neurologic deterioration, and airway compromise."}]},{"id":73,"title":"Cephalopelvic Disproportion","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• An obstetric condition in which fetal size or position exceeds pelvic capacity, often requiring cesarean delivery."},{"h":"Pathophysiology/Background","r":"info","t":"• Obstructed labor leads to operative or cesarean delivery; the relevance is anesthetic care for cesarean and the risks of prolonged, obstructed labor."},{"h":"Worry About","r":"alert","t":"• The need for a possibly urgent cesarean, the risks of prolonged labor (maternal exhaustion, infection, uterine rupture), and standard obstetric concerns (aspiration, difficult airway, neuraxial hypotension)."},{"h":"Preoperative Preparation","r":"action","t":"• Evaluate for cesarean with a standard obstetric assessment (airway, aspiration risk, volume) and plan neuraxial versus general anesthesia."},{"h":"Anesthetic Management","r":"action","t":"• Use neuraxial anesthesia for cesarean when feasible, with left-uterine displacement and hypotension management; use general anesthesia with rapid-sequence induction if emergent or if neuraxial is contraindicated, with aspiration prophylaxis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Urgent cesarean, hemorrhage, and neonatal considerations."}]},{"id":74,"title":"Cerebral Arteriovenous Malformations","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Abnormal high-flow vascular tangles at risk of hemorrhage; anesthetic care centers on hemodynamic control and hemorrhage risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Arteriovenous shunting carries a risk of intracranial hemorrhage; patients present for embolization or resection, with a risk of normal-perfusion-pressure breakthrough after treatment."},{"h":"Worry About","r":"alert","t":"• Intracranial hemorrhage, blood-pressure control (both rupture risk and post-treatment breakthrough hyperemia), raised intracranial pressure, and procedural blood loss."},{"h":"Preoperative Preparation","r":"action","t":"• Assess neurologic status, intracranial pressure, and the lesion; plan tight blood-pressure control and blood availability with neurosurgery and neuroradiology."},{"h":"Anesthetic Management","r":"action","t":"• Control blood pressure strictly — avoid hypertension (rupture) and, after obliteration, avoid breakthrough hyperemia (a lower target may be set); keep induction and emergence smooth, manage intracranial pressure, and prepare for hemorrhage with invasive monitoring."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage, raised intracranial pressure, hemodynamic swings, and neurologic injury."}]},{"id":75,"title":"Cerebral Palsy","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A non-progressive motor disorder from early brain injury, with spasticity, contractures, and associated seizures, reflux, and communication difficulties."},{"h":"Pathophysiology/Background","r":"info","t":"• Spasticity and contractures complicate positioning and access; bulbar dysfunction brings aspiration and secretions; seizures, reflux, poor nutrition, restrictive lung disease, and cognitive or communication impairment are common."},{"h":"Worry About","r":"alert","t":"• Aspiration (reflux and bulbar dysfunction), difficult positioning and IV access, seizures, hypothermia, and communication and consent; emergence may be prolonged."},{"h":"Preoperative Preparation","r":"action","t":"• Assess baseline function, continue anticonvulsants, note reflux and respiratory status, involve caregivers, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Take aspiration precautions (consider rapid-sequence induction), pad and position contractures carefully, continue anticonvulsants, warm actively, and expect a possibly reduced anesthetic requirement.\n• Succinylcholine is generally acceptable (cerebral palsy is not a denervation state), though care is individualized; watch for prolonged emergence."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aspiration, hypothermia, seizures, delayed emergence, and positioning problems."}]},{"id":76,"title":"Cerebrovascular Transient Ischemic Attack","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A transient focal neurologic deficit from temporary ischemia without infarction — a warning marker of stroke risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Usually embolic (carotid or cardiac) or small-vessel, it indicates cerebrovascular disease and elevated perioperative stroke risk, and patients are often on antiplatelets or anticoagulants."},{"h":"Worry About","r":"alert","t":"• Perioperative stroke, blood-pressure management (preserving cerebral perfusion while avoiding extremes), antithrombotic management, and carotid disease."},{"h":"Preoperative Preparation","r":"action","t":"• Evaluate the cause (carotid imaging, cardiac source), continue or plan antiplatelet therapy, delay elective surgery appropriately after a recent event, and assess carotid stenosis."},{"h":"Anesthetic Management","r":"action","t":"• Keep blood pressure near or slightly above baseline to preserve cerebral perfusion and avoid hypotension and hypertension; manage glucose, continue antiplatelets where possible, and monitor neurologic status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Stroke, perfusion-related ischemia, and the bleeding-versus-thrombosis balance."}]},{"id":77,"title":"Cervical Disk Disease (Cervical Spine Disease)","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Degenerative or herniated cervical disk disease with potential cord or root compression and airway and neck-mobility implications."},{"h":"Pathophysiology/Background","r":"info","t":"• Nerve-root or cord compression with limited neck movement and a risk of cord injury with manipulation; patients may present for cervical spine surgery with positioning, airway, and neuromonitoring demands."},{"h":"Worry About","r":"alert","t":"• Cord injury with neck manipulation during intubation or positioning, limited neck extension (difficult airway), neuromonitoring needs, and prone or sitting positioning risks."},{"h":"Preoperative Preparation","r":"action","t":"• Assess neck mobility and neurologic deficits (document a baseline) and imaging; plan the airway (video or awake fiberoptic with in-line stabilization) and positioning, and coordinate neuromonitoring."},{"h":"Anesthetic Management","r":"action","t":"• Manage the airway with cervical protection (video laryngoscopy or awake fiberoptic, manual in-line stabilization) and avoid excessive neck movement.\n• Use an anesthetic compatible with neuromonitoring (limit relaxants and volatile agents if motor-evoked or somatosensory potentials are recorded) and position carefully."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cord injury, airway difficulty, positioning complications, and neuromonitoring interference."}]},{"id":78,"title":"Charcot-Marie-Tooth Disease","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A hereditary sensorimotor peripheral neuropathy with distal weakness, atrophy, and sensory loss, relevant for relaxant response and regional planning."},{"h":"Pathophysiology/Background","r":"info","t":"• Peripheral neuropathy with distal muscle wasting and foot deformity; some patients have respiratory-muscle or bulbar involvement.\n• It is not associated with malignant hyperthermia."},{"h":"Worry About","r":"alert","t":"• Variable and possibly prolonged response to nondepolarizers; succinylcholine is often avoided out of caution for hyperkalemia in advanced denervation; respiratory reserve; and documenting baseline deficits before regional techniques."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory and bulbar function and baseline neurologic deficits, and discuss regional options (feasible but document deficits)."},{"h":"Anesthetic Management","r":"action","t":"• Monitor neuromuscular blockade with nondepolarizers and avoid succinylcholine where denervation is significant.\n• Regional anesthesia is not contraindicated but requires a documented baseline; watch respiratory status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Prolonged or variable blockade and respiratory compromise."}]},{"id":79,"title":"CHARGE Association","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A cluster of congenital anomalies (coloboma, heart defects, choanal atresia, growth retardation, and genital and ear anomalies) with major airway and cardiac implications."},{"h":"Pathophysiology/Background","r":"info","t":"• Choanal atresia causes nasal obstruction (neonates are obligate nasal breathers); congenital heart disease, cranial-nerve dysfunction (aspiration, weak airway reflexes), and a difficult airway (micrognathia, laryngomalacia) are common."},{"h":"Worry About","r":"alert","t":"• Difficult airway (choanal atresia and airway anomalies), congenital heart disease, aspiration, and postoperative airway obstruction or apnea."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and heart and the feeding and aspiration history, and plan for a difficult airway."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (an oral airway bypasses choanal atresia; video or fiberoptic tools), manage the cardiac lesion appropriately, take aspiration precautions, and monitor the airway vigilantly afterward."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway obstruction, cardiac events, aspiration, and apnea."}]},{"id":80,"title":"Chiari Malformations","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Hindbrain-herniation malformations; type I (cerebellar tonsillar herniation) is most common in adults, with headache and potential brainstem, cord, and syrinx effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Tonsillar herniation through the foramen magnum can cause brainstem compression, cranial-nerve dysfunction, sleep apnea, and syringomyelia; raised intracranial pressure and craniocervical positioning are concerns."},{"h":"Worry About","r":"alert","t":"• Brainstem compression and cranial-nerve dysfunction (aspiration, apnea), raised intracranial pressure, and neck positioning that stresses the craniocervical junction; autonomic instability is possible."},{"h":"Preoperative Preparation","r":"action","t":"• Assess neurologic and bulbar function, sleep apnea, and intracranial pressure; document a baseline and plan careful positioning."},{"h":"Anesthetic Management","r":"action","t":"• Avoid raising intracranial pressure and extremes of neck flexion or extension, take aspiration precautions, keep induction and emergence smooth, and anticipate postoperative respiratory problems; avoid succinylcholine where significant weakness or denervation exists."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Apnea, aspiration, raised intracranial pressure, and cranial-nerve dysfunction."}]},{"id":81,"title":"Churg-Strauss Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A small-vessel (ANCA-associated) vasculitis with asthma, marked eosinophilia, and multi-organ involvement — also called eosinophilic granulomatosis with polyangiitis."},{"h":"Pathophysiology/Background","r":"info","t":"• Severe asthma and eosinophilia with sinusitis, plus vasculitic involvement of nerves (mononeuritis multiplex), heart (cardiomyopathy and pericarditis, a leading cause of death), gut, kidneys, and lungs.\n• Patients are usually on steroids or immunosuppression."},{"h":"Worry About","r":"alert","t":"• Severe bronchospasm, cardiac involvement (cardiomyopathy, arrhythmia, pericarditis), neuropathy (document deficits), and steroid dependence."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize asthma (bronchodilators, steroids), assess cardiac and neurologic involvement, provide stress-dose steroids, and evaluate the airway."},{"h":"Anesthetic Management","r":"action","t":"• Treat as a reactive-airway patient (bronchodilators, avoid histamine-releasing drugs, deepen anesthesia before airway manipulation), manage cardiac status, give stress-dose steroids, and document neuropathy before regional techniques."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Bronchospasm, cardiac events, adrenal suppression, and neuropathy."}]},{"id":82,"title":"Cigarette Smoking","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Tobacco use with cardiovascular, pulmonary, and wound-healing effects and heightened perioperative respiratory risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Carboxyhemoglobin reduces oxygen delivery; airway hyperreactivity, secretions, and COPD or coronary disease are common; wound healing and immune function are impaired."},{"h":"Worry About","r":"alert","t":"• Bronchospasm, laryngospasm, secretions, hypoxemia, coronary disease, and postoperative pulmonary complications, plus carboxyhemoglobin effects."},{"h":"Preoperative Preparation","r":"action","t":"• Encourage cessation — even 12–24 hours helps carbon-monoxide and nicotine levels, while weeks improve airway reactivity, secretions, and outcomes; optimize pulmonary status."},{"h":"Anesthetic Management","r":"action","t":"• Deepen anesthesia before airway manipulation (hyperreactive airway), ensure good oxygenation, and avoid airway irritants; favor regional or multimodal analgesia, and provide good pulmonary toilet."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway reactivity, secretions, pulmonary complications, and delayed healing."}]},{"id":83,"title":"Cleft Palate","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital orofacial cleft with airway and feeding implications, commonly repaired in infancy."},{"h":"Pathophysiology/Background","r":"info","t":"• May be part of a syndrome (for example Pierre Robin with micrognathia and a difficult airway); feeding difficulty and aspiration and other associated anomalies can occur."},{"h":"Worry About","r":"alert","t":"• Difficult intubation (especially syndromic), airway obstruction, the laryngoscope blade slipping into the cleft (pack it), and postoperative airway swelling, obstruction, and bleeding after palate repair."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway, identify syndromic associations, and plan for a difficult airway when indicated."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway, pack the cleft to prevent blade slippage, secure the tube well (RAE tube), and watch vigilantly for postoperative airway obstruction and bleeding after repair."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, postoperative obstruction and bleeding, and aspiration."}]},{"id":84,"title":"Coagulopathy, Factor IX Deficiency","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Hemophilia B — an X-linked deficiency of factor IX causing impaired clotting and bleeding into joints, muscles, and surgical sites."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced factor IX impairs intrinsic coagulation and prolongs the aPTT; bleeding severity tracks the factor level, and treatment is factor IX concentrate."},{"h":"Worry About","r":"alert","t":"• Perioperative and neuraxial bleeding, the need to replace factor IX to target levels before and after surgery, and inhibitor development; avoid intramuscular injections and antiplatelet drugs."},{"h":"Preoperative Preparation","r":"action","t":"• Involve hematology, measure the factor level and inhibitors, and plan factor IX replacement to target (higher for major surgery) with a peri- and postoperative schedule and antifibrinolytics."},{"h":"Anesthetic Management","r":"action","t":"• Ensure adequate factor levels before proceeding and before or after any neuraxial technique (often avoided unless corrected); avoid intramuscular injections, NSAIDs, and antiplatelets; ensure meticulous hemostasis and monitor levels."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhage, hemarthrosis, and inhibitor-related failure of replacement."}]},{"id":85,"title":"Coarctation of the Aorta","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Narrowing of the aorta (usually near the left subclavian) causing upper-body hypertension and lower-body hypoperfusion, with a blood-pressure difference between arms and legs."},{"h":"Pathophysiology/Background","r":"info","t":"• Fixed obstruction causes LV pressure overload, upper-extremity hypertension, reduced lower-body and renal perfusion, and collateral circulation.\n• Associations include bicuspid aortic valve and intracranial berry aneurysms; critical neonatal coarctation is duct-dependent."},{"h":"Worry About","r":"alert","t":"• Upper-body hypertension and organ hypoperfusion below the coarctation (measure blood pressure in the right arm), cross-clamp spinal-cord and renal ischemia at repair, associated aneurysms and bicuspid valve, and heart failure."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the blood-pressure gradient, cardiac function, and associated lesions; control hypertension and plan monitoring above and below the coarctation for repair."},{"h":"Anesthetic Management","r":"action","t":"• Monitor blood pressure appropriately (right arm, plus lower limb for repair) and control proximal hypertension.\n• During repair, manage cross-clamp hemodynamics with spinal-cord and renal protection and watch for post-repair (paradoxical) hypertension."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypertensive complications, cord or renal ischemia, heart failure, and aneurysm rupture."}]},{"id":86,"title":"Cogan Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rare autoimmune disorder with interstitial keratitis and audiovestibular dysfunction, sometimes with systemic vasculitis including aortitis."},{"h":"Pathophysiology/Background","r":"info","t":"• Inflammatory eye and ear disease that may involve large-vessel vasculitis (aortitis, aortic regurgitation, aneurysm); patients are often on steroids or immunosuppression."},{"h":"Worry About","r":"alert","t":"• Aortic involvement (aortic regurgitation, aneurysm), steroid dependence, hearing and vestibular deficits (communication), and active vasculitis."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac and aortic involvement (echo) and steroid history, and evaluate hearing for communication."},{"h":"Anesthetic Management","r":"action","t":"• Manage any aortic regurgitation appropriately (maintain afterload, avoid bradycardia), give stress-dose steroids, support communication given hearing loss, and control blood pressure carefully with large-vessel disease."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Aortic regurgitation or vascular events, adrenal suppression, and communication difficulty."}]},{"id":87,"title":"Complement Deficiency","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inherited or acquired complement deficiencies predisposing to recurrent infection (especially encapsulated organisms and Neisseria) and, in some, autoimmune disease or angioedema."},{"h":"Pathophysiology/Background","r":"info","t":"• The picture depends on the component: terminal-pathway deficiency favors Neisseria infection, early-component deficiency causes lupus-like disease, and C1-esterase-inhibitor deficiency causes hereditary angioedema — a distinct and dangerous airway entity."},{"h":"Worry About","r":"alert","t":"• Infection risk, and — in C1-inhibitor deficiency (hereditary angioedema) — airway angioedema triggered by trauma or intubation, a major airway threat that does not respond to standard anaphylaxis drugs."},{"h":"Preoperative Preparation","r":"action","t":"• Clarify the specific deficiency; for hereditary angioedema, arrange C1-inhibitor prophylaxis and have treatment available; maintain strict asepsis and confirm vaccination status."},{"h":"Anesthetic Management","r":"action","t":"• Keep asepsis meticulous; for C1-inhibitor deficiency, minimize airway trauma, give C1-inhibitor prophylaxis, and have C1-inhibitor concentrate (or icatibant/ecallantide) ready for angioedema; avoid unnecessary instrumentation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Infection, airway angioedema in hereditary angioedema, and autoimmune complications."}]},{"id":88,"title":"Congenital Methemoglobinemia","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited tendency to methemoglobinemia, in which oxidized hemoglobin cannot carry oxygen, causing cyanosis and reduced oxygen delivery."},{"h":"Pathophysiology/Background","r":"info","t":"• Deficient methemoglobin reduction (cytochrome b5 reductase) or hemoglobin M variants; methemoglobin cannot bind oxygen and left-shifts the curve.\n• Pulse oximetry is unreliable (tends toward about 85%) and oxidant drugs worsen it."},{"h":"Worry About","r":"alert","t":"• Functional hypoxia, unreliable pulse oximetry, oxidant drugs (benzocaine, prilocaine, nitrates) precipitating acute methemoglobinemia, and cyanosis unresponsive to oxygen."},{"h":"Preoperative Preparation","r":"action","t":"• Note the baseline, avoid oxidant triggers, and use co-oximetry for accurate measurement."},{"h":"Anesthetic Management","r":"action","t":"• Avoid oxidant drugs (benzocaine, prilocaine, large-dose local anesthetics, nitrates), use co-oximetry rather than standard oximetry, and treat significant acute methemoglobinemia with methylene blue (avoiding it in G6PD deficiency) while maintaining oxygenation."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxia, misleading monitoring, and drug-induced worsening."}]},{"id":89,"title":"Congenital Pulmonary Cystic Lesions/Lobar Emphysema","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Congenital lung malformations (cystic malformation, lobar emphysema, sequestration) that can trap air and compress adjacent lung and mediastinum, especially under positive pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Air-trapping lesions — congenital lobar emphysema in particular hyperinflates and compresses normal lung and mediastinum with positive-pressure ventilation, causing cardiorespiratory compromise; infants present for resection."},{"h":"Worry About","r":"alert","t":"• Hyperinflation and mediastinal compression with positive-pressure ventilation (avoid high pressures and nitrous oxide), cardiorespiratory collapse, and one-lung ventilation for resection in a small child."},{"h":"Preoperative Preparation","r":"action","t":"• Review imaging and extent, plan the ventilation strategy and lung isolation, and avoid nitrous oxide."},{"h":"Anesthetic Management","r":"action","t":"• Maintain spontaneous ventilation until the chest is open where feasible, use gentle low-pressure ventilation, avoid nitrous oxide, and be ready for sudden hyperinflation; use lung isolation for resection with resuscitation ready."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hyperinflation and tension physiology, cardiorespiratory collapse, and hypoxemia."}]},{"id":90,"title":"Congestive Heart Failure","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Impaired cardiac output and/or congestion from systolic or diastolic dysfunction — a strong predictor of perioperative risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Reduced contractility (reduced ejection fraction) or impaired filling (preserved ejection fraction), with neurohormonal activation, fluid retention, congestion, and arrhythmia risk; decompensated failure sharply raises risk."},{"h":"Worry About","r":"alert","t":"• Decompensation and pulmonary edema, poor tolerance of myocardial depression and fluid shifts, arrhythmia, and hypotension; delay elective surgery if decompensated."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize to euvolemia, continue guideline therapy (holding ACE inhibitors or ARBs on the day is common practice given hypotension risk), assess function (echo), rhythm, and device status, and delay if decompensated."},{"h":"Anesthetic Management","r":"action","t":"• Avoid myocardial depression and titrate carefully, manage preload and afterload to maintain output, use invasive monitoring for major surgery and judicious fluids, support contractility with inotropes as needed, and treat arrhythmia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Decompensation, pulmonary edema, arrhythmia, and hypotension."}]},{"id":91,"title":"Constipation","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A common condition, minor for anesthesia itself but relevant when severe (obstruction, megacolon) or reflecting underlying disease."},{"h":"Pathophysiology/Background","r":"info","t":"• Usually benign; severe cases (obstruction, Ogilvie syndrome, chronic megacolon) risk perforation and fluid and electrolyte disturbance, and opioids worsen it (postoperative ileus)."},{"h":"Worry About","r":"alert","t":"• Bowel obstruction or perforation and aspiration in severe cases, electrolyte disturbance, and opioid-induced worsening and ileus."},{"h":"Preoperative Preparation","r":"action","t":"• For significant cases, assess for obstruction and check electrolytes, with aspiration precautions if obstructed."},{"h":"Anesthetic Management","r":"action","t":"• Simple constipation has minimal impact; for obstruction, treat as a full stomach (rapid-sequence induction) and correct fluids and electrolytes; minimize opioids (multimodal analgesia) and use regional techniques to reduce ileus."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Obstruction or perforation, ileus, and aspiration if obstructed."}]},{"id":92,"title":"Conversion Disorder (Functional Neurologic Symptom Disorder)","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Neurologic symptoms (weakness, sensory change, seizures) not explained by organic disease; the relevance is diagnosis, communication, and avoiding unnecessary intervention."},{"h":"Pathophysiology/Background","r":"info","t":"• Functional (non-organic) neurologic symptoms that are real and distressing but without a structural lesion; the diagnosis requires exclusion of organic causes."},{"h":"Worry About","r":"alert","t":"• Wrongly attributing genuine organic pathology to conversion (careful workup), perioperative symptom exacerbation, and patient distress."},{"h":"Preoperative Preparation","r":"action","t":"• Ensure organic causes are excluded, communicate supportively, and involve psychiatry as appropriate."},{"h":"Anesthetic Management","r":"action","t":"• Provide standard anesthetic care with a supportive, non-confrontational approach, avoid unnecessary intraoperative investigation, aim for a smooth emergence, and stay alert that new or changed symptoms may still be organic."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Symptom exacerbation, diagnostic uncertainty, and patient distress."}]},{"id":93,"title":"Cor Pulmonale","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Right-heart enlargement and failure from chronic lung disease and pulmonary hypertension."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic hypoxic pulmonary vasoconstriction and lung disease raise pulmonary pressures, causing right-ventricular hypertrophy and failure; the right ventricle tolerates further afterload poorly."},{"h":"Worry About","r":"alert","t":"• Right-ventricular failure, worsened by anything that raises pulmonary vascular resistance (hypoxia, hypercarbia, acidosis, cold, high airway pressures, nitrous oxide); arrhythmia and the underlying lung disease also matter."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize lung disease and oxygenation, assess right-ventricular function (echo) and pulmonary pressures, treat infection, and continue cardiopulmonary medications."},{"h":"Anesthetic Management","r":"action","t":"• Avoid raising pulmonary vascular resistance (maintain oxygenation and normocarbia, avoid acidosis, cold, and nitrous oxide, ventilate carefully) and support the right ventricle (adequate but not excessive preload, inotropes such as milrinone or dobutamine, pulmonary vasodilators if needed) while maintaining systemic pressure for coronary perfusion."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Right-ventricular failure, pulmonary hypertensive crisis, arrhythmia, and hypoxemia."}]},{"id":94,"title":"Coronary Artery Disease (Left Main and Non–Left Main Disease)","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Atherosclerotic coronary narrowing with a myocardial oxygen supply–demand mismatch; left-main or equivalent disease is the highest-risk subset."},{"h":"Pathophysiology/Background","r":"info","t":"• The degree and location of stenosis and the LV function drive risk; associated hypertension, diabetes, and dyslipidemia are common, and stents require antiplatelet continuity."},{"h":"Worry About","r":"alert","t":"• Perioperative ischemia or infarction from tachycardia, hypertension, hypotension, or anemia; stent thrombosis if antiplatelets are stopped early; and arrhythmia."},{"h":"Preoperative Preparation","r":"action","t":"• Continue beta-blockers and statins, weigh stent type and timing against bleeding before stopping antiplatelets (with cardiology input for recent stents), risk-stratify (Revised Cardiac Risk Index), and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Keep heart rate low-normal and preserve diastolic and coronary perfusion pressure, avoid tachycardia and pressure extremes, and maintain an adequate hematocrit.\n• Treat ischemia actively (nitroglycerin, rate control, correcting the supply–demand imbalance) and use invasive monitoring for high-risk or major surgery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Ischemia, infarction, arrhythmia, and demand-related events under surgical stress."}]},{"id":95,"title":"Coronary Artery Spasm","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Transient coronary vasospasm causing ischemia at rest, potentially triggering arrhythmia or infarction, sometimes with angiographically normal coronaries."},{"h":"Pathophysiology/Background","r":"info","t":"• Endothelial dysfunction drives vasospasm and ischemia; triggers include sympathetic stimulation, hyperventilation and alkalosis, cold, certain drugs, and withdrawal of vasodilators."},{"h":"Worry About","r":"alert","t":"• Perioperative spasm-induced ischemia and arrhythmia, triggers (light anesthesia and sympathetic surges, hyperventilation, cold, alpha-agonists), and continuity of coronary vasodilator therapy."},{"h":"Preoperative Preparation","r":"action","t":"• Continue calcium-channel blockers and nitrates (do not stop abruptly), avoid triggers, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Continue calcium blockers and nitrates and avoid triggers (adequate depth, avoid hyperventilation and alkalosis, keep warm, be cautious with alpha-agonists and beta-blockers, which can unmask spasm); treat spasm with nitroglycerin and calcium blockers and maintain stable hemodynamics."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Spasm and ischemia, arrhythmia, and infarction."}]},{"id":96,"title":"Craniosynostosis","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Premature cranial-suture fusion causing skull deformity and, with multiple sutures, raised intracranial pressure; repair in infancy carries major blood-loss risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Single or multiple suture fusion; syndromic forms (Apert, Crouzon) add midface and airway issues; multi-suture disease raises intracranial pressure, and repair involves significant blood loss and possible venous air embolism."},{"h":"Worry About","r":"alert","t":"• Difficult airway (if syndromic), raised intracranial pressure, major and rapid blood loss during repair, venous air embolism, and infant hypothermia."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and intracranial pressure, type and crossmatch for blood loss, and plan large-bore access, warming, and blood products."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway if syndromic, manage intracranial pressure, and prepare thoroughly for major blood loss (blood available, adequate access, watch for venous air embolism and coagulopathy) with active warming and careful positioning."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Massive blood loss, venous air embolism, raised intracranial pressure, hypothermia, and airway difficulty."}]},{"id":97,"title":"Creutzfeldt-Jakob Disease","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A fatal prion neurodegenerative disease; the key anesthetic concern is preventing prion transmission via instruments."},{"h":"Pathophysiology/Background","r":"info","t":"• A prion-mediated spongiform encephalopathy causing rapidly progressive dementia, myoclonus, and ataxia; prions resist standard sterilization."},{"h":"Worry About","r":"alert","t":"• Prion transmission through contaminated instruments (standard sterilization is insufficient), plus the patient's neurologic decline with aspiration and airway risk."},{"h":"Preoperative Preparation","r":"action","t":"• Follow institutional prion precautions, assess neurologic and bulbar status, and use single-use or disposable equipment where possible."},{"h":"Anesthetic Management","r":"action","t":"• Use disposable equipment and follow strict prion decontamination protocols for anything reusable (or quarantine and destroy it); provide standard supportive anesthesia with aspiration precautions and minimize contact with high-risk CNS tissue."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Instrument transmission risk, aspiration, and neurologic complications."}]},{"id":98,"title":"Crohn Disease","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Chronic transmural inflammatory bowel disease with malnutrition, anemia, and treatment effects; patients often face multiple abdominal surgeries."},{"h":"Pathophysiology/Background","r":"info","t":"• Transmural inflammation anywhere in the gut with strictures, fistulae, and abscesses; malabsorption and malnutrition, anemia, volume and electrolyte disturbance, and extraintestinal manifestations.\n• Patients are often on steroids, immunomodulators, or biologics, with elevated VTE risk."},{"h":"Worry About","r":"alert","t":"• Malnutrition, anemia, and volume and electrolyte depletion; steroid dependence; bowel obstruction and aspiration risk; VTE; and immunosuppression and infection."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize nutrition, volume, electrolytes, and anemia; give stress-dose steroids; assess for obstruction; and provide VTE prophylaxis."},{"h":"Anesthetic Management","r":"action","t":"• Correct volume and electrolytes, give stress-dose steroids, take aspiration precautions if obstructed (rapid-sequence induction), provide VTE prophylaxis, and use multimodal or epidural analgesia (which aids bowel recovery) while being cautious with nephrotoxins."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypovolemia and electrolyte issues, adrenal suppression, VTE, infection, and ileus."}]},{"id":99,"title":"Croup (Laryngotracheobronchitis)","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Viral subglottic airway inflammation in young children producing a barky cough, stridor, and variable airway obstruction."},{"h":"Pathophysiology/Background","r":"info","t":"• Subglottic edema at the narrowest point of the pediatric airway causes inspiratory stridor; it is usually viral and must be distinguished from bacterial epiglottitis. Postintubation croup is a related entity."},{"h":"Worry About","r":"alert","t":"• Airway obstruction from subglottic narrowing, distinguishing it from epiglottitis, the need for a smaller tube to avoid subglottic trauma, and postextubation stridor."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity and treat with humidified oxygen, nebulized epinephrine, and steroids (dexamethasone), avoiding agitation of the child."},{"h":"Anesthetic Management","r":"action","t":"• Use a smaller-than-predicted tube (subglottic narrowing), minimize airway trauma, give dexamethasone and nebulized epinephrine for stridor, monitor for postextubation obstruction, and keep the child calm."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway obstruction, postextubation stridor, and hypoxemia."}]},{"id":100,"title":"Crouzon Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A craniosynostosis syndrome (FGFR2) with midface hypoplasia and proptosis, bringing a difficult airway and possible raised intracranial pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Premature suture fusion with midface hypoplasia (difficult mask and intubation), shallow orbits with proptosis, possible airway narrowing, raised intracranial pressure, obstructive sleep apnea, and occasional cervical spine or cardiac involvement; multiple craniofacial surgeries are typical."},{"h":"Worry About","r":"alert","t":"• Difficult mask ventilation and intubation, raised intracranial pressure, sleep apnea, corneal exposure from proptosis (eye protection), and craniofacial blood loss."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway and intracranial pressure, plan eye protection, and evaluate cardiac and cervical involvement."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (video or fiberoptic tools, oral airway), protect the proptotic eyes carefully, manage intracranial pressure and blood loss, and stay vigilant for postoperative airway obstruction."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway difficulty, raised intracranial pressure, corneal injury, blood loss, and postoperative obstruction."}]},{"id":101,"title":"Cryptococcus Infection","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A fungal infection (Cryptococcus neoformans), notably meningitis in immunocompromised patients, characteristically with raised intracranial pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Cryptococcal meningitis causes raised intracranial pressure (a defining problem managed with drainage), usually in immunocompromised hosts; pulmonary disease also occurs, and patients are on antifungals (amphotericin — nephrotoxicity and electrolyte loss; azoles — interactions)."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure, the immunocompromised host, antifungal toxicities and interactions, and pulmonary involvement."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial pressure and neurologic status, check renal function and electrolytes (amphotericin), note drug interactions, and continue antifungals."},{"h":"Anesthetic Management","r":"action","t":"• Manage raised intracranial pressure, correct amphotericin-related electrolyte disturbances (potassium, magnesium) and protect the kidneys, account for azole interactions, keep strict asepsis, and support the immunocompromised patient."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure, renal and electrolyte issues, drug interactions, and infection."}]},{"id":102,"title":"Cushing Syndrome","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• Cortisol excess (endogenous or exogenous) causing hypertension, hyperglycemia, obesity, and other effects, relevant for perioperative endocrine and comorbidity management."},{"h":"Pathophysiology/Background","r":"info","t":"• Glucocorticoid excess produces central obesity, hypertension, hyperglycemia, hypokalemic metabolic alkalosis, osteoporosis, fragile skin, proximal myopathy, and easy bruising; after tumor removal, adrenal insufficiency may follow."},{"h":"Worry About","r":"alert","t":"• Hypertension and hyperglycemia, hypokalemia and arrhythmia, difficult airway and access (obesity, fragile tissues), positioning injury (osteoporosis, skin), sleep apnea, and postoperative adrenal insufficiency after tumor removal."},{"h":"Preoperative Preparation","r":"action","t":"• Control blood pressure, glucose, and potassium, assess the airway and sleep apnea, and plan steroid replacement for adrenalectomy or pituitary surgery."},{"h":"Anesthetic Management","r":"action","t":"• Position carefully (fragile skin and bones) with airway planning, manage glucose, electrolytes, and blood pressure, provide perioperative steroid coverage for curative tumor surgery while anticipating postoperative adrenal insufficiency, and give VTE prophylaxis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypertension, hyperglycemia, hypokalemia and arrhythmia, postoperative adrenal insufficiency, and positioning or skin injury."}]},{"id":103,"title":"Cystic Fibrosis","cat":"Disease","L":"C","new":true,"sections":[{"h":"Overview","r":"info","t":"• A multisystem genetic disease (CFTR) whose thick secretions cause chronic suppurative lung disease, pancreatic insufficiency, and more; the lungs dominate anesthetic risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Viscous secretions cause bronchiectasis, chronic infection, airflow obstruction, hypoxemia, hemoptysis, and pneumothorax; pancreatic insufficiency brings malnutrition and CF-related diabetes, and hepatobiliary disease and salt loss occur."},{"h":"Worry About","r":"alert","t":"• Secretion burden and mucus plugging, bronchospasm, hypoxemia, pneumothorax and hemoptysis, and poor pulmonary reserve, plus malnutrition and diabetes."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize pulmonary status (physiotherapy, bronchodilators, treat infection), assess pulmonary function, nutrition, and glucose, and plan aggressive secretion management."},{"h":"Anesthetic Management","r":"action","t":"• Provide airway clearance and suctioning, humidification, bronchodilators, and adequate hydration; ventilate carefully (air trapping and pneumothorax risk); favor regional or multimodal analgesia to preserve respiratory function; continue physiotherapy postoperatively and monitor glucose."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Mucus plugging and atelectasis, bronchospasm, pneumothorax, respiratory failure, and hypoxemia."}]},{"id":104,"title":"Dandy-Walker Syndrome","cat":"Disease","L":"D","new":true,"sections":[{"h":"Overview","r":"info","t":"• A congenital malformation of the cerebellum and fourth ventricle with cystic posterior-fossa dilation and hydrocephalus."},{"h":"Pathophysiology/Background","r":"info","t":"• Cerebellar vermis hypoplasia with a cystic fourth ventricle and hydrocephalus that is often shunt-dependent; associated CNS and systemic anomalies and developmental delay are common."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure and shunt malfunction, associated anomalies (including cardiac), and airway, positioning, and communication considerations."},{"h":"Preoperative Preparation","r":"action","t":"• Assess intracranial pressure and shunt function, neurologic status, and associated anomalies."},{"h":"Anesthetic Manageme
