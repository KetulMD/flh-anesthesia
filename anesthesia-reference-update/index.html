ic inflammation and ARDS, hypocalcemia and hyperglycemia, aspiration (ileus), pleural effusions and respiratory compromise, coagulopathy, and sepsis in severe disease."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate fluids aggressively, correct electrolytes (calcium) and glucose, assess respiratory and renal status, take aspiration precautions, and treat the cause and any sepsis."},{"h":"Anesthetic Management","r":"action","t":"• Provide volume resuscitation and hemodynamic support (invasive monitoring in severe cases), correct calcium, glucose, and electrolytes, use rapid-sequence induction, ventilate protectively, provide multimodal analgesia (epidural can help), and manage sepsis with warming."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypovolemic shock, ARDS, hypocalcemia and hyperglycemia, aspiration, and sepsis."}]},{"id":215,"title":"Parkinson Disease (Paralysis Agitans)","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A neurodegenerative disorder with dopaminergic deficiency causing tremor, rigidity, and bradykinesia; anesthetic concerns include medication continuity, aspiration, and autonomic dysfunction."},{"h":"Pathophysiology/Background","r":"info","t":"• Dopamine deficiency causes tremor, rigidity, bradykinesia, and postural instability, with autonomic dysfunction (orthostatic hypotension, dysphagia), a weak cough and restrictive respiration; patients take levodopa/carbidopa, MAO-B inhibitors, dopamine agonists, or amantadine."},{"h":"Worry About","r":"alert","t":"• Withdrawal of anti-Parkinson medications (abrupt cessation causes severe rigidity, akinesia, and aspiration; levodopa is short-acting, so minimize the NPO gap), aspiration from dysphagia, autonomic instability, and respiratory compromise; avoid dopamine antagonists (metoclopramide, droperidol, most antipsychotics) and avoid meperidine with MAO-B inhibitors."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anti-Parkinson medications including the morning of surgery (plan enteral dosing and a short NPO gap), and assess aspiration, autonomic, and respiratory status."},{"h":"Anesthetic Management","r":"action","t":"• Minimize interruption of levodopa (consider timing or NG dosing), avoid dopamine antagonists and meperidine (with selegiline), take aspiration precautions, manage orthostatic hypotension, and watch respiratory function (ondansetron is acceptable for nausea)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Symptom exacerbation from a medication gap, aspiration, autonomic instability, and respiratory issues."}]},{"id":216,"title":"Patent Ductus Arteriosus","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A persistent fetal ductus arteriosus creating a left-to-right shunt from aorta to pulmonary artery, ranging from silent to significant pulmonary overcirculation and heart failure."},{"h":"Pathophysiology/Background","r":"info","t":"• The ductal shunt causes pulmonary overcirculation and left-ventricular volume overload with heart failure; a large or long-standing shunt can cause pulmonary hypertension and reversal (Eisenmenger). It is common in premature infants and may present for closure."},{"h":"Worry About","r":"alert","t":"• Pulmonary overcirculation and heart failure, pulmonary hypertension in a large or long-standing shunt, paradoxical air embolism (de-air lines), and endocarditis prophylaxis, plus prematurity issues in preterm infants."},{"h":"Preoperative Preparation","r":"action","t":"• Assess shunt size, pulmonary pressures, and ventricular function (echo), de-air lines, and provide endocarditis prophylaxis where indicated."},{"h":"Anesthetic Management","r":"action","t":"• Balance systemic and pulmonary resistance to control the shunt (avoid excessive drops in pulmonary resistance in significant shunts and avoid dangerous rises if pulmonary hypertension is present), support ventricular function, and de-air lines; for ligation, watch for hemodynamic changes at clamping and great-vessel injury."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Heart failure, pulmonary hypertension, paradoxical embolism, and hemodynamic events at closure."}]},{"id":217,"title":"Pemphigus","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An autoimmune blistering disease with intraepidermal bullae of skin and mucous membranes (including the mouth and airway); the anesthetic priority is avoiding shear trauma and managing airway involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Antibodies against desmosomes cause flaccid intraepidermal blisters and a positive Nikolsky sign (shear creates new blisters), with painful oral and mucosal erosions, fluid and protein loss, and infection risk; patients are often on steroids or immunosuppression."},{"h":"Worry About","r":"alert","t":"• Blistering from friction and shear (avoid tape and trauma), airway and oral mucosal involvement (laryngoscopy causes blisters and bleeding; possible difficult airway), fluid and electrolyte loss and infection, and steroid dependence."},{"h":"Preoperative Preparation","r":"action","t":"• Assess airway and oral involvement, skin, and fluid, electrolyte, and nutritional status, provide steroid coverage, and plan an atraumatic technique."},{"h":"Anesthetic Management","r":"action","t":"• Avoid friction and shear (no adhesive tape; lubricate and pad; secure lines and tubes atraumatically), manage the airway gently with lubrication and a smaller tube, give stress-dose steroids, manage fluids and electrolytes, and keep strict asepsis."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• New blistering, airway bleeding or compromise, infection, and fluid and electrolyte issues."}]},{"id":218,"title":"Pericardial Effusion","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Fluid in the pericardium; the concern is progression to tamponade physiology (impaired filling), which depends on the rate of accumulation."},{"h":"Pathophysiology/Background","r":"info","t":"• A rising pericardial pressure impairs diastolic filling and produces tamponade physiology (preload-dependent, low output); slow effusions can be large without tamponade, while rapid small ones can cause it."},{"h":"Worry About","r":"alert","t":"• Tamponade physiology and cardiovascular collapse on induction (loss of sympathetic tone and positive-pressure ventilation reduce filling), and distinguishing a stable effusion from tamponade."},{"h":"Preoperative Preparation","r":"action","t":"• Use echo to assess size and tamponade physiology, drain a significant effusion before or under local anesthesia, and keep the patient full, fast, and tight."},{"h":"Anesthetic Management","r":"action","t":"• For significant effusion or tamponade physiology, drain before induction (under local if possible), maintain preload, heart rate, contractility, and afterload, use a ketamine-based induction with spontaneous ventilation, and apply positive pressure cautiously; small stable effusions receive standard care with vigilance."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Tamponade and collapse at induction, arrest, and the need for drainage."}]},{"id":219,"title":"Peripheral Vascular Disease","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Atherosclerotic disease of the peripheral (usually lower-limb) arteries — a marker of systemic atherosclerosis with high coexisting coronary and cerebrovascular risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Peripheral arterial stenosis causes claudication or critical limb ischemia and strongly associates with coronary and cerebrovascular disease, diabetes, hypertension, and smoking; patients often present for revascularization or amputation."},{"h":"Worry About","r":"alert","t":"• Coexisting coronary and cerebrovascular disease (high cardiac risk), diabetes and renal issues, limb perfusion and positioning, and hemodynamic management for vascular surgery."},{"h":"Preoperative Preparation","r":"action","t":"• Assess coronary and cerebrovascular status and diabetes and renal function, continue statins and antiplatelets, optimize, and plan analgesia (regional is often used)."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a high cardiac-risk patient (maintain stability and coronary perfusion, avoid tachycardia), protect the kidneys, pad ischemic limbs carefully, use regional or neuraxial where anticoagulation permits (analgesia and graft patency), and manage clamp and unclamp hemodynamics."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Myocardial ischemia, stroke, renal dysfunction, and limb or graft issues."}]},{"id":220,"title":"Pertussis (Whooping Cough)","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A bacterial respiratory infection (Bordetella pertussis) with severe paroxysmal cough, most dangerous in infants (apnea, severe disease), with airway reactivity and transmission concerns."},{"h":"Pathophysiology/Background","r":"info","t":"• Paroxysmal coughing fits with an inspiratory whoop, post-tussive vomiting, and apnea (especially in infants) can progress to pneumonia and, in severe infant disease, pulmonary hypertension; it is highly contagious."},{"h":"Worry About","r":"alert","t":"• Severe cough paroxysms and airway reactivity (laryngospasm, bronchospasm), apnea in infants, post-tussive vomiting and aspiration, severe infant disease with pulmonary hypertension, and transmission; defer elective surgery."},{"h":"Preoperative Preparation","r":"action","t":"• Defer elective surgery in active disease, assess respiratory status, apply infection precautions, and treat with antibiotics."},{"h":"Anesthetic Management","r":"action","t":"• Defer elective surgery until treated; if urgent, deepen anesthesia before airway manipulation (reduce cough and laryngospasm), take aspiration precautions, manage bronchospasm, monitor respiration (infant apnea), and observe infection precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Laryngospasm and bronchospasm, infant apnea, aspiration, and respiratory failure."}]},{"id":221,"title":"Pheochromocytoma","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A catecholamine-secreting tumor (usually adrenal) causing paroxysmal hypertension; the anesthetic dangers are a hypertensive crisis and, after resection, profound hypotension."},{"h":"Pathophysiology/Background","r":"info","t":"• Excess catecholamines cause episodic severe hypertension, tachyarrhythmia, headache, and sweating, and chronic excess causes cardiomyopathy and volume contraction; tumor manipulation triggers surges, and after removal catecholamines fall abruptly. MEN2, VHL, and NF1 associations exist."},{"h":"Worry About","r":"alert","t":"• Hypertensive crisis (manipulation, intubation, stress — with stroke, infarction, or pulmonary edema), arrhythmias, catecholamine cardiomyopathy, and post-resection hypotension (loss of catecholamines plus residual alpha-blockade and volume contraction), with post-resection hypoglycemia."},{"h":"Preoperative Preparation","r":"action","t":"• Establish adequate alpha-blockade (phenoxybenzamine or doxazosin) over roughly 1–2 weeks to control blood pressure and re-expand volume, then add beta-blockade if needed (never beta before alpha — unopposed alpha causes crisis), with liberal salt and fluid and assessment of cardiomyopathy and blockade adequacy."},{"h":"Anesthetic Management","r":"action","t":"• Ensure adequate alpha-blockade and volume expansion, avoid triggers of catecholamine release (histamine releasers, indirect sympathomimetics, light anesthesia), and have short-acting titratable agents ready for crises (phenylephrine, nitroprusside, or nicardipine for hypertension, esmolol for tachycardia, magnesium).\n• Use invasive monitoring; after vein ligation, treat profound hypotension with fluids and vasopressors (norepinephrine) and stop antihypertensives, watching for hypoglycemia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypertensive crisis, arrhythmia, post-resection hypotension, hypoglycemia, and cardiomyopathy."}]},{"id":222,"title":"Pickwickian Syndrome","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Obesity hypoventilation syndrome — severe obesity with chronic hypoventilation (daytime hypercapnia), hypoxemia, and often sleep apnea and pulmonary hypertension."},{"h":"Pathophysiology/Background","r":"info","t":"• Obesity causes chronic alveolar hypoventilation with daytime hypercapnia (blunted CO₂ response), hypoxemia, polycythemia, obstructive sleep apnea, and pulmonary hypertension with right-heart failure; functional residual capacity is reduced with rapid desaturation and a difficult airway."},{"h":"Worry About","r":"alert","t":"• Difficult airway and rapid desaturation, chronic hypercapnia with a blunted drive (extreme sensitivity to sedatives and opioids), sleep apnea, pulmonary hypertension and cor pulmonale, postoperative respiratory failure, and positioning."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory status (blood gas for hypercapnia), sleep apnea and CPAP use, and pulmonary hypertension and right-ventricular function, and plan ramped positioning and postoperative respiratory support."},{"h":"Anesthetic Management","r":"action","t":"• Ramp and preoxygenate, prepare for a difficult airway, minimize opioids and sedatives (multimodal, regional), avoid raising pulmonary vascular resistance and support the right ventricle, extubate awake and upright, and plan postoperative CPAP and monitoring."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, postoperative respiratory failure, right-ventricular failure, and opioid and sedative sensitivity."}]},{"id":223,"title":"Pituitary Tumors","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Tumors of the pituitary with effects from hormone secretion or deficiency and from mass effect; anesthetic concerns depend on the hormonal syndrome and on transsphenoidal surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Functioning tumors cause acromegaly (growth hormone), Cushing disease (ACTH), or prolactinoma, while non-functioning tumors cause mass effect and hypopituitarism; mass effect brings visual field defects, raised intracranial pressure, and deficiencies of cortisol, thyroid, and ADH, and resection is often transsphenoidal."},{"h":"Worry About","r":"alert","t":"• The hormonal syndrome (acromegaly gives a difficult airway; Cushing gives hypertension and hyperglycemia), hypopituitarism (adrenal insufficiency needing steroids, hypothyroidism, postoperative diabetes insipidus), raised intracranial pressure, and transsphenoidal considerations (shared airway, bleeding, CSF leak, venous air embolism)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess hormonal status (cortisol for steroid coverage, thyroid, glucose), the acromegaly airway, and vision and intracranial pressure, and plan for transsphenoidal surgery (positioning, throat pack, diabetes-insipidus monitoring)."},{"h":"Anesthetic Management","r":"action","t":"• Manage the specific hormonal syndrome (difficult airway in acromegaly, Cushing issues) and give stress-dose steroids for hypopituitarism; for transsphenoidal surgery secure the shared airway (oral RAE tube, throat pack), keep hemodynamics smooth, watch for bleeding and venous air embolism, monitor for postoperative diabetes insipidus (sodium, urine output), and emerge smoothly to avoid CSF leak."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway in acromegaly, adrenal insufficiency, postoperative diabetes insipidus, and bleeding or CSF leak."}]},{"id":224,"title":"Plagiocephaly","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An asymmetric head shape, either positional (benign) or from craniosynostosis; anesthetic relevance depends on which it is."},{"h":"Pathophysiology/Background","r":"info","t":"• Positional plagiocephaly is benign flattening with no anesthetic implications, whereas synostotic plagiocephaly reflects premature suture fusion that may need surgery with blood-loss and intracranial-pressure concerns and can be syndromic."},{"h":"Worry About","r":"alert","t":"• For synostotic or surgical cases, blood loss and venous air embolism during cranial surgery, raised intracranial pressure with multiple sutures, and a possible syndromic difficult airway; positional plagiocephaly has minimal implications."},{"h":"Preoperative Preparation","r":"action","t":"• Distinguish positional from synostotic disease and, for surgical cases, assess as craniosynostosis (airway, intracranial pressure, blood-loss planning) with infant considerations."},{"h":"Anesthetic Management","r":"action","t":"• Positional disease needs only routine care; synostotic surgery requires preparation for major blood loss (access, blood, warming), venous-air-embolism monitoring, intracranial-pressure management, a difficult-airway plan if syndromic, and careful positioning with infant temperature and glucose control."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• In surgical cases, blood loss, venous air embolism, raised intracranial pressure, and airway difficulty; minimal concerns in positional disease."}]},{"id":225,"title":"Pneumonia, Community-Acquired","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An acute lung infection causing impaired gas exchange and systemic illness; elective surgery is generally deferred until treated."},{"h":"Pathophysiology/Background","r":"info","t":"• Infection causes consolidation, hypoxemia, cough and secretions, possible sepsis, and pleural effusion, with airway reactivity and systemic effects."},{"h":"Worry About","r":"alert","t":"• Hypoxemia and impaired gas exchange, secretions and airway reactivity (bronchospasm, laryngospasm), sepsis, and postoperative pulmonary complications; defer elective surgery until improved."},{"h":"Preoperative Preparation","r":"action","t":"• Defer elective surgery until treated, assess respiratory status and oxygenation, treat the infection, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• For urgent surgery, optimize oxygenation, manage secretions and airway reactivity (bronchodilators, deep anesthesia before manipulation), ventilate protectively, manage sepsis, and plan postoperative respiratory support."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia, bronchospasm, sepsis, and postoperative respiratory complications."}]},{"id":226,"title":"Poliomyelitis","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A viral disease causing motor-neuron destruction and paralysis; anesthetic relevance arises from residual or post-polio weakness, respiratory compromise, and bulbar involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Anterior horn cell destruction causes asymmetric flaccid paralysis with residual weakness and atrophy, and post-polio syndrome brings new weakness decades later; respiratory-muscle weakness and restrictive disease, bulbar involvement, scoliosis, and temperature dysregulation occur, and the muscle is denervated."},{"h":"Worry About","r":"alert","t":"• Respiratory-muscle weakness and restrictive disease (postoperative ventilation), bulbar dysfunction and aspiration, sensitivity to respiratory depressants and nondepolarizers, succinylcholine hyperkalemia risk (denervation — avoid), and temperature dysregulation."},{"h":"Preoperative Preparation","r":"action","t":"• Assess baseline respiratory and bulbar function, document deficits, anticipate postoperative ventilation, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine (denervation), use reduced-dose nondepolarizers with monitoring (sugammadex), minimize respiratory depressants (regional and multimodal), take aspiration precautions, maintain temperature, and anticipate postoperative respiratory support."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, aspiration, hyperkalemia with succinylcholine, prolonged weakness, and temperature instability."}]},{"id":227,"title":"Polymyositis","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An autoimmune inflammatory myopathy with proximal muscle weakness; relevance arises from muscle and respiratory weakness, possible cardiopulmonary involvement, and steroid therapy."},{"h":"Pathophysiology/Background","r":"info","t":"• Immune-mediated muscle inflammation causes proximal weakness with possible bulbar (dysphagia, aspiration) and respiratory-muscle involvement, interstitial lung disease, and myocarditis or conduction disease; patients are often on steroids, and the dermatomyositis variant associates with malignancy."},{"h":"Worry About","r":"alert","t":"• Respiratory-muscle weakness, bulbar dysfunction and aspiration, interstitial lung disease, cardiac involvement (arrhythmia, conduction disease, myocarditis), steroid dependence, and variable relaxant sensitivity; succinylcholine is often avoided (myopathic hyperkalemia)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory function, bulbar and aspiration risk, cardiac status (ECG, echo), and interstitial lung disease, provide steroid coverage, and document weakness."},{"h":"Anesthetic Management","r":"action","t":"• Take aspiration precautions, monitor nondepolarizers (variable sensitivity, reduced doses, sugammadex) and generally avoid succinylcholine, use lung-protective ventilation, manage cardiac involvement, give stress-dose steroids, and anticipate postoperative respiratory support."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, aspiration, arrhythmia, and prolonged weakness."}]},{"id":228,"title":"Pompe Disease","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A lysosomal glycogen storage disorder (acid maltase deficiency) causing progressive muscle weakness and, in the infantile form, severe cardiomyopathy — a high-risk anesthetic condition."},{"h":"Pathophysiology/Background","r":"info","t":"• Deficient acid alpha-glucosidase lets glycogen accumulate in muscle, causing skeletal and respiratory weakness; the infantile form adds profound hypertrophic cardiomyopathy (outflow obstruction, arrhythmia, sudden death) and macroglossia, while the late-onset form is mainly muscular and respiratory. Patients are on enzyme replacement."},{"h":"Worry About","r":"alert","t":"• Severe cardiomyopathy in the infantile form (behaves like hypertrophic obstructive cardiomyopathy with high anesthetic mortality), arrhythmia and sudden death, respiratory-muscle failure, a difficult airway (macroglossia), and succinylcholine hyperkalemia (avoid)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess cardiac status (echo, ECG for cardiomyopathy and obstruction), respiratory function, and the airway, anticipate very high risk in the infantile form, and continue enzyme replacement."},{"h":"Anesthetic Management","r":"action","t":"• In the infantile form manage like hypertrophic obstructive cardiomyopathy (maintain preload and afterload, avoid tachycardia and increased contractility, use phenylephrine for hypotension) with extreme caution given arrest and sudden-death risk, avoid succinylcholine, monitor relaxants, and support respiration with postoperative ventilation anticipated."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac arrest and arrhythmia (infantile), respiratory failure, difficult airway, and prolonged weakness."}]},{"id":229,"title":"Portal Hypertension","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated portal venous pressure (usually from cirrhosis) with varices, ascites, coagulopathy, and a hyperdynamic circulation — a high perioperative risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Raised portal pressure causes esophageal and gastric varices, ascites, splenomegaly with thrombocytopenia, hepatic dysfunction (coagulopathy, encephalopathy, altered drug handling), a hyperdynamic low-resistance circulation, and hepatopulmonary and hepatorenal risks."},{"h":"Worry About","r":"alert","t":"• Variceal hemorrhage, coagulopathy and thrombocytopenia, ascites (aspiration and respiratory compromise), hepatic dysfunction and encephalopathy, the low-resistance hyperdynamic state, hepatorenal risk, and portopulmonary hypertension."},{"h":"Preoperative Preparation","r":"action","t":"• Assess hepatic function (MELD, Child-Pugh), coagulation and platelets, varices, ascites, renal function, and encephalopathy, correct coagulopathy, take aspiration precautions, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Correct coagulopathy before procedures and regional techniques, use rapid-sequence induction (ascites), choose hepatically-sparing drugs at reduced doses, protect the kidneys, manage the hyperdynamic circulation and varices, and keep large-bore access and blood available."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Variceal hemorrhage, coagulopathy and bleeding, encephalopathy, renal failure, and hemodynamic instability."}]},{"id":230,"title":"Posttransplant Lymphoproliferative Disorder","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A lymphoid proliferation (often EBV-driven) in immunosuppressed transplant patients, ranging from benign to aggressive lymphoma; considerations include the transplant, immunosuppression, and mass effects."},{"h":"Pathophysiology/Background","r":"info","t":"• Immunosuppression-related lymphoproliferation can form masses (mediastinal, airway, abdominal), involve organs, and cause cytopenias, against the background of a transplanted organ and its immunosuppression and treatment (reduced immunosuppression, rituximab, chemotherapy)."},{"h":"Worry About","r":"alert","t":"• Mediastinal or airway masses (compression), the transplanted organ (graft function, immunosuppression, infection), cytopenias and bleeding, chemotherapy effects, and immunosuppression."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for a mediastinal or airway mass (imaging), graft function, counts, and chemotherapy effects, manage immunosuppression, and provide steroid coverage."},{"h":"Anesthetic Management","r":"action","t":"• Manage any mediastinal mass accordingly (spontaneous ventilation, positioning, backup), protect graft function, keep strict asepsis, continue immunosuppression and stress-dose steroids, manage cytopenias, and account for chemotherapy toxicities."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway or mediastinal compression, graft dysfunction, infection, and bleeding."}]},{"id":231,"title":"Preeclampsia","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A pregnancy-specific multisystem disorder with hypertension and organ dysfunction after 20 weeks, risking seizures (eclampsia), stroke, and severe complications; delivery is definitive treatment."},{"h":"Pathophysiology/Background","r":"info","t":"• Placental dysfunction causes widespread endothelial dysfunction, vasospasm, hypertension, and proteinuria; severe features include cerebral events (headache, seizures, stroke), pulmonary edema, hepatic involvement (HELLP, rupture), renal impairment, and thrombocytopenia."},{"h":"Worry About","r":"alert","t":"• Severe hypertension and stroke, seizures and eclampsia, airway edema (difficult airway), pulmonary edema, thrombocytopenia and coagulopathy (neuraxial threshold), HELLP, magnesium effects (potentiates blockade, toxicity), and aspiration."},{"h":"Preoperative Preparation","r":"action","t":"• Control blood pressure (labetalol, hydralazine, nicardipine), give magnesium for seizure prophylaxis, assess platelets, coagulation, and hepatic and renal function and the airway, and plan delivery while monitoring the magnesium level."},{"h":"Anesthetic Management","r":"action","t":"• Prefer neuraxial anesthesia for delivery when platelets are adequate (it also controls blood pressure); if general anesthesia is needed, blunt the hypertensive response to laryngoscopy (stroke risk) and anticipate a difficult airway (edema, smaller tube).\n• Manage magnesium (reduce relaxants, watch toxicity), control blood pressure, avoid ergometrine, and manage pulmonary edema and fluids carefully with aspiration precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Stroke or seizure, difficult airway, pulmonary edema, coagulopathy, magnesium toxicity, and hemorrhage."}]},{"id":232,"title":"Pregnancy, Ectopic","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Implantation outside the uterus (usually tubal) with a risk of rupture and hemorrhagic shock — often an emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Ectopic implantation can rupture, causing intra-abdominal hemorrhage and hypovolemic shock, in the context of early-pregnancy physiology and aspiration risk, with emergency surgery required."},{"h":"Worry About","r":"alert","t":"• Hemorrhagic shock from rupture, aspiration (pregnancy), rapid deterioration, and hemodynamic collapse on induction in the hypovolemic patient."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate (large-bore access, fluids and blood), type and crossmatch, take aspiration precautions, and assess volume status."},{"h":"Anesthetic Management","r":"action","t":"• Resuscitate with blood and fluids, use rapid-sequence induction with aspiration precautions, induce carefully in the hypovolemic patient (reduced doses, ketamine or etomidate), maintain perfusion, and be ready for major hemorrhage on abdominal entry with blood available."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemorrhagic shock, aspiration, and hemodynamic collapse."}]},{"id":233,"title":"Pregnancy, Maternal Physiology","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• The physiologic changes of pregnancy affecting nearly every system, which shape anesthetic management — airway, aspiration, cardiovascular, respiratory, and pharmacologic."},{"h":"Pathophysiology/Background","r":"info","t":"• Cardiovascular: increased output and blood volume, reduced resistance, and supine aortocaval compression. Respiratory: higher oxygen consumption and lower functional residual capacity (rapid desaturation) with a compensated respiratory alkalosis. Airway: edema and friable mucosa (difficult airway). GI: delayed emptying and reduced sphincter tone (aspiration risk). Anesthetic requirements and neuraxial sensitivity are increased."},{"h":"Worry About","r":"alert","t":"• Difficult airway and rapid desaturation, aspiration risk, aortocaval compression (left uterine displacement), reduced anesthetic requirements, hypercoagulability (VTE), and fetal effects — two patients at once."},{"h":"Preoperative Preparation","r":"action","t":"• Apply left uterine displacement, aspiration prophylaxis, and a difficult-airway plan with good preoxygenation, consider fetal wellbeing, and provide VTE prophylaxis."},{"h":"Anesthetic Management","r":"action","t":"• Maintain left uterine displacement, take aspiration precautions (rapid-sequence induction), prepare for a difficult airway (smaller tube, ramped position, preoxygenate), reduce anesthetic and neuraxial doses, maintain maternal blood pressure and uteroplacental perfusion (treat hypotension with phenylephrine or ephedrine and fluids), and consider fetal drug effects."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway and hypoxemia, aspiration, hypotension from aortocaval compression, and VTE."}]},{"id":234,"title":"Pregnancy-Induced Hypertension","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• New (gestational) hypertension in pregnancy without the organ dysfunction of preeclampsia; the concern is progression."},{"h":"Pathophysiology/Background","r":"info","t":"• New-onset hypertension after 20 weeks without proteinuria or severe features distinguishes it from preeclampsia, but it can progress and requires blood-pressure monitoring and control."},{"h":"Worry About","r":"alert","t":"• Progression to preeclampsia or eclampsia, hypertensive effects, and standard pregnancy considerations (airway, aspiration, aortocaval compression)."},{"h":"Preoperative Preparation","r":"action","t":"• Control blood pressure and monitor for preeclampsia features (proteinuria, symptoms, labs) with a standard obstetric assessment."},{"h":"Anesthetic Management","r":"action","t":"• Control blood pressure, use neuraxial anesthesia where appropriate (it also aids control) absent coagulopathy, apply standard pregnancy precautions, watch for progression to preeclampsia, and avoid ergometrine."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Progression to preeclampsia, hypertensive effects, and standard obstetric risks."}]},{"id":235,"title":"Protein C Deficiency","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited thrombophilia (deficient protein C, a natural anticoagulant) increasing venous thromboembolism risk, with a risk of warfarin-induced skin necrosis."},{"h":"Pathophysiology/Background","r":"info","t":"• Protein C inactivates factors Va and VIIIa; deficiency causes a hypercoagulable state with recurrent VTE, and starting warfarin can cause skin necrosis (protein C falls first); the homozygous form causes neonatal purpura fulminans."},{"h":"Worry About","r":"alert","t":"• Perioperative VTE, warfarin-induced skin necrosis (bridge with heparin), and balancing prophylaxis against bleeding."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the thrombotic history, plan VTE prophylaxis and anticoagulation with hematology (heparin bridging when starting warfarin), and observe ASRA timing for neuraxial."},{"h":"Anesthetic Management","r":"action","t":"• Provide aggressive VTE prophylaxis (mechanical and pharmacologic), avoid stasis and dehydration, manage anticoagulation (heparin bridge to prevent skin necrosis), and follow ASRA timing for neuraxial techniques."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• VTE, warfarin skin necrosis, and the bleeding-versus-thrombosis balance."}]},{"id":236,"title":"Pulmonary Embolism","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Obstruction of the pulmonary arteries by thrombus (or other embolus) causing acute right-heart strain, hypoxemia, and potential collapse; massive PE is an emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• An embolus raises pulmonary vascular resistance, straining the right ventricle and causing hypoxemia and reduced left-heart output; massive PE causes obstructive shock or arrest, and intraoperative PE presents with a sudden fall in end-tidal CO₂, hypoxemia, and hypotension."},{"h":"Worry About","r":"alert","t":"• Right-ventricular failure and obstructive shock (massive PE), hypoxemia, sudden intraoperative PE, and anticoagulation management (bleeding versus thrombosis)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess right-ventricular function and severity and the anticoagulation plan; for known PE, provide hemodynamic support and consider an IVC filter or intervention, and risk-stratify."},{"h":"Anesthetic Management","r":"action","t":"• Support the right ventricle (avoid raising pulmonary resistance — oxygenation, normocarbia, avoid acidosis; maintain systemic pressure with vasopressors for coronary perfusion; inotropes; pulmonary vasodilators), maintain preload cautiously, and treat hypoxemia; for intraoperative PE, resuscitate and consider thrombolysis, embolectomy, or ECMO for massive PE."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Right-ventricular failure and obstructive shock, hypoxemia, arrest in massive PE, and anticoagulation issues."}]},{"id":237,"title":"Pulmonary Hypertension","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• Elevated pulmonary arterial pressure straining the right ventricle — among the highest-risk anesthetic conditions, with risk of pulmonary hypertensive crisis and right-ventricular failure."},{"h":"Pathophysiology/Background","r":"info","t":"• Elevated pulmonary pressures (idiopathic, left-heart, lung disease, or chronic thromboembolic) cause right-ventricular pressure overload, hypertrophy, and failure; the right ventricle tolerates further afterload poorly, and systemic hypotension reduces its coronary perfusion in a death spiral."},{"h":"Worry About","r":"alert","t":"• Pulmonary hypertensive crisis (acute rise in resistance causing right-ventricular collapse) triggered by hypoxia, hypercarbia, acidosis, cold, pain, high airway pressures, or nitrous oxide, right-ventricular failure, and systemic hypotension; perioperative mortality is high."},{"h":"Preoperative Preparation","r":"action","t":"• Assess severity and right-ventricular function (echo, catheterization) and the cause, continue pulmonary vasodilator therapy (do not stop it), optimize, plan invasive monitoring, and consider high-risk referral."},{"h":"Anesthetic Management","r":"action","t":"• Avoid all triggers of raised resistance (maintain oxygenation and normocarbia, avoid acidosis, cold, and nitrous oxide, ensure adequate depth, ventilate at low pressures), maintain systemic pressure with vasopressors (norepinephrine, vasopressin) to preserve right-ventricular coronary perfusion, and support the right ventricle with inotropes.\n• Continue pulmonary vasodilators (add inhaled nitric oxide or epoprostenol for crisis), maintain preload carefully, use invasive monitoring, and consider regional to avoid general-anesthesia risks."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pulmonary hypertensive crisis, right-ventricular failure, systemic hypotension, and arrest."}]},{"id":238,"title":"Purpura, Thrombotic Thrombocytopenic","cat":"Disease","L":"P","new":true,"sections":[{"h":"Overview","r":"info","t":"• A thrombotic microangiopathy (ADAMTS13 deficiency) with microvascular thrombosis, thrombocytopenia, hemolysis, and organ ischemia — a hematologic emergency treated with plasma exchange."},{"h":"Pathophysiology/Background","r":"info","t":"• Deficient ADAMTS13 leaves large von Willebrand multimers that form platelet microthrombi, causing thrombocytopenia, microangiopathic hemolytic anemia, and organ ischemia (neurologic, renal, cardiac); urgent plasma exchange is the treatment, and platelet transfusion is generally avoided as it can worsen thrombosis."},{"h":"Worry About","r":"alert","t":"• Thrombocytopenia with thrombosis rather than bleeding (avoid platelet transfusion unless life-threatening hemorrhage), organ ischemia, hemolysis and anemia, and plasma-exchange effects (lowered pseudocholinesterase, coagulation and electrolyte changes); defer elective surgery."},{"h":"Preoperative Preparation","r":"action","t":"• Ensure urgent plasma exchange, assess organ involvement and anemia, avoid platelet transfusion unless there is life-threatening bleeding, coordinate with hematology, and defer elective surgery."},{"h":"Anesthetic Management","r":"action","t":"• Support organ perfusion, manage anemia with red cells, avoid platelet transfusion unless life-threatening hemorrhage, account for plasma-exchange effects (prolonged succinylcholine, coagulation and electrolyte changes), treat neuraxial as risky given thrombocytopenia, and manage neurologic, renal, and cardiac involvement."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Thrombosis and organ ischemia, hemolysis and anemia, treatment complications, and prolonged succinylcholine."}]},{"id":239,"title":"Q Fever","cat":"Disease","L":"Q","new":true,"sections":[{"h":"Overview","r":"info","t":"• A zoonotic infection (Coxiella burnetii) that is usually a self-limited acute illness but can cause chronic endocarditis — the feature of greatest anesthetic relevance."},{"h":"Pathophysiology/Background","r":"info","t":"• Acute Q fever causes a flu-like illness, atypical pneumonia, and hepatitis, while chronic Q fever causes culture-negative endocarditis (often on abnormal or prosthetic valves); it is acquired by aerosol from livestock and is highly infectious."},{"h":"Worry About","r":"alert","t":"• Chronic endocarditis with valve dysfunction and heart failure, acute pneumonia or hepatitis, and transmission (respiratory precautions, protection of pregnant staff)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess for endocarditis and valve disease (echo) and for pneumonia or hepatic involvement, continue antibiotics, and apply infection precautions."},{"h":"Anesthetic Management","r":"action","t":"• Manage any valve lesion and heart failure appropriately, account for hepatic dysfunction in drug choice, optimize respiratory status if pneumonia is present, and observe infection precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Valve dysfunction and heart failure, respiratory or hepatic compromise, and transmission risk."}]},{"id":240,"title":"Reflex Sympathetic Dystrophy (Complex Regional Pain Syndrome)","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic neuropathic pain disorder of a limb with disproportionate pain, allodynia, and autonomic and trophic changes, often after injury or surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Disordered pain processing and sympathetic involvement cause burning pain, allodynia and hyperalgesia, swelling, temperature and color changes, and later trophic and motor changes; treatment includes sympathetic and regional blocks, physical therapy, and agents such as ketamine."},{"h":"Worry About","r":"alert","t":"• Flare or spread of pain from stimulation of the affected limb, chronic pain and opioid tolerance, and the need to protect the affected limb (avoid blood-pressure cuffs, lines, and venipuncture there)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the affected limb, pain regimen, and opioid use, plan to protect the limb, and consider regional or sympathetic blockade that may prevent perioperative flares."},{"h":"Anesthetic Management","r":"action","t":"• Avoid instrumentation of the affected limb, provide multimodal analgesia accounting for opioid tolerance (ketamine can help), consider regional anesthesia to prevent flares, and position and handle the limb gently."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Pain flare or spread, inadequate analgesia from opioid tolerance, and limb injury."}]},{"id":241,"title":"Renal Failure, Acute","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• A rapid decline in kidney function causing fluid, electrolyte, acid-base, and uremic disturbances and impaired drug clearance — a high-risk perioperative state."},{"h":"Pathophysiology/Background","r":"info","t":"• Prerenal, intrinsic, or postrenal injury impairs filtration, causing hyperkalemia, volume overload or depletion, metabolic acidosis, uremia (platelet dysfunction, altered mentation), and accumulation of renally-cleared drugs; the cause guides management."},{"h":"Worry About","r":"alert","t":"• Hyperkalemia (arrhythmia), volume and acid-base disturbance, uremic platelet dysfunction (bleeding), accumulation of renally-cleared drugs, and worsening injury from hypotension or nephrotoxins."},{"h":"Preoperative Preparation","r":"action","t":"• Treat hyperkalemia and correct volume and acid-base status, assess the cause, consider dialysis for severe derangement, avoid nephrotoxins, and adjust drug doses."},{"h":"Anesthetic Management","r":"action","t":"• Maintain renal perfusion (avoid hypotension and nephrotoxins), treat hyperkalemia and avoid succinylcholine if potassium is elevated, favor organ-independent drugs (cisatracurium), adjust doses of renally-cleared agents, manage fluids and acid-base carefully, and account for uremic bleeding."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hyperkalemic arrhythmia, volume and acid-base derangement, bleeding, and prolonged drug effect."}]},{"id":242,"title":"Renal Failure, Chronic","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• Sustained loss of glomerular filtration with disturbances of volume, potassium, acid–base balance, anemia, platelet function, and drug clearance."},{"h":"Worry About","r":"alert","t":"• Hyperkalemia — a real risk with succinylcholine when potassium is already elevated.\n• Volume overload and pulmonary edema, and, conversely, hypotension after aggressive dialysis.\n• Uremic platelet dysfunction and accumulation of renally-cleared drugs and active metabolites."},{"h":"Preoperative Preparation","r":"action","t":"• Check a recent potassium and coordinate dialysis timing — ideally dialyzed within about a day of surgery, but not immediately beforehand to avoid hypovolemia and electrolyte shifts.\n• Avoid nephrotoxins and protect any arteriovenous fistula (no lines or cuffs on that arm)."},{"h":"Anesthetic Management","r":"action","t":"• Limit drugs with active renally-cleared metabolites (for example morphine and meperidine); cisatracurium is attractive because its elimination is organ-independent.\n• Titrate fluids carefully and monitor potassium and glucose."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hyperkalemia and arrhythmia, volume mismanagement, and prolonged effect of renally-eliminated agents."}]},{"id":243,"title":"Reye Syndrome","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• An acute childhood encephalopathy with hepatic dysfunction, classically after a viral illness treated with aspirin; raised intracranial pressure is the main threat."},{"h":"Pathophysiology/Background","r":"info","t":"• Mitochondrial injury causes acute non-inflammatory encephalopathy with cerebral edema and hepatic dysfunction (hyperammonemia, coagulopathy, hypoglycemia); raised intracranial pressure is the leading cause of death."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure and cerebral edema, hepatic failure with coagulopathy, hypoglycemia, and hyperammonemia, plus electrolyte disturbance."},{"h":"Preoperative Preparation","r":"action","t":"• Manage intracranial pressure, correct coagulopathy and glucose, assess hepatic and neurologic status, and provide intensive supportive care."},{"h":"Anesthetic Management","r":"action","t":"• Control intracranial pressure (avoid factors that raise it), manage hepatic dysfunction with hepatically-sparing drugs at reduced doses, maintain glucose, correct coagulopathy, and support the patient with ICU continuity."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Raised intracranial pressure, hepatic failure and coagulopathy, hypoglycemia, and hyperammonemia."}]},{"id":244,"title":"Rheumatoid Arthritis","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• A systemic autoimmune disease whose greatest anesthetic concern is the airway — cervical instability, cricoarytenoid arthritis, and limited mouth opening — alongside multi-system involvement."},{"h":"Pathophysiology/Background","r":"info","t":"• Chronic inflammatory arthritis causes atlantoaxial instability (subluxation risk with intubation and positioning), cricoarytenoid arthritis (hoarseness, airway narrowing), and TMJ involvement, plus cardiac (pericardial effusion, valve disease), pulmonary (interstitial disease, nodules, effusion), anemia, and renal effects, with immunosuppressive and steroid therapy."},{"h":"Worry About","r":"alert","t":"• A difficult airway and cervical spine instability (protect the neck, avoid excessive manipulation), cricoarytenoid narrowing, cardiac and pulmonary involvement, anemia, steroid dependence, and drug effects (methotrexate, biologics)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the cervical spine (imaging for instability), mouth opening and airway, and cardiac and pulmonary status, give steroid coverage, and plan an airway strategy."},{"h":"Anesthetic Management","r":"action","t":"• Protect the cervical spine (consider awake fiberoptic intubation and manual in-line stabilization, minimize neck movement), anticipate cricoarytenoid narrowing (smaller tube), position joints carefully, manage cardiac and pulmonary disease, give stress-dose steroids, and manage anemia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway and cervical injury, airway narrowing, cardiopulmonary complications, and positioning injury."}]},{"id":245,"title":"Riley-Day Syndrome (Familial Dysautonomia, Hereditary and Sensory Autonomic Neuropathy Type III)","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited autonomic and sensory neuropathy with profound autonomic instability, impaired pain and temperature sensation, and aspiration risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Autonomic dysfunction causes labile blood pressure and heart rate, dysautonomic crises, impaired temperature regulation, and a blunted response to hypoxia and hypercarbia, while sensory involvement gives reduced pain and reflexes; swallowing dysfunction and an absent gag cause recurrent aspiration, and lacrimation is reduced."},{"h":"Worry About","r":"alert","t":"• Severe hemodynamic lability and dysautonomic crises, aspiration (impaired swallowing, absent gag), a blunted ventilatory drive, impaired temperature regulation, and reduced pain perception, with emotional lability as a crisis trigger."},{"h":"Preoperative Preparation","r":"action","t":"• Take aspiration precautions, optimize hydration and volume (labile hemodynamics), assess respiratory and autonomic status, plan eye protection, and minimize stress that can trigger crises."},{"h":"Anesthetic Management","r":"action","t":"• Use aspiration precautions, anticipate marked hemodynamic lability (careful titrated agents and fluids, treat blood-pressure swings), support ventilation (blunted drive with anticipated postoperative support), maintain temperature actively, protect the eyes, and treat dysautonomic crises supportively."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hemodynamic lability and dysautonomic crisis, aspiration, respiratory depression, and temperature instability."}]},{"id":246,"title":"Rubella and Congenital Rubella Syndrome","cat":"Disease","L":"R","new":true,"sections":[{"h":"Overview","r":"info","t":"• A viral infection whose congenital form causes cardiac defects, deafness, cataracts, and other anomalies; anesthetic relevance centers on congenital heart disease and associated anomalies."},{"h":"Pathophysiology/Background","r":"info","t":"• Congenital rubella causes cardiac defects (patent ductus arteriosus, pulmonary stenosis), sensorineural deafness, cataracts, and neurologic and other anomalies; acquired rubella is a usually mild contagious illness dangerous to pregnant contacts."},{"h":"Worry About","r":"alert","t":"• Congenital heart disease (lesion-specific management), associated anomalies, and transmission (precautions and protection of pregnant staff)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the cardiac lesion (echo) and associated anomalies, plan lesion-specific management, and apply infection precautions."},{"h":"Anesthetic Management","r":"action","t":"• Manage the specific congenital cardiac lesion (resistance balance, de-air lines, prophylaxis), account for associated anomalies, and observe infection precautions."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Cardiac lesion-related instability, associated anomalies, and transmission risk."}]},{"id":247,"title":"Saethre-Chotzen Syndrome","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A craniosynostosis (acrocephalosyndactyly) syndrome with craniofacial and limb anomalies; anesthetic concerns are the airway and craniosynostosis surgery."},{"h":"Pathophysiology/Background","r":"info","t":"• Premature suture fusion gives an abnormal skull shape with possible raised intracranial pressure, along with facial asymmetry, ptosis, low-set ears, and syndactyly, and a possible difficult airway from craniofacial features and cervical anomalies."},{"h":"Worry About","r":"alert","t":"• Difficult airway (craniofacial features), raised intracranial pressure, cranial surgery (blood loss, venous air embolism), and possible cervical anomalies."},{"h":"Preoperative Preparation","r":"action","t":"• Assess the airway with a difficult-airway plan and intracranial pressure, plan for blood loss and venous-air-embolism monitoring for cranial surgery, and assess the cervical spine."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (fiberoptic tools, a range of sizes), manage intracranial pressure, and for craniosynostosis repair prepare for major blood loss (access, blood, warming) and monitor for venous air embolism with careful positioning."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, blood loss, venous air embolism, and raised intracranial pressure."}]},{"id":248,"title":"Sarcoma","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A malignant tumor of connective tissue (bone or soft tissue); anesthetic considerations depend on tumor site and extent and on chemotherapy and radiation effects."},{"h":"Pathophysiology/Background","r":"info","t":"• The site determines the issues (mediastinal airway or vascular compression, major resection and blood loss in extremity or retroperitoneal tumors, pulmonary metastases), and chemotherapy adds toxicities (doxorubicin cardiotoxicity, bleomycin pulmonary toxicity, myelosuppression), with pain and nutritional depletion."},{"h":"Worry About","r":"alert","t":"• Site-specific issues (mediastinal compression, major hemorrhage in large resections), chemotherapy toxicities (cardiac, pulmonary, myelosuppression), metastatic disease, and pain and nutrition."},{"h":"Preoperative Preparation","r":"action","t":"• Assess tumor site and airway or vascular involvement, chemotherapy cardiotoxicity (echo) and pulmonary toxicity, and counts, plan blood for major resection, and address nutrition and pain."},{"h":"Anesthetic Management","r":"action","t":"• Manage site-specific risks (mediastinal-mass caution; prepare for major blood loss with access, blood, warming, and invasive monitoring), limit oxygen after bleomycin, account for cardiotoxicity, manage cytopenias, and provide multimodal analgesia."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway or vascular compression, major hemorrhage, and chemotherapy-related cardiac and pulmonary issues."}]},{"id":249,"title":"Schizophrenia","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic psychiatric disorder whose anesthetic relevance is antipsychotic effects and interactions, cooperation and consent, and comorbidities."},{"h":"Pathophysiology/Background","r":"info","t":"• Antipsychotics cause QT prolongation, sedation, orthostatic hypotension, anticholinergic and extrapyramidal effects, a risk of neuroleptic malignant syndrome, and metabolic syndrome, while smoking, obesity, and cardiovascular disease are common comorbidities and cooperation may be limited."},{"h":"Worry About","r":"alert","t":"• QT prolongation and arrhythmia (avoid additional QT drugs), sedation and orthostatic hypotension, extrapyramidal and neuroleptic-malignant-syndrome risk (distinguish from MH), drug interactions, and cooperation and consent."},{"h":"Preoperative Preparation","r":"action","t":"• Continue psychiatric medications (abrupt withdrawal is risky), obtain an ECG for QT, assess comorbidities, and plan for cooperation and consent."},{"h":"Anesthetic Management","r":"action","t":"• Continue antipsychotics, avoid additional QT-prolonging drugs with monitoring, account for sedative, orthostatic, and anticholinergic effects, stay alert for neuroleptic malignant syndrome, manage comorbidities, and provide reassurance."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• QT arrhythmia, hypotension and sedation, neuroleptic malignant syndrome, and cooperation issues."}]},{"id":250,"title":"Scleroderma","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A connective-tissue disease with fibrosis of skin and organs; anesthetic concerns span the airway, lungs, heart, kidneys, GI tract, and vasculature."},{"h":"Pathophysiology/Background","r":"info","t":"• Fibrosis and vasculopathy cause tight skin and microstomia (difficult airway), Raynaud phenomenon, esophageal dysmotility and reflux (aspiration), interstitial lung disease and pulmonary hypertension, cardiac fibrosis and conduction disease, and renal involvement (scleroderma renal crisis with severe hypertension), with difficult IV access."},{"h":"Worry About","r":"alert","t":"• Difficult airway (microstomia, tight skin), aspiration (reflux, dysmotility), interstitial lung disease and pulmonary hypertension, cardiac conduction disease, renal crisis (continue ACE inhibitors), Raynaud (keep warm, protect digits), and difficult vascular access."},{"h":"Preoperative Preparation","r":"action","t":"• Plan the airway (difficult-airway strategy), give aspiration prophylaxis, assess pulmonary (function, pulmonary hypertension), cardiac, and renal status, keep the patient warm, continue ACE inhibitors, and plan vascular access."},{"h":"Anesthetic Management","r":"action","t":"• Prepare for a difficult airway (awake fiberoptic if microstomia), take aspiration precautions, manage pulmonary hypertension and interstitial disease (avoid raising resistance, ventilate protectively), manage cardiac involvement, maintain normothermia and protect the digits, and control blood pressure to protect the kidneys; regional can help where feasible."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway, aspiration, pulmonary hypertension and right-ventricular failure, renal crisis, and Raynaud and vascular issues."}]},{"id":251,"title":"Scoliosis and Kyphosis","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Spinal deformity causing restrictive lung disease and, when severe, cardiac strain; relevance includes respiratory compromise, positioning, and spine-surgery considerations."},{"h":"Pathophysiology/Background","r":"info","t":"• Curvature causes restrictive lung disease (reduced volumes, V/Q mismatch, hypoxemia) and, when severe, pulmonary hypertension and cor pulmonale, often with associated neuromuscular or syndromic conditions; corrective spine surgery involves major blood loss, prone positioning, and neuromonitoring."},{"h":"Worry About","r":"alert","t":"• Restrictive lung disease and postoperative respiratory failure, pulmonary hypertension and right-ventricular strain, associated neuromuscular disease (relaxant and succinylcholine and MH considerations), and spine-surgery risks (blood loss, prone positioning, neuromonitoring, visual loss)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory function and cardiac and pulmonary pressures and associated conditions, and plan for blood loss, neuromonitoring, and positioning."},{"h":"Anesthetic Management","r":"action","t":"• Support respiration (anticipate postoperative support in severe cases), manage any associated neuromuscular disease (avoid succinylcholine, keep MH awareness), use a neuromonitoring-compatible technique for spine surgery (total intravenous anesthesia, limited relaxant), prepare for blood loss (access, blood, cell salvage), and position prone carefully (protect the eyes and pressure points)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure, blood loss, positioning and visual loss, right-ventricular failure, and neuromonitoring interplay."}]},{"id":252,"title":"Seizures, Epileptic","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A chronic seizure disorder; anesthetic priorities are continuing anticonvulsants, avoiding triggers, and managing drug interactions."},{"h":"Pathophysiology/Background","r":"info","t":"• Recurrent seizures are controlled by anticonvulsants, many of which induce hepatic enzymes and alter the metabolism of other drugs (resistance to nondepolarizing relaxants and opioids), and certain agents or physiologic disturbances can be proconvulsant."},{"h":"Worry About","r":"alert","t":"• Seizures from anticonvulsant withdrawal or proconvulsant drugs and factors (hypoxia, hypocarbia), altered drug metabolism from enzyme induction, and interactions."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anticonvulsants including the day of surgery, note enzyme induction and interactions, avoid triggers, and ensure levels are adequate."},{"h":"Anesthetic Management","r":"action","t":"• Continue anticonvulsants, choose non-proconvulsant agents, account for enzyme induction (higher relaxant and opioid needs, with monitoring), maintain oxygenation and normocarbia, and treat seizures with benzodiazepines."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Perioperative seizures, altered drug response, and interactions."}]},{"id":253,"title":"Seizures, Intractable","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Refractory epilepsy poorly controlled despite therapy; patients may present for epilepsy surgery, adding surgical and pharmacologic complexity."},{"h":"Pathophysiology/Background","r":"info","t":"• Drug-resistant seizures on multiple anticonvulsants cause marked enzyme induction and interactions; patients may have a vagal nerve stimulator or a ketogenic diet (metabolic acidosis, hypoglycemia risk) and may present for resective surgery or awake craniotomy with electrocorticography, and status epilepticus is a risk."},{"h":"Worry About","r":"alert","t":"• Frequent seizures and status risk, marked drug interactions and relaxant and opioid resistance, ketogenic-diet effects (avoid glucose-containing fluids), vagal-nerve-stimulator considerations, and awake-craniotomy and mapping needs (avoid over-suppressing epileptiform activity)."},{"h":"Preoperative Preparation","r":"action","t":"• Continue anticonvulsants, note a ketogenic diet (glucose-free fluids, monitoring) and any stimulator, and plan the technique for awake craniotomy or mapping if applicable."},{"h":"Anesthetic Management","r":"action","t":"• Continue anticonvulsants and account for enzyme induction (higher relaxant and opioid doses), respect a ketogenic diet (avoid dextrose, monitor acid-base and glucose), for awake craniotomy plan sedation that allows cooperation and mapping without over-suppressing epileptiform activity, and manage the stimulator; treat seizures and status."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Seizures and status, drug interactions, metabolic issues, and awake-craniotomy challenges."}]},{"id":254,"title":"Sepsis, Severe Sepsis, and Septic Shock","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Life-threatening organ dysfunction from a dysregulated host response to infection, with distributive shock and multi-organ involvement — a critical emergency."},{"h":"Pathophysiology/Background","r":"info","t":"• Systemic inflammation causes vasodilation and capillary leak (distributive shock, hypovolemia), myocardial depression, coagulopathy and DIC, lactic acidosis, and organ dysfunction (acute kidney injury, ARDS, encephalopathy), requiring urgent antibiotics, source control, and resuscitation."},{"h":"Worry About","r":"alert","t":"• Vasodilatory shock refractory to fluids, myocardial depression, coagulopathy and DIC, ARDS and hypoxemia, acute kidney injury and acidosis, and profound sensitivity to anesthetic-induced hypotension (collapse on induction)."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate (fluids, early vasopressors, antibiotics, source control), use invasive monitoring, and correct coagulopathy, electrolytes, and glucose; surgery is often emergent for source control."},{"h":"Anesthetic Management","r":"action","t":"• Resuscitate aggressively (fluids, vasopressors such as norepinephrine, inotropes, invasive monitoring), induce carefully with markedly reduced doses (etomidate or ketamine, anticipating profound hypotension), ventilate protectively, correct coagulopathy, acidosis, and glucose, achieve source control, and consider stress-dose steroids for refractory shock."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Refractory shock and collapse, ARDS, acute kidney injury, coagulopathy and DIC, and death."}]},{"id":255,"title":"Shy-Drager Disease","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A neurodegenerative disorder (multiple system atrophy) with severe autonomic failure plus parkinsonian or cerebellar features; hemodynamic instability dominates management."},{"h":"Pathophysiology/Background","r":"info","t":"• Progressive autonomic failure causes severe orthostatic hypotension, an impaired baroreflex with blunted compensation (and denervation supersensitivity to catecholamines), a fixed heart rate, and impaired thermoregulation, with bulbar and laryngeal dysfunction (aspiration, stridor, sleep apnea) and respiratory irregularity."},{"h":"Worry About","r":"alert","t":"• Severe hemodynamic lability (exaggerated hypotension and exaggerated responses to sympathomimetics from supersensitivity), impaired thermoregulation, aspiration, laryngeal dysfunction and stridor, and a blunted response to hypoxia and hypercarbia."},{"h":"Preoperative Preparation","r":"action","t":"• Optimize volume, assess autonomic and orthostatic status and respiratory and laryngeal function, continue relevant medications, and plan invasive blood-pressure monitoring."},{"h":"Anesthetic Management","r":"action","t":"• Anticipate profound hypotension (invasive pressure monitoring, maintain preload and volume, use small cautious doses of direct-acting vasopressors given supersensitivity), take aspiration precautions, maintain temperature actively, support ventilation (anticipate postoperative apnea or stridor), and titrate carefully."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Severe hypotension and collapse, aspiration, respiratory and laryngeal complications, and temperature instability."}]},{"id":256,"title":"Sickle Cell Disease","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• An inherited hemoglobinopathy in which deoxygenation triggers red-cell sickling, causing vaso-occlusion and hemolysis; avoiding sickling triggers is the core anesthetic goal."},{"h":"Pathophysiology/Background","r":"info","t":"• Hemoglobin S polymerizes when deoxygenated, causing sickling and vaso-occlusion (painful crises, acute chest syndrome, stroke, organ infarction) and chronic hemolytic anemia; triggers include hypoxia, dehydration, acidosis, hypothermia, stasis, infection, and stress, and complications include functional asplenia, pulmonary hypertension, and renal disease."},{"h":"Worry About","r":"alert","t":"• Precipitating sickling (hypoxia, dehydration, acidosis, hypothermia, stasis, stress), acute chest syndrome (a leading postoperative cause of death), vaso-occlusive crisis, stroke, chronic anemia, infection (asplenia), and pulmonary hypertension."},{"h":"Preoperative Preparation","r":"action","t":"• Assess baseline hemoglobin and organ involvement, hydrate, consider transfusion (simple or exchange to reduce HbS for major surgery), provide infection prophylaxis, and plan incentive spirometry."},{"h":"Anesthetic Management","r":"action","t":"• Prevent sickling — maintain oxygenation, hydration, normothermia, normal acid-base, and good perfusion (avoid stasis) — provide adequate analgesia, transfuse per plan for major surgery, give VTE prophylaxis, and watch vigilantly for acute chest syndrome postoperatively (oxygen, spirometry, analgesia)."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Vaso-occlusive or acute chest crisis, stroke, hypoxemia, anemia, and infection."}]},{"id":257,"title":"Silicosis","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• An occupational fibrotic lung disease from inhaled silica, causing progressive restrictive (and sometimes obstructive) impairment and increased tuberculosis risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Silica exposure causes pulmonary fibrosis and nodules with restrictive lung disease, impaired gas exchange, and pulmonary hypertension or cor pulmonale, plus increased susceptibility to tuberculosis."},{"h":"Worry About","r":"alert","t":"• Restrictive lung disease and hypoxemia with limited reserve, pulmonary hypertension and right-ventricular strain, possible tuberculosis (precautions), and postoperative respiratory complications."},{"h":"Preoperative Preparation","r":"action","t":"• Assess pulmonary function, oxygenation, and pulmonary pressures, evaluate for active tuberculosis, and optimize."},{"h":"Anesthetic Management","r":"action","t":"• Use lung-protective ventilation, maintain oxygenation, avoid raising pulmonary vascular resistance and support the right ventricle, observe tuberculosis precautions if active, and anticipate postoperative respiratory support."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Hypoxemia and respiratory failure, right-ventricular failure and pulmonary hypertension, tuberculosis, and difficulty weaning."}]},{"id":258,"title":"Sleep Apnea, Central and Mixed","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Sleep-disordered breathing from loss of central respiratory drive (central) or a combination (mixed), distinct from purely obstructive apnea; relevance is sensitivity to respiratory depressants and postoperative respiratory risk."},{"h":"Pathophysiology/Background","r":"info","t":"• Central sleep apnea reflects reduced central drive (heart failure with Cheyne-Stokes breathing, opioids, CNS lesions), while mixed apnea combines central and obstructive features, causing nocturnal hypoxemia and hypercapnia and arrhythmia."},{"h":"Worry About","r":"alert","t":"• Extreme sensitivity to opioids and sedatives (respiratory depression, apnea), postoperative respiratory failure, nocturnal hypoxemia and arrhythmia, and the underlying cause (heart failure, CNS disease, opioid use)."},{"h":"Preoperative Preparation","r":"action","t":"• Identify the cause, assess severity and therapy (adaptive servo-ventilation or CPAP), and plan opioid-sparing analgesia and postoperative monitoring."},{"h":"Anesthetic Management","r":"action","t":"• Minimize opioids and sedatives (multimodal, regional), use short-acting agents, anticipate respiratory depression, plan postoperative respiratory monitoring and positive-pressure support (continue the home device), and treat the underlying cause."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Postoperative respiratory depression and failure, hypoxemia, and arrhythmia."}]},{"id":259,"title":"Sleep Apnea, Obstructive","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Repetitive upper-airway collapse during sleep producing intermittent hypoxemia and hypercarbia. Frequently accompanies obesity, hypertension, and, over time, pulmonary hypertension."},{"h":"Worry About","r":"alert","t":"• Heightened sensitivity to sedatives and opioids, which promote airway obstruction and respiratory depression.\n• Potential for difficult mask ventilation and difficult intubation.\n• Clustered respiratory events after surgery, particularly overnight."},{"h":"Preoperative Preparation","r":"action","t":"• Screen when undiagnosed (for example, the STOP-BANG questionnaire).\n• Have the patient continue home CPAP and bring the device to the hospital.\n• Minimize or omit sedative premedication."},{"h":"Anesthetic Management","r":"action","t":"• Favor opioid-sparing, multimodal analgesia and regional techniques where feasible.\n• Use short-acting agents, confirm full neuromuscular recovery, and extubate awake with the patient head-up.\n• Plan continuous oximetry (and capnography where available) after surgery; resume CPAP early in recovery."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Postoperative hypoxemia, airway obstruction, and exaggerated opioid effect.\n• Consider a monitored setting for higher-risk patients rather than an unmonitored floor bed."}]},{"id":260,"title":"Spasmodic Torticollis","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A focal (cervical) dystonia causing involuntary neck-muscle contraction and abnormal head posture; anesthetic relevance is airway positioning and botulinum-toxin treatment."},{"h":"Pathophysiology/Background","r":"info","t":"• Involuntary sustained cervical contractions cause abnormal head and neck posture and pain, treated with botulinum-toxin injections (which can affect swallowing) and anticholinergic and other agents, sometimes with limited neck movement."},{"h":"Worry About","r":"alert","t":"• Difficult airway and positioning from the fixed abnormal posture, botulinum-toxin effects (possible dysphagia and aspiration and altered neuromuscular-blocker response), and pain."},{"h":"Preoperative Preparation","r":"action","t":"• Assess neck mobility and posture and the airway, note botulinum-toxin timing and swallowing effects and medications, and plan the airway and positioning."},{"h":"Anesthetic Management","r":"action","t":"• Plan the airway around the abnormal posture (awake fiberoptic and careful positioning may be needed), take aspiration precautions if swallowing is affected, monitor neuromuscular blockade (possible altered response after recent botulinum toxin), and pad carefully."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Difficult airway and positioning, aspiration, and altered neuromuscular-blockade response."}]},{"id":261,"title":"Spinal Muscular Atrophy","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Inherited motor-neuron degeneration causing progressive weakness and respiratory compromise — a high-risk condition, especially in severe infantile forms."},{"h":"Pathophysiology/Background","r":"info","t":"• Motor-neuron degeneration causes progressive symmetric proximal weakness, respiratory-muscle weakness (restrictive disease, weak cough, recurrent infection), bulbar dysfunction (aspiration), and scoliosis, with denervated muscle; the infantile form causes profound weakness and respiratory failure."},{"h":"Worry About","r":"alert","t":"• Respiratory-muscle weakness and failure (postoperative ventilation, difficulty weaning), bulbar dysfunction and aspiration, succinylcholine hyperkalemia (denervation — avoid), sensitivity to nondepolarizers and respiratory depressants, and restrictive disease from scoliosis."},{"h":"Preoperative Preparation","r":"action","t":"• Assess respiratory function and reserve, bulbar and aspiration risk, and secretions, anticipate postoperative ventilation, and take aspiration precautions."},{"h":"Anesthetic Management","r":"action","t":"• Avoid succinylcholine (denervation hyperkalemia), use reduced-dose nondepolarizers with monitoring (sugammadex) or avoid them, minimize respiratory depressants (regional, multimodal), take aspiration precautions, manage secretions, and anticipate postoperative ventilation or noninvasive support."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Respiratory failure and difficulty weaning, aspiration, hyperkalemia with succinylcholine, and prolonged weakness."}]},{"id":262,"title":"Sturge-Weber Syndrome","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A neurocutaneous disorder with a facial port-wine stain, leptomeningeal angiomas (seizures, stroke-like episodes), and glaucoma; anesthetic concerns include seizures, airway vascular lesions, and raised intracranial pressure."},{"h":"Pathophysiology/Background","r":"info","t":"• Capillary-venous malformations cause a facial port-wine nevus (which can involve the oral mucosa and airway with bleeding), leptomeningeal angiomatosis (often refractory seizures, hemiparesis, stroke-like episodes, developmental delay, raised intracranial pressure), and glaucoma with raised intraocular pressure."},{"h":"Worry About","r":"alert","t":"• Airway and oral vascular malformations (bleeding, difficult airway), often intractable seizures, raised intracranial pressure and cerebral vascular fragility (avoid hypertension and venous congestion), and glaucoma (avoid raising intraocular pressure)."},{"h":"Preoperative Preparation","r":"action","t":"• Assess airway and oral lesions, seizure control (continue medications), neurologic and intracranial-pressure status, and glaucoma, and plan a gentle airway."},{"h":"Anesthetic Management","r":"action","t":"• Manage the airway gently (avoid trauma to vascular lesions), continue anticonvulsants and avoid seizure triggers, avoid raising intracranial and venous pressure and blood-pressure surges (vascular fragility), and avoid raising intraocular pressure."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Airway bleeding, seizures, raised intracranial pressure and stroke, and raised intraocular pressure."}]},{"id":263,"title":"Subphrenic Abscess","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• A collection of pus beneath the diaphragm, usually post-surgical or from intra-abdominal infection, causing sepsis and respiratory compromise."},{"h":"Pathophysiology/Background","r":"info","t":"• The infected subdiaphragmatic collection causes sepsis and pain that limits diaphragm movement, with sympathetic pleural effusion and atelectasis (respiratory compromise), and usually needs drainage."},{"h":"Worry About","r":"alert","t":"• Sepsis and septic shock, respiratory compromise (diaphragm splinting, effusion, atelectasis), aspiration (ileus), and fluid and electrolyte disturbance."},{"h":"Preoperative Preparation","r":"action","t":"• Resuscitate and treat sepsis (antibiotics, source control), assess respiratory status, take aspiration precautions, and correct fluids and electrolytes."},{"h":"Anesthetic Management","r":"action","t":"• Manage as a septic patient (fluids, vasopressors as needed, invasive monitoring if unstable), use rapid-sequence induction, optimize oxygenation and ventilation (effusion, atelectasis), achieve source control, and provide postoperative respiratory care."},{"h":"Anticipated Problems/Concerns","r":"alert","t":"• Sepsis and shock, respiratory compromise, and aspiration."}]},{"id":264,"title":"Supratentorial Brain Tumors","cat":"Disease","L":"S","new":true,"sections":[{"h":"Overview","r":"info","t":"• Tumors above the tentorium; the anesthetic priorities are controlling intracranial pressure, maintaining cerebral perfusion, and providing optimal surgical conditions."},{"h":"Pathophysiology/Background","r":"info","t":"• A mass and edema in the rigid cranium raise intracranial pressure (headache, vomiting, altered consciousness, focal deficits, seizures) and impair autoregulation with herniation risk; the goal is to control pressure and maintain cerebral perfusion while providing a slack brain."},{"h":"Worry About","r":"alert","t":"• Raised intracranial pressure and herniation, maintaining cerebral perfusion pressure, providing a relaxed brain (avoid hypercarbia
