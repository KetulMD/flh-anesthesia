• Deepen anesthesia (propofol) if it persists."},{"h":"Refractory","r":"action","t":"• Give a small dose of succinylcholine (with atropine in children) to break persistent spasm and secure the airway."},{"h":"Aftermath","r":"alert","t":"• Watch for negative-pressure pulmonary edema after forceful inspiration against a closed glottis."}]},{"id":420,"title":"Local Anesthetic Systemic Toxicity","cat":"Reference","L":"L","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Progresses from perioral numbness, tinnitus, and agitation to seizures, then cardiovascular toxicity (arrhythmia, conduction block, collapse); onset may be delayed."},{"h":"Immediate Actions","r":"action","t":"• Stop injecting, call for help, and manage the airway with 100% oxygen; treat seizures (benzodiazepine).\n• Give 20% lipid emulsion: bolus about 1.5 mL/kg (lean body weight) over 1 minute, then infuse about 0.25 mL/kg/min."},{"h":"Cardiac Arrest Modifications","r":"action","t":"• Use reduced epinephrine doses (under 1 mcg/kg), avoid vasopressin, calcium-channel and beta-blockers, and further local anesthetic.\n• Repeat the lipid bolus for persistent instability and increase the infusion; consider cardiopulmonary bypass for refractory arrest."},{"h":"After","r":"action","t":"• Continue lipid and monitoring after recovery (re-toxicity can occur), respecting an approximate upper limit near 10–12 mL/kg of lipid."}]},{"id":421,"title":"Malignant Hyperthermia Crisis","cat":"Reference","L":"M","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Unexplained rising end-tidal CO₂ (often earliest), tachycardia, masseter or generalized rigidity, and later hyperthermia, with acidosis, hyperkalemia, and arrhythmia after volatile agents or succinylcholine."},{"h":"Immediate Actions","r":"action","t":"• Stop all triggering agents and call for help and the MH cart.\n• Hyperventilate with 100% oxygen at high fresh-gas flow.\n• Give dantrolene 2.5 mg/kg IV and repeat until controlled (may need large cumulative doses).\n• Begin active cooling if hyperthermic."},{"h":"Treat the Derangements","r":"action","t":"• Treat hyperkalemia (calcium, insulin-glucose, bicarbonate), acidosis, and arrhythmias (avoid calcium-channel blockers with dantrolene).\n• Monitor for rhabdomyolysis (maintain urine output) and DIC."},{"h":"After","r":"action","t":"• Continue dantrolene and monitoring in ICU (recrudescence can occur), and refer for testing and MHAUS hotline guidance (in the US, 1-800-644-9737)."}]},{"id":422,"title":"Massive Transfusion Protocol","cat":"Reference","L":"M","new":true,"sections":[{"h":"Activate","r":"alert","t":"• For massive hemorrhage (e.g., anticipated large-volume loss or ongoing uncontrolled bleeding); activate early and communicate with the blood bank."},{"h":"Product Strategy","r":"action","t":"• Transfuse in a balanced ratio approximating 1:1:1 (red cells, plasma, platelets), give tranexamic acid early in trauma, and use viscoelastic or lab testing to guide fibrinogen and factor replacement."},{"h":"Prevent the Lethal Triad","r":"action","t":"• Warm all fluids and the patient (hypothermia), correct acidosis by restoring perfusion, and monitor and treat coagulopathy."},{"h":"Watch For","r":"alert","t":"• Ionized hypocalcemia (citrate — replace calcium), hyperkalemia, and transfusion reactions; monitor calcium, potassium, and coagulation frequently."}]},{"id":423,"title":"Mechanical Ventilation Strategies","cat":"Reference","L":"M","new":true,"sections":[{"h":"Lung-Protective Basics","r":"action","t":"• Use low tidal volumes (about 6–8 mL/kg predicted body weight), keep plateau pressure under 30 cmH₂O, apply appropriate PEEP, and limit driving pressure."},{"h":"ARDS","r":"action","t":"• Use lower tidal volumes with higher PEEP, permissive hypercapnia, and consider recruitment and prone positioning for severe hypoxemia."},{"h":"Intraoperative","r":"info","t":"• Apply protective settings to most patients, use recruitment judiciously, and match FiO₂ to oxygenation goals."},{"h":"Caution","r":"alert","t":"• Avoid high pressures and volumes (barotrauma and volutrauma) and account for the hemodynamic effects of PEEP, especially in the volume-depleted or right-heart-strained patient."}]},{"id":424,"title":"POCUS: Focused Cardiac Ultrasound","cat":"Reference","L":"P","new":true,"sections":[{"h":"Views","r":"info","t":"• Parasternal long and short axis, apical four-chamber, subcostal four-chamber, and the subcostal inferior vena cava view."},{"h":"What to Assess","r":"action","t":"• Gross left- and right-ventricular function, pericardial effusion and tamponade physiology, volume status (inferior vena cava), and obvious valvular abnormalities."},{"h":"Uses","r":"info","t":"• Helps evaluate undifferentiated hypotension, guide fluid and vasoactive therapy, and detect tamponade or acute right-heart strain."},{"h":"Caution","r":"alert","t":"• It is a focused, qualitative bedside tool that complements — not replaces — formal echocardiography and clinical judgment."}]},{"id":425,"title":"POCUS: Gastric Ultrasound","cat":"Reference","L":"P","new":true,"sections":[{"h":"Technique","r":"action","t":"• Scan the gastric antrum in the supine and right-lateral positions to assess contents and estimate volume from the cross-sectional area."},{"h":"Interpretation","r":"info","t":"• An empty antrum suggests low risk; clear fluid may be physiologic in small volumes, while a large fluid volume or solid content indicates a full stomach."},{"h":"Uses","r":"action","t":"• Helps decide aspiration risk and anesthetic plan when fasting status is uncertain, in emergencies, or with conditions delaying emptying (including GLP-1 agonists)."},{"h":"Caution","r":"alert","t":"• Interpret with clinical context; it informs, rather than replaces, aspiration-precaution judgment."}]},{"id":426,"title":"POCUS: Lung Ultrasound","cat":"Reference","L":"P","new":true,"sections":[{"h":"Normal & Interstitial","r":"info","t":"• Horizontal A-lines with lung sliding indicate normal aeration; multiple vertical B-lines indicate interstitial fluid (edema, inflammation)."},{"h":"Pneumothorax","r":"alert","t":"• Absent lung sliding with a lung point supports pneumothorax (though absent sliding has other causes)."},{"h":"Effusion & Consolidation","r":"info","t":"• Dependent anechoic fluid indicates pleural effusion, and tissue-like lung with air bronchograms indicates consolidation."},{"h":"Uses","r":"action","t":"• Rapidly evaluates hypoxemia and dyspnea, distinguishes edema from other causes, and detects pneumothorax and effusions at the bedside."}]},{"id":427,"title":"Postoperative Delirium Prevention","cat":"Reference","L":"P","new":true,"sections":[{"h":"Risk Factors","r":"info","t":"• Older age, preexisting cognitive impairment, frailty, sensory deficits, and major or emergency surgery raise risk."},{"h":"Prevention","r":"action","t":"• Use multicomponent care — reorientation, sleep and mobility promotion, sensory aids (glasses, hearing aids), hydration, and effective non-opioid pain control."},{"h":"Medication Strategy","r":"action","t":"• Minimize deliriogenic drugs (benzodiazepines, anticholinergics), consider dexmedetomidine, and avoid oversedation."},{"h":"Note","r":"alert","t":"• Delirium worsens outcomes; screen at-risk patients and address reversible contributors (pain, hypoxia, infection, retention) promptly."}]},{"id":428,"title":"Torsades de Pointes","cat":"Reference","L":"T","new":true,"sections":[{"h":"Recognize","r":"alert","t":"• Polymorphic ventricular tachycardia with a twisting axis on a background of QT prolongation; may be self-limited or degenerate into ventricular fibrillation."},{"h":"Immediate Treatment","r":"action","t":"• Give IV magnesium sulfate (about 2 g) even if the level is normal, and defibrillate if pulseless or unstable."},{"h":"Address the Cause","r":"action","t":"• Correct potassium and magnesium, stop QT-prolonging drugs, and treat the underlying cause."},{"h":"Refractory / Bradycardia-Dependent","r":"action","t":"• Increase the heart rate with overdrive pacing or isoproterenol (in acquired long QT) to shorten the QT and suppress recurrence."}]},{"id":429,"title":"Vasopressor Selection","cat":"Reference","L":"V","new":true,"sections":[{"h":"By Physiology","r":"action","t":"• Distributive (septic) shock: norepinephrine first, add vasopressin, then consider epinephrine or angiotensin II.\n• Cardiogenic shock: inotrope (dobutamine, epinephrine, or milrinone) with a vasopressor as needed.\n• Anaphylaxis: epinephrine."},{"h":"Special Situations","r":"info","t":"• Right-ventricular failure or pulmonary hypertension: support systemic pressure (norepinephrine, vasopressin) and the right ventricle (milrinone, dobutamine, inhaled pulmonary vasodilators), avoiding rises in pulmonary resistance.\n• Dynamic outflow obstruction (HOCM): pure vasoconstrictor (phenylephrine), avoid inotropes."},{"h":"Practical","r":"action","t":"• Treat transient hypotension with boluses (phenylephrine, ephedrine) while correcting the cause, and start an infusion for sustained needs."},{"h":"Caution","r":"alert","t":"• Extravasation of vasoconstrictors causes tissue injury (prefer central access), and refractory vasoplegia may need multiple mechanisms (catecholamine, vasopressin, angiotensin II, steroid)."}]},{"id":430,"title":"Induction, RSI & Rescue Bolus Doses (Adult)","cat":"Reference","L":"I","new":true,"sections":[{"h":"Overview","r":"info","t":"• Typical adult IV bolus ranges for induction, paralysis, and intraoperative rescue. Titrate to effect, comorbidity, age, and volume status; reduce in the frail, elderly, or hemodynamically unstable."},{"h":"Induction Agents","r":"action","t":"• Propofol: 1.5–2.5 mg/kg IV (reduce to 1–1.5 mg/kg if elderly/unstable).\n• Etomidate: 0.2–0.3 mg/kg IV (hemodynamically stable; transient adrenal suppression after a single dose).\n• Ketamine: 1–2 mg/kg IV (0.5–1 mg/kg if catecholamine-depleted); 4–6 mg/kg IM.\n• Midazolam: 0.02–0.04 mg/kg IV co-induction; 1–2 mg titrated for anxiolysis.\n• Remimazolam: ~5–12 mg IV titrated (procedural); flumazenil-reversible.\n• Dexmedetomidine: 1 mcg/kg over 10 min load, then 0.2–0.7 mcg/kg/h (adjunct, not a reliable sole induction agent)."},{"h":"Opioids","r":"action","t":"• Fentanyl: 1–3 mcg/kg IV (higher to blunt laryngoscopy).\n• Remifentanil: 0.5–1 mcg/kg over 30–60 s, then 0.05–0.2 mcg/kg/min.\n• Sufentanil: 0.1–0.5 mcg/kg IV.\n• Hydromorphone 0.2–0.5 mg IV; morphine 0.05–0.1 mg/kg IV, titrated."},{"h":"Neuromuscular Blockers","r":"action","t":"• Succinylcholine 1–1.5 mg/kg IV for RSI (2 mg/kg infants; ~3–4 mg/kg IM without IV).\n• Rocuronium 0.6 mg/kg intubating; 1.0–1.2 mg/kg for RSI (sugammadex-reversible).\n• Vecuronium 0.1 mg/kg; cisatracurium 0.15–0.2 mg/kg (organ-independent)."},{"h":"Reversal","r":"action","t":"• Sugammadex 2 mg/kg (≥2 twitches), 4 mg/kg (deep block), 16 mg/kg (immediate after 1.2 mg/kg rocuronium).\n• Neostigmine 0.03–0.07 mg/kg IV (max ~5 mg) with glycopyrrolate 0.2 mg per 1 mg neostigmine; only for minimal block."},{"h":"Hemodynamic Rescue","r":"action","t":"• Phenylephrine 50–200 mcg; ephedrine 5–10 mg; epinephrine 10–100 mcg IV (0.5 mg IM for anaphylaxis; 1 mg IV for arrest).\n• Vasopressin 1–2 units IV; atropine 0.5–1 mg IV (max ~3 mg); glycopyrrolate 0.2–0.4 mg IV.\n• Calcium chloride 500–1000 mg IV (central) for hyperkalemia/hypocalcemia/CCB toxicity."},{"h":"Antagonists","r":"action","t":"• Naloxone 40–80 mcg IV titrated q2–3 min (avoid abrupt full reversal).\n• Flumazenil 0.2 mg IV, repeat to 1 mg (seizure risk if benzodiazepine-dependent)."},{"h":"Worry About","r":"alert","t":"• Dose stacking and slow circulation time in low-output states.\n• Succinylcholine is contraindicated where hyperkalemia is a risk (burns >24–48 h, denervation, prolonged immobility, some myopathies) — rocuronium plus sugammadex is the alternative.\n• Confirm weight-based doses and local concentrations before giving."}]},{"id":431,"title":"OR Emergency & Code Doses (ACLS / PALS)","cat":"Reference","L":"O","new":true,"sections":[{"h":"Overview","r":"info","t":"• Adult ACLS and pediatric PALS dosing aligned with 2025 AHA guidance. High-quality compressions and early defibrillation are the highest-value actions; drugs are adjuncts. Confirm all weight-based doses."},{"h":"Adult Cardiac Arrest","r":"action","t":"• Epinephrine 1 mg IV/IO every 3–5 min (early in non-shockable rhythms; after initial shocks fail in VF/pVT).\n• Amiodarone 300 mg IV/IO, then 150 mg — OR — lidocaine 1–1.5 mg/kg then 0.5–0.75 mg/kg.\n• Do not routinely give bicarbonate, calcium, magnesium, or steroids without a specific indication."},{"h":"Adult Peri-Arrest","r":"action","t":"• Unstable bradycardia: atropine 1 mg IV q3–5 min (max 3 mg); then transcutaneous pacing or an epinephrine/dopamine infusion.\n• Stable regular SVT: adenosine 6 mg rapid push → 12 mg (use 3 mg via central line).\n• Unstable tachycardia with a pulse: synchronized cardioversion (biphasic, energy by rhythm width/regularity)."},{"h":"Pediatric Arrest (PALS)","r":"action","t":"• Epinephrine 0.01 mg/kg (0.1 mL/kg of 0.1 mg/mL) IV/IO q3–5 min, max single dose 1 mg.\n• Amiodarone 5 mg/kg IV/IO (max single 300 mg), up to 3 doses — OR — lidocaine 1 mg/kg.\n• Defibrillation 2 J/kg → 4 J/kg → up to 10 J/kg. Synchronized cardioversion 0.5–1 J/kg, up to 2 J/kg.\n• Fluid bolus 10–20 mL/kg isotonic crystalloid, reassessing between boluses."},{"h":"Reversible Causes (H's & T's)","r":"info","t":"• Hypovolemia, hypoxia, hydrogen ion (acidosis), hypo-/hyperkalemia, hypothermia, hypoglycemia.\n• Tension pneumothorax, tamponade, toxins, thrombosis (pulmonary or coronary)."},{"h":"Worry About","r":"alert","t":"• Interrupting compressions for drugs or airway — keep pauses minimal.\n• Weight-estimation errors in children (use a length-based tape).\n• Treating a number rather than correcting the underlying cause."}]}]</script></script>
<script>
(function(){
  "use strict";
  var DATA = JSON.parse(document.getElementById('data').textContent);
  DATA.forEach(function(e){
    var blob=e.title; for(var i=0;i<e.sections.length;i++) blob+=' '+e.sections[i].t;
    e._s=blob.toLowerCase();
  });

  var list=document.getElementById('list'), q=document.getElementById('q'),
      clear=document.getElementById('clear'), count=document.getElementById('count'),
      chips=document.getElementById('chips');
  var modal=document.getElementById('modal'), modalBody=document.getElementById('modalBody'),
      modalTitle=document.getElementById('modalTitle'), modalClose=document.getElementById('modalClose');
  var state={term:'', cat:'all', open:{}};

  var CATAB={Disease:'Cond',Drug:'Drug',Supplement:'Supp',Reference:'Ref'};
  function esc(s){return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function hi(text,term){
    var safe=esc(text); if(!term) return safe;
    var t=term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    try{return safe.replace(new RegExp('('+t+')','ig'),'<mark>$1</mark>');}catch(e){return safe;}
  }
  var ICON={
    action:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>',
    alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>'
  };

  function renderSection(sec,term,sid){
    var role=sec.r||'info';
    var lines=sec.t.split('\n').filter(function(l){return l.trim();});
    var html='<div class="sec sec--'+role+'" id="'+sid+'"><div class="sech">'+(ICON[role]||'')+esc(sec.h)+'</div>';
    var i=0;
    while(i<lines.length){
      if(lines[i].indexOf('\u2022')===0){
        html+='<ul>';
        while(i<lines.length && lines[i].indexOf('\u2022')===0){
          html+='<li>'+hi(lines[i].replace(/^\u2022\s*/,''),term)+'</li>'; i++;
        }
        html+='</ul>';
      } else { html+='<p>'+hi(lines[i],term)+'</p>'; i++; }
    }
    return html+'</div>';
  }

  function buildBody(e,term){
    var body='';
    for(var i=0;i<e.sections.length;i++){
      var s=e.sections[i], sid='s'+e.id+'-'+i;
      body+=renderSection(s,term,sid);
    }
    return '<div class="body">'+body+'</div>';
  }

  function entryNode(e,term){
    var d=document.createElement('div');
    d.className='entry'+(state.open[e.id]?' open':'');
    d.setAttribute('data-cat',e.cat);
    var head='<button class="etop" data-id="'+e.id+'"><span class="tag"></span>'+
      '<span class="etitle">'+hi(e.title,term)+'</span>'+
      (e['new']&&e.cat==='Drug'?'<span class="badge-new">Current</span>':'')+
      '<span class="ecat">'+(CATAB[e.cat]||e.cat)+'</span>'+
      '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round"><path d="m9 6 6 6-6 6"/></svg></button>';
    d.innerHTML=head+(state.open[e.id]?buildBody(e,term):'');
    return d;
  }

  function run(){
    var term=state.term.trim().toLowerCase();
    var res=DATA.filter(function(e){
      if(state.cat!=='all'&&e.cat!==state.cat) return false;
      if(term&&e._s.indexOf(term)===-1) return false;
      return true;
    });
    count.innerHTML='<b>'+res.length+'</b> '+(res.length===1?'entry':'entries');
    list.innerHTML='';
    if(!res.length){ list.innerHTML='<div class="empty">No matches for <b>'+esc(state.term)+'</b>.<br>Try a shorter term or a symptom.</div>'; return; }
    var frag=document.createDocumentFragment();
    if(term){
      res.sort(function(a,b){
        var at=a.title.toLowerCase().indexOf(term), bt=b.title.toLowerCase().indexOf(term);
        var aT=at>-1,bT=bt>-1;
        if(aT!==bT) return aT?-1:1;
        if(aT&&bT&&at!==bt) return at-bt;
        return a.title.localeCompare(b.title);
      });
      res.forEach(function(e){frag.appendChild(entryNode(e,state.term.trim()));});
    } else {
      var groups={};
      res.forEach(function(e){(groups[e.L]=groups[e.L]||[]).push(e);});
      Object.keys(groups).sort().forEach(function(L){
        var g=document.createElement('div'); g.className='lettergroup';
        g.innerHTML='<div class="lh">'+L+'</div>';
        groups[L].sort(function(a,b){return a.title.localeCompare(b.title);}).forEach(function(e){g.appendChild(entryNode(e,''));});
        frag.appendChild(g);
      });
    }
    list.appendChild(frag);
  }

  function openModal(id){
    var e=DATA.find(function(x){return x.id===id;}); if(!e) return;
    modalTitle.innerHTML=esc(e.title)+'<span class="mcat mcat-'+e.cat+'">'+(CATAB[e.cat]||e.cat)+'</span>';
    modalBody.innerHTML=buildBody(e,state.term.trim());
    modalBody.scrollTop=0;
    modal.classList.add('on'); modal.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
    modalClose.focus();
  }
  function closeModal(){
    modal.classList.remove('on'); modal.setAttribute('aria-hidden','true');
    document.body.style.overflow=''; modalBody.innerHTML='';
  }

  list.addEventListener('click',function(ev){
    var btn=ev.target.closest('.etop'); if(!btn) return;
    openModal(+btn.getAttribute('data-id'));
  });
  modalBody.addEventListener('click',function(ev){
    var pill=ev.target.closest('.jpill'); if(!pill) return;
    var el=document.getElementById(pill.getAttribute('data-go'));
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  });
  modal.addEventListener('click',function(ev){ if(ev.target.closest('[data-close]')) closeModal(); });
  modalClose.addEventListener('click',closeModal);

  var t;
  q.addEventListener('input',function(){
    clear.style.display=q.value?'block':'none';
    clearTimeout(t); t=setTimeout(function(){state.term=q.value; run();},90);
  });
  clear.addEventListener('click',function(){q.value='';state.term='';clear.style.display='none';run();q.focus();});
  chips.addEventListener('click',function(ev){
    var c=ev.target.closest('.chip'); if(!c) return;
    [].forEach.call(chips.children,function(x){x.classList.remove('on');});
    c.classList.add('on'); state.cat=c.getAttribute('data-cat'); run();
  });
  document.addEventListener('keydown',function(ev){
    if(ev.key!=='Escape') return;
    if(modal.classList.contains('on')){ closeModal(); return; }
    if(document.activeElement===q){q.value='';state.term='';clear.style.display='none';run();}
  });
  run();
})();
</script>
</body>
</html>
